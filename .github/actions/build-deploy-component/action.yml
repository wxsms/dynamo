name: 'Build Deploy Component'
description: 'Build and push a deploy component container (operator, snapshot, or power-agent)'

inputs:
  component:
    description: 'Component to build: operator, snapshot, or power-agent'
    required: true
  image_tag:
    description: 'Image tag to apply to built images'
    required: true
  target:
    description: 'Dockerfile target to build. Defaults to agent for snapshot and the default target for operator.'
    required: false
    default: ''
  builder_name:
    description: 'Buildx builder name'
    required: true
  aws_default_region:
    description: 'AWS Default Region'
    required: true
  aws_account_id:
    description: 'AWS Account ID'
    required: true
  azure_acr_hostname:
    description: 'Optional Azure ACR hostname for docker login'
    required: false
    default: ''
  azure_acr_user:
    description: 'Optional Azure ACR username for docker login'
    required: false
    default: ''
  azure_acr_password:
    description: 'Optional Azure ACR password for docker login'
    required: false
    default: ''
  ngc_ci_access_token:
    description: 'Optional NGC CI access token for nvcr.io login'
    required: false
    default: ''
  extra_tags:
    description: 'Optional newline-separated list of fully-qualified extra image URIs to also tag and push'
    required: false
    default: ''
  extra_build_args:
    description: 'Optional newline-separated KEY=VALUE build args'
    required: false
    default: ''
  archive_sources:
    description: |
      When 'true', build with ENABLE_SOURCE_ARCHIVAL=true and extract /sources/
      as a workflow artifact. Off by default — top-level callers opt in
      (post-merge-ci.yml sets true for push to main / release branches).
      Applies to the inline-compliance components (operator, snapshot); no
      effect for power-agent.
    required: false
    default: 'false'
  diff_event_context:
    description: |
      OSRB CSV diff baseline context (operator + snapshot): pr | push | ''. Empty
      skips baseline resolution and ships a baseline_unavailable diff. Selects
      the rule in container/compliance/resolve_diff_base.py.
    required: false
    default: ''
  diff_current_branch:
    description: 'Current branch (github.ref_name) for OSRB diff baseline selection.'
    required: false
    default: ''
  diff_base_branch:
    description: 'PR target branch (changed-files base_ref); selects the main vs release/* baseline rule.'
    required: false
    default: ''
  diff_merge_base_sha:
    description: 'PR merge-base SHA; pins PR->main OSRB diffs to the fork point.'
    required: false
    default: ''
  gh_token:
    description: |
      Token with actions: read to download a prior run's baseline compliance
      artifact (cross-run) for the OSRB diff. Empty -> the diff soft-degrades
      to a baseline_unavailable marker (build stays green).
    required: false
    default: ''

outputs:
  image_tag:
    description: 'The image tag applied to built images'
    value: ${{ inputs.image_tag }}

runs:
  using: composite
  steps:
    - name: Determine build settings
      id: settings
      shell: bash
      run: |
        if [[ "${{ inputs.component }}" == "operator" ]]; then
          echo "build_platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
        else
          echo "build_platforms=linux/amd64" >> $GITHUB_OUTPUT
        fi
        # Compliance /legal + /sboms are captured on a single platform: the
        # operator's Go-only build is arch-invariant, and snapshot ships amd64
        # only (cuda-checkpoint has no arm64 binary). Both baselines have an
        # -amd64 variant.
        echo "compliance_platform=linux/amd64" >> $GITHUB_OUTPUT
        # Per-component inline-compliance baseline *stem* + whether to run the
        # inline license/SBOM stages. The licenses stage appends
        # -${TARGETARCH}.cdx.json to subtract each arch's own floor.
        #
        # run_compliance gates the extract/upload steps: it is true only for the
        # shipped, /legal-bearing stage. The snapshot `placeholder` target is a
        # restore image built FROM an arbitrary framework runtime (not
        # cuda-dl-base) and carries no /legal, so it must NOT run compliance —
        # only the default `agent` build does. power-agent has no baseline at all.
        EFFECTIVE_TARGET="${{ inputs.target }}"
        if [[ -z "${EFFECTIVE_TARGET}" && "${{ inputs.component }}" == "snapshot" ]]; then
          EFFECTIVE_TARGET="agent"
        fi
        BASELINE_STEM=""
        RUN_COMPLIANCE=""
        case "${{ inputs.component }}" in
          operator)
            BASELINE_STEM="go@e86c88d0"
            [[ -z "${{ inputs.target }}" ]] && RUN_COMPLIANCE="true" ;;
          snapshot)
            BASELINE_STEM="cuda-dl-base@8315e245"
            [[ "${EFFECTIVE_TARGET}" == "agent" ]] && RUN_COMPLIANCE="true" ;;
        esac
        echo "baseline_stem=${BASELINE_STEM}" >> $GITHUB_OUTPUT
        echo "run_compliance=${RUN_COMPLIANCE}" >> $GITHUB_OUTPUT

    - name: Initialize Dynamo Builder
      uses: ./.github/actions/init-dynamo-builder
      with:
        builder_name: ${{ inputs.builder_name }}
        flavor: general
        arch: ${{ steps.settings.outputs.build_platforms }}

    - name: Docker Login
      uses: ./.github/actions/docker-login
      with:
        aws_default_region: ${{ inputs.aws_default_region }}
        aws_account_id: ${{ inputs.aws_account_id }}
        azure_acr_hostname: ${{ inputs.azure_acr_hostname }}
        azure_acr_user: ${{ inputs.azure_acr_user }}
        azure_acr_password: ${{ inputs.azure_acr_password }}
        ngc_ci_access_token: ${{ inputs.ngc_ci_access_token }}

    - name: Build and push Container
      shell: bash
      working-directory: ./deploy/${{ inputs.component }}
      env:
        ECR_HOSTNAME: ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com
        IMAGE_REGISTRY: ai-dynamo
        IMAGE_REPOSITORY: dynamo
      run: |
        ECR_DEFAULT_IMAGE_BASE="${ECR_HOSTNAME}/${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}"
        IMAGE_URIS=("${ECR_DEFAULT_IMAGE_BASE}:${{ inputs.image_tag }}")

        # Append optional full extra image URIs provided by caller.
        while IFS= read -r extra_image; do
          if [[ -n "$extra_image" ]]; then
            IMAGE_URIS+=("$extra_image")
          fi
        done <<< "${{ inputs.extra_tags }}"

        TAGGING_FLAGS=$(printf -- '-t %s ' "${IMAGE_URIS[@]}")
        echo "flags for docker buildx: ${TAGGING_FLAGS}"

        TARGET="${{ inputs.target }}"
        if [[ -z "${TARGET}" && "${{ inputs.component }}" == "snapshot" ]]; then
          TARGET="agent"
        fi

        TARGET_FLAG=""
        if [[ -n "${TARGET}" ]]; then
          TARGET_FLAG="--target ${TARGET}"
        fi

        BUILD_ARGS=("--build-arg" "DOCKER_PROXY=${ECR_HOSTNAME}/dockerhub/")
        # Inline-compliance build args (operator + snapshot). BASELINE_SBOM_FILE
        # is the per-arch baseline *stem*; the licenses stage appends
        # -${TARGETARCH}.cdx.json to subtract each arch's own floor (mirrors
        # container/context.yaml). Empty stem (power-agent) → no compliance.
        if [[ "${{ steps.settings.outputs.run_compliance }}" == "true" ]]; then
          BUILD_ARGS+=("--build-arg" "BASELINE_SBOM_FILE=${{ steps.settings.outputs.baseline_stem }}")
          BUILD_ARGS+=("--build-arg" "ENABLE_SOURCE_ARCHIVAL=${{ inputs.archive_sources }}")
        fi
        while IFS= read -r build_arg; do
          if [[ -n "${build_arg}" ]]; then
            BUILD_ARGS+=("--build-arg" "${build_arg}")
          fi
        done <<< "${{ inputs.extra_build_args }}"

        # operator and snapshot both consume the named `snapshot` build context
        # (deploy/operator/Dockerfile COPYs --from=snapshot; the snapshot image
        # IS that tree), and the named `operator` build context (deploy/snapshot/
        # Dockerfile COPYs --from=operator for the `replace => ../operator` module).
        # power-agent is self-contained, so omit both there.
        # operator + snapshot additionally consume the `compliance` context for
        # their inline license/SBOM stages (COPY --from=compliance).
        BUILD_CONTEXT_FLAG=""
        if [[ "${{ inputs.component }}" != "power-agent" ]]; then
          BUILD_CONTEXT_FLAG="--build-context snapshot=../snapshot --build-context operator=../operator"
        fi
        if [[ "${{ steps.settings.outputs.run_compliance }}" == "true" ]]; then
          BUILD_CONTEXT_FLAG="${BUILD_CONTEXT_FLAG} --build-context compliance=../../container/compliance"
        fi

        docker buildx build --push \
            --platform ${{ steps.settings.outputs.build_platforms }} \
            "${BUILD_ARGS[@]}" \
            ${BUILD_CONTEXT_FLAG} \
            ${TARGET_FLAG} \
            ${TAGGING_FLAGS} -f Dockerfile .

        DISPLAY_NAME="${{ inputs.component }}"
        echo "### 🐳 ${DISPLAY_NAME^} Container Images" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Image URI |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|" >> $GITHUB_STEP_SUMMARY
        for image_uri in "${IMAGE_URIS[@]}"; do
          echo "| \`${image_uri}\` |" >> $GITHUB_STEP_SUMMARY
        done

    # Inline-compliance extraction (operator + snapshot). Reuses the warm BuildKit
    # cache from the push step above; compliance_artifact is FROM scratch so the
    # export is a few MB regardless of runtime image size.
    - name: Compliance extract
      if: ${{ steps.settings.outputs.run_compliance == 'true' }}
      shell: bash
      working-directory: ./deploy/${{ inputs.component }}
      env:
        ECR_HOSTNAME: ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com
      run: |
        mkdir -p /tmp/compliance
        # Single FROM-scratch compliance_artifact stage → the unified /legal tree
        # (flat NOTICES-<Eco>.txt + osrb-deps.csv + osrb.cdx.json). Runs on one
        # platform, so buildx exports directly into dest. Keep BASELINE_SBOM_FILE
        # in sync with the build-and-push step above.
        BUILD_ARGS=("--build-arg" "DOCKER_PROXY=${ECR_HOSTNAME}/dockerhub/")
        BUILD_ARGS+=("--build-arg" "BASELINE_SBOM_FILE=${{ steps.settings.outputs.baseline_stem }}")
        while IFS= read -r build_arg; do
          if [[ -n "${build_arg}" ]]; then
            BUILD_ARGS+=("--build-arg" "${build_arg}")
          fi
        done <<< "${{ inputs.extra_build_args }}"
        docker buildx build \
            --platform ${{ steps.settings.outputs.compliance_platform }} \
            "${BUILD_ARGS[@]}" \
            --build-context snapshot=../snapshot \
            --build-context operator=../operator \
            --build-context compliance=../../container/compliance \
            --target compliance_artifact \
            --output type=local,dest=/tmp/compliance \
            --progress=plain \
            -f Dockerfile .
        # Name the OSRB files: osrb-<component>-<arch>-<sha8>.{csv,cdx.json}.
        SHA8=$(echo "${{ github.sha }}" | cut -c1-8); [ -z "${SHA8}" ] && SHA8="nosha"
        ARCH=$(echo "${{ steps.settings.outputs.compliance_platform }}" | sed 's|.*linux/||')
        for f in /tmp/compliance/osrb-deps.csv /tmp/compliance/osrb.cdx.json; do
          if [ ! -s "${f}" ]; then echo "::error::Missing/empty compliance output: ${f}"; exit 1; fi
        done
        mv /tmp/compliance/osrb-deps.csv "/tmp/compliance/osrb-${{ inputs.component }}-${ARCH}-${SHA8}.csv"
        mv /tmp/compliance/osrb.cdx.json "/tmp/compliance/osrb-${{ inputs.component }}-${ARCH}-${SHA8}.cdx.json"

    # Inline-compliance OSRB diff (operator + snapshot). Resolves a baseline build,
    # downloads its compliance artifact, and emits osrb-<component>-<arch>-<sha8>.diff.csv
    # next to the full CSV — the same resolve -> fetch -> diff flow the framework
    # images get from shared-build-image.yml + the compliance-extract action,
    # which these hand-written Dockerfiles can't reuse (they aren't rendered by
    # container/render.py). Empty diff_event_context or a missing baseline
    # soft-degrades to a baseline_unavailable marker; the build stays green.
    - name: Resolve diff baseline
      id: resolve-diff-base
      if: ${{ steps.settings.outputs.run_compliance == 'true' && inputs.diff_event_context != '' }}
      shell: bash
      # All workflow-context values pass via env (never interpolated into the
      # script body) so attacker-controllable strings like branch names can't
      # inject shell — see zizmor "template-injection".
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        DIFF_EVENT_CONTEXT: ${{ inputs.diff_event_context }}
        DIFF_CURRENT_BRANCH: ${{ inputs.diff_current_branch }}
        DIFF_BASE_BRANCH: ${{ inputs.diff_base_branch }}
        DIFF_MERGE_BASE_SHA: ${{ inputs.diff_merge_base_sha }}
        DIFF_CURRENT_SHA: ${{ github.sha }}
        DIFF_REPO: ${{ github.repository }}
        DIFF_RUN_ID: ${{ github.run_id }}
        IMAGE_TAG: ${{ inputs.image_tag }}
      run: |
        # The build checkout is shallow with no tags. Make the refs each baseline
        # rule needs reachable (all best-effort; a miss just yields an empty
        # base_sha and a baseline_unavailable diff). Depth 30 gives the
        # first-parent baseline walks enough history to find an artifact:
        git fetch --deepen=30 --quiet || true                                     # HEAD~N (main post-merge walk)
        git fetch --tags --quiet || true                                          # vX.Y.Z tags (release branch)
        if [ "${DIFF_BASE_BRANCH}" = "main" ] && [ -n "${DIFF_MERGE_BASE_SHA}" ]; then
          git fetch --no-tags --depth=30 origin "${DIFF_MERGE_BASE_SHA}" --quiet || true # stable PR fork-point walk
        fi
        CURRENT_VERSION=$(grep -m1 -E '^version[[:space:]]*=' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/' || true)
        # The compliance artifact is compliance-<image_tag>, and image_tag is
        # <github.sha>-<suffix> (e.g. -operator, -snapshot-agent), so the baseline
        # lookup targets compliance-<baseSHA>-<suffix>. Derive the suffix from
        # image_tag by stripping the leading <sha>- (the SHA carries no dash).
        ARTIFACT_PREFIX="${IMAGE_TAG#*-}"
        python3 container/compliance/resolve_diff_base.py \
          --event-context "${DIFF_EVENT_CONTEXT}" \
          --current-branch "${DIFF_CURRENT_BRANCH}" \
          --base-branch "${DIFF_BASE_BRANCH}" \
          --merge-base-sha "${DIFF_MERGE_BASE_SHA}" \
          --current-sha "${DIFF_CURRENT_SHA}" \
          --current-version "${CURRENT_VERSION}" \
          --artifact-prefix "${ARTIFACT_PREFIX}" \
          --repo "${DIFF_REPO}" \
          --current-run-id "${DIFF_RUN_ID}" \
          >> "$GITHUB_OUTPUT"

    # Download the resolved baseline's compliance artifact so the diff has
    # something to compare against. Any miss (expired retention, never built, no
    # token) leaves /tmp/compliance-base empty and the diff marks it unavailable.
    - name: Fetch baseline compliance artifact
      id: fetch-baseline
      if: ${{ steps.settings.outputs.run_compliance == 'true' && steps.resolve-diff-base.outputs.base_artifact_id != '' && inputs.gh_token != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        REPO: ${{ github.repository }}
        ARTIFACT_ID: ${{ steps.resolve-diff-base.outputs.base_artifact_id }}
        BASE_RUN_ID: ${{ steps.resolve-diff-base.outputs.base_run_id }}
      run: |
        set -euo pipefail
        ARCHIVE="${RUNNER_TEMP}/compliance-baseline-${ARTIFACT_ID}.zip"
        mkdir -p /tmp/compliance-base
        if [ -n "${BASE_RUN_ID}" ]; then
          echo "baseline_run_id=${BASE_RUN_ID}" >> "$GITHUB_OUTPUT"
        fi
        if gh api -X GET "/repos/${REPO}/actions/artifacts/${ARTIFACT_ID}/zip" \
          > "${ARCHIVE}" && unzip -q "${ARCHIVE}" -d /tmp/compliance-base; then
          echo "Downloaded baseline artifact ${ARTIFACT_ID}."
          echo "baseline_available=true" >> "$GITHUB_OUTPUT"
        else
          echo "Baseline download failed; diff will mark it unavailable."
          echo "baseline_available=false" >> "$GITHUB_OUTPUT"
        fi

    # Emit osrb-<component>-<arch>-<sha8>.diff.csv next to the full CSV, plus a
    # self-describing baseline/ folder. Always runs so a diff (real or a
    # baseline_unavailable marker) always ships. The operator + snapshot compliance
    # artifacts are single-platform and flat, so both the current and baseline
    # CSVs sit directly under their dest dirs (arch_dir ".").
    - name: Compute OSRB diff
      if: ${{ steps.settings.outputs.run_compliance == 'true' && always() }}
      shell: bash
      env:
        REPO: ${{ github.repository }}
        BASE_SHA: ${{ steps.resolve-diff-base.outputs.base_sha }}
        BASE_LABEL: ${{ steps.resolve-diff-base.outputs.base_label }}
        BASE_RUN_ID: ${{ steps.fetch-baseline.outputs.baseline_run_id }}
      run: |
        set -euo pipefail
        shopt -s nullglob

        # Write baseline/ (metadata + baseline CSV copy) into an arch dir.
        # $1 = arch dir, $2 = baseline CSV path ('' when unavailable).
        write_baseline_folder() {
          local dir="$1/baseline" base_csv="$2"
          mkdir -p "${dir}"
          {
            echo "# OSRB diff baseline"
            echo
            echo "The \`*.diff.csv\` next to this folder compares this build's OSRB"
            echo "dependency CSV against the baseline described below."
            echo
            echo "## How the baseline is chosen (by build context)"
            echo "- PR targeting \`main\` -> PR merge-base (or nearest earlier commit with an artifact)"
            echo "- Post-merge on \`main\` -> the previous commit on \`main\`"
            echo "- PR / post-merge on \`release/*\` -> highest release tag \`vX.Y.Z\` strictly older than the current version (semver first, later publish date breaks same-version ties)"
            echo "- Nightly -> the previous successful scheduled nightly run (manual runs excluded)"
            echo
            echo "## This build's baseline"
            echo "- Label: ${BASE_LABEL:-(none)}"
            if [ -n "${BASE_SHA}" ]; then
              echo "- Baseline commit SHA: \`${BASE_SHA}\`"
              echo "- Commit: https://github.com/${REPO}/commit/${BASE_SHA}"
            else
              echo "- Baseline commit SHA: (none — no baseline was available)"
            fi
            if [ -n "${BASE_RUN_ID:-}" ] && [ "${BASE_RUN_ID}" != "null" ]; then
              echo "- Generating workflow run: https://github.com/${REPO}/actions/runs/${BASE_RUN_ID}"
            fi
            if [ -n "${base_csv}" ]; then
              echo "- Baseline CSV (copied into this folder): \`$(basename "${base_csv}")\`"
            else
              echo "- Baseline CSV: unavailable (expired artifact, first build of the line, or no prior run)"
            fi
          } > "${dir}/BASELINE.md"
          if [ -n "${base_csv}" ]; then cp "${base_csv}" "${dir}/"; fi
          echo "Wrote baseline folder: ${dir}"
        }

        diff_one() {  # $1 = current CSV, $2 = arch dir name (e.g. linux_amd64)
          local cur="$1" arch_dir="$2"
          local out="${cur%.csv}.diff.csv"
          local base_csv="" base_arg=()
          # Pick the baseline's full CSV, skipping its own *.diff.csv sibling
          # (baseline artifacts now ship a diff too, and osrb-*.csv would match it).
          for cand in /tmp/compliance-base/"${arch_dir}"/osrb-*.csv; do
            [ -f "${cand}" ] || continue
            case "${cand}" in *.diff.csv) continue;; esac
            base_csv="${cand}"
            base_arg=(--base "${base_csv}")
            break
          done
          python3 container/compliance/diff_osrb_csv.py \
            --current "${cur}" \
            "${base_arg[@]}" \
            --baseline-label "${BASE_LABEL}" \
            --output "${out}"
          echo "Wrote diff: ${out}"
          write_baseline_folder "$(dirname "${cur}")" "${base_csv}"
        }
        found=0
        for d in /tmp/compliance/linux_*; do
          [ -d "$d" ] || continue
          for cur in "$d"/osrb-*.csv; do
            [ -f "$cur" ] || continue
            case "$cur" in *.diff.csv) continue;; esac
            found=1
            diff_one "$cur" "$(basename "$d")"
          done
        done
        if [ "${found}" -eq 0 ]; then  # single-platform: files directly under dest
          for cur in /tmp/compliance/osrb-*.csv; do
            [ -f "$cur" ] || continue
            case "$cur" in *.diff.csv) continue;; esac
            diff_one "$cur" "."
          done
        fi

    # /sources/ extraction: opt-in via archive_sources. PR / on-demand leave it
    # false; post-merge-ci.yml sets it true for push to main + release branches.
    - name: Extract /sources/ (opt-in via archive_sources)
      if: ${{ steps.settings.outputs.run_compliance == 'true' && inputs.archive_sources == 'true' }}
      shell: bash
      working-directory: ./deploy/${{ inputs.component }}
      env:
        ECR_HOSTNAME: ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_default_region }}.amazonaws.com
      run: |
        mkdir -p /tmp/sources
        BUILD_ARGS=("--build-arg" "DOCKER_PROXY=${ECR_HOSTNAME}/dockerhub/")
        BUILD_ARGS+=("--build-arg" "BASELINE_SBOM_FILE=${{ steps.settings.outputs.baseline_stem }}")
        BUILD_ARGS+=("--build-arg" "ENABLE_SOURCE_ARCHIVAL=true")
        while IFS= read -r build_arg; do
          if [[ -n "${build_arg}" ]]; then
            BUILD_ARGS+=("--build-arg" "${build_arg}")
          fi
        done <<< "${{ inputs.extra_build_args }}"
        docker buildx build \
            --platform ${{ steps.settings.outputs.compliance_platform }} \
            "${BUILD_ARGS[@]}" \
            --build-context snapshot=../snapshot \
            --build-context operator=../operator \
            --build-context compliance=../../container/compliance \
            --target sources_archive \
            --output type=local,dest=/tmp/sources \
            --progress=plain \
            -f Dockerfile .

    - name: Upload compliance artifact (NOTICES + CSV + CycloneDX)
      if: ${{ steps.settings.outputs.run_compliance == 'true' && always() }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        # compliance-<git-sha>-<component> (image_tag is already <github.sha>-<component>),
        # matching the framework images' compliance-<git-sha>-<container> naming.
        name: compliance-${{ inputs.image_tag }}
        path: /tmp/compliance/
        retention-days: 90

    - name: Upload /sources/ archive (opt-in via archive_sources)
      if: ${{ steps.settings.outputs.run_compliance == 'true' && inputs.archive_sources == 'true' }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: compliance-${{ inputs.image_tag }}-sources
        path: /tmp/sources/
        retention-days: 90
