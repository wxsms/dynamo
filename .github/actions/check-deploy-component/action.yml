name: 'Check Deploy Component'
description: 'Run validation checks for a deploy component'

inputs:
  component:
    description: 'Component to check: operator or snapshot'
    required: true
  platform:
    description: 'Docker platform used for linter and tester targets'
    required: true

runs:
  using: composite
  steps:
    - name: Linter
      shell: bash
      working-directory: ./deploy/${{ inputs.component }}
      run: |
        docker buildx build \
          --platform ${{ inputs.platform }} \
          --target linter \
          --progress=plain \
          --build-context snapshot=../snapshot \
          --build-context operator=../operator \
          .

    - name: Tester
      shell: bash
      working-directory: ./deploy/${{ inputs.component }}
      run: |
        docker buildx build \
          --platform ${{ inputs.platform }} \
          --target tester \
          --progress=plain \
          --build-context snapshot=../snapshot \
          --build-context operator=../operator \
          --build-context operator-chart=../helm/charts/platform/components/operator \
          .

    - name: Set up Go
      if: ${{ inputs.component == 'operator' }}
      uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
      with:
        go-version: '1.26.3'

    - name: Set up Python
      if: ${{ inputs.component == 'operator' }}
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Python dependencies for operator checks
      if: ${{ inputs.component == 'operator' }}
      shell: bash
      working-directory: ./deploy/operator
      run: |
        python -m pip install --upgrade pip
        python -m pip install \
          "pydantic>=2,<3" \
          "black==23.1.0" \
          "pyyaml>=6.0" \
          "pytest==9.0.3" \
          "pytest-timeout==2.4.0"

    - name: Check operator generated files
      if: ${{ inputs.component == 'operator' }}
      shell: bash
      working-directory: ./deploy/operator
      run: |
        make check

    - name: Test Go/Python DGD override boundary
      if: ${{ inputs.component == 'operator' }}
      shell: bash
      env:
        DYNAMO_RUN_DGD_OVERRIDE_GO_INTEGRATION: "1"
        PYTHONPATH: ${{ github.workspace }}/components/src
      run: |
        go version
        python -m pytest \
          -c /dev/null \
          --confcutdir=components/src/dynamo/profiler/tests/integration \
          -W ignore::pytest.PytestUnknownMarkWarning \
          -o "cache_dir=${RUNNER_TEMP}/dgd-override-pytest-cache" \
          -q \
          components/src/dynamo/profiler/tests/integration/test_dgd_override_go_integration.py
