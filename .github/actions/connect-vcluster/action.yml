name: 'Connect to vCluster'
description: 'Establish a port-forward to a vCluster and output its kubeconfig as base64'

inputs:
  host_kubeconfig_base64:
    description: 'Base64-encoded kubeconfig for host cluster access'
    required: false
    default: ''
  vcluster_name:
    description: 'Name of the vCluster to connect to'
    required: true
  vcluster_namespace:
    description: 'Host namespace where the vCluster is running'
    required: true
outputs:
  kubeconfig_base64:
    description: 'Base64-encoded kubeconfig for the vCluster (points to 127.0.0.1:8443 via port-forward)'
    value: ${{ steps.connect.outputs.kubeconfig_base64 }}

runs:
  using: "composite"
  steps:
    - name: Setup host kubeconfig
      if: inputs.host_kubeconfig_base64 != ''
      shell: bash
      run: |
        echo "${{ inputs.host_kubeconfig_base64 }}" | base64 -d > ${{ github.workspace }}/.kubeconfig-host
        chmod 600 ${{ github.workspace }}/.kubeconfig-host
        echo "KUBECONFIG=${{ github.workspace }}/.kubeconfig-host" >> $GITHUB_ENV

    - name: Install vCluster CLI
      uses: ./.github/actions/install-vcluster-cli

    - name: Connect to vCluster
      id: connect
      shell: bash
      env:
        VCLUSTER_NAME: ${{ inputs.vcluster_name }}
        NAMESPACE: ${{ inputs.vcluster_namespace }}
      run: |
        echo "::group::Port-forward and generate vCluster kubeconfig"
        set -e

        PF_LOG="${{ github.workspace }}/.vcluster-port-forward.log"
        PF_PID_FILE="${{ github.workspace }}/.vcluster-port-forward.pid"
        WATCHDOG_LOG="${{ github.workspace }}/.vcluster-port-forward-watchdog.log"
        WATCHDOG_PID_FILE="${{ github.workspace }}/.vcluster-port-forward-watchdog.pid"
        KUBECONFIG_PATH="${{ github.workspace }}/.kubeconfig-vcluster"
        KUBECONFIG_TMP="${KUBECONFIG_PATH}.tmp"

        start_port_forward() {
          kubectl port-forward -n "${NAMESPACE}" "svc/${VCLUSTER_NAME}" 8443:443 > "${PF_LOG}" 2>&1 &
          PF_PID=$!
          echo "${PF_PID}" > "${PF_PID_FILE}"
          echo "Started vCluster API port-forward pid ${PF_PID}; log: ${PF_LOG}"
        }

        wait_for_port_forward() {
          for attempt in $(seq 1 30); do
            if [ -f "${PF_PID_FILE}" ]; then
              PF_PID="$(cat "${PF_PID_FILE}")"
              if [ -n "${PF_PID}" ] && ! kill -0 "${PF_PID}" 2>/dev/null; then
                echo "::error::kubectl port-forward exited before local port was reachable"
                tail -n 100 "${PF_LOG}" || true
                exit 1
              fi
            fi
            if curl -sk --connect-timeout 1 --max-time 2 https://127.0.0.1:8443/healthz >/dev/null; then
              echo "vCluster API reachable after ${attempt} attempt(s)"
              return 0
            fi
            sleep 2
          done
          echo "::error::vCluster API did not become reachable within 60s"
          tail -n 100 "${PF_LOG}" || true
          exit 1
        }

        # In the Self-bootstrap rerun path, setup-dynamo-operator already started a
        # backgrounded `kubectl port-forward` to 127.0.0.1:8443 that survives across
        # steps. Reuse it instead of racing for the same local port (which would
        # fail with "address already in use" and break this step).
        if curl -sk --connect-timeout 1 --max-time 2 https://127.0.0.1:8443/healthz >/dev/null; then
          echo "Existing port-forward on 127.0.0.1:8443 detected; reusing"
        else
          # The vCluster pod must be Ready before port-forwarding. A Pending pod
          # causes `kubectl port-forward` to exit immediately ("unable to forward
          # port because pod is not running. Current status=Pending"); because it's
          # backgrounded, the script continues, and the connectivity check later
          # fails with "connection refused" on 127.0.0.1:8443.
          #
          # Assumes the pod is already scheduled by the time we get here — true for
          # all current callers (deploy-operator creates the StatefulSet upstream,
          # and pods land near-instantly when CPU/GPU/memory requests fit a node).
          # If a future caller hits "no matching resources found" exiting immediately,
          # `kubectl wait --for=condition=ready` does not poll for resources to
          # appear; remediate with one of:
          #   - poll `kubectl get pod -l ... -o name` until non-empty, then wait
          #   - `kubectl rollout status statefulset/${VCLUSTER_NAME}` first
          #   - chain `kubectl wait --for=create pod ... ` then `--for=condition=ready` (kubectl >= 1.31)
          echo "Waiting for vCluster pod (app=vcluster,release=${VCLUSTER_NAME}) to be Ready (timeout 300s)..."
          kubectl wait --for=condition=ready pod \
            -l "app=vcluster,release=${VCLUSTER_NAME}" \
            -n "${NAMESPACE}" \
            --timeout=300s

          start_port_forward
          wait_for_port_forward
        fi

        for attempt in $(seq 1 5); do
          if vcluster connect "${VCLUSTER_NAME}" \
            --namespace "${NAMESPACE}" \
            --server=https://127.0.0.1:8443 \
            --print > "${KUBECONFIG_TMP}"; then
            mv "${KUBECONFIG_TMP}" "${KUBECONFIG_PATH}"
            break
          fi

          if [ "${attempt}" = "5" ]; then
            echo "::error::vcluster connect failed after ${attempt} attempts"
            exit 1
          fi

          echo "vcluster connect failed on attempt ${attempt}; retrying..."
          sleep $((attempt * 2))
        done

        echo "Verifying vCluster connectivity..."
        kubectl --kubeconfig="${KUBECONFIG_PATH}" \
          --request-timeout=15s get ns

        if [ ! -f "${WATCHDOG_PID_FILE}" ] || ! kill -0 "$(cat "${WATCHDOG_PID_FILE}")" 2>/dev/null; then
          nohup bash -c '
            set +e
            pf_pid_file="$1"
            pf_log="$2"
            namespace="$3"
            vcluster_name="$4"

            start_pf() {
              kubectl port-forward -n "${namespace}" "svc/${vcluster_name}" 8443:443 > "${pf_log}" 2>&1 &
              echo "$!" > "${pf_pid_file}"
            }

            while true; do
              if ! curl -sk --connect-timeout 1 --max-time 2 https://127.0.0.1:8443/healthz >/dev/null; then
                if [ -f "${pf_pid_file}" ]; then
                  pf_pid="$(cat "${pf_pid_file}")"
                  if [ -n "${pf_pid}" ]; then
                    kill "${pf_pid}" 2>/dev/null || true
                  fi
                fi
                start_pf
              fi
              sleep 5
            done
          ' _ "${PF_PID_FILE}" "${PF_LOG}" "${NAMESPACE}" "${VCLUSTER_NAME}" > "${WATCHDOG_LOG}" 2>&1 &
          echo "$!" > "${WATCHDOG_PID_FILE}"
          echo "Started vCluster API port-forward watchdog; log: ${WATCHDOG_LOG}"
        fi

        KUBECONFIG_B64=$(base64 < "${KUBECONFIG_PATH}" | tr -d '\n')
        echo "kubeconfig_base64=${KUBECONFIG_B64}" >> $GITHUB_OUTPUT
        echo "::endgroup::"
