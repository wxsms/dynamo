name: Request NVSkills CI

on:
  issue_comment:
    types: [created]
  push:

permissions:
  contents: read
  pull-requests: read

jobs:
  team-request:
    uses: ./.github/workflows/nvskills-team-request.yml
    secrets:
      NVSKILLS_CI_DISPATCH_TOKEN: ${{ secrets.NVSKILLS_CI_DISPATCH_TOKEN }}
