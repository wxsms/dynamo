name: Post-Merge CI Pipeline

on:
  push:
    branches:
      - main
      - 'release/*.*.*'
  workflow_dispatch:
    inputs:
      framework:
        description: 'Framework to validate'
        type: choice
        options: [all, vllm, sglang, trtllm]
        default: all

permissions:
  contents: read

jobs:
  # ============================================================================
  # DISPATCH CONFIG
  # On workflow_dispatch, narrows the run to a single framework.
  # On push, all run flags resolve to true (full pipeline as before).
  # ============================================================================
  config:
    name: Config
    runs-on: ubuntu-latest
    outputs:
      run_vllm:   ${{ steps.flags.outputs.run_vllm }}
      run_sglang: ${{ steps.flags.outputs.run_sglang }}
      run_trtllm: ${{ steps.flags.outputs.run_trtllm }}
    steps:
      - id: flags
        shell: bash
        env:
          FW: ${{ github.event.inputs.framework || 'all' }}
        run: |
          for f in vllm sglang trtllm; do
            if [[ "$FW" == "all" || "$FW" == "$f" ]]; then
              echo "run_$f=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_$f=false" >> "$GITHUB_OUTPUT"
            fi
          done

  # ============================================================================
  # DYNAMO RUNTIME PIPELINE
  # ============================================================================
  dynamo-pipeline:
    name: dynamo-runtime
    if: github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/dynamo-pipeline.yml
    with:
      builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
      # TODO: widen to include `post_merge` — today it picks up tests
      # (e.g. fault_tolerance/deploy/*) that fail in this container-only
      # context. Matches the coverage of the old container-validation-dynamo
      # workflow.
      cpu_parallel_test_markers: 'pre_merge and parallel and not (vllm or sglang or trtllm) and (gpu_0)'
      cpu_sequential_test_markers: 'pre_merge and not parallel and not (vllm or sglang or trtllm) and (gpu_0)'
      gpu_test_markers: 'pre_merge and none and gpu_1'
    secrets: inherit

  # ============================================================================
  # OPERATOR BUILD
  # ============================================================================
  operator:
    name: Operator
    runs-on: prod-default-v2
    outputs:
      operator_default_tag: ${{ steps.build.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        # Do not use fetch-depth: 0 — it fetches all 1600+ branches (~3 min)
      - name: Build and push operator
        id: build
        uses: ./.github/actions/build-deploy-component
        with:
          component: operator
          image_tag: ${{ github.sha }}-operator
          builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
          extra_tags: |
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-operator

# ============================================================================
# Snapshot Agent
# ============================================================================

  snapshot-agent:
    name: Snapshot Agent
    if: github.event_name != 'workflow_dispatch'
    runs-on: prod-default-v2
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Build and push snapshot agent
        uses: ./.github/actions/build-deploy-component
        with:
          component: snapshot
          image_tag: ${{ github.sha }}-snapshot-agent
          builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
          extra_tags: |
            ${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-snapshot-agent

  # ============================================================================
  # BUILD JOBS
  # ============================================================================

  vllm-build:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [config]
    if: github.event_name != 'workflow_dispatch' || needs.config.outputs.run_vllm == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: vllm
      target: runtime
      cuda_version: '["12.9", "13.0"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
      build_timeout_minutes: 120
      extra_tags: |
        ${{ github.ref_name == 'main' && 'main-vllm-runtime' || '' }}
        ${{ github.ref_name == 'main' && format('main-vllm-runtime-{0}', github.sha) || '' }}
    secrets: inherit

  vllm-dev-build:
    name: vllm-dev
    needs: [config]
    if: github.event_name != 'workflow_dispatch' || needs.config.outputs.run_vllm == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: vllm
      target: dev
      cuda_version: '["12.9", "13.0"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
      push_image: true
      build_timeout_minutes: 60
      extra_tags: |
        ${{ github.ref_name == 'main' && 'main-vllm-dev' || '' }}
        ${{ github.ref_name == 'main' && format('main-vllm-dev-{0}', github.sha) || '' }}
    secrets: inherit

  vllm-efa-build:
    name: vllm-runtime-efa
    needs: [config]
    if: github.event_name != 'workflow_dispatch' || needs.config.outputs.run_vllm == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: vllm
      target: runtime
      platform: 'linux/amd64'
      cuda_version: '["12.9"]'
      make_efa: true
      builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
      build_timeout_minutes: 120
      extra_tags: |
        ${{ github.ref_name == 'main' && 'main-vllm-efa' || '' }}
        ${{ github.ref_name == 'main' && format('main-vllm-efa-{0}', github.sha) || '' }}
    secrets: inherit

  sglang-build:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [config]
    if: github.event_name != 'workflow_dispatch' || needs.config.outputs.run_sglang == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: sglang
      target: runtime
      cuda_version: '["12.9", "13.0"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
      build_timeout_minutes: 120
      extra_tags: |
        ${{ github.ref_name == 'main' && 'main-sglang-runtime' || '' }}
        ${{ github.ref_name == 'main' && format('main-sglang-runtime-{0}', github.sha) || '' }}
    secrets: inherit

  sglang-dev-build:
    name: sglang-dev
    needs: [config]
    if: github.event_name != 'workflow_dispatch' || needs.config.outputs.run_sglang == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: sglang
      target: dev
      cuda_version: '["12.9", "13.0"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
      push_image: true
      build_timeout_minutes: 60
      extra_tags: |
        ${{ github.ref_name == 'main' && 'main-sglang-dev' || '' }}
        ${{ github.ref_name == 'main' && format('main-sglang-dev-{0}', github.sha) || '' }}
    secrets: inherit

  sglang-efa-build:
    name: sglang-runtime-efa
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: sglang
      target: runtime
      platform: 'linux/amd64,linux/arm64'
      cuda_version: '["12.9"]'
      make_efa: true
      builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
      build_timeout_minutes: 120
      extra_tags: |
        ${{ github.ref_name == 'main' && 'main-sglang-efa' || '' }}
        ${{ github.ref_name == 'main' && format('main-sglang-efa-{0}', github.sha) || '' }}
    secrets: inherit

  trtllm-build:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [config]
    if: github.event_name != 'workflow_dispatch' || needs.config.outputs.run_trtllm == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: trtllm
      target: runtime
      cuda_version: '["13.1"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
      build_timeout_minutes: 120
      extra_tags: |
        ${{ github.ref_name == 'main' && 'main-trtllm-runtime' || '' }}
        ${{ github.ref_name == 'main' && format('main-trtllm-runtime-{0}', github.sha) || '' }}
    secrets: inherit

  trtllm-dev-build:
    name: trtllm-dev
    needs: [config]
    if: github.event_name != 'workflow_dispatch' || needs.config.outputs.run_trtllm == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: trtllm
      target: dev
      cuda_version: '["13.1"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
      push_image: true
      build_timeout_minutes: 60
      extra_tags: |
        ${{ github.ref_name == 'main' && 'main-trtllm-dev' || '' }}
        ${{ github.ref_name == 'main' && format('main-trtllm-dev-{0}', github.sha) || '' }}
    secrets: inherit

  trtllm-efa-build:
    name: trtllm-runtime-efa
    needs: [config]
    if: github.event_name != 'workflow_dispatch' || needs.config.outputs.run_trtllm == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: trtllm
      target: runtime
      platform: 'linux/amd64'
      cuda_version: '["13.1"]'
      make_efa: true
      builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
      build_timeout_minutes: 120
      extra_tags: |
        ${{ github.ref_name == 'main' && 'main-trtllm-efa' || '' }}
        ${{ github.ref_name == 'main' && format('main-trtllm-efa-{0}', github.sha) || '' }}
    secrets: inherit

  planner-build:
    name: planner # This name overlaps with other planner jobs to group them in the UI
    if: github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: dynamo
      target: planner
      cuda_version: '[""]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
      build_timeout_minutes: 45
      extra_tags: |
        ${{ github.ref_name == 'main' && 'main-dynamo-planner' || '' }}
        ${{ github.ref_name == 'main' && format('main-dynamo-planner-{0}', github.sha) || '' }}
    secrets: inherit

  frontend-build:
    name: frontend
    needs: [config]
    if: github.event_name != 'workflow_dispatch' || needs.config.outputs.run_vllm == 'true'
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: dynamo
      target: frontend
      cuda_version: '[""]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
      build_timeout_minutes: 45
      extra_tags: |
        ${{ github.ref_name == 'main' && 'main-dynamo-frontend' || '' }}
        ${{ github.ref_name == 'main' && format('main-dynamo-frontend-{0}', github.sha) || '' }}
    secrets: inherit

  # ============================================================================
  # TEST JOBS
  # ============================================================================

  vllm-test:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [vllm-build]
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: vllm
      test_type: Test
      amd_runner: prod-tester-amd-gpu-v1 # This runner is overridden for ARM platform
      target_tag_plain: ${{ needs.vllm-build.outputs.target_tag_plain }}
      cuda_version: '["12.9", "13.0"]'
      platform: '["amd64", "arm64"]' # arm64 for CPU tests, single GPU tests are skipped
      run_cpu_only_tests: true
      cpu_only_test_markers: '(pre_merge or post_merge) and vllm and gpu_0'
      gpu_test_markers: '(pre_merge or post_merge) and vllm and gpu_1'
      gpu_test_timeout_minutes: 120
    secrets: inherit

  vllm-multi-gpu-test:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [vllm-build]
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: vllm
      test_type: Multi-GPU Test
      amd_runner: prod-tester-amd-gpu-4-v1
      target_tag_plain: ${{ needs.vllm-build.outputs.target_tag_plain }}
      cuda_version: '["12.9", "13.0"]'
      platform: '["amd64"]' # No ARM GPUs available
      run_sanity_check: false
      gpu_test_markers: '(pre_merge or post_merge) and vllm and (gpu_2 or gpu_4)'
      gpu_test_timeout_minutes: 60
    secrets: inherit

  vllm-efa-test:
    name: vllm-runtime-efa
    needs: [vllm-efa-build]
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: vllm-efa
      test_type: CPU Test
      amd_runner: prod-tester-amd-gpu-4-v1
      target_tag_plain: ${{ needs.vllm-efa-build.outputs.target_tag_plain }}
      cuda_version: '["12.9"]'
      platform: '["amd64"]'
      run_cpu_only_tests: true
      cpu_only_test_markers: '(pre_merge or post_merge) and vllm and gpu_0'
      run_gpu_tests: false
    secrets: inherit

  sglang-test:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [sglang-build]
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: sglang
      test_type: Test
      amd_runner: prod-tester-amd-gpu-v1 # This runner is overridden for ARM platform
      target_tag_plain: ${{ needs.sglang-build.outputs.target_tag_plain }}
      cuda_version: '["12.9", "13.0"]'
      platform: '["amd64", "arm64"]' # arm64 for CPU tests, single GPU tests are skipped
      run_cpu_only_tests: true
      cpu_only_test_markers: '(pre_merge or post_merge) and sglang and gpu_0'
      gpu_test_markers: '(pre_merge or post_merge) and sglang and gpu_1'
      gpu_test_timeout_minutes: 120
    secrets: inherit

  sglang-multi-gpu-test:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [sglang-build]
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: sglang
      test_type: Multi-GPU Test
      amd_runner: prod-tester-amd-gpu-4-v1
      target_tag_plain: ${{ needs.sglang-build.outputs.target_tag_plain }}
      cuda_version: '["12.9", "13.0"]'
      platform: '["amd64"]' # No ARM GPUs available
      run_sanity_check: false
      gpu_test_markers: '(pre_merge or post_merge) and sglang and (gpu_2 or gpu_4)'
      gpu_test_timeout_minutes: 60
    secrets: inherit

  trtllm-test:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [trtllm-build]
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: trtllm
      test_type: Test
      amd_runner: prod-tester-amd-gpu-v1 # This runner is overridden for ARM platform
      target_tag_plain: ${{ needs.trtllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.1"]'
      platform: '["amd64", "arm64"]' # arm64 for CPU tests, single GPU tests are skipped
      run_cpu_only_tests: true
      cpu_only_test_markers: '(pre_merge or post_merge) and trtllm and gpu_0'
      gpu_test_markers: '(pre_merge or post_merge) and trtllm and gpu_1'
      gpu_test_timeout_minutes: 120
    secrets: inherit

  trtllm-multi-gpu-test:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [trtllm-build]
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: trtllm
      test_type: Multi-GPU Test
      amd_runner: prod-tester-amd-gpu-4-v1
      target_tag_plain: ${{ needs.trtllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.1"]'
      platform: '["amd64"]' # No ARM GPUs available
      run_sanity_check: false
      gpu_test_markers: '(pre_merge or post_merge) and trtllm and (gpu_2 or gpu_4)'
      gpu_test_timeout_minutes: 60
    secrets: inherit

  trtllm-efa-test:
    name: trtllm-runtime-efa
    needs: [trtllm-efa-build]
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: trtllm-efa
      test_type: CPU Test
      amd_runner: prod-tester-amd-gpu-4-v1
      target_tag_plain: ${{ needs.trtllm-efa-build.outputs.target_tag_plain }}
      cuda_version: '["13.1"]'
      platform: '["amd64"]'
      run_cpu_only_tests: true
      cpu_only_test_markers: '(pre_merge or post_merge) and trtllm and gpu_0'
      run_gpu_tests: false
    secrets: inherit

  planner-test:
    name: planner # This name overlaps with other planner jobs to group them in the UI
    needs: [planner-build]
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: planner
      test_type: CPU Test
      amd_runner: prod-tester-amd-gpu-v1 # TODO: CPU only DinD runner for dynamo repo
      target_tag_plain: ${{ needs.planner-build.outputs.target_tag_plain }}
      cuda_version: '[""]'
      platform: '["amd64"]'
      run_sanity_check: false
      run_cpu_only_tests: true
      cpu_parallel_mode: none
      cpu_only_test_markers: '(pre_merge or post_merge) and planner and gpu_0'
      cpu_only_test_timeout_minutes: 30
      run_gpu_tests: false
    secrets: inherit

  # ============================================================================
  # IMAGE COMPLIANCE JOBS
  # ============================================================================

  vllm-compliance:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [vllm-build]
    uses: ./.github/workflows/shared-compliance.yml
    with:
      framework: vllm
      target: runtime
      target_tag_plain: ${{ needs.vllm-build.outputs.target_tag_plain }}
      cuda_version: '["12.9", "13.0"]'
      platform: '["amd64", "arm64"]'
    secrets: inherit

  sglang-compliance:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [sglang-build]
    uses: ./.github/workflows/shared-compliance.yml
    with:
      framework: sglang
      target: runtime
      target_tag_plain: ${{ needs.sglang-build.outputs.target_tag_plain }}
      cuda_version: '["12.9", "13.0"]'
      platform: '["amd64", "arm64"]'
    secrets: inherit

  trtllm-compliance:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [trtllm-build]
    uses: ./.github/workflows/shared-compliance.yml
    with:
      framework: trtllm
      target: runtime
      target_tag_plain: ${{ needs.trtllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.1"]'
      platform: '["amd64", "arm64"]'
    secrets: inherit

  planner-compliance:
    name: planner # This name overlaps with other planner jobs to group them in the UI
    needs: [planner-build]
    uses: ./.github/workflows/shared-compliance.yml
    with:
      framework: dynamo
      target: planner
      target_tag_plain: ${{ needs.planner-build.outputs.target_tag_plain }}
      cuda_version: '[""]'
      platform: '["amd64", "arm64"]'
    secrets: inherit

  frontend-compliance:
    name: frontend # This name overlaps with other frontend jobs to group them in the UI
    needs: [frontend-build]
    uses: ./.github/workflows/shared-compliance.yml
    with:
      framework: dynamo
      target: frontend
      target_tag_plain: ${{ needs.frontend-build.outputs.target_tag_plain }}
      cuda_version: '[""]'
      platform: '["amd64", "arm64"]'
    secrets: inherit

  # ============================================================================
  # IMAGE COPY JOBS
  # ============================================================================

  vllm-copy-to-acr:
    name: vllm-runtime # This name overlaps with other vllm jobs to group them in the UI
    needs: [vllm-build, vllm-test]
    if: |
      always() &&
      needs.vllm-build.result == 'success' &&
      (needs.vllm-test.result == 'success' || needs.vllm-test.result == 'skipped')
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.vllm-build.outputs.target_tag_plain }}
      cuda_version: '["12.9"]' # Deploy tests only use CUDA 12
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 20
    secrets: inherit

  sglang-copy-to-acr:
    name: sglang-runtime # This name overlaps with other sglang jobs to group them in the UI
    needs: [sglang-build, sglang-test]
    if: |
      always() &&
      needs.sglang-build.result == 'success' &&
      (needs.sglang-test.result == 'success' || needs.sglang-test.result == 'skipped')
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.sglang-build.outputs.target_tag_plain }}
      cuda_version: '["12.9"]' # Deploy tests only use CUDA 12
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 20
    secrets: inherit

  trtllm-copy-to-acr:
    name: trtllm-runtime # This name overlaps with other trtllm jobs to group them in the UI
    needs: [trtllm-build, trtllm-test]
    if: |
      always() &&
      needs.trtllm-build.result == 'success' &&
      (needs.trtllm-test.result == 'success' || needs.trtllm-test.result == 'skipped')
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.trtllm-build.outputs.target_tag_plain }}
      cuda_version: '["13.1"]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 20
    secrets: inherit

  frontend-copy-to-acr:
    name: frontend # This name overlaps with other frontend jobs to group them in the UI
    needs: [frontend-build, frontend-compliance]
    if: |
      always() &&
      needs.frontend-build.result == 'success' &&
      (needs.frontend-compliance.result == 'success' || needs.frontend-compliance.result == 'skipped')
    uses: ./.github/workflows/shared-copy.yml
    with:
      target_tag_plain: ${{ needs.frontend-build.outputs.target_tag_plain }}
      cuda_version: '[""]'
      override_arch: amd64 # We are using AMD64 images only on the rest of the clusters.
      copy_timeout_minutes: 20
    secrets: inherit

  # ============================================================================
  # DEPLOYMENT JOBS
  # Deploy operator and run end-to-end tests on Kubernetes cluster
  # ============================================================================

  deploy-operator:
    needs: [operator]
    runs-on: prod-default-small-v2
    outputs:
      namespace: ${{ steps.setup.outputs.namespace }}
      vcluster_name: ${{ steps.setup.outputs.vcluster_name }}
      operator_tag: ${{ steps.setup.outputs.operator_tag }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Setup vCluster and operator
      id: setup
      uses: ./.github/actions/setup-dynamo-operator
      with:
        kubeconfig_base64: ${{ secrets.AZURE_AKS_CI_KUBECONFIG_B64 }}
        registry: ${{ secrets.AZURE_ACR_HOSTNAME }}
        operator_tag: ${{ needs.operator.outputs.operator_default_tag }}
        hf_token: ${{ secrets.HF_TOKEN }}
        dockerhub_username: ${{ secrets.DOCKERHUB_LOGIN_USER }}
        dockerhub_password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

  deploy-test-vllm:
    needs: [deploy-operator, vllm-copy-to-acr]
    uses: ./.github/workflows/shared-deploy-test.yml
    with:
      framework: vllm
      profiles: '["agg", "agg_router", "disagg", "disagg_router"]'
      image_suffix: vllm-runtime-cuda12
      namespace: ${{ needs.deploy-operator.outputs.namespace }}
      vcluster_name: ${{ needs.deploy-operator.outputs.vcluster_name }}
      operator_tag: ${{ needs.deploy-operator.outputs.operator_tag }}
    secrets: inherit

  deploy-test-sglang:
    needs: [deploy-operator, sglang-copy-to-acr]
    uses: ./.github/workflows/shared-deploy-test.yml
    with:
      framework: sglang
      profiles: '["agg", "agg_router"]'
      image_suffix: sglang-runtime-cuda12
      namespace: ${{ needs.deploy-operator.outputs.namespace }}
      vcluster_name: ${{ needs.deploy-operator.outputs.vcluster_name }}
      operator_tag: ${{ needs.deploy-operator.outputs.operator_tag }}
    secrets: inherit

  deploy-test-trtllm:
    needs: [deploy-operator, trtllm-copy-to-acr]
    uses: ./.github/workflows/shared-deploy-test.yml
    with:
      framework: trtllm
      profiles: '["agg", "agg_router"]'
      image_suffix: trtllm-runtime-cuda13
      namespace: ${{ needs.deploy-operator.outputs.namespace }}
      vcluster_name: ${{ needs.deploy-operator.outputs.vcluster_name }}
      operator_tag: ${{ needs.deploy-operator.outputs.operator_tag }}
    secrets: inherit

  deploy-cleanup:
    if: always()
    needs: [deploy-operator, deploy-test-vllm, deploy-test-sglang, deploy-test-trtllm, deploy-test-gaie]
    runs-on: prod-default-small-v2
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Teardown vCluster
      if: needs.deploy-operator.outputs.namespace != '' && needs.deploy-operator.outputs.vcluster_name != ''
      uses: ./.github/actions/teardown-dynamo-operator
      with:
        kubeconfig_base64: ${{ secrets.AZURE_AKS_CI_KUBECONFIG_B64 }}
        vcluster_name: ${{ needs.deploy-operator.outputs.vcluster_name }}
        vcluster_namespace: ${{ needs.deploy-operator.outputs.namespace }}

  # ============================================================================
  # GAIE DEPLOY TEST
  # ============================================================================
  deploy-test-gaie:
    name: GAIE Deploy Test
    runs-on: prod-default-small-v2
    needs: [deploy-operator, frontend-copy-to-acr, vllm-copy-to-acr]
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check if vCluster exists
        id: vcluster-check
        uses: ./.github/actions/check-vcluster-exists
        with:
          kubeconfig_base64: ${{ secrets.AZURE_AKS_CI_KUBECONFIG_B64 }}
          vcluster_name: ${{ needs.deploy-operator.outputs.vcluster_name }}
          vcluster_namespace: ${{ needs.deploy-operator.outputs.namespace }}
      - name: Self-bootstrap vCluster (rerun)
        if: steps.vcluster-check.outputs.exists != 'true'
        uses: ./.github/actions/setup-dynamo-operator
        with:
          kubeconfig_base64: ${{ secrets.AZURE_AKS_CI_KUBECONFIG_B64 }}
          vcluster_name: ${{ needs.deploy-operator.outputs.vcluster_name }}
          vcluster_namespace: ${{ needs.deploy-operator.outputs.namespace }}
          registry: ${{ secrets.AZURE_ACR_HOSTNAME }}
          operator_tag: ${{ needs.deploy-operator.outputs.operator_tag }}
          hf_token: ${{ secrets.HF_TOKEN }}
          dockerhub_username: ${{ secrets.DOCKERHUB_LOGIN_USER }}
          dockerhub_password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
      - name: Connect to vCluster
        id: connect-vcluster
        uses: ./.github/actions/connect-vcluster
        with:
          host_kubeconfig_base64: ${{ secrets.AZURE_AKS_CI_KUBECONFIG_B64 }}
          vcluster_name: ${{ needs.deploy-operator.outputs.vcluster_name }}
          vcluster_namespace: ${{ needs.deploy-operator.outputs.namespace }}
      - name: Install GAIE prerequisites (Gateway API, kgateway, Inference Extension CRDs)
        shell: bash
        env:
          KUBECONFIG_B64: ${{ steps.connect-vcluster.outputs.kubeconfig_base64 }}
        run: |
          echo "${KUBECONFIG_B64}" | base64 -d > ${{ github.workspace }}/.kubeconfig_gaie
          export KUBECONFIG=${{ github.workspace }}/.kubeconfig_gaie
          export NAMESPACE=default
          bash deploy/inference-gateway/scripts/install_gaie_crd_kgateway.sh
          rm -f ${{ github.workspace }}/.kubeconfig_gaie
      - name: Run GAIE Deploy Test
        id: deploy-test
        uses: ./.github/actions/dynamo-deploy-test
        with:
          kubeconfig_base64: ${{ steps.connect-vcluster.outputs.kubeconfig_base64 }}
          namespace: default
          registry: ${{ secrets.AZURE_ACR_HOSTNAME }}
          operator_tag: ${{ needs.deploy-operator.outputs.operator_tag }}
          hf_token: ${{ secrets.HF_TOKEN }}
          test_name: gaie
          extra_pytest_args: >-
            -m framework_with_gaie
            --frontend-image=${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-dynamo-frontend
            --image=${{ secrets.AZURE_ACR_HOSTNAME }}/ai-dynamo/dynamo:${{ github.sha }}-vllm-runtime-cuda12

  deploy-status-check:
    runs-on: ubuntu-latest
    needs: [deploy-operator, deploy-test-vllm, deploy-test-sglang, deploy-test-trtllm, deploy-test-gaie]
    if: always()
    steps:
      - name: "Check all deploy test jobs"
        run: |
          echo '${{ toJson(needs) }}' | jq -e 'to_entries | map(.value.result) | all(. as $result | ["success", "skipped", "cancelled"] | any($result == .))'

  # ============================================================================
  # CLEANUP JOBS
  # ============================================================================

  clean-k8s-builder:
    name: Clean K8s builder if exists
    runs-on: prod-default-small-v2
    if: always()
    needs: [vllm-build, sglang-build, trtllm-build, vllm-dev-build, sglang-dev-build, trtllm-dev-build, vllm-efa-build, sglang-efa-build, trtllm-efa-build, operator, frontend-build, planner-build]
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Create K8s builders (skip bootstrap)
      uses: ./.github/actions/bootstrap-buildkit
      continue-on-error: true
      with:
        builder_name: b-${{ github.run_id }}-${{ github.run_attempt }}
        buildkit_worker_addresses: '' # k8s builder
        skip_bootstrap: true
    - name: Builder Cleanup in case of k8s builder
      shell: bash
      run: |
        docker buildx rm b-${{ github.run_id }}-${{ github.run_attempt }} || true

  ############################## SLACK NOTIFICATION ##############################
  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-slim
    if: always() && github.event_name != 'workflow_dispatch'
    needs: [ deploy-status-check ]
    permissions:
      contents: read
    steps:
      - name: Get Failed jobs
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JOBS_JSON=$(mktemp)
          curl -sSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            >$JOBS_JSON

          FAILED_JOBS=$(jq -r '.jobs[] | select(.conclusion == "failure") | .name | split(" / ") | if length > 2 then ":failed: " + .[0] + " > " + .[-1] else ":failed: " + .[-1] end | . + "\\n"' "$JOBS_JSON")
          echo $FAILED_JOBS
          {
            echo "FAILED_JOBS<<EOF"
            echo "$FAILED_JOBS"
            echo "EOF"
          } >> "$GITHUB_ENV"
      - name: Notify Slack
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a #v2.1.1
        with:
          webhook: ${{ secrets.SLACK_NOTIFY_NIGHTLY_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            blocks:
              - type: "section"
                text:
                  type: mrkdwn
                  text: ":alert: *Github Post-merge Pipeline Failure*"
              - type: "section"
                text:
                  type: mrkdwn
                  text: "<https://github.com/ai-dynamo/dynamo/actions/runs/${{ github.run_id }}|Workflow Summary>"
              - type: "section"
                text:
                  type: mrkdwn
                  text: "${{ env.FAILED_JOBS }}"
              - type: "section"
                text:
                  type: mrkdwn
                  text: "@ops-support Please investigate the failures above."
