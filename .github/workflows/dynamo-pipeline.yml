# Dynamo Pipeline — single entry point for building the dynamo runtime image
# and running all of its associated checks (rust, mypy, pytest parallel/
# sequential/GPU).

name: Dynamo Pipeline

on:
  workflow_call:
    inputs:
      builder_name:
        description: 'BuildKit builder name'
        required: true
        type: string
      cuda_version:
        description: 'CUDA version for the runtime image (e.g. 13.0). cuda13 is the default.'
        required: false
        type: string
        default: '13.0'
      fresh_builder:
        description: 'Always create a fresh K8s BuildKit builder (for nightly)'
        required: false
        type: boolean
        default: false
      build_timeout_minutes:
        required: false
        type: number
        default: 30
      no_cache:
        description: 'Disable BuildKit cache-from/to. Nightly sets true for regression detection.'
        required: false
        type: boolean
        default: false
      dev_version_suffix:
        description: 'PEP 440 dev suffix (e.g. .dev20260423+g1234567). Empty = stable build.'
        required: false
        type: string
        default: ''
      source_ref:
        description: 'Git ref/SHA to checkout and tag images with. Empty = caller SHA (github.sha).'
        required: false
        type: string
        default: ''
      image_tag_suffix:
        description: 'Suffix appended to the SHA-keyed image tag (e.g. "-nightly"). Empty = no suffix.'
        required: false
        type: string
        default: ''
      cpu_parallel_test_markers:
        required: true
        type: string
      cpu_sequential_test_markers:
        required: true
        type: string
      gpu_test_markers:
        required: true
        type: string
    secrets:
      AWS_DEFAULT_REGION:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      AZURE_ACR_HOSTNAME:
        required: true
      AZURE_ACR_USER:
        required: true
      AZURE_ACR_PASSWORD:
        required: true
      SCCACHE_S3_BUCKET:
        required: false
      HF_TOKEN:
        required: false


jobs:
  image:
    uses: ./.github/workflows/shared-build-image.yml
    with:
      framework: dynamo
      target: runtime
      cuda_version: '["${{ inputs.cuda_version }}"]'
      platform: 'linux/amd64,linux/arm64'
      builder_name: ${{ inputs.builder_name }}
      fresh_builder: ${{ inputs.fresh_builder }}
      no_cache: ${{ inputs.no_cache }}
      build_timeout_minutes: ${{ inputs.build_timeout_minutes }}
      dev_version_suffix: ${{ inputs.dev_version_suffix }}
      source_ref: ${{ inputs.source_ref }}
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
    secrets: inherit

  # rust-gpu-checks + mypy run inside the built images because they depend on
  # native libs (NIXL, ffmpeg, CUDA) and pinned Python package versions that
  # aren't reproducible on plain ubuntu-latest runners.
  rust-gpu:
    needs: image
    runs-on: prod-tester-amd-gpu-v2
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/ai-dynamo/dynamo:${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}-${{ needs.image.outputs.target_tag_plain }}${{ (inputs.cuda_version != '' && !startsWith(inputs.cuda_version, '13.')) && format('-cuda{0}', startsWith(inputs.cuda_version, '12.') && '12' || inputs.cuda_version) || '' }}${{ inputs.image_tag_suffix }}-test
      env:
        # The image creates user 'dynamo' at uid 1000, but the ARC k8s runner
        # executes the job pod as uid 1001 (runner's uid). Overriding HOME and
        # USER here sidesteps two symptoms of that mismatch:
        #   * actions/checkout probing $HOME/.gitconfig (owned by 1000, unreadable by 1001)
        #   * torch._inductor calling getpass.getuser() -> pwd.getpwuid(1001) -> KeyError
        HOME: /__w/dynamo/dynamo
        USER: dynamo
        # The image bakes CARGO_HOME=/usr/local/cargo owned by uid 1000, so cargo
        # cannot write registry/{index,cache} as the uid-1001 runner and dies with
        # "Permission denied (os error 13)" while downloading crates. Redirect
        # CARGO_HOME to the runner-writable workspace so cargo owns its cache.
        CARGO_HOME: /__w/dynamo/dynamo/.cargo
        CONTAINER_ID: test_${{ github.run_id }}_${{ github.run_attempt }}_rust_dynamo
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          # `cargo test` reads LFS-managed fixtures under lib/llm/tests/data/media via
          # include_bytes!; without lfs:true the checkout has 132-byte pointer files and
          # the image-decoder tests panic with "image format could not be determined".
          lfs: true
      - name: Select cargo target dir (prefer NVMe scratch)
        shell: bash
        run: |
          # GPU runners mount /scratch (nvme-scratch emptyDir, RAID0 instance store).
          CARGO_TARGET_DIR=/tmp/cargo-target
          if [[ -d /scratch ]]; then
            CARGO_TARGET_DIR=/scratch/cargo-target
            echo "✅ NVMe scratch available, using ${CARGO_TARGET_DIR}"
          fi
          mkdir -p "${CARGO_TARGET_DIR}"
          echo "CARGO_TARGET_DIR=${CARGO_TARGET_DIR}" >> "$GITHUB_ENV"

      - name: Run Rust checks (block-manager + media-ffmpeg + integration tests)
        # Run from the checked-out source (owned by the runner uid) rather than
        # /workspace (baked as dynamo:0 mode 0775). The ARC pod runs as uid 1001
        # with non-zero gid, so it falls into "other" perms on the baked tree and
        # cargo cannot rewrite Cargo.lock when resolve mutates it.
        working-directory: lib/llm
        env:
          SCCACHE_BUCKET: ${{ secrets.SCCACHE_S3_BUCKET }}
          SCCACHE_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        shell: bash
        run: |
          /workspace/container/use-sccache.sh install
          eval $(/workspace/container/use-sccache.sh setup-env)
          rustup component add rustfmt clippy
          cargo fmt -- --check
          cargo clippy --features block-manager,media-ffmpeg,testing-nixl,integration --no-deps --all-targets -- -D warnings
          cargo test --locked --all-targets --features=block-manager,media-ffmpeg,testing-nixl,integration -- --nocapture
          cargo clippy -p kvbm-physical --no-deps --all-targets -- -D warnings
          cargo test --locked -p kvbm-physical --features testing-kvbm -- --nocapture --test-threads=4
          /workspace/container/use-sccache.sh show-stats "Rust Checks"

  mypy:
    needs: image
    runs-on: prod-tester-amd-v2
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/ai-dynamo/dynamo:${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}-${{ needs.image.outputs.target_tag_plain }}${{ (inputs.cuda_version != '' && !startsWith(inputs.cuda_version, '13.')) && format('-cuda{0}', startsWith(inputs.cuda_version, '12.') && '12' || inputs.cuda_version) || '' }}${{ inputs.image_tag_suffix }}-test
      env:
        # The image creates user 'dynamo' at uid 1000, but the ARC k8s runner
        # executes the job pod as uid 1001 (runner's uid). Overriding HOME and
        # USER here sidesteps two symptoms of that mismatch:
        #   * actions/checkout probing $HOME/.gitconfig (owned by 1000, unreadable by 1001)
        #   * torch._inductor calling getpass.getuser() -> pwd.getpwuid(1001) -> KeyError
        HOME: /__w/dynamo/dynamo
        USER: dynamo
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
      - name: Run mypy (components)
        working-directory: /workspace
        shell: bash
        run: |
          MYPYPATH=components/src:lib/bindings/python/src
          TARGETS=$(find components/src/dynamo -maxdepth 1 -mindepth 1 -type d | sort | tr "\n" " ")
          MYPYPATH=$MYPYPATH mypy --explicit-package-bases $TARGETS
      - name: Run mypy (bindings)
        working-directory: /workspace
        shell: bash
        run: |
          MYPYPATH=lib/bindings/python/src mypy -p dynamo

  # TODO: real xdist parallelism port conflicts. cpu_parallel_mode='none'
  # below runs -n 0, so this job is NOT actually parallel right now.
  parallel:
    name: test
    needs: image
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: dynamo
      test_type: parallel
      amd_runner: prod-tester-amd-v2
      target_tag_plain: ${{ needs.image.outputs.target_tag_plain }}
      cuda_version: '["${{ inputs.cuda_version }}"]'
      platform: '["amd64", "arm64"]'
      run_sanity_check: false
      run_cpu_only_tests: true
      cpu_only_test_markers: ${{ inputs.cpu_parallel_test_markers }}
      cpu_only_test_timeout_minutes: 30
      cpu_parallel_mode: 'none'
      run_gpu_tests: false
      source_ref: ${{ inputs.source_ref }}
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
    secrets: inherit

  sequential:
    name: test
    needs: image
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: dynamo
      test_type: sequential
      amd_runner: prod-tester-amd-v2
      target_tag_plain: ${{ needs.image.outputs.target_tag_plain }}
      cuda_version: '["${{ inputs.cuda_version }}"]'
      platform: '["amd64", "arm64"]'
      run_sanity_check: false
      run_cpu_only_tests: true
      cpu_only_test_markers: ${{ inputs.cpu_sequential_test_markers }}
      cpu_only_test_timeout_minutes: 30
      cpu_parallel_mode: 'none'
      run_gpu_tests: false
      source_ref: ${{ inputs.source_ref }}
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
    secrets: inherit

  gpu:
    name: test
    needs: image
    uses: ./.github/workflows/shared-test.yml
    with:
      test_suite_name: dynamo
      test_type: gpu
      amd_runner: prod-tester-amd-gpu-v2
      target_tag_plain: ${{ needs.image.outputs.target_tag_plain }}
      cuda_version: '["${{ inputs.cuda_version }}"]'
      platform: '["amd64"]'
      run_sanity_check: false
      run_cpu_only_tests: false
      run_gpu_tests: true
      gpu_test_markers: ${{ inputs.gpu_test_markers }}
      gpu_test_timeout_minutes: 30
      source_ref: ${{ inputs.source_ref }}
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
    secrets: inherit
