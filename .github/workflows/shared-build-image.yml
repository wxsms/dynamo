name: Shared Build Image

on:
  workflow_call:
    inputs:
      framework:
        description: 'Framework name (vllm, sglang, trtllm)'
        required: true
        type: string
      target:
        description: 'Target stage for Docker rendering'
        required: false
        type: string
        default: 'runtime'
      cuda_version:
        description: 'CUDA versions to build as a JSON array'
        required: true
        type: string
      platform:
        description: 'Target platforms to build as a JSON array'
        required: true
        type: string
      builder_name:
        description: 'Buildkit builder name'
        required: true
        type: string
      build_timeout_minutes:
        description: 'Timeout in minutes for the build step'
        required: false
        type: number
        default: 60
      extra_tags:
        description: 'Additional tags (newline-separated, -$platform suffix auto-appended)'
        required: false
        type: string
        default: ''
      no_cache:
        description: 'Disable Docker build cache'
        required: false
        type: boolean
        default: false
      fresh_builder:
        description: 'Always create a fresh K8s BuildKit builder (skip remote worker routing)'
        required: false
        type: boolean
        default: false
      push_image:
        description: 'Push image to registry'
        required: false
        type: boolean
        default: true
      no_load:
        description: 'Do not load the image into docker'
        required: false
        type: boolean
        default: true
      show_summary:
        description: 'Show summary'
        required: false
        type: boolean
        default: false
      make_efa:
        description: 'Enable AWS EFA support in the build'
        required: false
        type: boolean
        default: false
      sanitized_ref_name:
        description: 'Sanitized git ref name for branch-tagged images'
        required: false
        type: string
        default: ''
      build_only:
        description: 'Build and push only — skip tests and prepare branch tags'
        required: false
        type: boolean
        default: false
      extra_build_args:
        description: 'Extra build args to pass to docker build (newline-separated)'
        required: false
        type: string
        default: ''
      dev_version_suffix:
        description: 'PEP 440 dev suffix (e.g. .dev20260423+g1234567). Empty = stable build.'
        required: false
        type: string
        default: ''
      source_ref:
        description: 'Git ref/SHA to checkout and tag images with. Empty = caller SHA (github.sha).'
        required: false
        type: string
        default: ''
      image_tag_suffix:
        description: 'Suffix appended to the SHA-keyed image tag (e.g. "-nightly"). Empty = no suffix.'
        required: false
        type: string
        default: ''
    secrets:
      AWS_DEFAULT_REGION:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      AZURE_ACR_HOSTNAME:
        required: true
      AZURE_ACR_USER:
        required: true
      AZURE_ACR_PASSWORD:
        required: true
      SCCACHE_S3_BUCKET:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      HF_TOKEN:
        required: false
    outputs:
      target_tag_plain:
        description: 'Plain runtime image tag prefix'
        value: ${{ jobs.build.outputs.target_tag_plain }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        cuda_version: ${{ fromJson(inputs.cuda_version) }}
    runs-on: prod-builder-v3
    # cuda_version not empty -- name: cuda12, linux/amd64
    # cuda_version empty -- name: cpu, linux/amd64
    name: Build multi-arch ${{ matrix.cuda_version == '' && 'cpu' || format('cuda{0}', matrix.cuda_version) }}
    timeout-minutes: ${{ inputs.build_timeout_minutes }}
    outputs:
      target_tag_plain: ${{ steps.calculate-target-tag.outputs.target_tag_plain }}
      test_tag_plain: ${{ steps.calculate-target-tag.outputs.test_tag_plain }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          lfs: true
      - name: Docker Login
        uses: ./.github/actions/docker-login
        with:
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          azure_acr_hostname: ${{ secrets.AZURE_ACR_HOSTNAME }}
          azure_acr_user: ${{ secrets.AZURE_ACR_USER }}
          azure_acr_password: ${{ secrets.AZURE_ACR_PASSWORD }}
      - name: Calculate target tag
        id: calculate-target-tag
        shell: bash
        run: |
          TAG_BUILDER=${{ inputs.framework }}-${{ inputs.target }}
          if [ "${{ inputs.make_efa }}" == "true" ]; then
            TAG_BUILDER+="-efa"
          fi
          TARGET_TAG_PLAIN=${TAG_BUILDER}
          if [ "${{ matrix.cuda_version }}" != "" ]; then
            CUDA_VERSION="${{ matrix.cuda_version }}"
            CUDA_MAJOR=${CUDA_VERSION%%.*}
            # cuda13 is the default — no suffix in the ECR tag. cuda12 (and
            # any future non-13 major) stays explicit so the tag still
            # disambiguates the variant. Keep the cuda-suffix expressions in
            # shared-test.yml and dynamo-pipeline.yml in sync with this rule.
            if [ "${CUDA_MAJOR}" != "13" ]; then
              TAG_BUILDER+="-cuda${CUDA_MAJOR}"
            fi
          fi
          SOURCE_SHA=${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          IMAGE_TAG_SUFFIX='${{ inputs.image_tag_suffix }}'
          IMAGE_TAG=${SOURCE_SHA}-${TAG_BUILDER}${IMAGE_TAG_SUFFIX}
          TEST_IMAGE_TAG=${SOURCE_SHA}-${TAG_BUILDER}${IMAGE_TAG_SUFFIX}-test

          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com"
          IMAGE_URI="${ECR_REGISTRY}/ai-dynamo/dynamo:${IMAGE_TAG}"
          TEST_IMAGE_URI="${ECR_REGISTRY}/ai-dynamo/dynamo:${TEST_IMAGE_TAG}"

          # When a suffix is set (e.g. "-nightly"), also emit a mutable,
          # SHA-less floating ECR tag (e.g. vllm-runtime-cuda12-nightly) so
          # consumers can pull the latest nightly without knowing the SHA.
          # Repushed on every build via extra_tags below; the immutable
          # SHA-keyed tag above is still the source of truth for promotions.
          MUTABLE_IMAGE_URI=""
          if [ -n "${IMAGE_TAG_SUFFIX}" ]; then
            MUTABLE_IMAGE_URI="${ECR_REGISTRY}/ai-dynamo/dynamo:${TAG_BUILDER}${IMAGE_TAG_SUFFIX}"
          fi

          # cuda13 is the implicit default, so the tags above carry no cuda
          # suffix. Also publish explicit `-cuda13` aliases so consumers can
          # pin to cuda13 specifically (and won't get silently upgraded when
          # the default flips later). Same digest, additional tags.
          EXPLICIT_CUDA_IMAGE_URI=""
          EXPLICIT_CUDA_MUTABLE_IMAGE_URI=""
          if [ "${CUDA_MAJOR:-}" = "13" ]; then
            EXPLICIT_CUDA_IMAGE_URI="${ECR_REGISTRY}/ai-dynamo/dynamo:${SOURCE_SHA}-${TAG_BUILDER}-cuda13${IMAGE_TAG_SUFFIX}"
            if [ -n "${IMAGE_TAG_SUFFIX}" ]; then
              EXPLICIT_CUDA_MUTABLE_IMAGE_URI="${ECR_REGISTRY}/ai-dynamo/dynamo:${TAG_BUILDER}-cuda13${IMAGE_TAG_SUFFIX}"
            fi
          fi

          echo "target_tag_plain=${TARGET_TAG_PLAIN}" >> $GITHUB_OUTPUT
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "test_image_uri=${TEST_IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "mutable_image_uri=${MUTABLE_IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "explicit_cuda_image_uri=${EXPLICIT_CUDA_IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "explicit_cuda_mutable_image_uri=${EXPLICIT_CUDA_MUTABLE_IMAGE_URI}" >> $GITHUB_OUTPUT
      - name: Calculate Builder Flavor
        id: calculate-builder-flavor
        shell: bash
        run: |
          if [[ ${{ inputs.framework }} != @(vllm|sglang|trtllm) ]]; then
            echo "builder_flavor=general" >> $GITHUB_OUTPUT
          else
            echo "builder_flavor=${{ inputs.framework }}" >> $GITHUB_OUTPUT
          fi
      - name: Initialize Dynamo Builder
        uses: ./.github/actions/init-dynamo-builder
        with:
          builder_name: ${{ inputs.builder_name }}
          flavor: ${{ steps.calculate-builder-flavor.outputs.builder_flavor }}
          arch: ${{ inputs.platform }}
          cuda_version: ${{ matrix.cuda_version }}
          fresh_builder: ${{ inputs.fresh_builder }}
      - name: Calculate extra tags
        id: extra-tags
        shell: bash
        env:
          EXTRA_TAGS: ${{ inputs.extra_tags }}
          MUTABLE_IMAGE_URI: ${{ steps.calculate-target-tag.outputs.mutable_image_uri }}
          EXPLICIT_CUDA_IMAGE_URI: ${{ steps.calculate-target-tag.outputs.explicit_cuda_image_uri }}
          EXPLICIT_CUDA_MUTABLE_IMAGE_URI: ${{ steps.calculate-target-tag.outputs.explicit_cuda_mutable_image_uri }}
        run: |
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com"
          RESULT=""
          if [ -n "$EXTRA_TAGS" ]; then
            while IFS= read -r tag; do
              if [ -n "$tag" ]; then
                RESULT+="${ECR_REGISTRY}/ai-dynamo/dynamo:${tag}"$'\n'
              fi
            done <<< "$EXTRA_TAGS"
          fi
          # Append the mutable floating tag computed in calculate-target-tag
          # (e.g. vllm-runtime-cuda12-nightly). Empty for non-nightly builds.
          if [ -n "${MUTABLE_IMAGE_URI}" ]; then
            RESULT+="${MUTABLE_IMAGE_URI}"$'\n'
          fi
          # Append explicit -cuda13 aliases for cuda13 builds. Empty for
          # cuda12 / cpu builds.
          if [ -n "${EXPLICIT_CUDA_IMAGE_URI}" ]; then
            RESULT+="${EXPLICIT_CUDA_IMAGE_URI}"$'\n'
          fi
          if [ -n "${EXPLICIT_CUDA_MUTABLE_IMAGE_URI}" ]; then
            RESULT+="${EXPLICIT_CUDA_MUTABLE_IMAGE_URI}"$'\n'
          fi
          if [ -n "$RESULT" ]; then
            echo "tags<<EOF" >> $GITHUB_OUTPUT
            echo "$RESULT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "tags=" >> $GITHUB_OUTPUT
          fi
      - name: Print Build Container inputs
        shell: bash
        run: |
          echo "=== Build Container Inputs ==="
          echo "image_uri: ${{ steps.calculate-target-tag.outputs.image_uri }}"
          echo "framework: ${{ inputs.framework }}"
          echo "target: ${{ inputs.target }}"
          echo "platform: ${{ inputs.platform }}"
          echo "no_cache: ${{ inputs.no_cache }}"
          echo "extra_tags: ${{ steps.extra-tags.outputs.tags }}"
          echo "push_image: ${{ inputs.push_image }}"
          echo "no_load: ${{ inputs.no_load }}"
          echo "build_timeout_minutes: ${{ inputs.build_timeout_minutes }}"
      - name: Build EPP Image (For Frontend Only)
        id: build-epp-image
        if: ${{ inputs.target == 'frontend' }}
        shell: bash
        env:
          ECR_HOSTNAME: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com
          IMAGE_REPOSITORY: ai-dynamo/dynamo
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          SCCACHE_S3_BUCKET: ${{ secrets.SCCACHE_S3_BUCKET }}
        timeout-minutes: 20
        run: |
          set -x
          EPP_REPOSITORY="${{ env.IMAGE_REPOSITORY }}/dynamo-epp"
          EPP_IMAGE_REPO="${{ env.ECR_HOSTNAME }}/${EPP_REPOSITORY}"
          EPP_IMAGE_TAG="${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}"
          EPP_IMAGE_REF="${EPP_REPOSITORY}:${EPP_IMAGE_TAG}"
          echo "epp_image_uri=${{ env.ECR_HOSTNAME }}/${EPP_IMAGE_REF}" >> $GITHUB_OUTPUT

          CACHE_ARGS=""
          CACHE_ARGS+="--cache-from type=registry,ref=${ECR_HOSTNAME}/${EPP_REPOSITORY}:cache "
          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            CACHE_ARGS+="--cache-to type=registry,ref=${ECR_HOSTNAME}/${EPP_REPOSITORY}:cache,mode=max "
          fi

          # Enable sccache to match the runtime image build path
          # (.github/actions/docker-remote-build). The runner pod injects
          # AWS_WEB_IDENTITY_TOKEN_FILE + AWS_ROLE_ARN via IRSA; the Makefile
          # forwards them to BuildKit as --secret mounts when both are set.
          # If IRSA is unavailable, sccache will fail to start inside the
          # container and the build proceeds without cache (never with a
          # stale one) -- same fallback as the wheel_builder Rust steps.
          SCCACHE_MAKE_ARGS=""
          if [ -n "${SCCACHE_S3_BUCKET:-}" ] \
              && [ -n "${AWS_WEB_IDENTITY_TOKEN_FILE:-}" ] \
              && [ -f "${AWS_WEB_IDENTITY_TOKEN_FILE}" ] \
              && [ -n "${AWS_ROLE_ARN:-}" ]; then
            SCCACHE_MAKE_ARGS="USE_SCCACHE=true SCCACHE_BUCKET=${SCCACHE_S3_BUCKET} SCCACHE_REGION=${AWS_DEFAULT_REGION}"
          else
            echo "::warning::sccache prerequisites missing (bucket or IRSA token); EPP Rust build will run without sccache"
          fi

          make -C deploy/inference-gateway/epp image-multiarch-push \
            IMAGE_REPO="${EPP_IMAGE_REPO}" \
            GIT_TAG="${EPP_IMAGE_TAG}" \
            DOCKER_PROXY="${ECR_HOSTNAME}/dockerhub/" \
            ${SCCACHE_MAKE_ARGS} \
            EXTRA_BUILD_ARGS="${CACHE_ARGS}"
      - name: Refresh BuildKit builder (For Frontend Only)
        if: ${{ inputs.target == 'frontend' }}
        uses: ./.github/actions/builder-refresher
        with:
          builder_name: ${{ inputs.builder_name }}
          flavor: ${{ steps.calculate-builder-flavor.outputs.builder_flavor }}
          arch: ${{ inputs.platform }}
      - name: Generate Dockerfile
        shell: bash
        run: |
          echo "Generating Dockerfile for target: ${{ inputs.target }} and framework: ${{ inputs.framework }}"
          MAKE_EFA_FLAG=""
          if [ "${{ inputs.make_efa }}" == "true" ]; then
            MAKE_EFA_FLAG="--make-efa"
          fi
          # If CUDA version is empty, use empty arg to fallback to default (eg. for planner)
          if [ "${{ matrix.cuda_version }}" == "" ]; then
            CUDA_FLAG=""
          else
            CUDA_FLAG="--cuda-version=${{ matrix.cuda_version }}"
          fi

          python ./container/render.py \
              --target=${{ inputs.target }} \
              --framework=${{ inputs.framework }} \
              --platform=${{ inputs.platform }} \
              ${CUDA_FLAG} \
              ${MAKE_EFA_FLAG} \
              --show-result \
              --output-short-filename
      - name: Apply nightly dev version
        if: inputs.dev_version_suffix != ''
        shell: bash
        run: python3 .github/scripts/apply_dev_version.py "${{ inputs.dev_version_suffix }}" .
      - name: Build and Push Image
        id: build-image
        uses: ./.github/actions/docker-remote-build
        with:
          image_tag: ${{ steps.calculate-target-tag.outputs.image_uri }}
          framework: ${{ inputs.framework }}
          target: ${{ inputs.target }}
          build_target: ${{ (inputs.make_efa && (inputs.target == 'runtime' || inputs.target == 'dev')) && 'aws' || inputs.target }}
          platform: ${{ inputs.platform }}
          cuda_version: ${{ matrix.cuda_version }}
          aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
          sccache_s3_bucket: ${{ secrets.SCCACHE_S3_BUCKET }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          no_cache: ${{ inputs.no_cache }}
          extra_tags: ${{ steps.extra-tags.outputs.tags }}
          push_image: ${{ inputs.push_image }}
          no_load: ${{ inputs.no_load }}
          extra_build_args: |
            DYNAMO_COMMIT_SHA=${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
            EPP_IMAGE=${{ steps.build-epp-image.outputs.epp_image_uri || '' }}
            ${{ inputs.extra_build_args }}
      - name: Refresh BuildKit builder
        if: ${{ inputs.target != 'dev' && inputs.target != 'frontend' }}
        uses: ./.github/actions/builder-refresher
        with:
          builder_name: ${{ inputs.builder_name }}
          flavor: ${{ steps.calculate-builder-flavor.outputs.builder_flavor }}
          arch: ${{ inputs.platform }}
          cuda_version: ${{ matrix.cuda_version }}
      - name: Build and Push Test Image
        if: ${{ inputs.target != 'dev' && inputs.target != 'frontend' }}
        shell: bash
        run: |
          PUSH_ARGS=""
          if [ "${{ inputs.push_image }}" == "true" ]; then
            PUSH_ARGS="--push"
          elif [ "${{ inputs.no_load }}" == "false" ]; then
            PUSH_ARGS="--load"
          fi

          NO_CACHE_ARG=""
          if [ "${{ inputs.no_cache }}" == "true" ]; then
            NO_CACHE_ARG="--no-cache"
          fi
          TEST_TARGET="test_image"
          if [ "${{ inputs.target }}" == "planner" ]; then
            TEST_TARGET="test_distroless"
          fi

          docker buildx build \
            --progress=plain \
            ${PUSH_ARGS} \
            ${NO_CACHE_ARG} \
            --platform ${{ inputs.platform }} \
            --target ${TEST_TARGET} \
            -f container/Dockerfile.test \
            --build-arg BASE_IMAGE=${{ steps.calculate-target-tag.outputs.image_uri }} \
            -t ${{ steps.calculate-target-tag.outputs.test_image_uri }} .
      - name: Show summary
        shell: bash
        if: ${{ inputs.push_image == 'true' && inputs.show_summary == 'true' }}
        run: |
          echo "### 🐳 ${{ steps.calculate-target-tag.outputs.target_tag_plain }} Default Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image URI |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ steps.calculate-target-tag.outputs.image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
          EXTRA_TAGS="${{ steps.extra-tags.outputs.tags }}"
          if [ -n "$EXTRA_TAGS" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🏷️ Extra Tags" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Image URI |" >> $GITHUB_STEP_SUMMARY
            echo "|-----|" >> $GITHUB_STEP_SUMMARY
            while IFS= read -r tag; do
              if [ -n "$tag" ]; then
                echo "| \`${tag}\` |" >> $GITHUB_STEP_SUMMARY
              fi
            done <<< "$EXTRA_TAGS"
          fi
