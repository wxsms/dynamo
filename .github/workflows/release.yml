name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Git commit SHA whose post-merge CI images to publish (full 40-char SHA).'
        required: true
        type: string
      rc_number:
        description: 'RC number (e.g., 0 for rc0). Leave empty to auto-increment.'
        required: false
        type: string
      nightly:
        description: 'Publish as nightly (nightly-dated NGC tags; skips RC and Helm push). Must be run from main.'
        required: false
        type: boolean
        default: false
      skip_gitlab_pipeline:
        description: 'Skip the GitLab release automation pipeline trigger. Emergency use only.'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      commit_sha:
        required: true
        type: string
      rc_number:
        required: false
        type: string
      nightly:
        required: false
        type: boolean
        default: false
      skip_gitlab_pipeline:
        required: false
        type: boolean
        default: false

# Note: workflow_dispatch can only be triggered from release/* branches (or main when nightly=true)
# This is enforced in the prepare-release job via branch validation. workflow_call paths
# (e.g. nightly-ci.yml) inherit the caller's ref — the same branch rules apply.

permissions:
  contents: read

env:
  REGISTRY_IMAGE: ai-dynamo/dynamo

jobs:
  # ============================================================================
  # GATE: Version Extraction
  # ============================================================================

  prepare-release:
    name: Prepare Release
    runs-on: prod-default-small-v2
    outputs:
      version: ${{ steps.extract.outputs.version }}
      commit_sha: ${{ steps.extract.outputs.commit_sha }}
      nightly: ${{ steps.extract.outputs.nightly }}
      rc_number: ${{ steps.rc_tag.outputs.rc_number }}
      ngc_version_tag: ${{ steps.rc_tag.outputs.ngc_version_tag }}
      helm_chart_version: ${{ steps.rc_tag.outputs.helm_chart_version }}
      wheel_version: ${{ steps.rc_tag.outputs.wheel_version }}
    steps:
      - name: Extract version and validate inputs
        id: extract
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          NIGHTLY: ${{ inputs.nightly }}
        run: |
          set -euo pipefail

          if ! [[ "${COMMIT_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Error: commit_sha must be a full 40-character hex SHA (got: '${COMMIT_SHA}')"
            exit 1
          fi

          if [[ "${NIGHTLY}" == "true" ]]; then
            if [[ "${BRANCH_NAME}" != "main" ]]; then
              echo "Error: nightly=true requires branch=main (got: ${BRANCH_NAME})"
              exit 1
            fi
            VERSION="nightly"
          else
            if [[ ! "$BRANCH_NAME" =~ ^release/[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              echo "Error: workflow_dispatch must be triggered from a release/* branch (or main with nightly=true)"
              echo "Current branch: $BRANCH_NAME"
              exit 1
            fi
            VERSION="${BRANCH_NAME#release/}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
          echo "nightly=${NIGHTLY}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"
          echo "Source commit SHA: ${COMMIT_SHA}"
          echo "Nightly: ${NIGHTLY}"

      # Checkout at the source commit with full tags so the RC-number step can
      # enumerate existing v<VERSION>-rc<N> tags and auto-increment. Also lets
      # downstream jobs (release-publish, stage-wheels-artifactory) consume the
      # computed rc_number/ngc_version_tag as needs.prepare-release.outputs.*
      # and run in parallel.
      - name: Checkout at source commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ steps.extract.outputs.commit_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Determine next RC number
        id: rc_tag
        env:
          INPUT_RC_NUMBER: ${{ inputs.rc_number }}
          VERSION: ${{ steps.extract.outputs.version }}
          COMMIT_SHA: ${{ steps.extract.outputs.commit_sha }}
          NIGHTLY: ${{ steps.extract.outputs.nightly }}
        run: |
          set -euo pipefail

          # Base version pinned in pyproject.toml at the source SHA. Same value
          # cargo and maturin stamp into the wheel filename / METADATA.
          BASE_VERSION=$(awk '/^version = / {gsub(/"/, "", $3); print $3; exit}' pyproject.toml)
          if [[ ! "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: cannot parse base version from pyproject.toml (got '${BASE_VERSION}')"
            exit 1
          fi

          if [[ "${NIGHTLY}" == "true" ]]; then
            DATE_UTC=$(date -u +%Y%m%d)
            SHORT_SHA="${COMMIT_SHA:0:7}"
            NGC_VERSION_TAG="nightly-${DATE_UTC}-${SHORT_SHA}"
            WHEEL_VERSION="${BASE_VERSION}.dev${DATE_UTC}"
            echo "rc_number=" >> $GITHUB_OUTPUT
            echo "ngc_version_tag=${NGC_VERSION_TAG}" >> $GITHUB_OUTPUT
            echo "helm_chart_version=" >> $GITHUB_OUTPUT
            echo "wheel_version=${WHEEL_VERSION}" >> $GITHUB_OUTPUT
            echo "Nightly NGC tag: ${NGC_VERSION_TAG}"
            echo "Nightly wheel version: ${WHEEL_VERSION}"
            exit 0
          fi

          if [ -n "${INPUT_RC_NUMBER}" ]; then
            if ! [[ "${INPUT_RC_NUMBER}" =~ ^[0-9]+$ ]]; then
              echo "Error: rc_number must be a non-negative integer (got: ${INPUT_RC_NUMBER})"
              exit 1
            fi
            NEXT_RC="${INPUT_RC_NUMBER}"
            echo "Using provided RC number: ${NEXT_RC}"
          else
            echo "No RC number provided. Auto-incrementing..."
            RC_PATTERN="v${VERSION}-rc"
            EXISTING_RCS=$(git tag -l "${RC_PATTERN}*" | grep -E "^v${VERSION}-rc[0-9]+$" | sort -V || true)

            if [ -z "$EXISTING_RCS" ]; then
              NEXT_RC=0
              echo "No existing RC tags found. Starting with rc0."
            else
              LAST_RC=$(echo "$EXISTING_RCS" | tail -1)
              LAST_RC_NUM=${LAST_RC#v${VERSION}-rc}
              NEXT_RC=$((LAST_RC_NUM + 1))
              echo "Found existing RC tags:"
              echo "$EXISTING_RCS"
              echo "Last RC: ${LAST_RC}, Next RC number: ${NEXT_RC}"
            fi
          fi

          # Normalize version for Helm SemVer: X.Y.Z.suffix → X.Y.Z-suffix
          SEMVER_VERSION=$(echo "${VERSION}" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+)\.(.+)/\1-\2/')
          HELM_CHART_VERSION="${SEMVER_VERSION}-rc${NEXT_RC}"

          WHEEL_VERSION="${BASE_VERSION}"

          echo "rc_number=${NEXT_RC}" >> $GITHUB_OUTPUT
          echo "ngc_version_tag=${VERSION}rc${NEXT_RC}" >> $GITHUB_OUTPUT
          echo "helm_chart_version=${HELM_CHART_VERSION}" >> $GITHUB_OUTPUT
          echo "wheel_version=${WHEEL_VERSION}" >> $GITHUB_OUTPUT
          echo "RC number: ${NEXT_RC}"
          echo "Helm chart version: ${HELM_CHART_VERSION}"
          echo "RC wheel version: ${WHEEL_VERSION}"

  # ============================================================================
  # NGC PUBLISH: crane copy to NGC, Helm chart push
  # Sources images from ECR using SHA-based tags produced by post-merge CI.
  # ============================================================================

  release-publish:
    name: Publish to NGC
    needs: [prepare-release]
    if: needs.prepare-release.result == 'success'
    runs-on: prod-builder-amd-v1 # TODO: needs to identify the correct runner here, definitely should not be prod-builder-amd-v1
    environment: automated-release
    env:
      VERSION: ${{ needs.prepare-release.outputs.version }}
      COMMIT_SHA: ${{ needs.prepare-release.outputs.commit_sha }}
      NIGHTLY: ${{ needs.prepare-release.outputs.nightly }}
      REGISTRY_IMAGE: ai-dynamo/dynamo
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - name: Checkout at source commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.prepare-release.outputs.commit_sha }}

      - name: Setup crane
        env:
          CRANE_VERSION: v0.20.2
        run: |
          curl --retry 5 --retry-delay 2 \
            --connect-timeout 10 --max-time 120 \
            --fail --show-error -sL \
            "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar -xzf - crane
          sudo mv crane /usr/local/bin/
          crane version

      - name: Login to ECR
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_HOSTNAME="${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
          aws ecr get-login-password --region ${AWS_DEFAULT_REGION} | docker login --username AWS --password-stdin "${ECR_HOSTNAME}"

      - name: Login to NGC
        env:
          NGC_TOKEN: ${{ secrets.NGC_PUBLISH_TOKEN }}
          NGC_USERNAME: ${{ secrets.NGC_PUBLISH_USERNAME }}
        run: |
          echo "${NGC_TOKEN}" | docker login nvcr.io -u "${NGC_USERNAME}" --password-stdin
          echo "${NGC_TOKEN}" | crane auth login nvcr.io -u "${NGC_USERNAME}" --password-stdin

      - name: Copy images to NGC
        id: copy_images
        env:
          NGC_REGISTRY: nvcr.io
          NGC_ORG: ${{ secrets.NGC_PUBLISH_ORG }}
          NGC_VERSION_TAG: ${{ needs.prepare-release.outputs.ngc_version_tag }}
        run: |
          set -euo pipefail

          SUCCESSFUL_COPIES=()
          FAILED_COPIES=()

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_HOSTNAME="${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"

          # Nightly builds push ECR tags with a `-nightly` suffix so a missing
          # or failed nightly build can't fall through to the post-merge image
          # at the same SHA (which carries stable, non-dev wheel versions).
          NIGHTLY_TAG_SUFFIX=""
          if [ "${NIGHTLY}" = "true" ]; then
            NIGHTLY_TAG_SUFFIX="-nightly"
          fi

          echo "========================================"
          echo "Copying images from ECR to NGC (registry-to-registry)"
          echo "Source commit SHA: ${COMMIT_SHA}"
          echo "NGC Version Tag: ${NGC_VERSION_TAG}"
          echo "Nightly tag suffix: '${NIGHTLY_TAG_SUFFIX}'"
          echo "========================================"

          copy_image() {
            local SRC="$1" DST="$2" LABEL="$3"
            echo "----------------------------------------"
            echo "Copying: ${LABEL}"
            # crane copy preserves multi-arch manifest lists by default (no --platform needed)
            if crane copy "${SRC}" "${DST}"; then
              echo "  Copied: ${LABEL}"
              SUCCESSFUL_COPIES+=("${LABEL}")
              return 0
            else
              echo "  Warning: Failed to copy ${LABEL}, skipping..."
              FAILED_COPIES+=("${LABEL}")
              return 1
            fi
          }

          # ---- CUDA 12 runtime images (vllm and sglang) ----
          echo ""
          echo "=== CUDA 12 Runtime Images (vllm, sglang) ==="
          CUDA12_FRAMEWORKS=("vllm" "sglang")
          for FRAMEWORK in "${CUDA12_FRAMEWORKS[@]}"; do
            NGC_NAME="${FRAMEWORK}-runtime"
            SOURCE="${ECR_HOSTNAME}/${REGISTRY_IMAGE}:${COMMIT_SHA}-${FRAMEWORK}-runtime-cuda12${NIGHTLY_TAG_SUFFIX}"
            TARGET="${NGC_REGISTRY}/${NGC_ORG}/ai-dynamo/${NGC_NAME}:${NGC_VERSION_TAG}"
            copy_image "${SOURCE}" "${TARGET}" "${NGC_NAME}:${NGC_VERSION_TAG}"
          done

          # ---- CUDA 13 runtime images (vllm, sglang, trtllm) ----
          echo ""
          echo "=== CUDA 13 Runtime Images (vllm, sglang, trtllm) ==="
          CUDA13_FRAMEWORKS=("vllm" "sglang" "trtllm")
          for FRAMEWORK in "${CUDA13_FRAMEWORKS[@]}"; do
            if [ "${FRAMEWORK}" = "trtllm" ]; then
              NGC_NAME="tensorrtllm-runtime"
            else
              NGC_NAME="${FRAMEWORK}-runtime"
            fi

            SOURCE="${ECR_HOSTNAME}/${REGISTRY_IMAGE}:${COMMIT_SHA}-${FRAMEWORK}-runtime-cuda13${NIGHTLY_TAG_SUFFIX}"
            TARGET="${NGC_REGISTRY}/${NGC_ORG}/ai-dynamo/${NGC_NAME}:${NGC_VERSION_TAG}-cuda13"
            copy_image "${SOURCE}" "${TARGET}" "${NGC_NAME}:${NGC_VERSION_TAG}-cuda13"
          done

          # Nightly builds only the runtime images above (vllm/sglang/trtllm
          # cuda12+cuda13). EFA/frontend/operator/planner/snapshot are built
          # by post-merge and other workflows on release branches; for nightly
          # we skip them entirely so we don't try to copy ECR tags that don't
          # exist for the resolved SHA.
          if [[ "${NIGHTLY}" != "true" ]]; then
            # ---- EFA runtime images ----
            # All EFA runtime images are multi-arch (amd64+arm64).
            # crane copy preserves multi-arch manifests automatically.
            echo ""
            echo "=== EFA Runtime Images ==="

            # vllm EFA (CUDA 12)
            SOURCE="${ECR_HOSTNAME}/${REGISTRY_IMAGE}:${COMMIT_SHA}-vllm-runtime-efa-cuda12"
            TARGET="${NGC_REGISTRY}/${NGC_ORG}/ai-dynamo/vllm-runtime:${NGC_VERSION_TAG}-efa"
            copy_image "${SOURCE}" "${TARGET}" "vllm-runtime:${NGC_VERSION_TAG}-efa"

            # sglang EFA (CUDA 12)
            SOURCE="${ECR_HOSTNAME}/${REGISTRY_IMAGE}:${COMMIT_SHA}-sglang-runtime-efa-cuda12"
            TARGET="${NGC_REGISTRY}/${NGC_ORG}/ai-dynamo/sglang-runtime:${NGC_VERSION_TAG}-efa"
            copy_image "${SOURCE}" "${TARGET}" "sglang-runtime:${NGC_VERSION_TAG}-efa"

            # trtllm EFA (CUDA 13)
            SOURCE="${ECR_HOSTNAME}/${REGISTRY_IMAGE}:${COMMIT_SHA}-trtllm-runtime-efa-cuda13"
            TARGET="${NGC_REGISTRY}/${NGC_ORG}/ai-dynamo/tensorrtllm-runtime:${NGC_VERSION_TAG}-efa"
            copy_image "${SOURCE}" "${TARGET}" "tensorrtllm-runtime:${NGC_VERSION_TAG}-efa"

            # ---- Frontend image (already multi-arch from build-frontend-image workflow) ----
            echo ""
            echo "=== Frontend Image ==="
            SOURCE="${ECR_HOSTNAME}/${REGISTRY_IMAGE}:${COMMIT_SHA}-frontend"
            TARGET="${NGC_REGISTRY}/${NGC_ORG}/ai-dynamo/dynamo-frontend:${NGC_VERSION_TAG}"
            copy_image "${SOURCE}" "${TARGET}" "dynamo-frontend:${NGC_VERSION_TAG}"

            # ---- Operator image (multi-arch manifest already built by post-merge operator-build) ----
            echo ""
            echo "=== Operator Image ==="
            OPERATOR_SOURCE="${ECR_HOSTNAME}/${REGISTRY_IMAGE}:${COMMIT_SHA}-operator"
            OPERATOR_TARGET="${NGC_REGISTRY}/${NGC_ORG}/ai-dynamo/kubernetes-operator:${NGC_VERSION_TAG}"
            copy_image "${OPERATOR_SOURCE}" "${OPERATOR_TARGET}" "kubernetes-operator:${NGC_VERSION_TAG}"

            # ---- Planner image (CPU-only, multi-arch from post-merge planner-pipeline) ----
            echo ""
            echo "=== Planner Image ==="
            SOURCE="${ECR_HOSTNAME}/${REGISTRY_IMAGE}:${COMMIT_SHA}-dynamo-planner"
            TARGET="${NGC_REGISTRY}/${NGC_ORG}/ai-dynamo/dynamo-planner:${NGC_VERSION_TAG}"
            copy_image "${SOURCE}" "${TARGET}" "dynamo-planner:${NGC_VERSION_TAG}"

            # ---- Snapshot image ----
            echo ""
            echo "=== Snapshot Image ==="
            SNAPSHOT_SOURCE="${ECR_HOSTNAME}/${REGISTRY_IMAGE}:${COMMIT_SHA}-snapshot-agent"
            SNAPSHOT_TARGET="${NGC_REGISTRY}/${NGC_ORG}/ai-dynamo/snapshot-agent:${NGC_VERSION_TAG}"
            copy_image "${SNAPSHOT_SOURCE}" "${SNAPSHOT_TARGET}" "snapshot-agent:${NGC_VERSION_TAG}"
          else
            echo ""
            echo "=== Skipping EFA / frontend / operator / planner / snapshot (not built by nightly) ==="
          fi

          # ---- Summary ----
          echo "successful_count=${#SUCCESSFUL_COPIES[@]}" >> $GITHUB_OUTPUT
          echo "failed_count=${#FAILED_COPIES[@]}" >> $GITHUB_OUTPUT

          printf '%s\n' "${SUCCESSFUL_COPIES[@]}" > /tmp/successful_copies.txt
          printf '%s\n' "${FAILED_COPIES[@]}" > /tmp/failed_copies.txt 2>/dev/null || true

          echo "========================================"
          echo "NGC Publishing Summary:"
          echo "  Successful: ${#SUCCESSFUL_COPIES[@]}"
          echo "  Failed: ${#FAILED_COPIES[@]}"
          echo "========================================"

          if [ ${#SUCCESSFUL_COPIES[@]} -eq 0 ]; then
            echo "ERROR: No images were successfully copied to NGC!"
            exit 1
          fi

      - name: Package and push Helm charts to NGC
        if: env.NIGHTLY != 'true'
        env:
          NGC_HELM_REPO: https://helm.ngc.nvidia.com/${{ secrets.NGC_PUBLISH_ORG }}/ai-dynamo
          NGC_TOKEN: ${{ secrets.NGC_PUBLISH_TOKEN }}
          NGC_USERNAME: ${{ secrets.NGC_PUBLISH_USERNAME }}
          HELM_CHART_VERSION: ${{ needs.prepare-release.outputs.helm_chart_version }}
        run: |
          set -euo pipefail

          REPO_ALIAS="ngc-staging-dynamo"

          helm plugin install https://github.com/chartmuseum/helm-push || true

          echo "${NGC_TOKEN}" | helm repo add "${REPO_ALIAS}" \
            --username="${NGC_USERNAME}" \
            --password-stdin \
            "${NGC_HELM_REPO}" > /dev/null 2>&1

          helm repo add nats https://nats-io.github.io/k8s/helm/charts/ || true
          helm repo add bitnami https://charts.bitnami.com/bitnami || true

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Helm Charts" >> $GITHUB_STEP_SUMMARY

          PLATFORM_CHART_DIR="deploy/helm/charts/platform"
          CHART_NAME=$(awk '/^name:/ {print $2}' "${PLATFORM_CHART_DIR}/Chart.yaml")
          pushd "${PLATFORM_CHART_DIR}"
          helm dep build .
          popd

          echo "Packaging ${CHART_NAME} with version ${HELM_CHART_VERSION}..."
          helm package \
            --version "${HELM_CHART_VERSION}" \
            --app-version "${HELM_CHART_VERSION}" \
            "${PLATFORM_CHART_DIR}"

          CHART_FILE="${CHART_NAME}-${HELM_CHART_VERSION}.tgz"
          echo "Pushing ${CHART_FILE} to NGC Helm registry..."
          helm cm-push "${CHART_FILE}" "${REPO_ALIAS}"
          echo "- \`${CHART_NAME}:${HELM_CHART_VERSION}\` pushed to NGC Helm registry" >> $GITHUB_STEP_SUMMARY

          helm repo remove "${REPO_ALIAS}"

      - name: Create release summary
        env:
          NGC_VERSION_TAG: ${{ needs.prepare-release.outputs.ngc_version_tag }}
          HELM_CHART_VERSION: ${{ needs.prepare-release.outputs.helm_chart_version }}
          SUCCESSFUL_COUNT: ${{ steps.copy_images.outputs.successful_count }}
          FAILED_COUNT: ${{ steps.copy_images.outputs.failed_count }}
        run: |
          if [[ "${NIGHTLY}" == "true" ]]; then
            echo "## Nightly Build Summary" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| NGC Version Tag | ${NGC_VERSION_TAG} |" >> $GITHUB_STEP_SUMMARY
          echo "| Source Commit SHA | ${COMMIT_SHA} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### NGC Publishing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Successful copies**: ${SUCCESSFUL_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Failed copies**: ${FAILED_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Expected Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Runtime images (CUDA 12 - default):" >> $GITHUB_STEP_SUMMARY
          echo "- \`vllm-runtime:${NGC_VERSION_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`sglang-runtime:${NGC_VERSION_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Runtime images (CUDA 13):" >> $GITHUB_STEP_SUMMARY
          echo "- \`vllm-runtime:${NGC_VERSION_TAG}-cuda13\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`sglang-runtime:${NGC_VERSION_TAG}-cuda13\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`tensorrtllm-runtime:${NGC_VERSION_TAG}-cuda13\`" >> $GITHUB_STEP_SUMMARY
          if [[ "${NIGHTLY}" != "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "EFA runtime images (multi-arch):" >> $GITHUB_STEP_SUMMARY
            echo "- \`vllm-runtime:${NGC_VERSION_TAG}-efa\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`sglang-runtime:${NGC_VERSION_TAG}-efa\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`tensorrtllm-runtime:${NGC_VERSION_TAG}-efa\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Operator image:" >> $GITHUB_STEP_SUMMARY
            echo "- \`kubernetes-operator:${NGC_VERSION_TAG}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Planner image:" >> $GITHUB_STEP_SUMMARY
            echo "- \`dynamo-planner:${NGC_VERSION_TAG}\` (multi-arch)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Frontend images:" >> $GITHUB_STEP_SUMMARY
            echo "- \`dynamo-frontend:${NGC_VERSION_TAG}\` (multi-arch)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Helm chart:" >> $GITHUB_STEP_SUMMARY
            echo "- \`dynamo-platform:${HELM_CHART_VERSION}\` (pushed to NGC Helm registry)" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================================
  # ARTIFACTORY STAGING: extract wheels from the dynamo-runtime image in ECR
  # and upload them to JFrog Artifactory so consumers can pip-install them.
  # Runs in parallel with release-publish (both gated only on prepare-release).
  # ============================================================================

  stage-wheels-artifactory:
    name: Stage Wheels to Artifactory
    needs: [prepare-release]
    if: needs.prepare-release.result == 'success'
    runs-on: prod-tester-amd-v1
    environment: automated-release
    env:
      COMMIT_SHA: ${{ needs.prepare-release.outputs.commit_sha }}
      NIGHTLY: ${{ needs.prepare-release.outputs.nightly }}
      VERSION: ${{ needs.prepare-release.outputs.version }}
      RC_NUMBER: ${{ needs.prepare-release.outputs.rc_number }}
      REGISTRY_IMAGE: ai-dynamo/dynamo
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - name: Setup crane
        env:
          CRANE_VERSION: v0.20.2
        run: |
          curl --retry 5 --retry-delay 2 \
            --connect-timeout 10 --max-time 120 \
            --fail --show-error -sL \
            "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar -xzf - crane
          sudo mv crane /usr/local/bin/
          crane version

      - name: Login to ECR
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_HOSTNAME="${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
          aws ecr get-login-password --region ${AWS_DEFAULT_REGION} | crane auth login --username AWS --password-stdin "${ECR_HOSTNAME}"

      - name: Extract wheels from dynamo-runtime image
        id: extract
        run: |
          set -euo pipefail

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_HOSTNAME="${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
          # Nightly pushes to <sha>-dynamo-runtime-cuda12-nightly so a failed
          # nightly build cannot fall through to the stable post-merge image.
          NIGHTLY_TAG_SUFFIX=""
          if [ "${NIGHTLY}" = "true" ]; then
            NIGHTLY_TAG_SUFFIX="-nightly"
          fi
          ECR_IMAGE="${ECR_HOSTNAME}/${REGISTRY_IMAGE}:${COMMIT_SHA}-dynamo-runtime-cuda12${NIGHTLY_TAG_SUFFIX}"

          STAGE="${RUNNER_TEMP}/wheels"
          mkdir -p "${STAGE}/amd64" "${STAGE}/arm64"

          echo "Exporting amd64 filesystem from ${ECR_IMAGE}..."
          crane export --platform=linux/amd64 "${ECR_IMAGE}" - \
            | tar -x -C "${STAGE}/amd64" \
                --wildcards \
                'opt/dynamo/wheelhouse/ai_dynamo-*py3-none-any.whl' \
                'opt/dynamo/wheelhouse/ai_dynamo_runtime-*x86_64*.whl' \
                'opt/dynamo/wheelhouse/kvbm-*x86_64*.whl'

          echo "Exporting arm64 filesystem from ${ECR_IMAGE}..."
          crane export --platform=linux/arm64 "${ECR_IMAGE}" - \
            | tar -x -C "${STAGE}/arm64" \
                --wildcards \
                'opt/dynamo/wheelhouse/ai_dynamo_runtime-*aarch64*.whl' \
                'opt/dynamo/wheelhouse/kvbm-*aarch64*.whl'

          OUT="${STAGE}/upload"
          mkdir -p "${OUT}"

          shopt -s nullglob
          AMD64_WHEELS=("${STAGE}/amd64/opt/dynamo/wheelhouse/"*.whl)
          ARM64_WHEELS=("${STAGE}/arm64/opt/dynamo/wheelhouse/"*.whl)
          shopt -u nullglob

          if [ ${#AMD64_WHEELS[@]} -eq 0 ]; then
            echo "::error::No amd64 wheels extracted from ${ECR_IMAGE}"
            exit 1
          fi
          if [ ${#ARM64_WHEELS[@]} -eq 0 ]; then
            echo "::error::No arm64 wheels extracted from ${ECR_IMAGE}"
            exit 1
          fi

          cp "${AMD64_WHEELS[@]}" "${OUT}/"
          cp "${ARM64_WHEELS[@]}" "${OUT}/"

          echo "Wheels staged for upload:"
          ls -la "${OUT}/"

          echo "upload_dir=${OUT}" >> $GITHUB_OUTPUT

      - name: Verify wheel versions match prepare-release expected tag
        env:
          EXPECTED_WHEEL_VERSION: ${{ needs.prepare-release.outputs.wheel_version }}
          UPLOAD_DIR: ${{ steps.extract.outputs.upload_dir }}
        run: |
          set -euo pipefail

          # Catches UTC-midnight drift between the build-time version stamp and
          # prepare-release's wheel_version; ai_dynamo and ai_dynamo_runtime must agree.
          shopt -s nullglob
          AI_DYNAMO_WHEELS=("${UPLOAD_DIR}"/ai_dynamo-*-py3-none-any.whl)
          AI_DYNAMO_RUNTIME_WHEELS=("${UPLOAD_DIR}"/ai_dynamo_runtime-*.whl)
          shopt -u nullglob

          if [ ${#AI_DYNAMO_WHEELS[@]} -eq 0 ] || [ ${#AI_DYNAMO_RUNTIME_WHEELS[@]} -eq 0 ]; then
            echo "::error::Missing ai_dynamo or ai_dynamo_runtime wheel in ${UPLOAD_DIR}"
            exit 1
          fi

          echo "Expected wheel version: ${EXPECTED_WHEEL_VERSION}"

          mismatch=0
          for path in "${AI_DYNAMO_WHEELS[@]}" "${AI_DYNAMO_RUNTIME_WHEELS[@]}"; do
            file="$(basename "${path}")"
            # PEP 427: <dist>-<version>-<tags>.whl; version sits between the 1st and 2nd hyphen.
            rest="${file#*-}"
            version="${rest%%-*}"
            if [ -z "${version}" ]; then
              echo "::error::Empty version parsed from ${file}"
              exit 1
            fi
            echo "  ${file} -> ${version}"
            if [ "${version}" != "${EXPECTED_WHEEL_VERSION}" ]; then
              mismatch=1
            fi
          done

          if [ "${mismatch}" -ne 0 ]; then
            echo "::error::Wheel version mismatch — expected '${EXPECTED_WHEEL_VERSION}' for all wheels above. dynamo-pipeline and prepare-release likely computed dev_suffix on different UTC days."
            exit 1
          fi

      - name: Upload wheels to Artifactory
        env:
          ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
          ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          UPLOAD_DIR: ${{ steps.extract.outputs.upload_dir }}
        run: |
          set -euo pipefail

          if [[ "${NIGHTLY}" == "true" ]]; then
            SUBPATH="nightly/${{ github.run_id }}"
          else
            if [ -z "${RC_NUMBER}" ]; then
              echo "Error: RC_NUMBER is empty for a non-nightly release"
              exit 1
            fi
            SUBPATH="release/${VERSION}/rc${RC_NUMBER}"
          fi

          BASE_URL="${ARTIFACTORY_URL%/}/${SUBPATH}"
          echo "Uploading to: ${BASE_URL}/"

          echo "## Wheel Staging Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Wheel | Target |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          shopt -s nullglob
          WHEELS=("${UPLOAD_DIR}"/*.whl)
          if [ ${#WHEELS[@]} -eq 0 ]; then
            echo "Error: no wheels found in ${UPLOAD_DIR}"
            exit 1
          fi

          for WHEEL in "${WHEELS[@]}"; do
            WHEEL_FILENAME=$(basename "${WHEEL}")
            TARGET_URL="${BASE_URL}/${WHEEL_FILENAME}"
            BODY_FILE=$(mktemp)
            HTTP_CODE=$(curl -sSL -o "${BODY_FILE}" -w "%{http_code}" \
              --connect-timeout 30 --max-time 300 \
              --retry 3 --retry-delay 5 --retry-all-errors \
              -u "${ARTIFACTORY_USER}:${ARTIFACTORY_TOKEN}" \
              -T "${WHEEL}" \
              "${TARGET_URL}")
            if [ "${HTTP_CODE}" != "201" ]; then
              echo "::error::Artifactory deploy failed: HTTP ${HTTP_CODE} at ${TARGET_URL}"
              cat "${BODY_FILE}" || true
              exit 1
            fi
            echo "Uploaded: ${WHEEL_FILENAME} -> ${TARGET_URL}"
            echo "| \`${WHEEL_FILENAME}\` | ${TARGET_URL} |" >> $GITHUB_STEP_SUMMARY
            rm -f "${BODY_FILE}"
          done

  # ============================================================================
  # GITLAB RELEASE AUTOMATION TRIGGER
  # Fires the GitLab release-automation pipeline once images and wheels are
  # staged. Variable shape consumed by
  # GITLAB/release-automation/projects/dynamo.yml. Skipped when
  # `skip_gitlab_pipeline` is set (emergency bypass).
  # ============================================================================

  trigger-gitlab-release-pipeline:
    name: Trigger GitLab Release Pipeline
    needs: [prepare-release, release-publish, stage-wheels-artifactory]
    if: ${{ inputs.skip_gitlab_pipeline != true }}
    runs-on:
      group: gitlab_ci_runners
    environment: automated-release
    steps:
      - name: Trigger GitLab pipeline
        env:
          # Both come from the automated-release environment. Storing the URL
          # as a secret (not hardcoded) keeps it masked in logs and lets it be
          # rotated without a code change.
          GITLAB_TRIGGER_URL:   ${{ secrets.GITLAB_PIPELINE_URL }}
          GITLAB_TRIGGER_TOKEN: ${{ secrets.GITLAB_TRIGGER_TOKEN }}
          VERSION:              ${{ needs.prepare-release.outputs.version }}
          NGC_VERSION_TAG:      ${{ needs.prepare-release.outputs.ngc_version_tag }}
          WHEEL_VERSION:        ${{ needs.prepare-release.outputs.wheel_version }}
          COMMIT_SHA:           ${{ needs.prepare-release.outputs.commit_sha }}
          NIGHTLY:              ${{ needs.prepare-release.outputs.nightly }}
          RC_NUMBER:            ${{ needs.prepare-release.outputs.rc_number }}
        run: |
          set -euo pipefail

          # PIPELINE_TYPE / RELEASE_TYPE drive every rule in dynamo.yml.
          # ARTIFACTS gates per-artifact scans and promotions.
          # NIGHTLY_TAG carries the resolved nightly tag (date+shortsha) for
          # the GitLab pipeline summary; the nspect version-name is hardcoded
          # to "Dynamo Nightlies" inside dynamo.yml, so we don't pass it.
          if [ "${NIGHTLY}" = "true" ]; then
            PIPELINE_TYPE="security"
            RELEASE_TYPE="nightly"
            ARTIFACTS="wheel,container"
            NIGHTLY_TAG="${NGC_VERSION_TAG}"
            RC_TAG=""
          else
            PIPELINE_TYPE="rc"
            RELEASE_TYPE="rc"
            ARTIFACTS="wheel,container,helm"
            NIGHTLY_TAG=""
            RC_TAG="v${VERSION}-rc${RC_NUMBER}"
          fi

          # Pipe the trigger token via @file rather than inline form value so
          # it never appears in process listings or `set -x` output.
          # `trap` is registered BEFORE the write so an error between mktemp
          # and the write (or any later line) still cleans up the file.
          TOKEN_FILE=$(mktemp)
          trap 'rm -f "${TOKEN_FILE}"' EXIT
          chmod 600 "${TOKEN_FILE}"
          printf '%s' "${GITLAB_TRIGGER_TOKEN}" > "${TOKEN_FILE}"

          RESPONSE=$(curl -fsSL \
            --request POST \
            --form "token=<${TOKEN_FILE}" \
            --form "ref=main" \
            --form "variables[PIPELINE_TYPE]=${PIPELINE_TYPE}" \
            --form "variables[RELEASE_TYPE]=${RELEASE_TYPE}" \
            --form "variables[DRY_RUN]=false" \
            --form "variables[PROJECT]=dynamo" \
            --form "variables[NIGHTLY_TAG]=${NIGHTLY_TAG}" \
            --form "variables[RC_TAG]=${RC_TAG}" \
            --form "variables[WHEEL_VERSION]=${WHEEL_VERSION}" \
            --form "variables[CONTAINER_TAG]=${NGC_VERSION_TAG}" \
            --form "variables[COMMIT_SHA]=${COMMIT_SHA}" \
            --form "variables[GITHUB_RUN_ID]=${GITHUB_RUN_ID}" \
            --form "variables[ARTIFACTS]=${ARTIFACTS}" \
            --form "variables[ENABLE_PULSE_SCAN]=true" \
            --form "variables[ENABLE_WHEEL_SCAN]=true" \
            --form "variables[ENABLE_SONARQUBE]=true" \
            --form "variables[SONAR_BRANCH]=main" \
            --form "variables[NSPECT_REGISTERED]=false" \
            "${GITLAB_TRIGGER_URL}")

          PIPELINE_ID=$(echo "${RESPONSE}" | jq -r '.id // empty')
          PIPELINE_URL=$(echo "${RESPONSE}" | jq -r '.web_url // empty')
          if [ -z "${PIPELINE_ID}" ]; then
            echo "::error::Failed to trigger GitLab pipeline or parse response"
            echo "Response: ${RESPONSE}"
            exit 1
          fi

          echo "GitLab release pipeline triggered: pipeline ID ${PIPELINE_ID}"

          {
            echo "## GitLab Release Pipeline"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Pipeline ID | ${PIPELINE_ID} |"
            echo "| Pipeline URL | ${PIPELINE_URL:-n/a} |"
            echo "| PIPELINE_TYPE | ${PIPELINE_TYPE} |"
            echo "| RELEASE_TYPE | ${RELEASE_TYPE} |"
            echo "| Version | ${VERSION} |"
            echo "| NGC tag | ${NGC_VERSION_TAG} |"
            echo "| Commit | ${COMMIT_SHA} |"
            echo "| Artifacts | ${ARTIFACTS} |"
          } >> "${GITHUB_STEP_SUMMARY}"
