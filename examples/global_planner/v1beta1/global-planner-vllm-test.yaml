#
# vLLM-based GlobalPlanner test: 2 prefill pools + 1 decode pool.
# Each pool SLA Planner reads router histogram metrics from cluster Prometheus
# and delegates scaling decisions to the GlobalPlanner.
#
# Architecture:
#   DGD gp-ctrl:      Frontend + GlobalRouter + GlobalPlanner
#   DGD gp-prefill-0: LocalRouter + VllmPrefillWorker (TP1) + Planner
#   DGD gp-prefill-1: LocalRouter + VllmPrefillWorker (TP2) + Planner
#   DGD gp-decode-0:  LocalRouter + VllmDecodeWorker  (TP1) + Planner
#
# Prerequisites:
#   - Cluster Prometheus deployed and scraping LocalRouter pods via PodMonitor
#   - HuggingFace token secret: kubectl create secret generic hf-token-secret \
#       --from-literal=HF_TOKEN=<your-token> -n ${K8S_NAMESPACE}
#
# Usage:
#   export K8S_NAMESPACE=... DYNAMO_IMAGE=... DYNAMO_VLLM_IMAGE=... MODEL_NAME=... STORAGE_CLASS_NAME=...
#   envsubst < global-planner-vllm-test.yaml | kubectl apply   -n ${K8S_NAMESPACE} -f -
#   envsubst < global-planner-vllm-test.yaml | kubectl delete  -n ${K8S_NAMESPACE} -f -
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ${K8S_NAMESPACE}-planner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dynamo-platform-dynamo-operator-planner
subjects:
  - kind: ServiceAccount
    name: planner-serviceaccount
    namespace: ${K8S_NAMESPACE}
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: gp-global-router-config
data:
  global_router_config.json: |
    {
      "num_prefill_pools": 2,
      "num_decode_pools": 1,
      "prefill_pool_dynamo_namespaces": [
        "${K8S_NAMESPACE}-gp-prefill-0",
        "${K8S_NAMESPACE}-gp-prefill-1"
      ],
      "decode_pool_dynamo_namespaces": [
        "${K8S_NAMESPACE}-gp-decode-0"
      ],
      "prefill_pool_selection_strategy": {
        "ttft_min_ms": 10, "ttft_max_ms": 3000, "ttft_resolution": 2,
        "isl_min": 0,   "isl_max": 32000, "isl_resolution": 2,
        "prefill_pool_mapping": [[0,1],[0,1]]
      },
      "decode_pool_selection_strategy": {
        "itl_min_ms": 10,  "itl_max_ms": 500,   "itl_resolution": 2,
        "context_length_min": 0, "context_length_max": 32000, "context_length_resolution": 2,
        "decode_pool_mapping": [[0,0],[0,0]]
      }
    }
---

# Shared model cache — ReadWriteMany PVC mounted into all vLLM worker pods.
# The model is downloaded once and reused across pods and restarts.
# Set storageClassName to a RWX-capable storage class available in your cluster
# (e.g. azurefile-csi-premium on AKS, nfs-csi on Nebius, efs-sc on EKS).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hf-model-cache
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ${STORAGE_CLASS_NAME}
  resources:
    requests:
      storage: 50Gi
---
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: gp-ctrl
spec:
  components:
  - name: Frontend
    podTemplate:
      spec:
        containers:
        - args:
          - --router-mode
          - round-robin
          - --namespace
          - ${K8S_NAMESPACE}-gp-ctrl
          - --model-name
          - ${MODEL_NAME}
          command:
          - python3
          - -m
          - dynamo.frontend
          image: ${DYNAMO_IMAGE}
          name: main
          workingDir: /workspace
        imagePullSecrets:
        - name: docker-imagepullsecret
    replicas: 1
    type: frontend
  - name: GlobalPlanner
    podTemplate:
      spec:
        containers:
        - command:
          - python3
          - -m
          - dynamo.global_planner
          image: ${DYNAMO_IMAGE}
          name: main
        imagePullSecrets:
        - name: docker-imagepullsecret
    replicas: 1
    type: planner
  - name: GlobalRouter
    podTemplate:
      spec:
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                - key: karpenter.sh/nodepool
                  operator: In
                  values:
                  - general-medium-storage
              weight: 100
        containers:
        - args:
          - --config
          - /config/global_router_config.json
          - --model-name
          - ${MODEL_NAME}
          - --namespace
          - ${K8S_NAMESPACE}-gp-ctrl
          command:
          - python3
          - -m
          - dynamo.global_router
          image: ${DYNAMO_IMAGE}
          name: main
          volumeMounts:
          - mountPath: /config
            name: global-router-config
            readOnly: true
          workingDir: /workspace
        imagePullSecrets:
        - name: docker-imagepullsecret
        tolerations:
        - effect: NoSchedule
          key: karpenter.sh/disrupted
          operator: Exists
        volumes:
        - configMap:
            name: gp-global-router-config
          name: global-router-config
    replicas: 1
---
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: gp-prefill-0
spec:
  components:
  - name: LocalRouter
    podTemplate:
      spec:
        containers:
        - args:
          - --endpoint
          - ${K8S_NAMESPACE}-gp-prefill-0.prefill.generate
          - --router-block-size
          - "16"
          - --no-router-track-active-blocks
          command:
          - python3
          - -m
          - dynamo.router
          env:
          - name: DYN_SYSTEM_PORT
            value: "9090"
          image: ${DYNAMO_IMAGE}
          name: main
          workingDir: /workspace
        imagePullSecrets:
        - name: docker-imagepullsecret
    replicas: 1
  - name: Planner
    podTemplate:
      spec:
        containers:
        - args:
          - --config
          - '{"environment":"global-planner","global_planner_namespace":"${K8S_NAMESPACE}-gp-ctrl","backend":"vllm","mode":"prefill","optimization_target":"sla","enable_load_scaling":false,"enable_throughput_scaling":true,"throughput_metrics_source":"router","ttft_ms":2000,"max_gpu_budget":-1,"prefill_engine_num_gpu":1,"model_name":"${MODEL_NAME}","profile_results_dir":"/workspace/components/src/dynamo/planner/tests/data/profiling_results/H200_TP1P_TP1D"}'
          command:
          - python3
          - -m
          - dynamo.planner
          image: ${DYNAMO_IMAGE}
          name: main
        imagePullSecrets:
        - name: docker-imagepullsecret
    replicas: 1
    type: planner
  - name: VllmPrefillWorker
    podTemplate:
      spec:
        containers:
        - args:
          - --model
          - ${MODEL_NAME}
          - --tensor-parallel-size
          - "1"
          - --is-prefill-worker
          command:
          - python3
          - -m
          - dynamo.vllm
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: ${DYNAMO_VLLM_IMAGE}
          name: main
          resources:
            limits:
              nvidia.com/gpu: "1"
          volumeMounts:
          - mountPath: /home/dynamo/.cache/huggingface/hub
            name: hf-model-cache
          workingDir: /workspace/examples/backends/vllm
        imagePullSecrets:
        - name: docker-imagepullsecret
        volumes:
        - name: hf-model-cache
          persistentVolumeClaim:
            claimName: hf-model-cache
    replicas: 1
    type: prefill
---
