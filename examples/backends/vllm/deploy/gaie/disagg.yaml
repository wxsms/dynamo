# GAIE-managed disaggregated vLLM deployment, tuned for *stability* because used as a Post Merge test
#
# Why this configuration looks the way it does (intentional, not a default):
#
#   * Disagg requires a vLLM KV connector. The only one available without
#     a separate KV cache service (KVBM, LMCache, FlexKV) is ``NixlConnector``
#     -- see components/src/dynamo/vllm/args.py:_validate_disagg_args. We
#     therefore use NIXL, but configure it for the most boring transport
#     path possible.
#
#   * ``kv_buffer_device: "cpu"`` keeps the KV cache buffer in host RAM
#     rather than GPU memory. This avoids the GPU-memory-registration code
#     path in UCX entirely. A previous CI run segfaulted in
#     ``uct_tcp_ep_am_bcopy`` while UCX tried to do a TCP active-message
#     buffer copy of GPU memory with ``UCX_TLS=tcp,self`` (which does NOT
#     include ``cuda_copy``/``cuda_ipc``). Moving the buffer to host RAM
#     makes the transfer a plain CPU<->CPU memcpy over TCP.
#
#   * ``UCX_TLS=tcp,self`` is the lowest-common-denominator UCX transport
#     set: TCP works everywhere, ``self`` covers intra-process. We deliberately
#     do NOT include any ``rc_*``/``dc_*`` (RDMA) or ``cuda_*`` transports --
#     they require hardware we cannot assume in CI.
#
#   * ``UCX_RNDV_THRESH=inf`` disables the UCX rendezvous protocol entirely,
#     forcing every transfer through the eager active-message path. Slower,
#     but fewer code paths and no zero-copy registration races.
#
#   * No ``podAffinity`` is set on the workers. Prefill and decode can land
#     on the same pod-host or on different hosts -- whatever the scheduler
#     decides given GPU availability. Stability over locality.
#
#   * ``gpu-memory-utilization: 0.50`` leaves enough headroom for prefill
#     and decode to share a GPU if they happen to co-schedule.
#
#   * ``--max-model-len 16384`` caps the context window so vLLM's KV cache
#     budget fits in the reduced GPU memory available to each worker.
#     Qwen/Qwen3-0.6B's model default is 40960 tokens, which would require
#     ~4.4 GiB of KV cache and refuses to start under
#     ``gpu-memory-utilization=0.50`` (~2.6 GiB available). 16384 leaves
#     comfortable headroom; raise this only if you also raise
#     ``gpu-memory-utilization``.
#
#   * Registered prefill and decode worker types establish disaggregated
#     serving. Both roles must be available before the model is ready.
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: qwen
spec:
  backendFramework: vllm
  components:
  - name: Epp
    type: epp
    replicas: 1
    eppConfig:
      config:
        plugins:
        - type: disagg-profile-handler
        - name: prefill-filter
          parameters:
            allowsNoLabel: false
            label: nvidia.com/dynamo-component-type
            validValues:
            - prefill
          type: label-filter
        - name: decode-filter
          parameters:
            allowsNoLabel: false
            label: nvidia.com/dynamo-component-type
            validValues:
            - decode
          type: label-filter
        - name: picker
          type: max-score-picker
        - name: dyn-prefill
          type: dyn-prefill-scorer
        - name: dyn-decode
          type: dyn-decode-scorer
        schedulingProfiles:
        - name: prefill
          plugins:
          - pluginRef: prefill-filter
            weight: 1
          - pluginRef: dyn-prefill
            weight: 1
          - pluginRef: picker
            weight: 1
        - name: decode
          plugins:
          - pluginRef: decode-filter
            weight: 1
          - pluginRef: dyn-decode
            weight: 1
          - pluginRef: picker
            weight: 1
    podTemplate:
      spec:
        containers:
        - name: main
          env:
          - name: DYN_KV_CACHE_BLOCK_SIZE
            value: "16"
          - name: DYN_MODEL_NAME
            value: Qwen/Qwen3-0.6B
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/epp-image:my-tag
          imagePullPolicy: IfNotPresent
          # Make EPP schedule away from disk-starved nodes and mitigate its
          # eviction under node DiskPressure: the ephemeral-storage request keeps
          # it out of the kubelet's first-to-evict bucket. CI-stability specific.
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
              ephemeral-storage: 1Gi
  - name: VllmDecodeWorker
    type: decode
    replicas: 1
    sharedMemorySize: 2Gi
    frontendSidecar: sidecar-frontend
    podTemplate:
      spec:
        # No podAffinity: prefill and decode can land on the same host
        # or different hosts. Stability over locality.
        containers:
        - name: main
          args:
          - python3 -m dynamo.vllm --model $MODEL_PATH --served-model-name $SERVED_MODEL_NAME
            --tensor-parallel-size 1 --data-parallel-size 1 --disaggregation-mode
            decode --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_buffer_device":"cpu"}'
            --gpu-memory-utilization 0.50 --max-model-len 16384 --block-size 16
          command:
          - /bin/sh
          - -c
          env:
          - name: SERVED_MODEL_NAME
            value: Qwen/Qwen3-0.6B
          - name: MODEL_PATH
            value: Qwen/Qwen3-0.6B
          # Force UCX to use only TCP and self transports -- no RDMA, no
          # CUDA-aware UCX paths. Combined with kv_buffer_device=cpu this
          # is the most boring (and most reliable) transport configuration.
          - name: UCX_TLS
            value: tcp,self
          # Disable rendezvous protocol; force eager active-message path.
          - name: UCX_RNDV_THRESH
            value: "inf"
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          workingDir: /workspace/examples/backends/vllm
        - name: sidecar-frontend
          args:
          - -m
          - dynamo.frontend
          - --router-mode
          - direct
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
        tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
  - name: VllmPrefillWorker
    type: prefill
    replicas: 1
    sharedMemorySize: 2Gi
    frontendSidecar: sidecar-frontend
    podTemplate:
      spec:
        # No podAffinity: prefill and decode can land on the same host
        # or different hosts. Stability over locality.
        containers:
        - name: main
          args:
          - python3 -m dynamo.vllm --model $MODEL_PATH --served-model-name $SERVED_MODEL_NAME
            --tensor-parallel-size 1 --data-parallel-size 1 --disaggregation-mode
            prefill --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_buffer_device":"cpu"}'
            --gpu-memory-utilization 0.50 --max-model-len 16384 --enable-prefix-caching
            --block-size 16 --kv-events-config '{"enable_kv_cache_events":true}'
          command:
          - /bin/sh
          - -c
          env:
          - name: SERVED_MODEL_NAME
            value: Qwen/Qwen3-0.6B
          - name: MODEL_PATH
            value: Qwen/Qwen3-0.6B
          # Force UCX to use only TCP and self transports -- no RDMA, no
          # CUDA-aware UCX paths. Combined with kv_buffer_device=cpu this
          # is the most boring (and most reliable) transport configuration.
          - name: UCX_TLS
            value: tcp,self
          # Disable rendezvous protocol; force eager active-message path.
          - name: UCX_RNDV_THRESH
            value: "inf"
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          workingDir: /workspace/examples/backends/vllm
        - name: sidecar-frontend
          args:
          - -m
          - dynamo.frontend
          - --router-mode
          - direct
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
        tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
