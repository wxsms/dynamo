apiVersion: batch/v1
kind: Job
metadata:
  name: glm5-disagg-bench
  namespace: <your-namespace>
spec:
  backoffLimit: 1
  completions: 1
  parallelism: 1
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: bench
        image: python:3.12-slim
        securityContext:
          allowPrivilegeEscalation: false
        imagePullPolicy: IfNotPresent
        env:
        - name: TARGET_MODEL
          value: nvidia/GLM-5-NVFP4
        - name: ENDPOINT
          value: glm5-sglang-frontend:8000
        - name: ISL
          value: "1000"
        - name: OSL
          value: "8192"
        # Concurrency = CONCURRENCY_PER_GPU * num_decode_gpus
        # Default: 32 req/GPU * 16 GPUs (4 nodes x 4 GPUs) = 512
        - name: CONCURRENCY
          value: "512"
        - name: ARTIFACT_DIR
          value: /model-store/perf/glm5-disagg-isl1k-osl8k
        - name: TOKENIZER
          value: nvidia/GLM-5-NVFP4
        - name: HF_HOME
          value: /model-store
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: COLUMNS
          value: "200"
        # HOME defaults to "/" for uid 1000 with no /etc/passwd entry; pip --user
        # then tries to write /.local (read-only). Point HOME at /tmp (1777 sticky)
        # so ~/.local resolves under a writable path.
        - name: HOME
          value: /tmp
        - name: PATH
          value: /tmp/.local/bin:/usr/local/bin:/usr/bin:/bin
        envFrom:
        - secretRef:
            name: hf-token-secret
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          # No apt-get: cluster benchmark pods run as non-root, and Python
          # stdlib is enough for the readiness probe.
          # GLM-5's tokenizer_config.json uses tokenizer_class=TokenizersBackend,
          # which is supported by Transformers v5.
          pip install --user -q aiperf==0.6.0 transformers==5.8.0 tokenizers==0.22.2

          echo "Waiting for model at http://$ENDPOINT/v1/models..."
          python3 - <<'PY'
          import json, os, time, urllib.error, urllib.request

          endpoint = os.environ["ENDPOINT"]
          target = os.environ["TARGET_MODEL"]
          while True:
              try:
                  with urllib.request.urlopen(f"http://{endpoint}/v1/models", timeout=5) as r:
                      data = json.load(r)
                  if any(model.get("id") == target for model in data.get("data", [])):
                      break
              except (urllib.error.URLError, ValueError, KeyError):
                  pass
              print(f"[{time.strftime('%H:%M:%S')}] not ready, retrying in 10s...", flush=True)
              time.sleep(10)
          print("Model ready!", flush=True)
          PY

          mkdir -p "$ARTIFACT_DIR"

          aiperf profile \
            --artifact-dir "$ARTIFACT_DIR" \
            --model "$TARGET_MODEL" \
            --tokenizer "$TOKENIZER" \
            --tokenizer-trust-remote-code \
            --endpoint-type chat \
            --endpoint /v1/chat/completions \
            --streaming \
            --url "http://$ENDPOINT" \
            --synthetic-input-tokens-mean $ISL \
            --synthetic-input-tokens-stddev 0 \
            --output-tokens-mean $OSL \
            --output-tokens-stddev 0 \
            --extra-inputs "max_tokens:$OSL" \
            --extra-inputs "min_tokens:$OSL" \
            --extra-inputs "ignore_eos:true" \
            --concurrency $CONCURRENCY \
            --request-count $((CONCURRENCY * 3)) \
            --warmup-request-count 16 \
            --num-dataset-entries 12800 \
            --random-seed 100 \
            --ui simple

          echo "Done. Results in $ARTIFACT_DIR"
          ls -la "$ARTIFACT_DIR"
        volumeMounts:
        - name: model-cache
          mountPath: /model-store
        workingDir: /workspace
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
