apiVersion: batch/v1
kind: Job
metadata:
  name: turbo-gptoss-120b-bench
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 7200 # 2h hard cap on the Job
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: turbo-gptoss-120b-bench
    spec:
      # Co-locate the bench pod with the DGD frontend to minimise client/server network overhead.
      # Update `values:` to the DGD you are benchmarking.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: nvidia.com/dynamo-component-type
                operator: In
                values:
                - frontend
              - key: nvidia.com/dynamo-graph-deployment-name
                operator: In
                values:
                - turbo-gptoss-120b-agg-b200-agentic
                - turbo-gptoss-120b-agg-h200-agentic
                - turbo-gptoss-120b-disagg-b200-agentic
                - turbo-gptoss-120b-disagg-h200-agentic
            topologyKey: kubernetes.io/hostname
      # tolerations: # uncomment to populate any tolerations for the gpu nodes
      containers:
      - name: perf
        image: python:3.12-slim
        imagePullPolicy: IfNotPresent
        workingDir: /workspace
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          ulimit -n 600000
          apt-get update && apt-get install -y curl jq procps git && apt-get clean
          pip install "aiperf==0.10.0" "transformers==4.57.3" "tiktoken==0.13.0" "blobfile"
          sysctl -w net.ipv4.ip_local_port_range="1024 65000" 2>/dev/null || true
          export COLUMNS=200
          EPOCH=$(date +%s)
          wait_for_model_ready() {
            local max_attempts=${WAIT_FOR_MODEL_MAX_ATTEMPTS:-720} # 720 * 5s = 1h default
            local attempt=0
            echo "Waiting for model '$TARGET_MODEL' at $ENDPOINT/v1/models (max ${max_attempts} attempts) ..."
            while ! curl -sf "http://$ENDPOINT/v1/models" | jq -e --arg m "$TARGET_MODEL" '.data[]? | select(.id == $m)' >/dev/null 2>&1; do
              attempt=$((attempt + 1))
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "ERROR: model '$TARGET_MODEL' did not become ready after ${max_attempts} attempts. Aborting."
                exit 1
              fi
              echo "[$(date '+%H:%M:%S')] not ready (attempt ${attempt}/${max_attempts}), sleeping 5s"
              sleep 5
            done
            curl -s "http://$ENDPOINT/v1/models" | jq .
          }
          if [ ! -f "${TRACE_FILE}" ]; then
            echo "ERROR: trace file not found at ${TRACE_FILE}"
            echo "Copy it onto the PVC via a helper pod, e.g.:"
            echo " kubectl cp <local_trace.jsonl> <ns>/<helper-pod>:${TRACE_FILE}"
            exit 1
          fi
          if head -c 12 "${TRACE_FILE}" | grep -q "^version http"; then
            echo "ERROR: ${TRACE_FILE} is a Git LFS pointer file, not trace data."
            echo "Run 'git lfs pull --include \"recipes/kimi-k2.6/perf/traces/*\"' in the repo, then re-stage."
            exit 1
          fi
          wait_for_model_ready
          ROOT_DIR="${ROOT_ARTIFACT_DIR}/${EPOCH}_${JOB_NAME}"
          mkdir -p "$ROOT_DIR"
          echo "=============================================="
          echo "Trace Replay Benchmark (aiperf)"
          echo "=============================================="
          echo "Endpoint:     http://${ENDPOINT}"
          echo "Model:        ${TARGET_MODEL}"
          echo "Trace file:   ${TRACE_FILE}"
          echo "Concurrency:  ${CONCURRENCY}"
          echo "Artifact root:${ROOT_DIR}"
          echo "=============================================="
          # Warmup (fills prefix cache; not scored). Replays a slice of the SAME trace at the
          # benchmark concurrency, so every worker warms under the ISL/OSL distribution that will
          # be scored — a c1 / synthetic-ISL warmup leaves most of an 8-worker agg deployment cold.
          WARMUP_DIR="${ROOT_DIR}/warmup"
          mkdir -p "$WARMUP_DIR"
          WARMUP_REQUESTS=$(( CONCURRENCY * 2 ))   # >= a couple per worker so none stay cold
          aiperf profile \
          -m "${TARGET_MODEL}" \
          --tokenizer "${TARGET_MODEL}" \
          --tokenizer-trust-remote-code \
          --input-file "${TRACE_FILE}" \
          --custom-dataset-type mooncake_trace \
          --num-requests "${WARMUP_REQUESTS}" \
          --prompt-input-tokens-block-size 512 \
          --url "http://${ENDPOINT}" \
          --streaming \
          --use-server-token-count \
          --extra-inputs ignore_eos:true \
          --concurrency "${CONCURRENCY}" \
          --random-seed 7 \
          --ui simple \
          --artifact-dir "${WARMUP_DIR}"
          echo "Warmup complete"
          MODEL_BASE="${TARGET_MODEL##*/}"
          TS=$(date +'%Y%m%d_%H%M%S')
          RUN_DIR="${ROOT_DIR}/${MODEL_BASE}_trace_c${CONCURRENCY}_${TS}"
          mkdir -p "$RUN_DIR"
          aiperf profile \
          -m "${TARGET_MODEL}" \
          --tokenizer "${TARGET_MODEL}" \
          --tokenizer-trust-remote-code \
          --input-file "${TRACE_FILE}" \
          --custom-dataset-type mooncake_trace \
          --num-requests $(wc -l < "${TRACE_FILE}") \
          --prompt-input-tokens-block-size 512 \
          --url "http://${ENDPOINT}" \
          --streaming \
          --use-server-token-count \
          --extra-inputs ignore_eos:true \
          --concurrency "${CONCURRENCY}" \
          --random-seed 42 \
          --ui simple \
          --artifact-dir "${RUN_DIR}" \
          --request-timeout-seconds 1200 \
          --workers-max "${CONCURRENCY}" \
          --export-http-trace
          echo "Concurrency ${CONCURRENCY} complete; artifacts in ${RUN_DIR}"
          echo "per-GPU throughput = output_token_throughput / (#GPUs in the DGD, e.g. 8); target >= 50 tps/user"
          ls -la "${RUN_DIR}" || true
          echo ""
          echo "Done. Root: ${ROOT_DIR}"
        env:
        # --- Edit these to target the DGD + trace you want to benchmark ---
        - name: ENDPOINT
          value: turbo-gptoss-120b-agg-b200-agentic-frontend:8000
        - name: TRACE_FILE
          value: /model-cache/traces/64k_400_90kv_agent_new_noschedule_short_15perc.jsonl  # agentic 15% trace (staged from ../../kimi-k2.6/perf/traces/)
        - name: CONCURRENCY
          value: "384"   # B200 agentic ~50-tps floor; H200 ~128. Sweep by restarting DGD workers between runs.
        # --- The remainder is shared across all variants ---
        - name: TARGET_MODEL
          value: openai/gpt-oss-120b
        - name: AIPERF_HTTP_CONNECTION_LIMIT
          value: "400"
        - name: AIPERF_HTTP_SO_RCVTIMEO
          value: "120"
        - name: AIPERF_SERVICE_PROFILE_CONFIGURE_TIMEOUT
          value: "3600"
        - name: AIPERF_DATASET_CONFIGURATION_TIMEOUT
          value: "3600"
        - name: JOB_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['job-name']
        - name: ROOT_ARTIFACT_DIR
          value: /model-cache/perf
        - name: HF_HOME
          value: /model-cache
        - name: PYTHONUNBUFFERED
          value: "1"
        volumeMounts:
        - name: model-cache
          mountPath: /model-cache
      restartPolicy: Never
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
