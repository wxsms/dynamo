apiVersion: batch/v1
kind: Job
metadata:
  name: model-download
spec:
  backoffLimit: 3
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: model-download
    spec:
      restartPolicy: Never
      containers:
        - name: model-download
          image: python:3.10-slim
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          command: ["sh", "-c"]
          envFrom:
            - secretRef:
                name: hf-token-secret
          env:
            - name: HF_HOME
              value: /model-cache
            - name: HF_XET_HIGH_PERFORMANCE
              value: "1"
          # `ignore_patterns` skips the Apple/original checkpoints (~120Gi) vLLM never loads
          # (it uses only the root `model-*.safetensors`). The EAGLE3 head is REQUIRED — spec-dec is ON.
          # NB: use snapshot_download; the `hf download <repo> --exclude A B` CLI form mis-parses the
          # 2nd pattern as a positional filename and fails ("File not found: original/*").
          args:
            - |
              set -eux
              pip install --no-cache-dir huggingface_hub==1.16.4
              python3 -c "from huggingface_hub import snapshot_download as s; \
                s('openai/gpt-oss-120b', ignore_patterns=['metal/*','original/*']); \
                s('nvidia/gpt-oss-120b-Eagle3-v3')"
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
