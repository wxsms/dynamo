apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      # gpt-oss-120b MXFP4 root weights ~57Gi + EAGLE3 head ~1.5Gi + perf traces/artifacts.
      storage: 400Gi
  # Edit this to match your cluster (`kubectl get storageclass`).
  storageClassName: "your-storage-class-name"
