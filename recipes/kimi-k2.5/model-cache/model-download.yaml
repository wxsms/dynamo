#
# Downloads Kimi-K2.5-NVFP4 and the Eagle3 speculative-decoding head into the
# shared model-cache PVC. Both checkpoints are pulled from HuggingFace.
apiVersion: batch/v1
kind: Job
metadata:
  name: model-download
spec:
  backoffLimit: 3
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: model-download
    spec:
      restartPolicy: Never
      containers:
        - name: model-download
          image: python:3.10-slim
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          command: ["sh", "-c"]
          envFrom:
            - secretRef:
                name: hf-token-secret
          env:
            - name: MODEL_NAME
              value: nvidia/Kimi-K2.5-NVFP4
            - name: EAGLE_MODEL_NAME
              value: nvidia/Kimi-K2.5-Thinking-Eagle3
            - name: HF_HOME
              value: /model-cache
            # Uses up to 64 GB RAM for XET buffers; set "0" on low-memory nodes (8 GB cap): https://huggingface.co/docs/hub/en/xet/using-xet-storage#download-buffers
            - name: HF_XET_HIGH_PERFORMANCE
              value: "1"
          args:
            - |
              set -eux
              pip install --no-cache-dir huggingface_hub==1.11.0
              hf download $MODEL_NAME
              hf download $EAGLE_MODEL_NAME
          resources:
            requests:
              cpu: "2"
              memory: "64Gi"
            limits:
              cpu: "8"
              memory: "64Gi"
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
