#
# Disaggregated Kimi-K2.5-NVFP4 with Eagle3 speculative decoding, KV-aware routing,
# and host-memory KV offloading on prefill workers.
#
# Topology (6x GB200 nodes, 24 GPUs total):
#   - 3x prefill workers (TP=4 / EP=4, single-node each)
#   - 3x decode workers  (TP=4 / EP=4, single-node each)
#
# Routing: frontend uses KV-aware routing with prefix-hash awareness to land
# requests on whichever prefill worker already holds matching KV blocks.
#
# Prefill workers offload spilled KV blocks to host memory (host_cache_size +
# secondary_offload_min_priority in prefill.yaml).
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: kimi-k25-disagg-kv-eagle
spec:
  envs:
    - name: NCCL_MNNVL_ENABLE
      value: "1"
    - name: NCCL_CUMEM_ENABLE
      value: "1"
    - name: TLLM_LOG_LEVEL
      value: "info"
    - name: TRTLLM_ENABLE_PDL
      value: "1"
  services:
    Frontend:
      componentType: frontend
      extraPodSpec:
        containers: null
        mainContainer:
          command:
            - python3
          args:
            - -m
            - dynamo.frontend
            - --router-mode
            - kv
            - --request-plane
            - nats
          env:
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          image: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:<IMAGE_TAG>
          name: ""
          resources: {}
        nodeSelector:
          kubernetes.io/arch: arm64
        # tolerations:     # uncomment to populate any tolerations for the gpu nodes
      replicas: 1

    prefill:
      componentType: worker
      subComponentType: prefill
      envFromSecret: hf-token-secret
      extraPodSpec:
        containers: null
        mainContainer:
          args:
            - --model-path
            - nvidia/Kimi-K2.5-NVFP4
            - --served-model-name
            - nvidia/Kimi-K2.5-NVFP4
            - --extra-engine-args
            - /config/prefill.yaml
            - --disaggregation-mode
            - prefill
            - --publish-events-and-metrics
            - --request-plane
            - nats
            - --kv-block-size
            - "32"
            - --dyn-tool-call-parser
            - kimi_k2
            - --dyn-reasoning-parser
            - kimi_k25
          command:
            - python3
            - -m
            - dynamo.trtllm
          env:
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: HF_HOME
              value: /model-cache
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: HF_MODULES_CACHE
              value: /tmp/hf_modules
            - name: NCCL_GRAPH_MIXING_SUPPORT
              value: "0"
            # KV transfer (UCX zcopy on; no staging buffer required)
            - name: TRTLLM_TRY_ZCOPY_FOR_KVCACHE_TRANSFER
              value: "1"
            - name: TRTLLM_KVCACHE_TRANSFER_BUFFER_SIZE
              value: "0B"
          image: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:<IMAGE_TAG>
          name: ""
          resources: {}
          securityContext:
            runAsUser: 0
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /live
              port: 9090
            periodSeconds: 60
            timeoutSeconds: 20
          volumeMounts:
            - mountPath: /model-cache
              name: model-cache
            - mountPath: /config
              name: trtllm-config
              readOnly: true
          workingDir: /workspace/
        nodeSelector:
          kubernetes.io/arch: arm64
        # tolerations:     # uncomment to populate any tolerations for the gpu nodes
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: your-compute-domain-channel
        volumes:
          - name: model-cache
            persistentVolumeClaim:
              claimName: model-cache
          - name: trtllm-config
            configMap:
              name: kimi-k25-disagg-kv-eagle-config
      replicas: 3
      resources:
        limits:
          gpu: "4"
        claims:
          - name: compute-domain-channel

    decode:
      componentType: worker
      subComponentType: decode
      envFromSecret: hf-token-secret
      extraPodSpec:
        containers: null
        mainContainer:
          args:
            - --model-path
            - nvidia/Kimi-K2.5-NVFP4
            - --served-model-name
            - nvidia/Kimi-K2.5-NVFP4
            - --extra-engine-args
            - /config/decode.yaml
            - --disaggregation-mode
            - decode
            - --publish-events-and-metrics
            - --request-plane
            - nats
            - --kv-block-size
            - "32"
            - --dyn-tool-call-parser
            - kimi_k2
            - --dyn-reasoning-parser
            - kimi_k25
          command:
            - python3
            - -m
            - dynamo.trtllm
          env:
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: HF_HOME
              value: /model-cache
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRITON_CACHE_DIR
              value: /tmp/.triton-cache
            - name: HF_MODULES_CACHE
              value: /tmp/hf_modules
            - name: NCCL_SOCKET_IFNAME
              value: eth0
            - name: GLOO_SOCKET_IFNAME
              value: eth0
            - name: NCCL_GRAPH_MIXING_SUPPORT
              value: "0"
            - name: ENABLE_CONFIGURABLE_MOE
              value: "1"
            # Uncomment the below to reproduce benchmark results in README exactly.
            # - name: TLLM_SPEC_DECODE_FORCE_NUM_ACCEPTED_TOKENS
            #   value: "2"
            # KV transfer (UCX zcopy on; no staging buffer required)
            - name: TRTLLM_TRY_ZCOPY_FOR_KVCACHE_TRANSFER
              value: "1"
            - name: TRTLLM_KVCACHE_TRANSFER_BUFFER_SIZE
              value: "0B"
            - name: NCCL_NVLS_ENABLE
              value: "1"
            - name: NVIDIA_GDRCOPY
              value: "1"
          image: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:<IMAGE_TAG>
          name: ""
          resources: {}
          securityContext:
            runAsUser: 0
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /live
              port: 9090
            periodSeconds: 60
            timeoutSeconds: 20
          volumeMounts:
            - mountPath: /model-cache
              name: model-cache
            - mountPath: /config
              name: trtllm-config
              readOnly: true
          workingDir: /workspace/
        nodeSelector:
          kubernetes.io/arch: arm64
        # tolerations:     # uncomment to populate any tolerations for the gpu nodes
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: your-compute-domain-channel
        volumes:
          - name: model-cache
            persistentVolumeClaim:
              claimName: model-cache
          - name: trtllm-config
            configMap:
              name: kimi-k25-disagg-kv-eagle-config
      replicas: 3
      resources:
        limits:
          gpu: "4"
        claims:
          - name: compute-domain-channel
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kimi-k25-disagg-kv-eagle-config
data:
  prefill.yaml: |
    cache_transceiver_config:
      backend: UCX
      max_tokens_in_buffer: 0
      kv_transfer_sender_future_timeout_ms: 30000
    allreduce_strategy: MNNVL
    max_batch_size: 4
    max_num_tokens: 8192
    enable_chunked_prefill: true
    max_seq_len: 200000
    tensor_parallel_size: 4
    moe_expert_parallel_size: 4
    enable_attention_dp: true
    pipeline_parallel_size: 1
    num_postprocess_workers: 4
    print_iter_log: true
    stream_interval: 100
    trust_remote_code: true
    cuda_graph_config: null
    disable_overlap_scheduler: true
    moe_config:
      backend: TRTLLM
    kv_cache_config:
      enable_block_reuse: true
      free_gpu_memory_fraction: 0.6
      host_cache_size: 107374182400  # 100 GiB host-memory KV offload
      secondary_offload_min_priority: 35
      dtype: fp8
      tokens_per_block: 32
    speculative_config:
      decoding_type: Eagle
      max_draft_len: 3
      allow_advanced_sampling: true
      speculative_model_dir: nvidia/Kimi-K2.5-Thinking-Eagle3
  decode.yaml: |
    allreduce_strategy: MNNVL
    cache_transceiver_config:
      backend: UCX
      max_tokens_in_buffer: 0
      kv_transfer_sender_future_timeout_ms: 30000
    max_num_tokens: 640
    cuda_graph_config:
      batch_sizes:
        - 1
        - 2
        - 4
        - 8
        - 16
        - 32
        - 64
        - 128
      enable_padding: true
    enable_attention_dp: false
    kv_cache_config:
      dtype: fp8
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.85
      tokens_per_block: 32
    max_batch_size: 128
    moe_config:
      backend: CUTLASS
      use_low_precision_moe_combine: true
    moe_expert_parallel_size: 4
    nvfp4_gemm_config:
      allowed_backends:
        - cutlass
        - cublaslt
        - cuda_core
    num_postprocess_workers: 8
    print_iter_log: true
    stream_interval: 10
    tensor_parallel_size: 4
    trust_remote_code: true
    speculative_config:
      decoding_type: Eagle
      max_draft_len: 3
      allow_advanced_sampling: true
      speculative_model_dir: nvidia/Kimi-K2.5-Thinking-Eagle3
