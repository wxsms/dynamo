apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: dsv4-flash-disagg-h200-agentic
spec:
  backendFramework: vllm
  components:
  - name: Frontend
    type: frontend
    replicas: 1
    podTemplate:
      spec:
        containers:
        - image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
          workingDir: /workspace
          command:
          - /bin/bash
          - -lc
          args:
          - |
            python3 -m dynamo.frontend \
              --router-mode kv \
              --router-kv-events \
              --kv-cache-block-size 256 \
              --router-reset-states \
              --http-host 0.0.0.0 \
              --http-port 8000
          name: main
          volumeMounts:
          - name: model-cache
            mountPath: /model-cache
            readOnly: true
        schedulerName: default-scheduler
        volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
            readOnly: true
  - name: VllmPrefillWorker
    type: prefill
    replicas: 4
    podTemplate:
      spec:
        volumes:
        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
            readOnly: true
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-H200
        runtimeClassName: nvidia
        containers:
        - image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
          workingDir: /workspace
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
              - IPC_LOCK
              - SYS_RESOURCE
          volumeMounts:
          - name: shared-memory
            mountPath: /dev/shm
          - name: model-cache
            mountPath: /model-cache
            readOnly: true
          env:
          - name: HF_HOME
            value: /model-cache
          - name: HF_HUB_CACHE
            value: /model-cache/hub
          - name: HF_HUB_OFFLINE
            value: "1"
          - name: TRANSFORMERS_OFFLINE
            value: "1"
          - name: VLLM_SKIP_P2P_CHECK
            value: "1"
          - name: NCCL_CUMEM_ENABLE
            value: "1"
          - name: NCCL_IB_DISABLE
            value: "0"
          # disagg GDR (per-rank NIC pinning): to enable GDR, set BOTH VLLM_GPU_NIC_PCIE_MAPPING and
          # VLLM_NIC_SELECTION_VARS (a pair - vLLM #42083, setting only one fails EngineCore init);
          # generate the node map per README "Per-rank NIC mapping". The recipe ships neither; without
          # them, disagg KV transfer uses host-staging (slower) - see README "Per-rank NIC mapping".
          - name: UCX_IB_ADDR_TYPE
            value: ib_global
          - name: UCX_IB_REG_METHODS
            value: odp,rcache
          - name: UCX_TLS
            value: rc_x,rc,cuda_copy,cuda_ipc
          - name: UCX_RNDV_SCHEME
            value: get_zcopy
          - name: UCX_RNDV_THRESH
            value: "0"
          - name: UCX_MEMTYPE_CACHE
            value: "1"
          command:
          - /bin/bash
          - -lc
          args:
          - |
            set -Eeuo pipefail
            ulimit -l unlimited
            ulimit -n 1048576
            python3 -m dynamo.vllm \
              --model deepseek-ai/DeepSeek-V4-Flash \
              --served-model-name deepseek-ai/DeepSeek-V4-Flash \
              --trust-remote-code \
              --kv-cache-dtype fp8 \
              --block-size 256 \
              --gpu-memory-utilization 0.92 \
              --max-model-len 1048576 \
              --max-num-seqs 128 \
              --max-num-batched-tokens 16384 \
              --data-parallel-size 4 \
              --enable-expert-parallel \
              --tensor-parallel-size 1 \
              --enable-prefix-caching \
              --moe-backend marlin \
              --tokenizer-mode deepseek_v4 \
              --dyn-tool-call-parser deepseek_v4 \
              --dyn-reasoning-parser deepseek_v4 \
              --kv-transfer-config '{
                  "kv_connector": "NixlConnector",
                  "kv_role": "kv_both",
                  "kv_buffer_device": "cuda"
                }' \
              --disaggregation-mode prefill \
              --kv-events-config '{
                  "publisher": "zmq",
                  "topic": "kv-events",
                  "endpoint": "tcp://*:5571",
                  "enable_kv_cache_events": true
                }'
          name: main
          envFrom:
          - secretRef:
              name: hf-token-secret
          resources:
            requests:
              nvidia.com/gpu: "4"
              rdma/ib: "4"
            limits:
              nvidia.com/gpu: "4"
              rdma/ib: "4"
        schedulerName: default-scheduler
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
  - name: VllmDecodeWorker
    type: decode
    replicas: 3
    podTemplate:
      spec:
        volumes:
        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
            readOnly: true
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-H200
        runtimeClassName: nvidia
        containers:
        - image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
          workingDir: /workspace
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
              - IPC_LOCK
              - SYS_RESOURCE
          volumeMounts:
          - name: shared-memory
            mountPath: /dev/shm
          - name: model-cache
            mountPath: /model-cache
            readOnly: true
          env:
          - name: HF_HOME
            value: /model-cache
          - name: HF_HUB_CACHE
            value: /model-cache/hub
          - name: HF_HUB_OFFLINE
            value: "1"
          - name: TRANSFORMERS_OFFLINE
            value: "1"
          - name: VLLM_SKIP_P2P_CHECK
            value: "1"
          - name: NCCL_CUMEM_ENABLE
            value: "1"
          - name: NCCL_IB_DISABLE
            value: "0"
          # disagg GDR (per-rank NIC pinning): to enable GDR, set BOTH VLLM_GPU_NIC_PCIE_MAPPING and
          # VLLM_NIC_SELECTION_VARS (a pair - vLLM #42083, setting only one fails EngineCore init);
          # generate the node map per README "Per-rank NIC mapping". The recipe ships neither; without
          # them, disagg KV transfer uses host-staging (slower) - see README "Per-rank NIC mapping".
          - name: UCX_IB_ADDR_TYPE
            value: ib_global
          - name: UCX_IB_REG_METHODS
            value: odp,rcache
          - name: UCX_TLS
            value: rc_x,rc,cuda_copy,cuda_ipc
          - name: UCX_RNDV_SCHEME
            value: get_zcopy
          - name: UCX_RNDV_THRESH
            value: "0"
          - name: UCX_MEMTYPE_CACHE
            value: "1"
          command:
          - /bin/bash
          - -lc
          args:
          - |
            set -Eeuo pipefail
            ulimit -l unlimited
            ulimit -n 1048576
            python3 -m dynamo.vllm \
              --model deepseek-ai/DeepSeek-V4-Flash \
              --served-model-name deepseek-ai/DeepSeek-V4-Flash \
              --trust-remote-code \
              --kv-cache-dtype fp8 \
              --block-size 256 \
              --max-model-len 1048576 \
              --max-num-seqs 128 \
              --data-parallel-size 4 \
              --enable-expert-parallel \
              --tensor-parallel-size 1 \
              --moe-backend marlin \
              --tokenizer-mode deepseek_v4 \
              --dyn-tool-call-parser deepseek_v4 \
              --dyn-reasoning-parser deepseek_v4 \
              --speculative-config '{
                  "method": "mtp",
                  "num_speculative_tokens": 1
                }' \
              --compilation-config '{
                  "cudagraph_mode": "FULL_AND_PIECEWISE",
                  "custom_ops": [
                    "all"
                  ]
                }' \
              --attention-backend FLASHINFER_MLA \
              --kv-transfer-config '{
                  "kv_connector": "NixlConnector",
                  "kv_role": "kv_both",
                  "kv_buffer_device": "cuda",
                  "kv_connector_extra_config": {
                    "num_threads": 8
                  }
                }' \
              --disaggregation-mode decode
          name: main
          envFrom:
          - secretRef:
              name: hf-token-secret
          resources:
            requests:
              nvidia.com/gpu: "4"
              rdma/ib: "4"
            limits:
              nvidia.com/gpu: "4"
              rdma/ib: "4"
        schedulerName: default-scheduler
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
