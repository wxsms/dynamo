#
# DynamoGraphDeployment for deepseek-ai/DeepSeek-V4-Pro on vLLM, aggregated.
#
# Shape: 1 decode replica spanning 2 GB200 nodes with 4 GPUs per node
#        (TP=8 + EP, no DP). Total: 2 nodes x 4 GPUs = 8 GPUs.
#
# DSV4-Pro is too large for a single 4-GPU NVL4 tray, so the tensor-parallel
# group spans both nodes. Cross-node TP all-reduce/all-gather flows over
# NVLink72 (MNNVL) via ComputeDomain, not RoCE/IB.
#
# Prerequisites: DRA / ComputeDomain controller installed cluster-wide.
# Image: replace `:my-tag` with a Dynamo + vLLM image (see ../container/README.md).
# Weights: served from the `model-cache` PVC (see ../../model-cache/model-download.yaml).
---
apiVersion: resource.nvidia.com/v1beta1
kind: ComputeDomain
metadata:
  name: dsv4-pro-agg-compute-domain
spec:
  numNodes: 0
  channel:
    resourceClaimTemplate:
      name: dsv4-pro-agg-compute-domain-channel
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: dsv4-pro-agg
spec:
  backendFramework: vllm
  pvcs:
    - name: model-cache
      create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      sharedMemory:
        size: 40Gi
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
          workingDir: /workspace/examples/backends/vllm
          env:
            - name: HF_HOME
              value: /opt/models
            - name: HF_HUB_OFFLINE
              value: "1"
    VllmDecodeWorker:
      componentType: worker
      subComponentType: decode
      envFromSecret: hf-token-secret
      replicas: 1
      multinode:
        nodeCount: 2
      resources:
        limits:
          gpu: "4"
        requests:
          gpu: "4"
        claims:
          - name: compute-domain-channel
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      sharedMemory:
        size: 200Gi
      extraPodSpec:
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: dsv4-pro-agg-compute-domain-channel
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
          workingDir: /workspace/examples/backends/vllm
          # ~90 min budget for first launch (weights + autotune + cudagraph): 10 * 540 = 5400s.
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 540
          env:
            - name: SERVED_MODEL_NAME
              value: deepseek-ai/DeepSeek-V4-Pro
            - name: MODEL_PATH
              value: deepseek-ai/DeepSeek-V4-Pro
            - name: HF_HOME
              value: /opt/models
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: VLLM_ENGINE_READY_TIMEOUT_S
              value: "5400"
            - name: TILELANG_CLEANUP_TEMP_FILES
              value: "1"
            - name: VLLM_SERVER_DEV_MODE
              value: "1"
            - name: VLLM_USE_NCCL_SYMM_MEM
              value: "1"
            - name: NCCL_CUMEM_ENABLE
              value: "1"
            - name: NCCL_MNNVL_ENABLE
              value: "1"
            - name: NCCL_NVLS_ENABLE
              value: "1"
            - name: NCCL_P2P_LEVEL
              value: NVL
            - name: NCCL_STORE_TIMEOUT
              value: "7200"
            - name: NCCL_SOCKET_IFNAME
              value: eth0
            - name: NVIDIA_GDRCOPY
              value: "1"
            - name: GLOO_SOCKET_IFNAME
              value: eth0
            - name: UCX_MEMTYPE_CACHE
              value: "n"
            - name: UCX_TLS
              value: cuda_copy,cuda_ipc,tcp
            - name: UCX_CUDA_IPC_ENABLE_MNNVL
              value: "y"
          command:
            - /bin/sh
            - -c
          args:
            - |
              # No DP coordinator; torch.distributed master binds MASTER_PORT (29500)
              # for cross-node TP rendezvous, satisfying the operator's
              # wait-for-leader-mp probe.
              # mode:3 + pass_config.fuse_allreduce_rms:true enables FlashInfer's
              # TRT-LLM fused allreduce + RMSNorm kernel for the cross-node TP
              # group. If FlashInfer fails to allocate the workspace at startup
              # vLLM logs a non-fatal warning and falls back to the non-fused path.
              exec python3 -m dynamo.vllm \
                --model "${MODEL_PATH}" \
                --served-model-name "${SERVED_MODEL_NAME}" \
                --trust-remote-code \
                --kv-cache-dtype fp8 \
                --block-size 256 \
                --tensor-parallel-size 8 \
                --pipeline-parallel-size 1 \
                --enable-expert-parallel \
                --max-num-seqs 256 \
                --gpu-memory-utilization 0.9 \
                --tokenizer-mode deepseek_v4 \
                --dyn-reasoning-parser deepseek_v4 \
                --dyn-tool-call-parser deepseek_v4 \
                --attention-config '{"use_fp4_indexer_cache":true}' \
                --moe-backend deep_gemm_mega_moe \
                --compilation-config '{"mode":3,"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"],"pass_config":{"fuse_allreduce_rms":true}}'
