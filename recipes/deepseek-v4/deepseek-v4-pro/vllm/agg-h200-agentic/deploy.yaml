apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: dsv4-pro-agg-h200-agentic
spec:
  backendFramework: vllm
  components:
  - name: Frontend
    type: frontend
    replicas: 1
    podTemplate:
      spec:
        containers:
        - image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
          workingDir: /workspace
          command:
          - /bin/bash
          - -lc
          args:
          - |
            DYN_ROUTER_MODE=kv python3 -m dynamo.frontend --trust-remote-code
          name: main
          volumeMounts:
          - name: model-cache
            mountPath: /model-cache
            readOnly: true
        schedulerName: default-scheduler
        volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
            readOnly: true
  - name: VllmDecodeWorker
    type: worker
    replicas: 1
    podTemplate:
      spec:
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-H200
        containers:
        - image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
          workingDir: /workspace
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          env:
          - name: HF_HOME
            value: /model-cache
          - name: HF_HUB_CACHE
            value: /model-cache/hub
          - name: HF_HUB_OFFLINE
            value: "1"
          - name: TRANSFORMERS_OFFLINE
            value: "1"
          - name: VLLM_SKIP_P2P_CHECK
            value: "1"
          - name: NCCL_CUMEM_ENABLE
            value: "1"
          - name: NCCL_NVLS_ENABLE
            value: "1"
          command:
          - /bin/bash
          - -lc
          args:
          - |
            python3 -m dynamo.vllm \
              --model deepseek-ai/DeepSeek-V4-Pro \
              --served-model-name deepseek-ai/DeepSeek-V4-Pro \
              --trust-remote-code \
              --kv-cache-dtype fp8 \
              --block-size 256 \
              --tensor-parallel-size 8 \
              --enable-expert-parallel \
              --max-model-len 86016 \
              --max-num-seqs 128 \
              --max-num-batched-tokens 16384 \
              --gpu-memory-utilization 0.94 \
              --no-enable-flashinfer-autotune \
              --moe-backend marlin \
              --tokenizer-mode deepseek_v4 \
              --dyn-tool-call-parser deepseek_v4 \
              --dyn-reasoning-parser deepseek_v4 \
              --enable-prefix-caching \
              --compilation-config '{
                  "mode": 0,
                  "cudagraph_mode": "FULL_DECODE_ONLY",
                  "cudagraph_capture_sizes": [
                    1,
                    2,
                    4,
                    8,
                    10,
                    12,
                    16,
                    32,
                    64,
                    80,
                    96,
                    128
                  ],
                  "max_cudagraph_capture_size": 128
                }'
          name: main
          envFrom:
          - secretRef:
              name: hf-token-secret
          volumeMounts:
          - name: model-cache
            mountPath: /model-cache
            readOnly: true
          resources:
            requests:
              nvidia.com/gpu: "8"
            limits:
              nvidia.com/gpu: "8"
        schedulerName: default-scheduler
        volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
            readOnly: true
        runtimeClassName: nvidia
        tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
