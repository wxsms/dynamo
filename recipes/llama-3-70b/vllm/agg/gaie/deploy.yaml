apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: llama3-70b-agg
spec:
  backendFramework: vllm
  components:
  - name: Epp
    type: epp
    replicas: 1
    eppConfig:
      # This config uses the same disagg-profile-handler as disaggregated deployments.
      # The handler's graceful degradation feature makes this possible:
      # - With no "prefill" profile defined, it runs only the "decode" profile.
      # - The decode scorer receives isDisaggregated=false, so the Dynamo KV router
      #   uses full overlap scoring (overlap_score_credit=1.0) for aggregated mode.
      # - If prefill workers were added later (and a prefill profile configured),
      #   the same handler would automatically switch to disaggregated routing.
      config:
        plugins:
        - type: disagg-profile-handler
        - name: decode-filter
          type: label-filter
          # allowsNoLabel: true lets pods without decode role labels pass through.
          parameters:
            label: nvidia.com/dynamo-component-type
            validValues:
            - decode
            allowsNoLabel: true
        - name: picker
          type: max-score-picker
        - name: dyn-decode
          type: dyn-decode-scorer
        # Only a "decode" profile — no "prefill" profile means pure aggregated mode.
        schedulingProfiles:
        - name: decode
          plugins:
          - pluginRef: decode-filter
            weight: 1
          - pluginRef: dyn-decode
            weight: 1
          - pluginRef: picker
            weight: 1
    podTemplate:
      spec:
        containers:
        - name: main
          env:
          - name: DYN_KV_CACHE_BLOCK_SIZE
            value: "128"
          - name: DYN_MODEL_NAME
            value: RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
          - name: DYN_DECODE_FALLBACK
            value: "true"
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/dynamo-frontend:1.3.0
  - name: VllmDecodeWorker
    type: decode
    replicas: 1
    sharedMemorySize: 20Gi
    frontendSidecar: sidecar-frontend
    podTemplate:
      spec:
        containers:
        - name: main
          args:
          - python3 -m dynamo.vllm --model $MODEL_PATH --served-model-name $SERVED_MODEL_NAME
            --tensor-parallel-size 4 --data-parallel-size 1 --gpu-memory-utilization
            0.90 --no-enable-prefix-caching --block-size 128
          command:
          - /bin/sh
          - -c
          env:
          - name: SERVED_MODEL_NAME
            value: RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
          - name: MODEL_PATH
            value: RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
          - name: HF_HOME
            value: /opt/models
          - name: DYN_STORE_KV
            value: mem
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
          resources:
            limits:
              nvidia.com/gpu: "4"
            requests:
              nvidia.com/gpu: "4"
          volumeMounts:
          - mountPath: /opt/models
            name: model-cache
          workingDir: /workspace/examples/backends/vllm
        - name: sidecar-frontend
          args:
          - -m
          - dynamo.frontend
          - --router-mode
          - direct
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
        volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
