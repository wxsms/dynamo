apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: tml-inkling-sglang-agg
  labels:
    app.kubernetes.io/name: tml-inkling-sglang-agg
    app.kubernetes.io/part-of: dynamo
spec:
  backendFramework: sglang
  components:
    - name: Frontend
      type: frontend
      replicas: 1
      podTemplate:
        spec:
          imagePullSecrets:
            - name: nvcr-imagepullsecret
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.4.0-inkling-dev.1
              command:
                - python3
              args:
                - -m
                - dynamo.frontend
                - --model-path
                - /model-cache/thinkingmachines/Inkling-NVFP4
                - --model-name
                - thinkingmachines/Inkling-NVFP4
                - --dyn-chat-processor
                - sglang
                - --reasoning-parser
                - inkling
                - --tool-call-parser
                - inkling
                - --trust-remote-code
              volumeMounts:
                - name: model-cache
                  mountPath: /model-cache
                  readOnly: true
              resources: {}
          volumes:
            - name: model-cache
              persistentVolumeClaim:
                # Edit this if your cluster provides a shared RWX model PVC
                claimName: model-cache

    - name: decode
      type: worker
      replicas: 1
      podTemplate:
        spec:
          hostIPC: true
          imagePullSecrets:
            - name: nvcr-imagepullsecret
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: nvidia.com/gpu.product
                        operator: In
                        values:
                          - NVIDIA-B200
          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.4.0-inkling-dev.1
              workingDir: /workspace/examples/backends/sglang
              command:
                - python3
                - -m
                - dynamo.sglang
              args:
                - --trust-remote-code
                - --model-path
                - /model-cache/thinkingmachines/Inkling-NVFP4
                - --served-model-name
                - thinkingmachines/Inkling-NVFP4
                - --tp
                - "8"
                - --quantization
                - modelopt_fp4
                - --attention-backend
                - fa4
                - --page-size
                - "128"
                - --fp4-gemm-backend
                - flashinfer_trtllm
                - --moe-runner-backend
                - flashinfer_trtllm_routed
                - --enable-torch-symm-mem
                - --mamba-radix-cache-strategy
                - extra_buffer
                - --mem-fraction-static
                - "0.75"
                - --swa-full-tokens-ratio
                - "0.1"
                - --mamba-full-memory-ratio
                - "0.1"
                - --enable-multimodal
                - --reasoning-parser
                - inkling
                - --tool-call-parser
                - inkling
                - --speculative-algorithm
                - EAGLE
                - --speculative-num-steps
                - "8"
                - --speculative-eagle-topk
                - "1"
                - --speculative-num-draft-tokens
                - "9"
                - --enable-multi-layer-eagle
                - --speculative-use-rejection-sampling
              env:
                # sglang-runtime 1.4.0-inkling-dev.1-rc.0: forward-pass metrics crash on
                # EAGLE batches (metrics_reporter iterates batch.seq_lens_cpu == None).
                # The operator injects DYN_FORWARDPASS_METRIC_PORT which auto-enables
                # them; an empty value keeps them off until the image gets a fix.
                - name: DYN_FORWARDPASS_METRIC_PORT
                  value: ""
                - name: SGLANG_ENABLE_UNIFIED_RADIX_TREE
                  value: "1"
                - name: HF_HOME
                  value: /tmp/hf-cache
                - name: FLASHINFER_DISABLE_VERSION_CHECK
                  value: "1"
              securityContext:
                capabilities:
                  add:
                    - IPC_LOCK
              resources:
                requests:
                  cpu: "64"
                  memory: "512Gi"
                  ephemeral-storage: "200Gi"
                limits:
                  nvidia.com/gpu: "8"
              volumeMounts:
                - name: model-cache
                  mountPath: /model-cache
                  readOnly: true
                - name: dshm
                  mountPath: /dev/shm
                - name: tmp
                  mountPath: /tmp
                - name: flashinfer-cache
                  mountPath: /root/.cache/flashinfer
          volumes:
            - name: model-cache
              persistentVolumeClaim:
                # Edit this if your cluster provides a shared RWX model PVC
                claimName: model-cache
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 512Gi
            - name: tmp
              emptyDir:
                sizeLimit: 200Gi
            - name: flashinfer-cache
              emptyDir:
                sizeLimit: 32Gi
