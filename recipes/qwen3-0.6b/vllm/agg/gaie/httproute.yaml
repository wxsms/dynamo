# HTTPRoute for Qwen3-0.6B aggregated GAIE deployment
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qwen3-0-6b-agg
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: inference-gateway
      # Adjust to the namespace where your Gateway is installed.
      namespace: kgateway-system
  rules:
    - matches:
        - headers:
            - name: X-Gateway-Model-Name
              type: Exact
              value: Qwen/Qwen3-0.6B
          path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: qwen3-0-6b-agg-pool
          port: 8000
          weight: 1
      timeouts:
        request: 300s
