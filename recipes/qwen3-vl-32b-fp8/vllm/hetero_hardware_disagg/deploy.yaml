#
# Disaggregated deployment for Qwen3-VL-32B-Instruct-FP8.
# Separates multimodal encode (prefill) from decode using NIXL KV transfer.
# Encode worker runs on Intel XPU with RDMA; decode worker runs on NVIDIA GPU with RDMA.
#
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-vl-32b-fp8-vllm-disagg
spec:
  backendFramework: vllm
  pvcs:
    - name: model-cache
      create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
          workingDir: /workspace/examples/multimodal
      envs:
        - name: HF_HOME
          value: /opt/models
        - name: DYN_STORE_KV
          value: "mem"
        - name: DYN_REQUEST_PLANE
          value: "tcp"
        - name: DYN_TCP_MAX_MESSAGE_SIZE
          value: "67108864"
    EncodeWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      replicas: 1
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      sharedMemory:
        size: 80Gi
      extraPodSpec:
        resourceClaims:
          - name: intel-gpu-rdma-resource
            resourceClaimTemplateName: intel-xpu-rdma-template
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime-xpu:my-tag
          workingDir: /workspace/examples/multimodal
          securityContext:
            runAsUser: 0
            capabilities:
              add:
                - IPC_LOCK
                - SYS_RESOURCE
                - NET_RAW
          env:
            - name: DYN_STORE_KV
              value: "mem"
            - name: DYN_REQUEST_PLANE
              value: "tcp"
            - name: DYN_TCP_MAX_MESSAGE_SIZE
              value: "67108864"
            - name: SERVED_MODEL_NAME
              value: "Qwen/Qwen3-VL-32B-Instruct-FP8"
            - name: MODEL_PATH
              value: "Qwen/Qwen3-VL-32B-Instruct-FP8"
            - name: HF_HOME
              value: /opt/models
            - name: DYN_VLLM_EMBEDDING_TRANSFER_MODE
              value: "nixl-read"
            - name: ENABLE_ENCODER_CACHE
              value: "0"
            - name: VISION_ENCODE_SERIALIZE
              value: "1"
            - name: VLLM_NIXL_SIDE_CHANNEL_PORT
              value: "20098"
            - name: VLLM_NIXL_SIDE_CHANNEL_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: UCX_TLS
              value: "ib,rc,ud,rc_verbs,ud_verbs,ze_copy"
            - name: UCX_IB_ROCE_REACHABILITY_MODE
              value: "all"
            - name: UCX_MEMTYPE_CACHE
              value: "0"
          command:
            - /bin/sh
            - -c
          args:
            - >-
              ulimit -l unlimited
              TRANSFER_LOCAL=0 \
              python -m dynamo.vllm \
              --model $MODEL_PATH \
              --served-model-name $SERVED_MODEL_NAME \
              --enable-multimodal \
              --multimodal-encode-worker \
              --enable-mm-embeds \
              --dtype bfloat16 \
              --enforce-eager \
              --block-size 64 \
              --gpu-memory-utilization 0.7 \
              --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_buffer_device":"xpu","kv_connector_extra_config":{"enforce_handshake_compat":false}}'
          resources:
            claims:
              - name: intel-gpu-rdma-resource
    VllmDecodeWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      replicas: 1
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      sharedMemory:
        size: 80Gi
      extraPodSpec:
        resourceClaims:
          - name: gpu-rdma-resource
            resourceClaimTemplateName: nvidia-gpu-rdma-template
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
          workingDir: /workspace/examples/multimodal
          securityContext:
            runAsUser: 0
            capabilities:
              add:
                - IPC_LOCK
                - SYS_RESOURCE
                - NET_RAW
          env:
            - name: DYN_STORE_KV
              value: "mem"
            - name: DYN_REQUEST_PLANE
              value: "tcp"
            - name: DYN_TCP_MAX_MESSAGE_SIZE
              value: "67108864"
            - name: SERVED_MODEL_NAME
              value: "Qwen/Qwen3-VL-32B-Instruct-FP8"
            - name: MODEL_PATH
              value: "Qwen/Qwen3-VL-32B-Instruct-FP8"
            - name: HF_HOME
              value: /opt/models
            - name: DYN_VLLM_EMBEDDING_TRANSFER_MODE
              value: "nixl-read"
            - name: DYN_VLLM_KV_EVENT_PORT
              value: "20080"
            - name: ENABLE_ENCODER_CACHE
              value: "0"
            - name: VLLM_NIXL_SIDE_CHANNEL_PORT
              value: "20098"
            - name: VLLM_NIXL_SIDE_CHANNEL_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: UCX_TLS
              value: "ib,rc,ud,rc_verbs,ud_verbs,cuda_copy"
            - name: UCX_IB_ROCE_REACHABILITY_MODE
              value: "all"
            - name: UCX_MEMTYPE_CACHE
              value: "0"
          command:
            - /bin/sh
            - -c
          args:
            - >-
              ulimit -l unlimited
              TRANSFER_LOCAL=0 CUDA_VISIBLE_DEVICES=0 \
              python -m dynamo.vllm \
              --model $MODEL_PATH \
              --served-model-name $SERVED_MODEL_NAME \
              --enable-multimodal \
              --multimodal-worker \
              --enable-mm-embeds \
              --route-to-encoder \
              --mm-prompt-template "<|im_start|>system\nYou are a helpful assistant.<|im_end|>\n<|im_start|>user\n<|vision_start|><|image_pad|><|vision_end|><prompt><|im_end|>\n<|im_start|>assistant\n" \
              --dtype bfloat16 \
              --max-num-seqs 40 \
              --kv-cache-dtype fp8 \
              --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_buffer_device":"cuda","kv_connector_extra_config":{"enforce_handshake_compat":false}}'
          resources:
            claims:
              - name: gpu-rdma-resource

