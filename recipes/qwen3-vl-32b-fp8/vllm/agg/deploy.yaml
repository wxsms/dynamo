#
# Aggregated deployment for Qwen3-VL-32B-Instruct-FP8.
# Single GPU decode worker with multimodal (vision) support.
#
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-vl-32b-fp8-vllm-agg
spec:
  backendFramework: vllm
  pvcs:
    - name: model-cache
      create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.0
          workingDir: /workspace/examples/multimodal
      envs:
        - name: HF_HOME
          value: /opt/models
        - name: DYN_STORE_KV
          value: "mem"
        - name: DYN_REQUEST_PLANE
          value: "tcp"
        - name: DYN_TCP_MAX_MESSAGE_SIZE
          value: "67108864"
    VllmWorker:
      componentType: worker
      envFromSecret: hf-token-secret
      replicas: 1
      resources:
        limits:
          gpu: "1"
        requests:
          gpu: "1"
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      sharedMemory:
        size: 80Gi
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.0
          workingDir: /workspace/examples/multimodal
          env:
            - name: SERVED_MODEL_NAME
              value: "Qwen/Qwen3-VL-32B-Instruct-FP8"
            - name: MODEL_PATH
              value: "Qwen/Qwen3-VL-32B-Instruct-FP8"
            - name: HF_HOME
              value: /opt/models
            - name: DYN_STORE_KV
              value: "mem"
            - name: DYN_REQUEST_PLANE
              value: "tcp"
            - name: DYN_TCP_MAX_MESSAGE_SIZE
              value: "67108864"
          command:
            - /bin/sh
            - -c
          args:
            - >-
              python3 -m dynamo.vllm \
              --model $MODEL_PATH \
              --served-model-name $SERVED_MODEL_NAME \
              --enable-multimodal \
              --enable-mm-embeds \
              --max-num-seqs 40 \
              --tensor-parallel-size 1 \
              --kv-cache-dtype fp8 \
              --gpu-memory-utilization 0.95 \
              --no-enable-prefix-caching

