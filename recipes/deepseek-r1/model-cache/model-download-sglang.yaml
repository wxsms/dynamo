apiVersion: batch/v1
kind: Job
metadata:
  name: model-download
spec:
  backoffLimit: 3
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: model-download
    spec:
      restartPolicy: Never
      tolerations: []
      containers:
        - name: model-download
          image: python:3.10-slim
          command: ["sh", "-c"]
          env:
            - name: HF_XET_HIGH_PERFORMANCE
              value: "1"
            - name: HF_HOME
              value: /opt/model-cache
          args:
            - |
              set -eux
              pip install --no-cache-dir huggingface_hub==1.11.0
              hf download deepseek-ai/DeepSeek-R1
          volumeMounts:
            - name: model-cache
              mountPath: /opt/model-cache
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
