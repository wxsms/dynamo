  "BSD-1-Clause",       # libx11
  "BSD-4-Clause-UC",    # curl (legacy UC-Berkeley clause)
  "Beerware",           # libbsd0, libczmq4 — well-known permissive joke license
  "Bitstream-Vera",     # fonts-dejavu — permissive font license
  "CPL-1.0",            # Common Public License — ibverbs-providers (RDMA family)
  "FSFAP",              # FSF All Permissive (libappstream5, gir1.2-glib)
  "GFDL-1.2-only",      # wget (docs only — mere aggregation)
  "GFDL-1.3-only",      # libc6/glibc (docs only — mere aggregation)
  "GPL-1.0-only",       # historical-only references (liberror-perl, libssl3t64)
  "GPL-1.0-or-later",   # historical-only references
  "HPND",               # libx11 — Historical Permission Notice and Disclaimer
  "HPND-sell-variant",  # fontconfig, libxft2, libxrender1 — HPND with sell clause
  "ICU",                # tzdata, IBM/Unicode ICU permissive license
  "Jam",                # Boost build-tool license (permissive)
  "OFL-1.1",            # SIL Open Font License — fonts-mathjax
  "OLDAP-2.8",          # OpenLDAP — curl bundles for ldap support
  "TCL",                # Tcl/Tk Foundation license — blt, libtcl, libtk
  "X11",                # curl — historic permissive X11/MIT license
  "bzip2-1.0.6",        # bzip2 1.0.6+ permissive license
