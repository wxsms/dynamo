#
# License-policy file for Python / Go / dpkg / native ecosystems.
# Rust uses cargo-deny's deny.toml at the repo root (same allow list,
# enforced via `cargo deny check licenses`). This file is consumed by
# container/compliance/policy/validate.py.
#
# Policy semantics (mirrors cargo-deny):
#   - allow: SPDX IDs that are always permitted.
#   - deny:  SPDX IDs that are always rejected.
#   - unknown: how to treat licenses we couldn't resolve to an SPDX ID.
#               "deny" makes UNKNOWN a build failure (recommended).
#   - copyleft: how to treat the copyleft category (LGPL / MPL / etc).
#               "deny" by default; allow specific copyleft IDs via the allow list.
#   - exceptions: per-package opt-ins for licenses that would otherwise be denied.
#
# SPDX expressions in the input data may be compound:
#   "MIT OR Apache-2.0"           → allowed if EITHER token is allowed
#   "MIT AND Apache-2.0"          → allowed only if BOTH are allowed
#   "Apache-2.0 WITH LLVM-exception" → treated as Apache-2.0 plus the exception
# validate.py handles these.

[licenses]

# Permissive licenses we ship with no special handling.
# The Rust /deny.toml is a subset of this — Python/Go/dpkg legitimately need
# more SPDX IDs because the Linux distribution surface area is broader than
# the Rust crate ecosystem (creative-commons doc/data licenses, NVIDIA
# proprietary refs, older variants of permissive licenses, etc.).
allow = [
  # --- Core permissive ---
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-2-Clause-Patent",
  "BSD-3-Clause",
  "BSD-4-Clause",
  "BSD-Source-Code",    # permissive BSD variant; cyclonedx-gomod's
                        # go-license-detector frequently picks this for
                        # golang.org/x/* (actual upstream is BSD-3-Clause,
                        # which is allowed regardless).
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "libtiff",            # Sam Leffler/SGI permissive (the libtiff license); used by libtiff6
  "MIT",
  "MIT-0",
  "MIT-CMU",            # variant of MIT used by Pillow + a few others
  "MPL-2.0",
  "NCSA",
  "OpenSSL",
  "PSF-2.0",
  "Python-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Unlicense",
  "WTFPL",
  "Zlib",

  # --- Permissive but less obvious ---
  "Artistic-1.0",       # historic Perl
  "Artistic-2.0",       # current Perl + a few CPAN-shaped projects
  "CC-BY-3.0",          # documentation/data only (jq, libuv, etc.)
  "CC-BY-4.0",
  "CC-BY-SA-3.0",       # documentation/data only — share-alike applies to docs only
  "CC-BY-SA-4.0",
  "CNRI-Python",        # `regex` and a few historic Python pkgs
  "FSFUL",              # Free Software Foundation Unlimited (libksba)
  "FSFULLR",            # Free Software Foundation Unlimited (libtool, etc.)
  "Info-ZIP",           # `unzip` package upstream license

  # --- LGPL family ---
  # LGPL is permissive for our use because we link against these libraries
  # dynamically (LGPL's linking exception). Listed for every version we may
  # encounter in a Debian/Ubuntu base image.
  # NOTE: LGPL-2.x is ALSO in the deny list below, which the validator checks
  # first — so deny currently wins and an LGPL package passes only via a
  # per-package [[exceptions]] entry. This overlap is intentional defense-in-
  # depth (force explicit per-package copyleft review) but is a known
  # contradiction; reconcile (drop from one list) pending OSRB sign-off.
  "LGPL-2.0-only",
  "LGPL-2.0-or-later",
  "LGPL-2.1-only",
  "LGPL-2.1-or-later",
  "LGPL-3.0",
  "LGPL-3.0-only",
  "LGPL-3.0-or-later",

  # --- NVIDIA-proprietary references ---
  # Internal NVIDIA EULAs covering CUDA, cuDNN, NCCL, Nsight, mlnx-dpdk, etc.
  # These are our own product and licensed for our distribution paths.
  "LicenseRef-NVIDIA-Proprietary",
  "LicenseRef-NVIDIA-SOFTWARE-LICENSE",
  "LicenseRef-NVIDIA-Software-License-Agreement",

  # --- Additional permissive licenses surfaced by syft scans ---
  # Each of these is a permissive license that shows up in Ubuntu base
  # packages or upstream framework images. Adding them globally avoids
  # writing the same per-package exception 50 times.
