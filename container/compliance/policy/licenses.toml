# Hard denies: never ship these regardless of any other consideration.
# Strong copyleft (would force our Apache-2.0 work to relicense if linked).
deny = [
  "AGPL-1.0-only",
  "AGPL-1.0-or-later",
  "AGPL-3.0",
  "AGPL-3.0-only",
  "AGPL-3.0-or-later",
  "CDDL-1.0",
  "CDDL-1.1",
  "EPL-1.0",
  "EPL-2.0",
  "EUPL-1.1",
  "EUPL-1.2",
  "GPL-2.0",
  "GPL-2.0-only",
  "GPL-2.0-or-later",
  "GPL-3.0",
  "GPL-3.0-only",
  "GPL-3.0-or-later",
  # NOTE: LGPL-2.x is also in the allow list above. deny is checked before
  # allow, so these win by default — an LGPL package passes only via a
  # per-package [[exceptions]] entry (see the dpkg LGPL exceptions below). Kept
  # as intentional defense-in-depth; reconcile with the allow list pending OSRB.
  "LGPL-2.0-only",
  "LGPL-2.0-or-later",
  "LGPL-2.1-only",
  "LGPL-2.1-or-later",
  "SSPL-1.0",
]

# Build fails on any package whose license we couldn't resolve.
# Forces the right action: add an entry to license_overrides.yaml,
# or fix the upstream metadata, or take an exception below.
unknown = "deny"

# How aggressive to be about the broader copyleft category for
# licenses that aren't in either allow or deny above.
# Practical effect: if a future SPDX ID we haven't classified shows
# up and looks copyleft-shaped, treat it as deny rather than UNKNOWN.
copyleft = "deny"

# Exceptions: per-package opt-ins for licenses that would otherwise
# fail policy. Keep these rare and well-justified — every entry is
# legal review surface area on every audit.
#
# Schema:
#   type: ecosystem ("python" | "dpkg" | "go" | "native")
#   name: package name
#   version: optional; omit to apply to all versions
#   allow: SPDX IDs that are additionally permitted FOR THIS PACKAGE
#   reason: required, short prose explaining why
#
# [[exceptions]]
# type = "python"
# name = "example-pkg"
# version = "1.2.3"
# allow = ["GPL-2.0-only"]
# reason = "Pure-Python library, isolated import surface; legal-approved 2026-XX-XX"
# --- Auto-generated dpkg [[exceptions]] for Ubuntu base packages -------------
# Each entry: version omitted -> applies to all versions of that package.
# allow list: the GPL/LGPL token(s) that package's audited license expression
# contains. If the actual license adds tokens beyond these, the build breaks.

[[exceptions]]
type = "dpkg"
name = "login"
allow = ["GPL-1.0-only", "GPL-2.0-or-later"]
reason = "Mere aggregation; system component"

