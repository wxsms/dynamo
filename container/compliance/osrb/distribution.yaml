#
# Per-image distribution context. OSRB applies different review rigor based
# on where the image is shipped (public NGC vs internal vs customer-specific).
#
# Schema:
#   <image-name>: <distribution-class>
# Where distribution-class is one of:
#   public            shipped on NGC public registry; broadest distribution
#   internal          NVIDIA-internal only; no external distribution
#   customer-specific shipped to specific customer(s) under contract

dynamo-runtime:        public
vllm-runtime:          public
sglang-runtime:        public
trtllm-runtime:        public
