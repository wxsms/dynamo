[package]
name = "dynamo-vllm-sidecar"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Rust sidecar for vLLM's native gRPC server"

[package.metadata.cargo-machete]
# Referenced by protobuf code generated into OUT_DIR.
ignored = ["prost"]

[[bin]]
name = "dynamo-vllm-sidecar"
path = "src/main.rs"

[dependencies]
dynamo-backend-common = { workspace = true }
dynamo-sidecar-common = { workspace = true }

anyhow = { workspace = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
clap = { version = "4", features = ["derive", "env"] }
futures = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }

prost = { version = "0.13.5" }
prost-types = { version = "0.13.5" }
tonic = { version = "0.13.1" }

[build-dependencies]
tonic-build = { version = "0.13.1" }

[dev-dependencies]
dynamo-backend-common = { workspace = true, features = ["testing"] }
tokio-stream = { workspace = true, features = ["net"] }
