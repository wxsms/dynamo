//
// Plugin contract for Dynamo Planner Plugin Architecture.
//
// **Schema evolution policy** (proto3, must-follow):
//   1. NEVER reuse a field tag — add `reserved` for any deleted tag.
//   2. NEVER change the type of an existing field.
//   3. NEVER rename an existing field (clients may key on field names in
//      reflection / json transcoding).
//   4. ALL new fields MUST be optional or have safe-zero defaults.
//   5. Bumping `protocol_version` (RegisterRequest.protocol_version) is
//      reserved for *additive* contract changes; *breaking* changes
//      require a new package path (v2/).
//
// Layout follows dynamo convention (proto in src tree, generated stubs
// alongside; see `lib/llm/src/grpc/protos/` for parallel example).

syntax = "proto3";

package dynamo.planner.plugin.v1;

// ============================================================================
// PluginRegistry service
// ============================================================================

service PluginRegistry
{
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Plugin gracefully announces shutdown; orchestrator immediately removes
  // it from active set and clears its HOLD_LAST cache (without waiting for
  // missed_heartbeat threshold).
  rpc Unregister(UnregisterRequest) returns (UnregisterResponse);


  // Admin / observability: returns metadata of all registered plugins
  // (builtin and user) plus runtime state (circuit breaker, cache age,
  // evaluation counts). Authorization typically gated by an admin RBAC
  // distinct from plugin Register auth.
  rpc ListPlugins(ListPluginsRequest) returns (ListPluginsResponse);
}

message RegisterRequest
{
  string plugin_id = 1;
  string plugin_type = 2;                // "predict" | "propose" | "reconcile" | "constrain"
  uint32 priority = 3;                   // lower number = higher priority
  string endpoint = 4;                   // inproc://<id> | grpc://host:port
  string version = 5;                    // plugin's own semver
  float execution_interval_seconds = 6;  // 0 = every tick (default)
  HoldPolicy hold_policy = 7;

  // Capability subscription: dot-paths into PipelineContext that this plugin
  // actually consumes. When non-empty, the orchestrator MAY trim the
  // context to those fields to save wire / serialisation cost — best-
  // effort; it must never break the contract. Empty and unset are
  // indistinguishable on the wire (proto3 ``repeated`` has no field
  // presence) and both mean "send full context" (the safe default).
  repeated string needs = 8;

  // Protocol versioning: orchestrator keeps a supported range
  // [min_supported, max_supported]. Out-of-range -> reject with reason
  // "protocol_version_unsupported".
  string protocol_version = 9;  // e.g. "1.0"

  // Authentication token. Must validate against one of the
  // configured trusted_sources (k8s SA token / SPIFFE JWT / static secret).
  // If no source is configured, all Register calls are rejected.
  string auth_token = 10;

  // Tags 11 and 12 were used by prior drafts (`fpm_encoding` at 11; a
  // per-plugin `request_timeout_seconds` override at 12). Both were
  // never plumbed into the orchestrator — the per-plugin timeout in
  // particular was stored on RegisteredPlugin but never read by
  // make_transport_for_endpoint, which only honoured the global
  // TransportConfig.request_timeout_seconds. Removed before any client
  // shipped a v1 implementation. Reserved per the schema-evolution
  // policy (NEVER reuse a deleted tag). A future PR may re-introduce a
  // per-plugin timeout at a new tag with the missing plumbing.
  reserved 11, 12;

  // Fire-gating dependencies (scale_interval cadence model). Plugin only
  // fires this tick if every listed dot-path resolves to a non-None value
  // in the current PipelineContext. Used to chain throttled plugins, e.g.
  // ``throughput_propose`` declaring ``requires_produced_fields=
  // ["predictions"]`` skips its turn whenever ``predict_load`` didn't
  // produce predictions on the same tick (preventing stale-input fire).
  //
  // Empty/unset = no gating (plugin fires whenever its own
  // ``execution_interval_seconds`` throttle permits).
  repeated string requires_produced_fields = 13;

  // Observation aggregation window (scale_interval cadence model). For
  // each observation type listed in ``needs`` that supports time-windowed
  // aggregation (currently ``observations.traffic``), this declares how
  // much history the plugin wants Prometheus to aggregate over.
  //
  // 0.0 (default) — observation taken with ``scale_interval`` window
  //                 (per-tick freshness, matches the pipeline cadence).
  // N > 0         — Prometheus query uses ``[Ns]`` window; aggregated
  //                 value (avg / sum) covers the last N seconds of source
  //                 data. Plugin sees ``ctx.observations.<type>
  //                 .duration_s == N``.
  //
  // Constraint: must be 0 OR a positive multiple of
  // ``SchedulingConfig.scale_interval_seconds`` so windows align to tick
  // boundaries. Validator rejects otherwise. Field is silently ignored
  // when the plugin's ``needs`` does not list any windowed observation
  // type (a config validator may warn on this combination).
  float observation_window_seconds = 14;
}

enum HoldPolicy {
  ACCEPT_WHEN_IDLE = 0;  // treat as no opinion between invocations
  HOLD_LAST = 1;         // replay last result until next invocation
}

message RegisterResponse
{
  bool accepted = 1;
  string reject_reason = 2;
  // Echo back the negotiated protocol_version so the plugin can confirm
  // (relevant when orchestrator supports multiple major versions).
  string negotiated_protocol_version = 3;
}

// Plugin pushes heartbeats every `heartbeat_timeout_seconds / 3` (approx 5s
// by default). 2 consecutive misses -> orchestrator evicts plugin from
// scheduling and clears its HOLD_LAST cache.
//
// HeartbeatMonitor skips checks for transport_type == "in_process"
// (NOT based on is_builtin) — otherwise in_process user plugin would be
// evicted immediately for not sending heartbeat.
message HeartbeatRequest
{
  string plugin_id = 1;
  // Caller-supplied auth token. Gateway re-validates via the same
  // AuthValidator used for Register and checks that the resulting
  // identity.subject matches the subject captured at Register time —
  // i.e. only the entity that registered this plugin_id can heartbeat
  // for it. Empty token rejected over gRPC (UNAUTHENTICATED).
  string auth_token = 2;
}
message HeartbeatResponse
{
  bool ok = 1;
}

message UnregisterRequest
{
  string plugin_id = 1;
  string reason = 2;  // optional; for audit log e.g. "graceful_shutdown" / "version_upgrade"
  // Same auth contract as HeartbeatRequest.auth_token — gateway requires
  // a token whose validated subject matches the plugin's Register-time
  // subject. Admin-driven force-evict (subject-bypass) is reserved for
  // a follow-up PR that wires AdminAuthConfig.
  string auth_token = 3;
}
message UnregisterResponse
{
  bool ok = 1;
}

message ListPluginsRequest
{
  // Optional filters
  string stage_filter = 1;    // "" = all; "predict" / "propose" / etc.
  bool include_disabled = 2;  // include enabled=false plugins
}
message ListPluginsResponse
{
  repeated PluginInfo plugins = 1;
}

message PluginInfo
{
  string plugin_id = 1;
  string plugin_type = 2;  // "predict" | "propose" | "reconcile" | "constrain"
  uint32 priority = 3;
  string version = 4;
  string protocol_version = 5;
  bool enabled = 6;      // current enabled state (config + runtime overrides)
  bool is_builtin = 7;   // true for builtin-* plugins
  string transport = 8;  // "in_process" | "uds" | "grpc"
  CircuitState circuit_state = 9;
  uint64 evaluations_total = 10;  // total Run/Predict/Propose/.. RPC count since register
  double last_call_at_seconds_ago = 11;
  double cache_age_seconds = 12;  // 0 if not in HOLD_LAST state
}

enum CircuitState {
  CLOSED = 0;
  OPEN = 1;
  HALF_OPEN = 2;
}

// ============================================================================
// Pipeline context (flows through all stages)
//
// Observation types are isomorphic to the existing TickInput boundary types
// in components/src/dynamo/planner/core/types.py. FPM data is passed in its
// native msgspec encoding to avoid duplicating the ForwardPassMetrics schema.
// ============================================================================

message PipelineContext
{
  // request_id: per-tick orchestrator trace id. All plugin RPCs in the same
  // pipeline tick (PREDICT through CONSTRAIN) share the same request_id;
  // used for stitching audit logs and distributed traces.
  string request_id = 1;

  // decision_id: assigned by RECONCILE when it produces a non-empty proposal,
  // and stays the same through CONSTRAIN and EXECUTE. Different from
  // request_id because not every tick produces a decision (e.g. all plugins
  // returned ACCEPT, or REJECT short-circuit). Used to correlate
  // ScaleRequest / ScaleResponse, EXECUTE outcomes, and rollback audit.
  string decision_id = 2;

  optional ObservationData observations = 3;  // filled by OBSERVE
  optional PredictionData predictions = 4;    // filled by PREDICT (or built-in fallback)
  // proposal/constrained carry one ComponentTarget per sub_component_type
  // (prefill / decode / agg). Single-pool by construction in this PR;
  // multi-pool addressing is hierarchical-planner territory and will be
  // re-introduced when that lands.
  optional ScalingProposal proposal = 5;     // filled by PROPOSE -> RECONCILE
  optional ScalingProposal constrained = 6;  // filled by CONSTRAIN
}

// Mirrors TickInput (types.py)
message ObservationData
{
  optional TrafficMetrics traffic = 1;
  optional FpmData fpm = 2;
  optional WorkerState workers = 3;
}

// Mirrors TrafficObservation (types.py)
message TrafficMetrics
{
  // ``double`` (64-bit) — matches the Python float64 source of truth
  // (TrafficObservation in core/types.py + the Pydantic mirror). A 32-bit
  // ``float`` here would silently truncate rate-style values over gRPC,
  // and the in-process transport (no serialization) would disagree with
  // the gRPC transport bit-for-bit. ``double`` keeps the two transports
  // numerically identical and honors the round-trip-equality contract.
  double duration_s = 1;  // observation window length (seconds)
  double num_req = 2;     // request count in window
  double isl = 3;         // avg input sequence length
  double osl = 4;         // avg output sequence length

  // KV cache hit rate over the window, derived from prefill prompt-cache
  // hit metrics emitted by the engine.  ``optional`` distinguishes
  // "Prometheus returned no hit-rate datapoint" (unset) from
  // "all-cold cache, 0.0 hit rate" (set to 0.0).  PSM throughput
  // scaling consumes this — external throughput-propose plugins
  // replicating PSM behaviour need it for parity.
  optional double kv_hit_rate = 5;
}

// Mirrors FpmObservations (types.py).
//
// Wire format: each map value is a msgspec/msgpack-encoded
// ForwardPassMetrics record (see ``dynamo.common.forward_pass_metrics``).
// Cross-language plugins decode via any standard msgpack library (Go's
// vmihailenco/msgpack, Rust's rmp-serde, JS @msgpack/msgpack, etc.) plus
// knowledge of the ForwardPassMetrics struct layout.
//
// Per-engine map key format: ``"<worker_id>/<dp_rank>"`` — flat string
// since proto3 ``map`` keys can't carry a tuple.  Engines without an
// observation this tick are simply absent from the map; a plugin
// declaring ``needs=["observations.fpm"]`` should treat an empty
// submap as "no FPM data this tick" rather than an error.  When neither
// prefill nor decode engines report, the orchestrator omits the
// ``ObservationData.fpm`` field entirely (proto3 absent vs
// empty-but-set is observable via ``HasField``).
message FpmData
{
  map<string, bytes> prefill_engines = 1;
  map<string, bytes> decode_engines = 2;
}

// Mirrors WorkerCounts (types.py)
message WorkerState
{
  optional int32 ready_prefill = 1;
  optional int32 ready_decode = 2;
  optional int32 expected_prefill = 3;
  optional int32 expected_decode = 4;

  // Scaling-in-progress flags.  ``true`` when the planner has issued
  // a scale operation that the connector has not yet observed as
  // stable (ready == expected).  PSM load-scaling uses these to
  // suppress further scale-up while a previous request is mid-flight
  // and to explain "held" decisions in audit logs — external plugins
  // replicating PSM load-scaling behaviour need parity access.
  // ``optional`` (proto3 presence) distinguishes "not reported" from
  // an explicit ``false`` value.
  optional bool prefill_scaling_in_progress = 5;
  optional bool decode_scaling_in_progress = 6;
}

// Prediction data flows through PREDICT chain-augment.
//
// **v11 critical**: All three prediction fields MUST be `optional float`.
// chain-augment partial-merge (PR 4) uses `HasField()` to distinguish:
//   - field set → plugin actively asserts this value (even if 0.0)
//   - field unset → plugin has no opinion; preserve previous chain plugin's value
// Without `optional`, proto3 default 0.0 makes "I assert 0" indistinguishable
// from "I have no opinion", breaking the layered-predictor pattern documented
// in DEP main doc line 1320.
message PredictionData
{
  // ``double`` (64-bit) — see TrafficMetrics: matches the float64 source
  // of truth and keeps in-process vs gRPC transports bit-identical.
  optional double predicted_num_req = 1;
  optional double predicted_isl = 2;
  optional double predicted_osl = 3;
  string source = 4;  // plugin_id or "builtin"

  // Predicted KV cache hit rate.  ``optional`` follows the same
  // first-writer-wins partial-merge semantic as the other predicted_*
  // fields — ``unset`` means "no opinion, preserve previous chain
  // plugin's value", ``set`` means "I assert this value (even 0.0)".
  // PSM ``TickDiagnostics.predicted_kv_hit_rate`` mirrors this; external
  // throughput-propose plugins replicating PSM behaviour need it on the
  // wire schema for parity.
  optional double predicted_kv_hit_rate = 5;
}

// Aligns wire format with existing ScaleRequest.target_replicas
// (components/src/dynamo/planner/connectors/protocol.py).
// Used as the output of RECONCILE/CONSTRAIN: each ComponentTarget's
// `type` field is unused here (only `replicas` matters).
message ScalingProposal
{
  repeated ComponentTarget targets = 1;
  string reason = 2;
  string source = 3;  // plugin_id or "builtin"
}

// One scaling target per component instance.
// `sub_component_type` uses string (NOT proto enum) for parity with the
// existing ScaleRequest wire format and to allow new engine kinds (e.g.
// agg, AFD) without bumping the proto version.
//
// Allowed sub_component_type values evolve with Dynamo; current set:
//   "prefill"  -- prefill engine
//   "decode"   -- decode engine (also used in agg mode)
//
// Tag 2 was previously a per-pool ``component_name`` (forward-compat
// surface for the hierarchical planner). Dropped because the
// single-planner runtime in this PR has a single configured WorkerInfo
// per sub_component_type and can never address an alternate pool —
// shipping the field without a runtime consumer was the
// "API advertises capability the runtime silently drops" mismatch
// flagged in review. Re-add at the same or new tag when the
// hierarchical planner PR lands.
message ComponentTarget
{
  string sub_component_type = 1;
  reserved 2;                   // was: optional string component_name
  optional int32 replicas = 3;  // unset => "no opinion on this component"
  OverrideType type = 4;        // only meaningful inside OverrideResult; ignored in ScalingProposal
}

message OverrideResult
{
  // Each target carries its own (component, type, replicas). One plugin
  // can therefore say "prefill SET=10, decode AT_MOST=6" in a single RPC.
  // Targets that the plugin has no opinion about are simply omitted.
  repeated ComponentTarget targets = 1;
  string reason = 2;
}

enum OverrideType {
  SET = 0;       // "set replicas to exactly this" (recommendation; priority-resolved)
  AT_LEAST = 1;  // "need at least this many" (floor; all values participate via max)
  AT_MOST = 2;   // "allow at most this many" (ceiling; all values participate via min)
}

message AcceptResult {}
message RejectResult
{
  string reason = 1;
}

// ============================================================================
// Stage-specific request/response (each stage receives full PipelineContext)
// ============================================================================

service PredictPlugin
{
  rpc Predict(PredictStageRequest) returns (PredictStageResponse);
}
message PredictStageRequest
{
  PipelineContext context = 1;
}
message PredictStageResponse
{
  // PREDICT plugins return PredictionData (chain-augment partial merge).
  // Omitted/unset prediction = ACCEPT (no opinion).
  PredictionData predictions = 1;
  string reason = 2;
  // final=true: stop the PREDICT chain immediately; subsequent plugins
  // in the chain are NOT called.
  // **Chain-augment final usage convention**:
  //   final=true is most commonly used as "my answer is enough; skip
  //   all remaining plugins". With ascending priority sort the
  //   authoritative plugin runs first, so the cleanest way to express
  //   that intent is to set final=true on the smallest-priority plugin.
  //   When final=true comes from a non-lowest-priority plugin, the
  //   chain still breaks at that plugin: the smallest-priority plugin
  //   has already weighed in (first-writer-wins protects its values),
  //   but larger-priority-number plugins after the final-setter are
  //   skipped. They lose the chance to populate fields earlier plugins
  //   left as None. This may be intentional (cost / policy override)
  //   or a config mistake; chain_augment cannot tell which. It logs a
  //   WARNING and records the event on
  //   ChainAugmentOutcome.chain_break_warnings (surfaced via
  //   PipelineOutcome.audit_events). A Prometheus counter for this
  //   signal is deferred to a follow-up observability PR.
  bool final = 3;
}

service ProposePlugin
{
  rpc Propose(ProposeStageRequest) returns (ProposeStageResponse);
}
message ProposeStageRequest
{
  PipelineContext context = 1;
}
message ProposeStageResponse
{
  oneof result
  {
    AcceptResult accept = 1;
    OverrideResult override = 2;
    RejectResult reject = 3;
  }
  // final=true: this plugin's OverrideResult is the FINAL output of the
  // PROPOSE stage—it COMPLETELY OVERRIDES all other plugins' outputs
  // (including AT_LEAST / AT_MOST). All other plugins are STILL CALLED
  // (preserving observability / metrics / audit), but their outputs are
  // discarded for the merge. Multiple plugins with final=true: priority
  // number smallest wins.
  // Does NOT skip CONSTRAIN—the CONSTRAIN stage still runs as the safety
  // net (with builtin-budget-constrain providing min_endpoint / max_gpu_budget).
  // **REJECT is HIGHER priority than final** (v11 G-2): if any plugin returns
  // RejectResult, the entire stage short-circuits regardless of final flags.
  bool final = 4;
}

service ReconcilePlugin
{
  rpc Reconcile(ReconcileStageRequest) returns (ReconcileStageResponse);
}
message ReconcileStageRequest
{
  PipelineContext context = 1;
  // All propose results from preceding stage. Reconcile plugins see the
  // full propose set (with priority) and can reweight or filter.
  repeated ProposeResult proposals = 2;
}
message ProposeResult
{
  string plugin_id = 1;
  oneof result
  {
    AcceptResult accept = 2;
    OverrideResult override = 3;
    RejectResult reject = 4;
  }
  uint32 priority = 5;
}
// RECONCILE plugins return OverrideResult (same shape as ProposePlugin).
// builtin-reconcile and user reconcile plugins all coexist; orchestrator
// runs the type-aware merge across all RECONCILE outputs to produce the
// final ScalingProposal.
//
// User reconcile plugins typically reweight or filter the propose results
// (they see the full propose set), then output their own override-typed
// recommendation. Priority resolves competing SETs across reconcile plugins.
message ReconcileStageResponse
{
  oneof result
  {
    AcceptResult accept = 1;
    OverrideResult override = 2;
    RejectResult reject = 3;
  }
  // Same final semantics as ProposeStageResponse: this plugin's output
  // completely overrides all other RECONCILE plugins' outputs in the merge,
  // while still calling them for observability. Multiple final=true:
  // priority number smallest wins. Does NOT skip CONSTRAIN.
  bool final = 4;
}

service ConstrainPlugin
{
  rpc Constrain(ConstrainStageRequest) returns (ConstrainStageResponse);
}
message ConstrainStageRequest
{
  PipelineContext context = 1;
}
// CONSTRAIN plugins return OverrideResult (same shape as ProposePlugin /
// ReconcilePlugin), but with a hard restriction on `type`:
//   * AT_LEAST and AT_MOST are valid (they tighten the constraint).
//   * SET is silently dropped at runtime (v11 决议: register-time static
//     rejection is infeasible because proto3 has no plugin-self-declared
//     output-type metadata; orchestrator cannot know in advance whether
//     a plugin will emit SET):
//     - At runtime, if a CONSTRAIN plugin produces SET (intentionally
//       or via version drift), the orchestrator drops the SET entry and
//       records the dropped component key on MergeOutcome.set_dropped
//       (surfaced via PipelineOutcome.constrain_outcome.set_dropped);
//       the rest of the OverrideResult is accepted. A Prometheus
//       counter / audit event for this signal is deferred to a
//       follow-up observability PR.
//
// Orchestrator merges all CONSTRAIN OverrideResults using the type-aware
// merge algorithm (only AT_LEAST / AT_MOST participate); the resulting
// floor / ceiling clamp the RECONCILE output per component_key.
message ConstrainStageResponse
{
  oneof result
  {
    AcceptResult accept = 1;
    OverrideResult override = 2;  // SET targets are silently dropped (see message comment above)
    RejectResult reject = 3;
  }
  // final is SILENTLY IGNORED in CONSTRAIN stage. CONSTRAIN allows only
  // AT_LEAST / AT_MOST, which are accumulated via max/min — there is no
  // SET-priority competition for final to influence. Allowing final to
  // "completely override" in CONSTRAIN would let a user plugin bypass
  // builtin-budget-constrain, breaking the safety guarantee. To make
  // your constrain win, simply tighten the bound (larger AT_LEAST or
  // smaller AT_MOST) — max/min monotonicity will let you win automatically.
  bool final = 4;
}

// ============================================================================
// PluginLifecycle service (v10 YAGNI: only Bootstrap + Reset)
// ============================================================================
//
// Snapshot/Restore are NOT part of this DEP — current code repo lacks the
// mechanism, planner restart goes through Bootstrap to re-fit regression
// (equivalent to cold start). proto3 add new RPC is backward-compatible;
// future PR may add Snapshot/Restore without breaking clients.

service PluginLifecycle
{
  // Plugin's first-call from orchestrator after Register; one-time priming
  // (e.g. load benchmark FPM, warm regression model).
  rpc Bootstrap(BootstrapRequest) returns (BootstrapResponse);

  // Clear plugin internal state back to pre-Bootstrap; called on config
  // reload or test setup/teardown. NOT idempotent in semantics (orchestrator
  // guarantees single-call lifecycle).
  rpc Reset(ResetRequest) returns (ResetResponse);
}

message BootstrapRequest
{
  // Generic blob; format defined by plugin itself (e.g. builtin-throughput-
  // propose may serialize benchmark FPM into bytes).
  bytes bootstrap_data = 1;

  // Startup hints from orchestrator (e.g. "regression_kind: prefill").
  // String-typed for flexibility; specific keys evolve with builtin plugins.
  map<string, string> hints = 2;
}
message BootstrapResponse
{
  bool ok = 1;
  string message = 2;  // optional; for audit / debugging
}

message ResetRequest
{
  string reason = 1;  // optional audit context (e.g. "config_reload" / "test_teardown")
}
message ResetResponse
{
  bool ok = 1;
  string message = 2;
}
