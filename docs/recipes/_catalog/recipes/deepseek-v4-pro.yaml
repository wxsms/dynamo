related_benchmarks: []
maintainer: null
gaps:
- 'H200 targets are secondary/best-effort on the public FP8 checkpoint, capped at max_model_len 86016 (HBM); cannot serve the full 1M context the B200 recipes handle.'
- maintainer unknown
- Day-0 / GB200 (vLLM + SGLang) variants (experimental, dev images, ComputeDomain/MNNVL) are intentionally excluded from this customer page.
