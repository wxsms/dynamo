id: deepseek-v4-pro
title: DeepSeek-V4-Pro
page: recipes/deepseek-v4-pro.mdx
provider: deepseek
model:
  name: DeepSeek-V4-Pro
  hf_id: nvidia/DeepSeek-V4-Pro-NVFP4
  precision: NVFP4 (B200) / FP8 (H200)
status: validated
targets:
- id: disagg-b200-agentic
  recommended: true
  hardware:
    gpu: B200
    count: 16
  runtime:
    framework: vllm
    image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
  topology: disaggregated
  techniques:
  - disaggregated-prefill-decode
  - expert-parallel
  - fp8-kv-cache
  - kv-aware-routing
  - prefix-caching
  - mtp-speculative-decoding
  - nixl-gdr
  workload:
    type: trace-replay
    traffic: 'Agentic MoonTrace: 64K avg ISL / 400 OSL, 90% KV reuse; 1P1D (TP8 + EP per worker), decode MTP-2'
    sla: user output >= 50 tok/s (floor-pick)
  deploy:
    asset: recipes/deepseek-v4/deepseek-v4-pro/vllm/disagg-b200-agentic/deploy.yaml
  benchmark:
    tool: aiperf
    asset: recipes/deepseek-v4/perf/perf.yaml
  expected_performance:
    available: true
    summary: Floor-pick c28 = 77.31 system tok/s/GPU @ user 51.3 (1P1D, +6% over AGG).
- id: agg-b200-agentic
  recommended: false
  hardware:
    gpu: B200
    count: 8
  runtime:
    framework: vllm
    image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
  topology: aggregated
  techniques:
  - expert-parallel
  - fp8-kv-cache
  - kv-aware-routing
  - prefix-caching
  - mtp-speculative-decoding
  workload:
    type: trace-replay
    traffic: 'Agentic MoonTrace: 64K avg ISL / 400 OSL, 90% KV reuse; TP8 + EP, MTP-2'
    sla: user output >= 50 tok/s (floor-pick)
  deploy:
    asset: recipes/deepseek-v4/deepseek-v4-pro/vllm/agg-b200-agentic/deploy.yaml
  benchmark:
    tool: aiperf
    asset: recipes/deepseek-v4/perf/perf.yaml
  expected_performance:
    available: true
    summary: Floor-pick c13 = 72.79 system tok/s/GPU @ user 51.3.
- id: agg-h200-agentic
  recommended: false
  hardware:
    gpu: H200
    count: 8
  runtime:
    framework: vllm
    image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
  topology: aggregated
  techniques:
  - expert-parallel
  - fp8-kv-cache
  - kv-aware-routing
  - prefix-caching
  workload:
    type: trace-replay
    traffic: 'Agentic MoonTrace, served subset (max_model_len 86016); TP8 + EP, MARLIN MoE'
    sla: user output >= 50 tok/s (floor-pick)
  deploy:
    asset: recipes/deepseek-v4/deepseek-v4-pro/vllm/agg-h200-agentic/deploy.yaml
  benchmark:
    tool: aiperf
    asset: recipes/deepseek-v4/perf/perf.yaml
  expected_performance:
    available: true
    summary: Secondary/best-effort on the public FP8 checkpoint; floor-pick c8 = 45.9 system tok/s/GPU @ user 53.2, max_model_len 86016 (H200 HBM cap).
- id: disagg-h200-agentic
  recommended: false
  hardware:
    gpu: H200
    count: 32
  runtime:
    framework: vllm
    image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0
  topology: disaggregated
  techniques:
  - disaggregated-prefill-decode
  - expert-parallel
  - fp8-kv-cache
  - kv-aware-routing
  - prefix-caching
