targets:
- id: trtllm-agg
  recommended: false
  hardware:
    gpu: GB200
    count: 4
  runtime:
    framework: trtllm
    image: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.2.0
  topology: aggregated
  techniques:
  - wideep
  - tp4
  - arm64
  workload:
    type: static-synthetic
    traffic: ISL 128 / OSL 1000, 3600 total concurrency (900/GPU), 10x request count
  deploy:
    asset: recipes/gpt-oss-120b/trtllm/agg/deploy.yaml
  benchmark:
    tool: aiperf
    asset: recipes/gpt-oss-120b/trtllm/agg/perf.yaml
  expected_performance:
    available: false
