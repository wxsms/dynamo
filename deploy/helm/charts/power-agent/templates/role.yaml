{{- if .Values.rbac.create }}
{{- $effectiveRestricted := include "power-agent.effectiveNamespaceRestricted" . }}
{{- if eq $effectiveRestricted "true" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "power-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "power-agent.labels" . | nindent 4 }}
rules:
  # The agent lists pods on its own node, filtered by spec.nodeName, to map
  # GPU process PIDs back to pod UIDs and read the per-pod power-limit
  # annotation. When namespace-scoped RBAC is in effect (production mode
  # with rbac.namespaceRestricted=true, OR dev mode), the agent is invoked
  # with --namespace={{ .Release.Namespace }} via the downward API so its
  # list call targets `list_namespaced_pod` (power_agent.py `_list_pods_on_node`)
  # instead of the cluster-wide default; see daemonset.yaml + dev-pod.yaml.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "power-agent.fullname" . }}
  labels:
    {{- include "power-agent.labels" . | nindent 4 }}
rules:
  # Cluster-wide pod read: the production DS sees worker pods in any
  # namespace on its node (GPU workloads may be spread across tenant
  # namespaces). Verbs limited to read-only — the agent never mutates pods.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
{{- end }}
{{- end }}
