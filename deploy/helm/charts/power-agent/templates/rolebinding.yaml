{{- if .Values.rbac.create }}
{{- $effectiveRestricted := include "power-agent.effectiveNamespaceRestricted" . }}
{{- if eq $effectiveRestricted "true" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "power-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "power-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "power-agent.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "power-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "power-agent.fullname" . }}
  labels:
    {{- include "power-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "power-agent.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "power-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
