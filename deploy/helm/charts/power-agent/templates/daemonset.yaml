{{- if .Values.daemonset.enabled }}
{{- include "power-agent.validateTerminationGracePeriod" . -}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "power-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "power-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "power-agent.selectorLabels" . | nindent 6 }}
  updateStrategy:
    {{- toYaml .Values.daemonset.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "power-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: power-agent
        {{- with .Values.daemonset.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.daemonset.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "power-agent.serviceAccountName" . }}
      # hostPID is required to read /proc/{pid}/cgroup for the host PIDs
      # returned by nvmlDeviceGetComputeRunningProcesses. See power_agent.py
      # _extract_pod_uid_from_cgroup.
      hostPID: true
      # Graceful shutdown restores default TGP on managed GPUs before exit
      # (the reconcile loop runs the restore after SIGTERM, not the signal
      # handler itself). Give it headroom to finish within the grace period;
      # the pod LIST best-effort bounds (see power_agent.py
      # K8S_LIST_*_TIMEOUT_S) substantially limit cleanup delay if SIGTERM lands
      # mid-LIST. Configurable so operators on high-density nodes can extend it.
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      # NVIDIA Container Toolkit injects libnvidia-ml.so via the `nvidia`
      # runtime class. Pairing with NVIDIA_VISIBLE_DEVICES=all in the
      # container env exposes every GPU on the node WITHOUT consuming a
      # `nvidia.com/gpu` resource claim — the same pattern DCGM Exporter
      # uses. Required for nvmlInit() to succeed.
      runtimeClassName: {{ .Values.runtimeClassName | quote }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.daemonset.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: power-agent
          image: {{ include "power-agent.imageRef" (dict "repository" .Values.image.repository "tag" .Values.image.tag "digest" .Values.image.digest) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - /app/power_agent.py
            - --safe-default-watts=$(SAFE_DEFAULT_WATTS)
            - --node-name=$(NODE_NAME)
            {{- if eq (include "power-agent.effectiveNamespaceRestricted" .) "true" }}
            # Namespace-scoped RBAC is in effect (Role + RoleBinding instead of
            # ClusterRole + ClusterRoleBinding — see role.yaml). The agent's
            # default pod listing (`list_pod_for_all_namespaces` in
            # power_agent.py `_list_pods_on_node`) would 403 against the
            # namespace-only token; pass --namespace so it uses
            # `list_namespaced_pod` instead. Mirrors the dev-pod template's
            # wiring (dev-pod.yaml).
            - --namespace=$(POD_NAMESPACE)
            {{- end }}
            - --prometheus-port={{ .Values.agent.prometheusPort }}
            - --actuator={{ .Values.agent.actuator }}
            {{- if eq .Values.agent.actuator "dcgm" }}
            - --dcgm-host={{ .Values.agent.dcgm.host }}
            - --dcgm-port={{ .Values.agent.dcgm.port }}
            {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if eq (include "power-agent.effectiveNamespaceRestricted" .) "true" }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- end }}
            - name: SAFE_DEFAULT_WATTS
              value: {{ .Values.agent.safeDefaultWatts | quote }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          securityContext:
            # NVML power-cap writes require root, and the agent persists
            # managed-GPU UUID state to a hostPath — non-root images cannot
            # write there. See power_agent.py:apply_cap.
            privileged: true
            readOnlyRootFilesystem: false
            runAsUser: 0
          ports:
            - name: metrics
              containerPort: {{ .Values.agent.prometheusPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: state
              mountPath: /var/lib/dynamo-power-agent
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: state
          hostPath:
            path: {{ .Values.state.hostPath | quote }}
            type: DirectoryOrCreate
{{- end }}
