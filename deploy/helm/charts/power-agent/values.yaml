# Power Agent — per-node GPU power-cap enforcement DaemonSet (NVML or DCGM
# actuator; see agent.actuator below).

image:
  repository: nvcr.io/nvidia/ai-dynamo/power-agent
  # REQUIRED for DaemonSet mode (daemonset.enabled, the default): pin the
  # image via `tag` OR `digest` — exactly one must be set. No default on
  # `tag` to avoid the `:latest` reproducibility footgun CodeRabbit flagged
  # on PR #9682. `helm install` fails fast at template time if both are
  # empty (or both are set) while daemonset.enabled. Dev-pod mode
  # (dev.enabled) ignores this and uses dev.image.* instead.
  tag: ""
  # Optional. When set, the image is rendered as
  # `{repository}@{digest}` (the canonical OCI digest form, e.g.
  # `nvcr.io/nvidia/ai-dynamo/power-agent@sha256:abc...`). Use this
  # for the strictest reproducibility — a digest is content-addressed
  # so the same string always pulls the same bytes, while a tag can
  # be re-pointed by the registry. Must look like `sha256:<hex>`.
  # PR #9682 fixed an earlier mistake of accepting digest values
  # via `image.tag` — that path renders `repo:sha256:...` which is
  # an INVALID image reference (parses as repo + tag "sha256" with
  # a stray suffix). Digests live on their own key for this reason.
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
# Example for NGC:
#   - name: ngc-secret

agent:
  # Per-SKU safety floor. The agent applies this cap to an opted-in GPU (one
  # whose pod carries dynamo.nvidia.com/gpu-power-limit) when the annotated
  # value cannot be used:
  #   - A single opted-in pod whose annotation value is empty or non-integer.
  #   - A multi-pod-per-GPU conflict that cannot agree on one parseable cap.
  # A GPU running ONLY pods without the annotation is out of scope: if this
  # agent previously capped it, the cap is released back to the GPU's factory
  # default (not this floor); otherwise the GPU is left untouched.
  # Recommended: ~70% of the SKU's default TGP.
  #   H200 SXM → 500    H100 SXM → 490    A100 SXM (80GB) → 280
  safeDefaultWatts: 500
  # NOTE: the agent's reconcile interval is currently a hardcoded module
  # constant (RECONCILE_INTERVAL_S = 15 in power_agent.py). It is NOT
  # exposed as a CLI flag, so plumbing it through values.yaml would create
  # a dead knob. If a future power_agent.py revision adds a
  # --reconcile-interval flag, add the matching key here at that time.
  prometheusPort: 9100

  # Power-cap actuator. Mutually exclusive — exactly one path is active
  # per chart install.
  #
  #   nvml (default) — Power Agent calls nvmlDeviceSetPowerManagementLimit
  #                    directly and never loads or connects to DCGM at
  #                    runtime. Use on clusters where the GPU Operator
  #                    runs with dcgm.enabled=false (the upstream
  #                    default). Same image as dcgm mode — the DCGM
  #                    bindings + libdcgm.so are always baked in (see
  #                    deploy/power-agent/Dockerfile); they simply stay
  #                    unused on this path. PR #9682 behaviour exactly.
  #
  #   dcgm — Power Agent connects standalone-TCP to the
  #          operator-managed nvidia-dcgm hostengine and routes cap
  #          writes through dcgmConfigSet. Use on clusters where the
  #          operator's dcgm.enabled=true (i.e. nvidia-dcgm pod is
  #          already running). DO NOT install this chart in actuator:
  #          dcgm mode on a cluster without nvidia-dcgm — agent.init()
  #          will fail fast at startup.
  #          REQUIRES a DCGM 4.x hostengine: the image bakes DCGM 4.x
  #          Python bindings and DcgmActuator uses c_dcgmDeviceConfig_v2,
  #          which has no 3.x fallback. Keep the bundled client >= the
  #          operator's nvidia-dcgm hostengine version (NVIDIA's guidance is
  #          client >= hostengine, not merely the same major). Pin the image's
  #          DCGM client to the `dcgm` tag your GPU Operator deploys for its
  #          nvidia-dcgm hostengine (the image default is DCGM 4.5.3; confirm
  #          against your operator's nvidia-dcgm image tag) and bump the
  #          Dockerfile DCGM_IMAGE arg in lockstep when the operator moves. A
  #          3.x hostengine is unsupported.
  #
  # Operator warning: any secondary writer to nvmlDeviceSetPowerManagementLimit
  # or dcgmConfigSet (regardless of which library it uses) will cause
  # the cap to flap. The chart's mutex applies to Power Agent itself, not
  # to third-party scripts; an operator script that calls
  # `nvidia-smi -pl` on a Power Agent-managed node will fight with us
  # regardless of which actuator we run.
  actuator: nvml

  # DCGM connection settings. Consulted only when actuator: dcgm.
  dcgm:
    # Defaults match the upstream GPU Operator's nvidia-dcgm Service:
    #   metadata.name = "nvidia-dcgm"
    #   metadata.namespace = "gpu-operator"
    # If your operator install uses non-default values (different
    # release name or namespace), override here. The hostengine
    # must be reachable from this DaemonSet's pods (same cluster,
    # no NetworkPolicy blocking egress to gpu-operator/*).
    #
    # IMPORTANT: the target must resolve to the NODE-LOCAL hostengine. The
    # stock nvidia-dcgm Service sets internalTrafficPolicy: Local, so the
    # default host routes to the DCGM pod on the SAME node — which is required:
    # DcgmActuator maps DCGM GPUs to NVML GPUs by comparing the REMOTE
    # hostengine's UUIDs against this pod's LOCAL NVML UUIDs (see actuator.py
    # _ensure_identity_map). A custom host that load-balances to a DCGM
    # instance on ANOTHER node would fail the UUID cross-check (RuntimeError at
    # startup) or mis-map GPUs. Any override MUST preserve node-local routing.
    host: nvidia-dcgm.gpu-operator.svc.cluster.local
    port: 5555
    # NOTE: The Power Agent issues ONLY dcgmConfigSet — never the
    # dcgmConfigEnforce manual re-assert. dcgmConfigSet already records the
    # cap as DCGM's "target configuration", and DCGM automatically re-applies
    # that target after a GPU reset or reinitialization on its own (per the
    # DCGM Configuration API). dcgmConfigEnforce is only a MANUAL re-assert of
    # that already-set target; issued right after Set it re-applies a value
    # that is already current, so it is redundant. An earlier revision exposed
    # it behind an `enforce` flag; that flag was removed as dead config. Notes:
    #   - The cap does NOT survive Power Agent restart (SIGTERM restores
    #     default regardless).
    #   - External `nvidia-smi -pl` clobbering is repaired on the Power
    #     Agent's next 15-s reconcile (which re-issues dcgmConfigSet),
    #     same as NVML.

# Pod termination grace period (seconds). On SIGTERM the agent restores each
# managed GPU's default power cap before exit; that cleanup runs from the
# reconcile loop's `finally`, AFTER any in-flight pod LIST returns. The LIST is
# best-effort bounded client- and server-side (K8S_LIST_*_TIMEOUT_S in
# power_agent.py) to substantially limit cleanup delay, but the default is set
# to 60s (2× the previous 30s) to leave headroom for the LIST to return and for
# per-GPU restore on high-density nodes. Kubelet SIGKILLs the pod when this
# elapses, so values below 60s are rejected by the chart; too-small values risk
# killing the agent mid-cleanup and leaving managed caps live. Applies to both
# DaemonSet and dev-pod modes.
terminationGracePeriodSeconds: 60

# NVIDIA container toolkit needs both runtimeClassName: nvidia AND
# NVIDIA_VISIBLE_DEVICES=all to inject libnvidia-ml.so AND expose every GPU
# WITHOUT consuming a nvidia.com/gpu resource claim. Same pattern DCGM
# Exporter uses. Privileged container bypasses the unprivileged-visibility
# edge case (accept-nvidia-visible-devices-envvar-when-unprivileged=false).
runtimeClassName: nvidia
env:
  NVIDIA_VISIBLE_DEVICES: "all"
  NVIDIA_DRIVER_CAPABILITIES: "compute,utility"

nodeSelector:
  nvidia.com/gpu.present: "true"

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

resources:
  # Steady-state RSS of the agent (pynvml + kubernetes client + prometheus
  # exporter) is ~80 MiB on an idle 8-GPU node. The previous 128Mi limit
  # left only ~48 MiB of headroom — enough to break under any of the
  # workloads we expect operators to run alongside the agent:
  #   - kubectl exec --container=power-agent -- python -c "..." for
  #     ad-hoc inspection (re-importing the kubernetes client in the
  #     same cgroup pushes RSS over 128 MiB; OOM-kills observed twice
  #     during 2026-05-21 live testing on AKS dpp-dev-env)
  #   - the agent's transient allocations during multi-pod conflict
  #     resolution on a node with O(50) pods (UID→annotation dict +
  #     PID→UUID map both held in memory)
  # 256Mi gives ~3× the steady-state RSS with safe room for both
  # patterns; on a fleet of 1000 nodes the extra 128MiB per node is
  # 125GiB — negligible compared to the cost of a silently OOM-killed
  # power-cap controller.
  requests:
    cpu: "50m"
    memory: "96Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

# Persisted UUID-gated cold-start state (managed_gpus.json).
state:
  hostPath: /var/lib/dynamo-power-agent

serviceAccount:
  create: true
  name: ""            # auto-generated from fullname if empty
  annotations: {}

rbac:
  create: true
  # true  → Role + RoleBinding; agent only sees pods in {{ .Release.Namespace }}.
  #         The DaemonSet's command is also invoked with
  #         `--namespace=$(POD_NAMESPACE)` (downward API → metadata.namespace)
  #         so power_agent.py uses `list_namespaced_pod` instead of its
  #         default `list_pod_for_all_namespaces`. Without that flag the
  #         agent would 403 on every reconcile against the namespace-only
  #         token. See templates/daemonset.yaml and power_agent.py
  #         `_list_pods_on_node`.
  # false → ClusterRole + ClusterRoleBinding; agent sees all pods on its
  #         node across every namespace. `--namespace` is NOT passed.
  # Default matches today's raw-YAML behaviour (cluster-scoped). Dev mode
  # overrides this to true automatically — see dev.namespaceRestrictedOverride.
  namespaceRestricted: false

# Production DaemonSet mode. Mutually exclusive with dev.enabled.
daemonset:
  enabled: true

  # Conservative default by design: when a Power Agent restarts, the GPUs
  # on its node have no power-cap enforcement until it comes back. If the
  # planner just emitted new annotations expecting them to apply, that
  # propagation stalls. `maxUnavailable: 1` ensures only one node's worth
  # of GPUs ever loses enforcement at a time.
  #
  # Override for large fleets: on clusters with hundreds of GPU nodes,
  # a 1-at-a-time rollout (~30s/pod × N nodes) gets slow. Operators can
  # opt into faster rollouts with:
  #   --set daemonset.updateStrategy.rollingUpdate.maxUnavailable=10%
  # (or any percentage / integer). The trade-off is more concurrent
  # enforcement gaps during a rollout; safe when the planner's reconcile
  # interval (15s) is much shorter than the rollout duration anyway.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

  podLabels: {}
  podAnnotations: {}
  affinity: {}

# In-cluster dev-iteration mode. Renders a single Pod (not a DaemonSet)
# that mounts power_agent.py, actuator.py AND managed_state.py from a
# ConfigMap. The caller is responsible for creating the ConfigMap
# separately BEFORE `helm install`; all three files are required because
# power_agent.py does `from actuator import ...` and `import managed_state`
# at module load (actuator.py since chart v1.1.0+, managed_state.py since
# chart v1.3.0+):
#
#   kubectl create configmap dynamo-power-agent-script \
#     --from-file=power_agent.py=deploy/power-agent/power_agent.py \
#     --from-file=actuator.py=deploy/power-agent/actuator.py \
#     --from-file=managed_state.py=deploy/power-agent/managed_state.py \
#     -n $NAMESPACE
#
# Without this ConfigMap the dev pod will stay Pending with a
# `MountVolume.SetUp failed for volume "script"` event; an incomplete
# ConfigMap will start the pod but ImportError immediately.
#
# Mutually exclusive with daemonset.enabled (chart fails to render if both
# are true). dev.nodeName is required when dev.enabled=true.
dev:
  enabled: false
  # Required when enabled=true. Pin to the GPU node hosting the workload pod
  # being annotated. Find a candidate with:
  #   kubectl get pods -n $NAMESPACE -l nvidia.com/dynamo-component-type=worker \
  #     -o jsonpath='{.items[*].spec.nodeName}'
  nodeName: ""
  # Name of an externally-created ConfigMap holding power_agent.py,
  # actuator.py AND managed_state.py at the matching key names (all three
  # are required; see top-of-section recipe).
  scriptConfigMap: dynamo-power-agent-script
  # The dev pod uses vllm-runtime (already cached on every GPU node by
  # the quickstart DGDs) which ships with pynvml; the agent pip-installs
  # kubernetes + prometheus-client at container start.
  #
  # NVML actuator only. For DCGM dev mode (agent.actuator=dcgm),
  # override repository + tag to the production power-agent image,
  # which vendors the required pydcgm bindings and libdcgm.so:
  #   --set dev.image.repository=nvcr.io/nvidia/ai-dynamo/power-agent
  #   --set dev.image.tag=v1.2.0
  # Script-iteration via the ConfigMap mount still works against the
  # power-agent image (the /scripts mount overrides /app at runtime).
  image:
    repository: nvcr.io/nvidia/ai-dynamo/vllm-runtime
    tag: "1.0.1"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # Set to true ONLY if you genuinely need cluster-wide pod-listing RBAC
  # while iterating on power_agent.py (e.g., testing cross-namespace
  # multi-pod conflict resolution). Default: false — dev mode forces
  # namespace-scoped RBAC for principle of least privilege.
  namespaceRestrictedOverride: false
