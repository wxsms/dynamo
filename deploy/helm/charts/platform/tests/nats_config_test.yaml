suite: NATS operator configuration
templates:
  - charts/dynamo-operator/templates/operator-config.yaml
tests:
  - it: should include natsAddress when global.nats.install is true
    set:
      global.nats.install: true
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "natsAddress:"

  - it: should not include natsAddress by default
    asserts:
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: "natsAddress:"

  - it: should use an explicit external natsAddr when bundled NATS is disabled
    set:
      global.nats.install: false
      dynamo-operator.natsAddr: "nats://external-nats:4222"
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'natsAddress: "nats://external-nats:4222"'

  - it: should prefer an explicit external natsAddr when bundled NATS is enabled
    set:
      global.nats.install: true
      dynamo-operator.natsAddr: "nats://external-nats:4222"
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'natsAddress: "nats://external-nats:4222"'

  - it: should generate correct auto-configured nats address
    release:
      name: my-release
      namespace: my-namespace
    set:
      global.nats.install: true
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'natsAddress: "nats://my-release-nats.my-namespace.svc.cluster.local:4222"'
