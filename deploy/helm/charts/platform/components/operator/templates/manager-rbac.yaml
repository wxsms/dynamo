{{- $managerRoleFile := required "generated manager RBAC role is missing" (.Files.Get "files/manager-role.yaml") }}
{{- $managerRole := $managerRoleFile | fromYaml }}
# Helm selects a namespaced Role or cluster-wide ClusterRole for the generated rules.
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.namespaceRestriction.enabled }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
  name: {{ include "dynamo-operator.fullname" . }}-manager-role
  {{- if .Values.namespaceRestriction.enabled }}
  namespace: {{ default .Release.Namespace .Values.namespaceRestriction.targetNamespace }}
  {{- end }}
  labels:
  {{- include "dynamo-operator.labels" . | nindent 4 }}
rules:
{{- $managerRole.rules | toYaml | nindent 0 }}
# WARNING: +kubebuilder:rbac markers are the default source for operator RBAC.
# Add rules below only when they are inherently Helm-specific and cannot be
# represented by markers. Audit them separately from controller reconciliation RBAC.
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  verbs:
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - delete
  - patch
- apiGroups:
  - ""
  resources:
  - endpoints
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - delete
  - patch
{{- if not .Values.namespaceRestriction.enabled }}
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - mutatingwebhookconfigurations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
{{- end }}
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - update
- apiGroups:
  - inference.networking.x-k8s.io
  resources:
  - inferencepools
  - inferenceobjectives
  - inferencemodelrewrites
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - nvidia.com
  resources:
  - dynamoworkermetadatas
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - nvidia.com
  resources:
  - podsnapshots
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - nvidia.com
  resources:
  - dynamocheckpoints/finalizers
  - dynamocomponentdeployments/finalizers
  - dynamographdeploymentrequests/finalizers
  - dynamographdeployments/finalizers
  - dynamomodels/finalizers
  - podsnapshots/finalizers
  verbs:
  - update
- apiGroups:
  - nvidia.com
  resources:
  - dynamocheckpoints/status
  - dynamocomponentdeployments/status
  - dynamographdeploymentrequests/status
  - dynamographdeployments/status
  - dynamographdeploymentscalingadapters/status
  - dynamomodels/status
  - podsnapshots/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - nvidia.com
  resources:
  - dynamographdeploymentscalingadapters/scale
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterrolebindings
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  verbs:
  - create
  - delete
  - patch
  - update
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings
  verbs:
  - patch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - roles
  verbs:
  - delete
  - patch
---
# Helm binds the selected manager role kind to this release's controller ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.namespaceRestriction.enabled }}
kind: RoleBinding
{{- else }}
kind: ClusterRoleBinding
{{- end }}
metadata:
  name: {{ include "dynamo-operator.fullname" . }}-manager-rolebinding
{{- if .Values.namespaceRestriction.enabled }}
  namespace: {{ default .Release.Namespace .Values.namespaceRestriction.targetNamespace }}
{{- end }}
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: dynamo-operator
    app.kubernetes.io/part-of: dynamo-operator
  {{- include "dynamo-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
{{- if .Values.namespaceRestriction.enabled }}
  kind: Role
{{- else }}
  kind: ClusterRole
{{- end }}
  name: '{{ include "dynamo-operator.fullname" . }}-manager-role'
subjects:
- kind: ServiceAccount
  name: '{{ include "dynamo-operator.fullname" . }}-controller-manager'
  namespace: '{{ .Release.Namespace }}'
---
# Helm keeps ClusterTopologyBinding access separate because a namespace-restricted Role cannot grant it.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dynamo-operator.fullname" . }}-{{ .Release.Namespace }}-clustertopologybinding-reader
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: dynamo-operator
    app.kubernetes.io/part-of: dynamo-operator
  {{- include "dynamo-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - grove.io
  resources:
  - clustertopologybindings
  verbs:
  - get
  - list
  - watch
---
# Helm binds the separate cluster-scoped ClusterTopologyBinding grant to the controller ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dynamo-operator.fullname" . }}-{{ .Release.Namespace }}-clustertopologybinding-reader-binding
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: dynamo-operator
    app.kubernetes.io/part-of: dynamo-operator
  {{- include "dynamo-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "dynamo-operator.fullname" . }}-{{ .Release.Namespace }}-clustertopologybinding-reader
subjects:
- kind: ServiceAccount
  name: '{{ include "dynamo-operator.fullname" . }}-controller-manager'
  namespace: '{{ .Release.Namespace }}'
---
# Helm keeps Queue access separate because a namespace-restricted Role cannot grant it.
