# GitHub repository link in navbar
navbar-links:
  - type: dropdown
    text: Digest
    links:
      - text: All Posts
        href: /dynamo/dev/digest
      - text: "NVIDIA Dynamo Snapshot: Fast Startup for Inference Workloads on Kubernetes"
        href: /dynamo/dev/digest/dynamo-snapshot-fast-startup
      - text: "DynoSim: Simulating the Pareto Frontier"
        href: /dynamo/dev/digest/dynosim-pareto-frontier
      - text: "Dynamo Day 0 support for TokenSpeed"
        href: /dynamo/dev/digest/tokenspeed-day-0
      - text: "Multi-Turn Agentic Harnesses"
        href: /dynamo/dev/digest/agentic-harnesses
  - type: github
    value: https://github.com/ai-dynamo/dynamo

footer: ./components/CustomFooter.tsx

layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true

metadata:
  canonical-host: "docs.nvidia.com/dynamo"

experimental:
  mdx-components:
    - ./components
  basepath-aware: true

colors:
  accentPrimary:
    dark: '#76B900'
    light: '#76B900'
  background:
    light: '#FFFFFF'
    dark: '#000000'
typography:
  bodyFont:
    name: NVIDIA
    paths:
      - path: ../docs/assets/fonts/NVIDIASans.woff2
        style: normal
      - path: ../docs/assets/fonts/NVIDIASans_Italic.woff2
        style: italic
  codeFont:
    name: RobotoMono
    paths:
      - path: ../docs/assets/fonts/RobotoMono.woff2
theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  dark: ../docs/assets/NVIDIA_dark.svg
  light: ../docs/assets/NVIDIA_light.svg
  height: 20
  href: /dynamo/getting-started
  right-text: Documentation

favicon: ../docs/assets/NVIDIA_symbol.svg

js:
  - url: https://assets.adobedtm.com/5d4962a43b79/c1061d2c5e7b/launch-191c2462b890.min.js
    strategy: beforeInteractive
css:
  - ./main.css
