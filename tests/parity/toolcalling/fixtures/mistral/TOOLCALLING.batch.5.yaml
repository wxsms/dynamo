family: mistral
mode: batch
cases:
  TOOLCALLING.batch.5.a:
    description: Missing [/TOOL_CALLS] end marker
    ref: dynamo
    model_text: '[TOOL_CALLS][{"name": "get_weather", "arguments": {"location": "NYC"}}]'
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id001
      sglang:
        calls: []
        normal_text: ''
  TOOLCALLING.batch.5.b:
    description: Closing [/TOOL_CALLS] without matching [TOOL_CALLS] open
    ref: dynamo
    model_text: '[{"name": "get_weather", "arguments": {"location": "NYC"}}][/TOOL_CALLS]'
    tools:
    - *id002
    expected:
      dynamo: &id003
        reason: "Dynamo's mistral parser leaves [/TOOL_CALLS] in normal_text on missing/orphan end marker (impl-defined recovery)"
        calls: []
        normal_text: '[{"name": "get_weather", "arguments": {"location": "NYC"}}][/TOOL_CALLS]'
      vllm: *id003
      sglang: *id003
  TOOLCALLING.batch.5.c:
    description: Truncation mid-arguments JSON
    ref: dynamo
    model_text: '[TOOL_CALLS][{"name": "get_weather", "arguments": {"loc'
    tools:
    - *id002
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '[{"name": "get_weather", "arguments": {"loc'
        reason: vLLM leaves the truncated post-marker JSON body in content; Dynamo suppresses the unterminated [TOOL_CALLS] call and emits empty content.
      sglang:
        calls: []
        normal_text: ''
  TOOLCALLING.batch.5.d:
    description: Multi-call, last call missing only end marker (body complete)
    ref: dynamo
    model_text: 'I''ll start by fetching the weather for both Boston and New York at the same time![TOOL_CALLS][{"name": "get_weather",
      "arguments": {"location": "Boston"}}, {"name": "get_weather", "arguments": {"location": "New York"}}]'
    tools:
    - *id002
    expected:
      dynamo: &id004
        calls:
        - name: get_weather
          arguments:
            location: Boston
        - name: get_weather
          arguments:
            location: New York
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      vllm: *id004
      sglang:
        calls: []
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
  TOOLCALLING.batch.5.e:
    description: Multi-call, last call truncated mid-arg-value
    ref: dynamo
    model_text: 'I''ll start by fetching the weather for both Boston and New York at the same time![TOOL_CALLS][{"name": "get_weather",
      "arguments": {"location": "Boston"}}, {"name": "get_weather", "arguments": {"location": "New York'
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      vllm:
        calls: []
        normal_text: '[{"name": "get_weather", "arguments": {"location": "Boston"}}, {"name": "get_weather", "arguments":
          {"location": "New York'
        reason: vLLM leaves the raw truncated body in content; Dynamo recovers the complete leading call (Boston) and drops the truncated trailing call without fabricating it.
      sglang:
        calls: []
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
        reason: SGLang emits no call and keeps the narration prefix; Dynamo recovers the complete leading call (Boston) and drops the truncated trailing call.
