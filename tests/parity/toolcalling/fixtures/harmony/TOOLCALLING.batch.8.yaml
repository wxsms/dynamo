family: harmony
mode: batch
cases:
  TOOLCALLING.batch.8.a:
    description: Narration before tool call only
    ref: dynamo
    model_text: I will check the weather. <|channel|>analysis<|message|>Need to use function get_weather.<|end|><|start|>assistant<|channel|>commentary
      to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: I will check the weather.
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: I will check the weather.
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: I will check the weather.
  TOOLCALLING.batch.8.b:
    description: Narration after tool call only
    ref: dynamo
    model_text: <|channel|>analysis<|message|>Need to use function get_weather.<|end|><|start|>assistant<|channel|>commentary
      to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|> Let me know if you need more.
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: Let me know if you need more.
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: Let me know if you need more.
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: Let me know if you need more.
  TOOLCALLING.batch.8.c:
    description: Narration both before and after (sandwich)
    ref: inspired-by https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_openai_tool_parser.py#L220
    model_text: I will check the weather. <|channel|>analysis<|message|>Need to use function get_weather.<|end|><|start|>assistant<|channel|>commentary
      to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|> Let me know if you need more.
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: I will check the weather.  Let me know if you need more.
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: I will check the weather.  Let me know if you need more.
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: I will check the weather.   Let me know if you need more.
        reason: "No spec-correct winner on whitespace: analysis is correctly hidden and the same call is extracted; surrounding prose is outside Harmony messages, so whitespace is recovery-only"
  TOOLCALLING.batch.8.d:
    description: Narration between multiple tool calls
    ref: dynamo
    model_text: I will check the weather. <|channel|>analysis<|message|>Need to use function get_weather.<|end|><|start|>assistant<|channel|>commentary
      to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|> Then check LA weather. <|channel|>commentary
      to=functions.get_weather <|constrain|>json<|message|>{"location":"LA"}<|call|>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            location: LA
          name: get_weather
        normal_text: I will check the weather.  Then check LA weather.
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            location: LA
          name: get_weather
        normal_text: I will check the weather.  Then check LA weather.
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: I will check the weather.   Then check LA weather.
        reason: "No spec-correct winner on whitespace: analysis is correctly hidden and the same calls are extracted; surrounding prose is outside Harmony messages, so whitespace is recovery-only"
