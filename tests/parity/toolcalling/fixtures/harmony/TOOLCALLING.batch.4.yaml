family: harmony
mode: batch
cases:
  TOOLCALLING.batch.4.a:
    description: Channel envelope with garbage body
    ref: "OpenAI Harmony JSON-constrained function calls: https://developers.openai.com/cookbook/articles/openai-harmony#receiving-tool-calls"
    model_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>not json at all<|call|>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_4_a
        calls:
        - arguments: not json at all
          name: get_weather
        normal_text: ''
      vllm: *d_4_a
      sglang:
        calls: []
        normal_text: ''
        reason: "Less parser-complete behavior: the Harmony envelope is a valid '<|call|>'-terminated function call, so the parser should preserve the malformed raw payload for downstream validation rather than dropping the call."
  TOOLCALLING.batch.4.b:
    description: Unterminated JSON in message body
    ref: "OpenAI Harmony JSON-constrained function calls: https://developers.openai.com/cookbook/articles/openai-harmony#receiving-tool-calls"
    model_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC<|call|>
    tools:
    - *id001
    expected:
      dynamo: &d_4_b
        calls:
        - arguments: '{"location":"NYC'
          name: get_weather
        normal_text: ''
      vllm: *d_4_b
      sglang:
        calls: []
        normal_text: ''
        reason: "Less parser-complete behavior: the Harmony envelope is a valid '<|call|>'-terminated function call, so the parser should preserve the malformed raw payload for downstream validation rather than dropping the call."
  TOOLCALLING.batch.4.c:
    description: No to=functions.X recipient
    ref: dynamo
    model_text: <|start|>assistant<|channel|>commentary <|constrain|>json<|message|>{"location":"NYC"}<|call|>
    tools:
    - *id001
    expected:
      dynamo: &d_4_c
        calls: []
        normal_text: ''
      vllm: *d_4_c
      sglang: *d_4_c
  TOOLCALLING.batch.4.d:
    description: Malformed variant 4.d — not applicable to this family
    reason: |-
      Malformed-input variant 4.d does not apply to harmony's parser syntax (no equivalent end-marker recovery scenario).
  TOOLCALLING.batch.4.e:
    description: Malformed-prefix recovery — n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.e is specific to llama3_json's raw JSON-object scanner: a malformed JSON-looking prefix is followed by a complete JSON object, and the detector may resynchronize on the later object. This family uses a framed parser grammar instead of that raw JSON-prefix scanner; malformed-input coverage for this family lives in TOOLCALLING.batch.4.a through 4.d.
  TOOLCALLING.batch.4.f:
    description: Tool-name XML tag case - n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.f is specific to Qwen3-Coder XML syntax, where the model may emit a tool-name tag such as <terminal> inside <tool_call> instead of the required <function=Terminal> opener. This family does not use Qwen3-Coder's <function=...> opener.
