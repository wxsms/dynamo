family: harmony
model_label: gpt-oss
mode: batch
cases:
  TOOLCALLING.batch.1:
    description: Single tool call (basic complete envelope)
    ref: "OpenAI Harmony receiving tool calls: https://developers.openai.com/cookbook/articles/openai-harmony#receiving-tool-calls"
    model_text: <|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_1
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *d_1
      sglang:
        calls: []
        normal_text: <|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|>
        reason: "Less spec-correct parsing: SGLang leaks raw Harmony markup instead of extracting a valid '<|call|>'-terminated commentary tool call."
  TOOLCALLING.batch.3:
    description: No tool call (bare text without final channel)
    ref: "OpenAI Harmony channels/final output: https://developers.openai.com/cookbook/articles/openai-harmony#channels"
    model_text: Hello, how can I help you today?
    tools:
    - *id001
    expected:
      dynamo: &d_3
        calls: []
        normal_text: ''
      vllm: *d_3
      sglang:
        calls: []
        normal_text: Hello, how can I help you today?
        reason: "Less spec-correct fallback: bare text is not a valid Harmony assistant response because no final message was emitted. A valid response would be '<|channel|>final<|message|>Hello, how can I help you today?<|return|>'."
  TOOLCALLING.batch.9.a:
    description: Empty model text
    model_text: ''
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: ''
      sglang:
        calls: []
        normal_text: ''
  TOOLCALLING.batch.9.b:
    description: Blank / whitespace-only model text
    ref: dynamo
    model_text: '   '
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: ''
      sglang:
        calls: []
        normal_text: '   '
        reason: "Less spec-correct fallback: blank text is not a valid Harmony assistant response because no final message was emitted."
  TOOLCALLING.batch.10:
    description: Duplicate calls (same name twice)
    model_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|><|start|>assistant<|channel|>commentary
      to=functions.get_weather <|constrain|>json<|message|>{"location":"LA"}<|call|>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            location: LA
          name: get_weather
        normal_text: ''
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            location: LA
          name: get_weather
        normal_text: ''
      sglang:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            location: LA
          name: get_weather
        normal_text: ''
  TOOLCALLING.batch.30:
    description: Separator-character case not applicable
    reason: |-
      This case is not applicable to harmony because it uses channel/recipient/message envelope tokens, not delimiter-separated call bodies.
  TOOLCALLING.batch.31:
    description: Multi-call separator-character case not applicable
    reason: |-
      This case is not applicable to harmony because it uses channel/recipient/message envelope tokens, not delimiter-separated call bodies.
  TOOLCALLING.batch.13:
    description: Unknown tool name absent from supplied tools
    ref: dynamo
    model_text: <|channel|>commentary to=functions.unknown_tool <|constrain|>json<|message|>{"location":"NYC"}<|call|>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        calls: []
        normal_text: <|channel|>commentary to=functions.unknown_tool <|constrain|>json<|message|>{"location":"NYC"}<|call|>
        reason: SGLang treats an unknown harmony recipient as ordinary content rather than forwarding a tool call by default.
  TOOLCALLING.batch.13.c:
    description: Mixed known and unknown calls not applicable
    reason: |-
      This case is not applicable to harmony because there is no peer mixed known/unknown Harmony parser case to align against.
