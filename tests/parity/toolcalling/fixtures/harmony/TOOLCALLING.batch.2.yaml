family: harmony
mode: batch
cases:
  TOOLCALLING.batch.2.a:
    description: Two back-to-back commentary envelopes
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_openai_tool_parser.py#L130
    model_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|><|start|>assistant<|channel|>commentary
      to=functions.get_time <|constrain|>json<|message|>{"timezone":"EST"}<|call|>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            timezone: EST
          name: get_time
        normal_text: ''
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            timezone: EST
          name: get_time
        normal_text: ''
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
  TOOLCALLING.batch.2.c:
    description: With surrounding narration
    ref: "OpenAI Harmony preambles should be commentary messages: https://developers.openai.com/cookbook/articles/openai-harmony#preambles"
    model_text: I need both. <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|><|start|>assistant<|channel|>commentary
      to=functions.get_time <|constrain|>json<|message|>{"timezone":"EST"}<|call|> Done.
    tools:
    - *id001
    - *id002
    expected:
      dynamo:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            timezone: EST
          name: get_time
        normal_text: I need both.  Done.
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            timezone: EST
          name: get_time
        normal_text: I need both.  Done.
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: I need both.   Done.
        reason: "No spec-correct winner on whitespace: surrounding prose is outside Harmony messages, so this is recovery-only; SGLang extracts the same calls but preserves one extra separator space"
  TOOLCALLING.batch.2.d:
    description: Same-name twice
    ref: dynamo
    model_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|><|start|>assistant<|channel|>commentary
      to=functions.get_weather <|constrain|>json<|message|>{"location":"LA"}<|call|>
    tools:
    - *id001
    - *id001
    expected:
      dynamo:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            location: LA
          name: get_weather
        normal_text: ''
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            location: LA
          name: get_weather
        normal_text: ''
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
  TOOLCALLING.batch.2.b:
    description: Two back-to-back fence pairs — not applicable to this family
    reason: |-
      harmony's multi-call form is exercised by TOOLCALLING.batch.2.a / 2.c / 2.d; no back-to-back fence/wrapper pattern applies to this family's parser syntax.
