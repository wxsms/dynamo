family: deepseek_v3
mode: batch
cases:
  TOOLCALLING.batch.6.a:
    description: Canonical empty {} in fenced code block
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L260
    model_text: |-
      <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>function<ÔĹútool‚ĖĀsepÔĹú>get_time
      ```json
      {}
      ```<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú><ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
    tools:
    - &id002
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo: &id001
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id001
      sglang: *id001
  TOOLCALLING.batch.6.b:
    description: Whitespace inside empty { } (newlines)
    ref: dynamo
    model_text: |-
      <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>function<ÔĹútool‚ĖĀsepÔĹú>get_time
      ```json
      {
      }
      ```<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú><ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm:
        reason: vLLM treats the multi-line empty-object argument body as invalid for DeepSeek V3 fenced JSON and emits no call.
        calls: []
        normal_text: ''
      sglang: *id003
  TOOLCALLING.batch.6.c:
    description: No fenced JSON block (function name only)
    ref: dynamo
    model_text: <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>function<ÔĹútool‚ĖĀsepÔĹú>get_time<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú><ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
    tools:
    - *id002
    expected:
      dynamo: &d_6_c
        calls: []
        normal_text: ''
      vllm: *d_6_c
      sglang:
        reason: SGLang preserves the minimal DeepSeek V3 no-args wrapper as normal_text; Dynamo and vLLM strip malformed tool-call markup from message content.
        calls: []
        normal_text: <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>function<ÔĹútool‚ĖĀsepÔĹú>get_time<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú><ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
