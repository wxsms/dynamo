family: deepseek_v3
mode: batch
cases:
  TOOLCALLING.batch.5.a:
    description: Missing calls_end / call_end markers
    ref: dynamo
    model_text: |-
      <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"location": "NYC"}
      ```
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_5_a
        calls: []
        normal_text: ''
      vllm: *d_5_a
      sglang: *d_5_a
  TOOLCALLING.batch.5.b:
    description: Closing tool_calls_end without matching tool_calls_begin
    ref: dynamo
    model_text: |-
      <｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"location": "NYC"}
      ```<｜tool▁call▁end｜><｜tool▁calls▁end｜>
    tools:
    - *id001
    expected:
      dynamo: &id002
        reason: "Dynamo's deepseek_v3 parser leaves <｜tool▁call…｜> deepseek_v3 token, <｜tool▁sep｜> in normal_text on missing/orphan end marker (impl-defined recovery)"
        calls: []
        normal_text: |-
          <｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
          ```json
          {"location": "NYC"}
          ```<｜tool▁call▁end｜><｜tool▁calls▁end｜>
      vllm: *id002
      sglang: *id002
  TOOLCALLING.batch.5.c:
    description: Truncation mid-arguments JSON inside fenced block
    ref: dynamo
    model_text: |-
      <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"loc
    tools:
    - *id001
    expected:
      dynamo: &d_5_c
        calls: []
        normal_text: ''
      vllm: *d_5_c
      sglang: *d_5_c
  TOOLCALLING.batch.5.d:
    description: Multi-call, last call missing only end marker (body complete)
    ref: dynamo
    model_text: |-
      I'll start by fetching the weather for both Boston and New York at the same time!
      <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"location": "Boston"}
      ```<｜tool▁call▁end｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"location": "New York"}
      ```
    tools:
    - *id001
    expected:
      dynamo: &d_5_d
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: |
          I'll start by fetching the weather for both Boston and New York at the same time!
      vllm: *d_5_d
      sglang:
        reason: SGLang recovers the completed leading DeepSeek V3 call but trims the trailing newline from prefix normal_text.
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
  TOOLCALLING.batch.5.e:
    description: Multi-call, last call truncated mid-arg-value
    ref: dynamo
    model_text: |-
      I'll start by fetching the weather for both Boston and New York at the same time!
      <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"location": "Boston"}
      ```<｜tool▁call▁end｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"location": "New York
    tools:
    - *id001
    expected:
      dynamo: &d_5_e
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: |
          I'll start by fetching the weather for both Boston and New York at the same time!
      vllm: *d_5_e
      sglang:
        reason: SGLang recovers the completed leading DeepSeek V3 call but trims the trailing newline from prefix normal_text.
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
