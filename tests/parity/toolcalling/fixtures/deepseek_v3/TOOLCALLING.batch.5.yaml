family: deepseek_v3
mode: batch
cases:
  TOOLCALLING.batch.5.a:
    description: Missing calls_end / call_end markers
    ref: dynamo
    model_text: |-
      <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"location": "NYC"}
      ```
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls: []
        normal_text: ''
      vllm: *id001
      sglang: *id001
  TOOLCALLING.batch.5.b:
    description: Closing tool_calls_end without matching tool_calls_begin
    ref: dynamo
    model_text: |-
      <｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"location": "NYC"}
      ```<｜tool▁call▁end｜><｜tool▁calls▁end｜>
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: &id003
        reason: vLLM/SGLang deepseek_v3 handling leaves the <｜tool▁call…｜> envelope and <｜tool▁sep｜> in normal_text on this orphan end-marker case.
        calls: []
        normal_text: |-
          <｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
          ```json
          {"location": "NYC"}
          ```<｜tool▁call▁end｜><｜tool▁calls▁end｜>
      sglang: *id003
  TOOLCALLING.batch.5.c:
    description: Truncation mid-arguments JSON inside fenced block
    ref: dynamo
    model_text: |-
      <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"loc
    tools:
    - *id002
    expected:
      dynamo: &id004
        calls: []
        normal_text: ''
      vllm: *id004
      sglang: *id004
  TOOLCALLING.batch.5.d:
    description: Multi-call, last call missing only end marker (body complete)
    ref: dynamo
    model_text: |-
      I'll start by fetching the weather for both Boston and New York at the same time!
      <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"location": "Boston"}
      ```<｜tool▁call▁end｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"location": "New York"}
      ```
    tools:
    - *id002
    expected:
      dynamo: &id005
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: |
          I'll start by fetching the weather for both Boston and New York at the same time!
      vllm: *id005
      sglang:
        reason: SGLang recovers the completed leading DeepSeek V3 call but trims the trailing newline from prefix normal_text.
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
  TOOLCALLING.batch.5.e:
    description: Multi-call, last call truncated mid-arg-value
    ref: dynamo
    model_text: |-
      I'll start by fetching the weather for both Boston and New York at the same time!
      <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"location": "Boston"}
      ```<｜tool▁call▁end｜><｜tool▁call▁begin｜>function<｜tool▁sep｜>get_weather
      ```json
      {"location": "New York
    tools:
    - *id002
    expected:
      dynamo: &id006
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: |
          I'll start by fetching the weather for both Boston and New York at the same time!
      vllm: *id006
      sglang:
        reason: SGLang recovers the completed leading DeepSeek V3 call but trims the trailing newline from prefix normal_text.
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
