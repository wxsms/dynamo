family: deepseek_v3
mode: batch
cases:
  TOOLCALLING.batch.7.a:
    description: Standard scalar types
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L220
    model_text: |-
      <пЅњtoolв–Ѓcallsв–ЃbeginпЅњ><пЅњtoolв–Ѓcallв–ЃbeginпЅњ>function<пЅњtoolв–ЃsepпЅњ>book_flight
      ```json
      {"destination": "Paris", "passengers": 2, "first_class": true}
      ```<пЅњtoolв–Ѓcallв–ЃendпЅњ><пЅњtoolв–Ѓcallsв–ЃendпЅњ>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo: &id001
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            passengers: 2
            first_class: true
        normal_text: ''
      vllm: *id001
      sglang: *id001
  TOOLCALLING.batch.7.b:
    description: Unicode + escaped chars
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L302
    model_text: |-
      <пЅњtoolв–Ѓcallsв–ЃbeginпЅњ><пЅњtoolв–Ѓcallв–ЃbeginпЅњ>function<пЅњtoolв–ЃsepпЅњ>get_weather
      ```json
      {"location": "TЕЌkyЕЌ \"central\""}
      ```<пЅњtoolв–Ѓcallв–ЃendпЅњ><пЅњtoolв–Ѓcallsв–ЃendпЅњ>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id002
        calls:
        - name: get_weather
          arguments:
            location: TЕЌkyЕЌ "central"
        normal_text: ''
      vllm: *id002
      sglang: *id002
  TOOLCALLING.batch.7.c:
    description: Schema mismatch вЂ” string value where schema declares integer
    ref: dynamo
    model_text: |-
      <пЅњtoolв–Ѓcallsв–ЃbeginпЅњ><пЅњtoolв–Ѓcallв–ЃbeginпЅњ>function<пЅњtoolв–ЃsepпЅњ>set_temperature
      ```json
      {"celsius": "20"}
      ```<пЅњtoolв–Ѓcallв–ЃendпЅњ><пЅњtoolв–Ѓcallsв–ЃendпЅњ>
    tools:
    - name: set_temperature
      parameters:
        type: object
        properties:
          celsius:
            type: integer
    expected:
      dynamo: &id003
        calls:
        - name: set_temperature
          arguments:
            celsius: '20'
        normal_text: ''
      vllm: *id003
      sglang: *id003
  TOOLCALLING.batch.7.d:
    description: Nested object + array (existing)
    ref: dynamo
    model_text: |-
      <пЅњtoolв–Ѓcallsв–ЃbeginпЅњ><пЅњtoolв–Ѓcallв–ЃbeginпЅњ>function<пЅњtoolв–ЃsepпЅњ>process_data
      ```json
      {"items": [1, 2, 3], "config": {"nested": true}}
      ```<пЅњtoolв–Ѓcallв–ЃendпЅњ><пЅњtoolв–Ѓcallsв–ЃendпЅњ>
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          items:
            type: array
          config:
            type: object
    expected:
      dynamo: &id004
        calls:
        - name: process_data
          arguments:
            items:
            - 1
            - 2
            - 3
            config:
              nested: true
        normal_text: ''
      vllm: *id004
      sglang: *id004
  TOOLCALLING.batch.7.e:
    description: Large / deep JSON-edge argument payload
    ref: dynamo
    model_text: '<пЅњtoolв–Ѓcallsв–ЃbeginпЅњ><пЅњtoolв–Ѓcallв–ЃbeginпЅњ>function<пЅњtoolв–ЃsepпЅњ>process_data

      ```json

      {"payload": {"regions": [{"name": "west", "scores": [1, 2, 3]}, {"name": "east", "scores": [4, 5, 6]}], "flags": {"enabled":
      true, "retry": null}, "empty": {}}}

      ```<пЅњtoolв–Ѓcallв–ЃendпЅњ><пЅњtoolв–Ѓcallsв–ЃendпЅњ>'
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          payload:
            type: object
    expected:
      dynamo:
        calls:
        - name: process_data
          arguments:
            payload:
              regions:
              - name: west
                scores:
                - 1
                - 2
                - 3
              - name: east
                scores:
                - 4
                - 5
                - 6
              flags:
                enabled: true
                retry: null
              empty: {}
        normal_text: ''
      vllm:
        calls:
        - name: process_data
          arguments:
            payload:
              regions:
              - name: west
                scores:
                - 1
                - 2
                - 3
              - name: east
                scores:
                - 4
                - 5
                - 6
              flags:
                enabled: true
                retry: null
              empty: {}
        normal_text: ''
      sglang:
        calls:
        - name: process_data
          arguments:
            payload:
              regions:
              - name: west
                scores:
                - 1
                - 2
                - 3
              - name: east
                scores:
                - 4
                - 5
                - 6
              flags:
                enabled: true
                retry: null
              empty: {}
        normal_text: ''
  TOOLCALLING.batch.7.f:
    description: Numeric precision edge preserves integer-like number literal
    ref: https://huggingface.co/deepseek-ai/DeepSeek-V3/blob/main/tokenizer_config.json
    model_text: |-
      <пЅњtoolв–Ѓcallsв–ЃbeginпЅњ><пЅњtoolв–Ѓcallв–ЃbeginпЅњ>function<пЅњtoolв–ЃsepпЅњ>set_limit
      ```json
      {"count":9007199254740993}
      ```<пЅњtoolв–Ѓcallв–ЃendпЅњ><пЅњtoolв–Ѓcallsв–ЃendпЅњ>
    tools:
    - name: set_limit
      parameters:
        type: object
        properties:
          count:
            type: number
    expected:
      dynamo: &d_7_f
        calls:
        - name: set_limit
          arguments:
            count: 9007199254740993
        normal_text: ''
      vllm: *d_7_f
      sglang: *d_7_f
