family: deepseek_v3_2
mode: batch
cases:
  TOOLCALLING.batch.6.a:
    description: Invoke with no <parameter>
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_deepseekv32_tool_parser.py#L363
    model_text: |-
      <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_time">
      </｜DSML｜invoke>
      </｜DSML｜function_calls>
    tools:
    - &id001
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo: &d_6_a
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *d_6_a
      sglang: *d_6_a
  TOOLCALLING.batch.6.b:
    description: Invoke with extra newline
    ref: dynamo
    model_text: |-
      <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_time">

      </｜DSML｜invoke>
      </｜DSML｜function_calls>
    tools:
    - *id001
    expected:
      dynamo: &d_6_b
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *d_6_b
      sglang: *d_6_b
  TOOLCALLING.batch.6.c:
    description: Empty-body variant 6.c — not yet authored for this family
    reason: |-
      Empty-body variant 6.c not yet authored for deepseek_v3_2; see 6.a / 6.b for this family's empty / whitespace scenarios.
