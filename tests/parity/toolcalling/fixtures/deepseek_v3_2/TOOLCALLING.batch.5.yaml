        normal_text: |-
          <節쏡SML節쐇nvoke name="get_weather">
          <節쏡SML節쐏arameter name="location" string="true">NYC</節쏡SML節쐏arameter>
          </節쏡SML節쐇nvoke>
          </節쏡SML節쐄unction_calls>
      sglang: *d_5_b
  TOOLCALLING.batch.5.c:
    description: Truncation mid-parameter value
    ref: dynamo
    model_text: |-
      <節쏡SML節쐄unction_calls>
      <節쏡SML節쐇nvoke name="get_weather">
