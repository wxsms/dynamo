family: deepseek_v3_2
mode: batch
cases:
  TOOLCALLING.batch.5.a:
    description: Missing </｜DSML｜function_calls> end marker
    ref: dynamo
    model_text: |-
      <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_5_a
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<｜DSML｜function_calls>

          <｜DSML｜invoke name="get_weather">

          <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>

          </｜DSML｜invoke>'
        reason: "vLLM leaks the tool call tag into normal_text on the recovery path"
      sglang: *d_5_a
  TOOLCALLING.batch.5.b:
    description: Closing </｜DSML｜function_calls> without matching open
    ref: dynamo
    model_text: |-
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜function_calls>
    tools:
    - *id001
    expected:
      dynamo: &d_5_b
        reason: "Dynamo's DSML parser leaves <｜DSML｜…> envelope in normal_text on missing/orphan end marker (impl-defined recovery)"
        calls: []
        normal_text: |-
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
          </｜DSML｜invoke>
          </｜DSML｜function_calls>
      vllm: *d_5_b
      sglang: *d_5_b
  TOOLCALLING.batch.5.c:
    description: Truncation mid-parameter value
    ref: dynamo
    model_text: |-
      <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NY
    tools:
    - *id001
    expected:
      dynamo: &d_5_c
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<｜DSML｜function_calls>

          <｜DSML｜invoke name="get_weather">

          <｜DSML｜parameter name="location" string="true">NY'
        reason: "vLLM leaks the tool call tag into normal_text on the recovery path"
      sglang: *d_5_c
  TOOLCALLING.batch.5.d:
    description: Multi-call, last call missing only end marker (body complete)
    ref: dynamo
    model_text: |-
      I'll start by fetching the weather for both Boston and New York at the same time!
      <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">Boston</｜DSML｜parameter>
      </｜DSML｜invoke>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">New York</｜DSML｜parameter>
      </｜DSML｜invoke>
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: |
          I'll start by fetching the weather for both Boston and New York at the same time!
      vllm:
        reason: vLLM preserves the unterminated DeepSeek V3.2 DSML function_calls block in normal_text on the recovery path.
        calls: []
        normal_text: |-
          I'll start by fetching the weather for both Boston and New York at the same time!
          <｜DSML｜function_calls>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">Boston</｜DSML｜parameter>
          </｜DSML｜invoke>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">New York</｜DSML｜parameter>
          </｜DSML｜invoke>
      sglang:
        reason: SGLang drops the unterminated DeepSeek V3.2 DSML block and trims the trailing newline from preserved narration.
        calls: []
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
  TOOLCALLING.batch.5.e:
    description: Multi-call, last call truncated mid-arg-value
    ref: dynamo
    model_text: |-
      I'll start by fetching the weather for both Boston and New York at the same time!
      <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">Boston</｜DSML｜parameter>
      </｜DSML｜invoke>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">New York
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: |
          I'll start by fetching the weather for both Boston and New York at the same time!
      vllm:
        reason: vLLM preserves the truncated DeepSeek V3.2 DSML function_calls block in normal_text on the recovery path.
        calls: []
        normal_text: |-
          I'll start by fetching the weather for both Boston and New York at the same time!
          <｜DSML｜function_calls>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">Boston</｜DSML｜parameter>
          </｜DSML｜invoke>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">New York
      sglang:
        reason: SGLang drops the truncated DeepSeek V3.2 DSML block and trims the trailing newline from preserved narration.
        calls: []
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
