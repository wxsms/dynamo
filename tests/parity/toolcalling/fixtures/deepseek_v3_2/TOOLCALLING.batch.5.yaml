        normal_text: ''
      vllm:
        calls: []
        normal_text: '<節쏡SML節쐄unction_calls>

          <節쏡SML節쐇nvoke name="get_weather">

          <節쏡SML節쐏arameter name="location" string="true">NY'
        reason: "vLLM leaks the tool call tag into normal_text on the recovery path"
      sglang: *d_5_c
  TOOLCALLING.batch.5.d:
    description: Multi-call, last call missing only end marker (body complete)
    ref: dynamo
    model_text: |-
      I'll start by fetching the weather for both Boston and New York at the same time!
      <節쏡SML節쐄unction_calls>
      <節쏡SML節쐇nvoke name="get_weather">
      <節쏡SML節쐏arameter name="location" string="true">Boston</節쏡SML節쐏arameter>
      </節쏡SML節쐇nvoke>
      <節쏡SML節쐇nvoke name="get_weather">
      <節쏡SML節쐏arameter name="location" string="true">New York</節쏡SML節쐏arameter>
      </節쏡SML節쐇nvoke>
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: |
          I'll start by fetching the weather for both Boston and New York at the same time!
      vllm:
        reason: vLLM preserves the unterminated DeepSeek V3.2 DSML function_calls block in normal_text on the recovery path.
        calls: []
        normal_text: |-
          I'll start by fetching the weather for both Boston and New York at the same time!
          <節쏡SML節쐄unction_calls>
          <節쏡SML節쐇nvoke name="get_weather">
          <節쏡SML節쐏arameter name="location" string="true">Boston</節쏡SML節쐏arameter>
          </節쏡SML節쐇nvoke>
          <節쏡SML節쐇nvoke name="get_weather">
          <節쏡SML節쐏arameter name="location" string="true">New York</節쏡SML節쐏arameter>
          </節쏡SML節쐇nvoke>
      sglang:
        reason: SGLang drops the unterminated DeepSeek V3.2 DSML block and trims the trailing newline from preserved narration.
        calls: []
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
