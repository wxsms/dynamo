family: deepseek_v3_2
mode: batch
cases:
  TOOLCALLING.batch.5.a:
    description: Missing </節쏡SML節쐄unction_calls> end marker
    ref: dynamo
    model_text: |-
      <節쏡SML節쐄unction_calls>
      <節쏡SML節쐇nvoke name="get_weather">
      <節쏡SML節쐏arameter name="location" string="true">NYC</節쏡SML節쐏arameter>
      </節쏡SML節쐇nvoke>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_5_a
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<節쏡SML節쐄unction_calls>

          <節쏡SML節쐇nvoke name="get_weather">

          <節쏡SML節쐏arameter name="location" string="true">NYC</節쏡SML節쐏arameter>

          </節쏡SML節쐇nvoke>'
        reason: "vLLM leaks the tool call tag into normal_text on the recovery path"
      sglang: *d_5_a
  TOOLCALLING.batch.5.b:
    description: Closing </節쏡SML節쐄unction_calls> without matching open
    ref: dynamo
    model_text: |-
      <節쏡SML節쐇nvoke name="get_weather">
      <節쏡SML節쐏arameter name="location" string="true">NYC</節쏡SML節쐏arameter>
      </節쏡SML節쐇nvoke>
      </節쏡SML節쐄unction_calls>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: &d_5_b
        reason: "vLLM and SGLang preserve orphan DSML markers as content when the opening <節쏡SML節쐄unction_calls> wrapper is missing; Dynamo recovers the complete bare <節쏡SML節쐇nvoke> call and strips the orphan marker tail."
