family: deepseek_v3_2
mode: batch
cases:
  TOOLCALLING.batch.8.a:
    description: Narration before tool call only
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_deepseekv32_tool_parser.py#L158
    model_text: |-
      I will check the weather. <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜function_calls>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      vllm: *id001
      sglang:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: I will check the weather.
        reason: drops trailing normal_text after tool-call wrapper end
  TOOLCALLING.batch.8.b:
    description: Narration after tool call only
    ref: dynamo
    model_text: |-
      <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜function_calls> Let me know if you need more.
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: ''
      sglang:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: ''
        reason: drops trailing normal_text after tool-call wrapper end
  TOOLCALLING.batch.8.c:
    description: Narration both before and after (sandwich)
    ref: dynamo
    model_text: |-
      I will check the weather. <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜function_calls> Let me know if you need more.
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: 'I will check the weather. '
      sglang:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: I will check the weather.
        reason: drops trailing normal_text after tool-call wrapper end
  TOOLCALLING.batch.8.d:
    description: Narration between multiple tool calls
    ref: dynamo
    model_text: |-
      I will check the weather. <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜function_calls> Then check LA weather. <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">LA</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜function_calls>
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: 'I will check the weather. '
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            location: LA
          name: get_weather
        normal_text: 'I will check the weather. '
      sglang:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: I will check the weather.
        reason: drops trailing normal_text after tool-call wrapper end
