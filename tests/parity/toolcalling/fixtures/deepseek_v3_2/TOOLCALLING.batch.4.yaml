family: deepseek_v3_2
mode: batch
cases:
  TOOLCALLING.batch.4.a:
    description: Function_calls wrapper with garbage
    ref: dynamo
    model_text: |-
      <｜DSML｜function_calls>
      not a valid invoke
      </｜DSML｜function_calls>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_4_a
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<｜DSML｜function_calls>

          not a valid invoke

          </｜DSML｜function_calls>'
        reason: "vLLM leaks the tool call tag into normal_text on the recovery path"
      sglang: *d_4_a
  # TOOLCALLING.batch.4.b (invalid JSON args) n/a: DSML uses attribute-encoded args, not JSON.
  TOOLCALLING.batch.4.c:
    description: Invoke without name attribute
    ref: dynamo
    model_text: |-
      <｜DSML｜function_calls>
      <｜DSML｜invoke>
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜function_calls>
    tools:
    - *id001
    expected:
      dynamo: &d_4_c
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<｜DSML｜function_calls>

          <｜DSML｜invoke>

          <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>

          </｜DSML｜invoke>

          </｜DSML｜function_calls>'
        reason: "vLLM leaks the tool call tag into normal_text on the recovery path"
      sglang: *d_4_c
  TOOLCALLING.batch.4.d:
    description: Missing </｜DSML｜parameter> end tag
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_deepseekv32_tool_parser.py#L499
    model_text: |-
      <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC
      </｜DSML｜invoke>
      </｜DSML｜function_calls>
    tools:
    - *id001
    expected:
      dynamo: &d_4_d
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
      vllm: *d_4_d
      sglang: *d_4_d
  TOOLCALLING.batch.4.b:
    description: Malformed variant 4.b — not yet authored for this family
    reason: |-
      Malformed-input variant 4.b not yet authored for deepseek_v3_2; see 4.a / 4.c / 4.d for this family's malformed-input scenarios.
  TOOLCALLING.batch.4.e:
    description: Malformed-prefix recovery — n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.e is specific to llama3_json's raw JSON-object scanner: a malformed JSON-looking prefix is followed by a complete JSON object, and the detector may resynchronize on the later object. This family uses a framed parser grammar instead of that raw JSON-prefix scanner; malformed-input coverage for this family lives in TOOLCALLING.batch.4.a through 4.d.
