family: minimax_m2
model_label: MiniMax 2.7
mode: stream
cases:
  TOOLCALLING.stream.1.a:
    description: Complete tool-call payload delivered in one content chunk
    ref: derived from TOOLCALLING.batch.1
    chunks:
    - delta_text: |-
        <minimax:tool_call>
        <invoke name="get_weather">
        <parameter name="location">NYC</parameter>
        </invoke>
        </minimax:tool_call>
    - delta_text: ''
      finish_reason: tool_calls
    tools: &id002
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang: *id001
      vllm: *id001
