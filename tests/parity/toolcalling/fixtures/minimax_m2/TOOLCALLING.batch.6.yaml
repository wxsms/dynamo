family: minimax_m2
mode: batch
cases:
  TOOLCALLING.batch.6.a:
    description: Invoke with no <parameter>
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_time">
      </invoke>
      </minimax:tool_call>
    tools:
    - &id002
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo: &id001
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id001
      sglang: *id001
  TOOLCALLING.batch.6.b:
    description: Invoke with extra newline
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_time">

      </invoke>
      </minimax:tool_call>
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id003
      sglang: *id003
  TOOLCALLING.batch.6.c:
    description: Empty-body variant 6.c — not yet authored for this family
    reason: |-
      Empty-body variant 6.c not yet authored for minimax_m2; see 6.a / 6.b for this family's empty / whitespace scenarios.
