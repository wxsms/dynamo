family: minimax_m2
mode: batch
cases:
  TOOLCALLING.batch.4.a:
    description: Tool_call wrapper with garbage body
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      not a valid invoke
      </minimax:tool_call>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: |-
          <minimax:tool_call>
          not a valid invoke
          </minimax:tool_call>
        reason: impl-defined recovery contract (see TOOLCALLING_CASES.md)
      sglang: *id001
  TOOLCALLING.batch.4.c:
    description: Invoke without name attribute
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke>
      <parameter name="location">NYC</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: |-
          <minimax:tool_call>
          <invoke>
          <parameter name="location">NYC</parameter>
          </invoke>
          </minimax:tool_call>
        reason: impl-defined recovery contract (see TOOLCALLING_CASES.md)
      sglang: *id003
  TOOLCALLING.batch.4.d:
    description: Missing closing </invoke>
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </minimax:tool_call>
    tools:
    - *id002
    expected:
      dynamo:
        calls: []
        normal_text: ''
        reason: |-
          Strict per MiniMax-M2 reference parser
          (https://huggingface.co/MiniMaxAI/MiniMax-M2/blob/main/docs/tool_calling_guide.md):
          the published `<invoke name=(.*?)</invoke>` regex requires both
          fences, so missing `</invoke>` yields no match and no recovered
          call. Wrapper markup is intentionally dropped (not echoed to
          normal_text) so tool-call protocol markers don't leak to
          user-facing content.
      vllm:
        calls: []
        normal_text: |-
          <minimax:tool_call>
          <invoke name="get_weather">
          <parameter name="location">NYC</parameter>
          </minimax:tool_call>
        reason: impl-defined recovery contract (see TOOLCALLING_CASES.md)
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
        reason: |-
          SGLang's MinimaxM2Detector regex
          (`r"<invoke name=\"(.*?)</invoke>|<invoke name=\"(.*)$"`) has an
          `|$` end-of-input alternation that lets a missing `</invoke>`
          still produce a call — contradicts MiniMax-M2 reference parser.
          Should be filed against sgl-project/sglang.
  TOOLCALLING.batch.4.b:
    description: Malformed variant 4.b — not yet authored for this family
    reason: |-
      Malformed-input variant 4.b not yet authored for minimax_m2; see 4.a / 4.c / 4.d for this family's malformed-input scenarios.
  TOOLCALLING.batch.4.e:
    description: Malformed-prefix recovery — n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.e is specific to llama3_json's raw JSON-object scanner: a malformed JSON-looking prefix is followed by a complete JSON object, and the detector may resynchronize on the later object. This family uses a framed parser grammar instead of that raw JSON-prefix scanner; malformed-input coverage for this family lives in TOOLCALLING.batch.4.a through 4.d.
