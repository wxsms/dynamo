family: minimax_m2
mode: batch
cases:
  TOOLCALLING.batch.7.a:
    description: Multiple parameters
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="book_flight">
      <parameter name="destination">Paris</parameter>
      <parameter name="passengers">2</parameter>
      <parameter name="first_class">true</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo: &id001
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            first_class: true
            passengers: 2
        normal_text: ''
      vllm: *id001
      sglang: *id001
  TOOLCALLING.batch.7.b:
    description: Unicode in parameter
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">Tōkyō central</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id002
        calls:
        - name: get_weather
          arguments:
            location: Tōkyō central
        normal_text: ''
      vllm: *id002
      sglang: *id002
  TOOLCALLING.batch.7.c:
    description: Schema-type-mismatch test 7.c — not yet authored for this family
    reason: |-
      Schema-type-mismatch test 7.c not yet authored for minimax_m2; argument-shape coverage is provided by 7.a / 7.b for this family.
  TOOLCALLING.batch.7.d:
    description: Nested-arguments test 7.d — not yet authored for this family
    reason: |-
      Nested-arguments test 7.d not yet authored for minimax_m2; see 7.a / 7.b for simpler argument shapes.
  TOOLCALLING.batch.7.e:
    description: Large / deep JSON-edge payload test 7.e — not yet authored for this family
    reason: Large/deep JSON-edge payload test 7.e not yet authored for minimax_m2; existing batch.7 coverage remains in 7.a-d.
  TOOLCALLING.batch.7.f:
    description: Numeric precision edge preserves integer-like number literal
    ref: inferhub live capture on nvidia/minimaxai/minimax-m2.7; format follows https://huggingface.co/MiniMaxAI/MiniMax-M2/blob/7496e9866209e263d0a1c4dd7dbddcaa186705fe/docs/tool_calling_guide.md
    model_text: |-
      <minimax:tool_call>
      <invoke name="set_limit">
      <parameter name="count">9007199254740993</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - name: set_limit
      parameters:
        type: object
        properties:
          count:
            type: number
    expected:
      dynamo: &d_7_f
        calls:
        - name: set_limit
          arguments:
            count: 9007199254740993
        normal_text: ''
      vllm: &peer_7_f
        reason: Dynamo preserves integer-like number literals before the f64 path; vLLM/SGLang round through f64 and lose precision above 2^53.
        calls:
        - name: set_limit
          arguments:
            count: 9007199254740992
        normal_text: ''
      sglang: *peer_7_f
