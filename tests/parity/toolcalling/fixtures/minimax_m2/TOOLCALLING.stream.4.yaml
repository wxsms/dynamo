family: minimax_m2
model_label: MiniMax 2.7
mode: stream
cases:
  TOOLCALLING.stream.4.a:
    description: Truncated stream terminates after a complete in-flight tool-call body
    ref: derived from TOOLCALLING.batch.5.a
    spec_ref: https://huggingface.co/MiniMaxAI/MiniMax-M2.7/blob/main/docs/tool_calling_guide.md#parsing-tool-calls
    chunks:
    - delta_text: |-
        <minimax:tool_call>
        <invoke name="get_weather">
        <parameter name="location">NYC</parameter>
        </invoke>
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_4_a
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang: *d_4_a
      vllm: *d_4_a
  TOOLCALLING.stream.4.b:
    description: Stream terminates mid-call body before the in-flight argument payload is complete
    ref: derived from TOOLCALLING.batch.5.c
    spec_ref: https://huggingface.co/MiniMaxAI/MiniMax-M2.7/blob/main/docs/tool_calling_guide.md#parsing-tool-calls
    chunks:
    - delta_text: |-
        <minimax:tool_call>
        <invoke name="get_
    - delta_text: |-
        weather">
        <parameter name="location">NY
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_4_b
        reason: |-
          Strict per MiniMax-M2.7's published parser regexes: the outer
          <minimax:tool_call>, inner <invoke>, and <parameter> blocks must all
          be paired. This stream ends mid-parameter, so Dynamo recovers no call
          and drops the buffered protocol block from normal_text.
        calls: []
        normal_text: ''
      sglang:
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
        reason: |-
          SGLang's streaming parser emits an empty-argument MiniMax call from
          a stream that ends before </parameter>, </invoke>, and
          </minimax:tool_call>; that contradicts the strict MiniMax-M2.7
          reference parser.
      vllm: *d_4_b
  TOOLCALLING.stream.4.c:
    description: Stream reaches length after a valid inner tool-call body without the required outer wrapper, followed by
      repeated close markers
    ref: derived from nemotron-ultra-preview-tool-call-leak-repro/repro_tool_call_leak.py
    chunks:
    - delta_text: |-
        <invoke name="get_weather">
        <parameter name="location">NYC</parameter>
        </invoke>
        </invoke>
        </invoke>
    - delta_text: ''
      finish_reason: length
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: &id002
        calls: []
        normal_text: |-
          <invoke name="get_weather">
          <parameter name="location">NYC</parameter>
          </invoke>
          </invoke>
          </invoke>
        reason: vLLM preserves the bare MiniMax invoke and orphan close-marker spam as content; Dynamo recovers the complete inner <invoke> call and drops the orphan marker tail.
      sglang:
        <<: *id002
        reason: SGLang preserves the bare MiniMax invoke and orphan close-marker spam as content; Dynamo recovers the complete inner <invoke> call and drops the orphan marker tail.
