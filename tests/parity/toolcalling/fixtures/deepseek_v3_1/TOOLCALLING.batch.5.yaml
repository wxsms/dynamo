family: deepseek_v3_1
mode: batch
cases:
  TOOLCALLING.batch.5.a:
    description: Missing tool_calls_end (truncation)
    ref: dynamo
    model_text: <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"NYC"}<｜tool▁call▁end｜>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        reason: "Dynamo's deepseek_v3_1 parser leaves <｜tool▁call…｜> deepseek_v3 token, <｜tool▁sep｜> in normal_text on missing/orphan end marker (impl-defined recovery)"
        calls: []
        normal_text: <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"NYC"}<｜tool▁call▁end｜>
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
  TOOLCALLING.batch.5.b:
    description: Closing tool_calls_end without matching tool_calls_begin
    ref: dynamo
    model_text: <｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"NYC"}<｜tool▁call▁end｜><｜tool▁calls▁end｜>
    tools:
    - *id001
    expected:
      dynamo: &id002
        reason: "Dynamo's deepseek_v3_1 parser leaves <｜tool▁call…｜> deepseek_v3 token, <｜tool▁sep｜> in normal_text on missing/orphan end marker (impl-defined recovery)"
        calls: []
        normal_text: <｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"NYC"}<｜tool▁call▁end｜><｜tool▁calls▁end｜>
      vllm: *id002
      sglang: *id002
  TOOLCALLING.batch.5.c:
    description: Truncation mid-arguments JSON
    ref: dynamo
    model_text: <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"loc
    tools:
    - *id001
    expected:
      dynamo:
        reason: "Dynamo's deepseek_v3_1 parser leaves <｜tool▁call…｜> deepseek_v3 token, <｜tool▁sep｜> in normal_text on missing/orphan end marker (impl-defined recovery)"
        calls: []
        normal_text: <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"loc
      vllm:
        calls: []
        normal_text: ''
      sglang:
        calls: []
        normal_text: ''
  TOOLCALLING.batch.5.d:
    description: Multi-call, last call missing only end marker (body complete)
    ref: dynamo
    model_text: I'll start by fetching the weather for both Boston and New York at the same time!<｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"Boston"}<｜tool▁call▁end｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"New
      York"}
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!<｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"Boston"}<｜tool▁call▁end｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"New
          York"}
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
  TOOLCALLING.batch.5.e:
    description: Multi-call, last call truncated mid-arg-value
    ref: dynamo
    model_text: I'll start by fetching the weather for both Boston and New York at the same time!<｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"Boston"}<｜tool▁call▁end｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"New
      York
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!<｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"Boston"}<｜tool▁call▁end｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"New
          York
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
