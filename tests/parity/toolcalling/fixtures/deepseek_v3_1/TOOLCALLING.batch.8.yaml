family: deepseek_v3_1
mode: batch
cases:
  TOOLCALLING.batch.8.a:
    description: Narration before tool call only
    ref: dynamo
    model_text: I will check the weather. <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"NYC"}<｜tool▁call▁end｜><｜tool▁calls▁end｜>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      vllm: *id001
      sglang:
        reason: SGLang trims trailing whitespace from normal_text that precedes DeepSeek V3.1 tool-call blocks.
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: I will check the weather.
  TOOLCALLING.batch.8.b:
    description: Narration after tool call only
    ref: dynamo
    model_text: <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"NYC"}<｜tool▁call▁end｜><｜tool▁calls▁end｜>
      Let me know if you need more.
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id003
      sglang: *id003
  TOOLCALLING.batch.8.c:
    description: Narration both before and after (sandwich)
    ref: dynamo
    model_text: I will check the weather. <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"NYC"}<｜tool▁call▁end｜><｜tool▁calls▁end｜>
      Let me know if you need more.
    tools:
    - *id002
    expected:
      dynamo: &id004
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      vllm: *id004
      sglang:
        reason: SGLang trims trailing whitespace from normal_text that precedes DeepSeek V3.1 tool-call blocks.
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: I will check the weather.
  TOOLCALLING.batch.8.d:
    description: Narration between multiple tool calls
    ref: dynamo
    model_text: I will check the weather. <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"NYC"}<｜tool▁call▁end｜><｜tool▁calls▁end｜>
      Then check LA weather. <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"LA"}<｜tool▁call▁end｜><｜tool▁calls▁end｜>
    tools:
    - *id002
    expected:
      dynamo: &id005
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: 'I will check the weather. '
      vllm: *id005
      sglang:
        reason: SGLang trims trailing whitespace from normal_text that precedes DeepSeek V3.1 tool-call blocks.
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: I will check the weather.
