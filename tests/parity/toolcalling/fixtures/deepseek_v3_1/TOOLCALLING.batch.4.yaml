family: deepseek_v3_1
mode: batch
cases:
  TOOLCALLING.batch.4.a:
    description: Garbage between calls fences (no tool_sep / args)
    ref: dynamo
    model_text: <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú>nonsense<ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        reason: "Dynamo's deepseek_v3_1 parser leaves <ÔĹútool‚ĖĀcall‚Ä¶ÔĹú> deepseek_v3 token in normal_text on malformed input (impl-defined recovery)"
        calls: []
        normal_text: <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú>nonsense<ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
      vllm:
        calls: []
        normal_text: ''
      sglang:
        calls: []
        normal_text: ''
  TOOLCALLING.batch.4.b:
    description: Unterminated JSON string in args
    ref: dynamo
    model_text: <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>get_weather<ÔĹútool‚ĖĀsepÔĹú>{"location":"NYC<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú><ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
    tools:
    - *id001
    expected:
      dynamo: &id002
        reason: "Dynamo's deepseek_v3_1 parser leaves <ÔĹútool‚ĖĀcall‚Ä¶ÔĹú> deepseek_v3 token, <ÔĹútool‚ĖĀsepÔĹú> in normal_text on malformed input (impl-defined recovery)"
        calls: []
        normal_text: <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>get_weather<ÔĹútool‚ĖĀsepÔĹú>{"location":"NYC<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú><ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
      vllm:
        calls:
        - name: get_weather
          arguments: '{"location":"NYC'
        normal_text: ''
      sglang: *id002
  TOOLCALLING.batch.4.c:
    description: Missing function name (no token before tool_sep)
    ref: dynamo
    model_text: <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀsepÔĹú>{"location":"NYC"}<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú><ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
    tools:
    - *id001
    expected:
      dynamo:
        reason: "Dynamo's deepseek_v3_1 parser leaves <ÔĹútool‚ĖĀcall‚Ä¶ÔĹú> deepseek_v3 token, <ÔĹútool‚ĖĀsepÔĹú> in normal_text on malformed input (impl-defined recovery)"
        calls: []
        normal_text: <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀsepÔĹú>{"location":"NYC"}<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú><ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
      vllm:
        calls:
        - name: ''
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        calls: []
        normal_text: ''
  TOOLCALLING.batch.4.d:
    description: Mismatched fences (calls_end without call_end)
    ref: dynamo
    model_text: <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>get_weather<ÔĹútool‚ĖĀsepÔĹú>{"location":"NYC"}<ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
    tools:
    - *id001
    expected:
      dynamo:
        reason: "Dynamo's deepseek_v3_1 parser leaves <ÔĹútool‚ĖĀcall‚Ä¶ÔĹú> deepseek_v3 token, <ÔĹútool‚ĖĀsepÔĹú> in normal_text on malformed input (impl-defined recovery)"
        calls: []
        normal_text: <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>get_weather<ÔĹútool‚ĖĀsepÔĹú>{"location":"NYC"}<ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
      vllm:
        calls: []
        normal_text: ''
      sglang:
        calls: []
        normal_text: ''
  TOOLCALLING.batch.4.e:
    description: Malformed-prefix recovery ‚ÄĒ n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.e is specific to llama3_json's raw JSON-object scanner: a malformed JSON-looking prefix is followed by a complete JSON object, and the detector may resynchronize on the later object. This family uses a framed parser grammar instead of that raw JSON-prefix scanner; malformed-input coverage for this family lives in TOOLCALLING.batch.4.a through 4.d.
  TOOLCALLING.batch.4.f:
    description: Tool-name XML tag case - n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.f is specific to Qwen3-Coder XML syntax, where the model may emit a tool-name tag such as <terminal> inside <tool_call> instead of the required <function=Terminal> opener. This family does not use Qwen3-Coder's <function=...> opener.
