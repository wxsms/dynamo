family: deepseek_v3_1
mode: batch
cases:
  TOOLCALLING.batch.4.a:
    description: Garbage between calls fences (no tool_sep / args)
    ref: dynamo
    model_text: <｜tool▁calls▁begin｜>nonsense<｜tool▁calls▁end｜>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_4_a
        calls: []
        normal_text: ''
      vllm: *d_4_a
      sglang: *d_4_a
  TOOLCALLING.batch.4.b:
    description: Unterminated JSON string in args
    ref: dynamo
    model_text: <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"NYC<｜tool▁call▁end｜><｜tool▁calls▁end｜>
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        reason: vLLM surfaces malformed DeepSeek V3.1 JSON arguments as a raw string while Dynamo treats the whole wrapper as malformed.
        calls:
        - name: get_weather
          arguments: '{"location":"NYC'
        normal_text: ''
      sglang:
        reason: SGLang preserves the malformed DeepSeek V3.1 wrapper as normal_text; Dynamo strips tool-call markup from message content.
        calls: []
        normal_text: <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"NYC<｜tool▁call▁end｜><｜tool▁calls▁end｜>
  TOOLCALLING.batch.4.c:
    description: Missing function name (no token before tool_sep)
    ref: dynamo
    model_text: <｜tool▁calls▁begin｜><｜tool▁call▁begin｜><｜tool▁sep｜>{"location":"NYC"}<｜tool▁call▁end｜><｜tool▁calls▁end｜>
    tools:
    - *id001
    expected:
      dynamo: &d_4_c
        calls: []
        normal_text: ''
      vllm:
        reason: vLLM recovers a call with an empty function name when the arguments are valid; Dynamo treats the missing name as malformed.
        calls:
        - name: ''
          arguments:
            location: NYC
        normal_text: ''
      sglang: *d_4_c
  TOOLCALLING.batch.4.d:
    description: Mismatched fences (calls_end without call_end)
    ref: dynamo
    model_text: <｜tool▁calls▁begin｜><｜tool▁call▁begin｜>get_weather<｜tool▁sep｜>{"location":"NYC"}<｜tool▁calls▁end｜>
    tools:
    - *id001
    expected:
      dynamo: &d_4_d
        calls: []
        normal_text: ''
      vllm: *d_4_d
      sglang: *d_4_d
  TOOLCALLING.batch.4.e:
    description: Malformed-prefix recovery — n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.e is specific to llama3_json's raw JSON-object scanner: a malformed JSON-looking prefix is followed by a complete JSON object, and the detector may resynchronize on the later object. This family uses a framed parser grammar instead of that raw JSON-prefix scanner; malformed-input coverage for this family lives in TOOLCALLING.batch.4.a through 4.d.
  TOOLCALLING.batch.4.f:
    description: Tool-name XML tag case - n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.f is specific to Qwen3-Coder XML syntax, where the model may emit a tool-name tag such as <terminal> inside <tool_call> instead of the required <function=Terminal> opener. This family does not use Qwen3-Coder's <function=...> opener.
