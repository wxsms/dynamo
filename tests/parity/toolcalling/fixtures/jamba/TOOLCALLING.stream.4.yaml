family: jamba
model_label: AI21 Jamba
mode: stream
cases:
  TOOLCALLING.stream.4.a:
    description: Truncated stream terminates after a complete in-flight tool-call body
    ref: derived from TOOLCALLING.batch.5.a
    chunks:
    - delta_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}]'
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='jamba'
      vllm:
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
