family: jamba
mode: batch
cases:
  TOOLCALLING.batch.4.a:
    description: Tool_calls wrapper with garbage
    ref: dynamo
    model_text: <tool_calls>not a json array</tool_calls>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        reason: "Dynamo's jamba parser leaves <tool_calls> envelope in normal_text on malformed input (impl-defined recovery)"
        calls: []
        normal_text: <tool_calls>not a json array</tool_calls>
      vllm: *id001
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.4.b:
    description: Missing close brace in JSON
    ref: dynamo
    model_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"]</tool_calls>'
    tools:
    - *id002
    expected:
      dynamo: &id003
        reason: "Dynamo's jamba parser leaves <tool_calls> envelope in normal_text on malformed input (impl-defined recovery)"
        calls: []
        normal_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"]</tool_calls>'
      vllm: *id003
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.4.c:
    description: Missing name key
    ref: dynamo
    model_text: '<tool_calls>[{"arguments": {"location": "NYC"}}]</tool_calls>'
    tools:
    - *id002
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<tool_calls>[{"arguments": {"location": "NYC"}}]</tool_calls>'
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.4.d:
    description: Missing </tool_calls> close
    ref: dynamo
    model_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}]'
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}]'
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.4.e:
    description: Malformed-prefix recovery — n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.e is specific to llama3_json's raw JSON-object scanner: a malformed JSON-looking prefix is followed by a complete JSON object, and the detector may resynchronize on the later object. This family uses a framed parser grammar instead of that raw JSON-prefix scanner; malformed-input coverage for this family lives in TOOLCALLING.batch.4.a through 4.d.
  TOOLCALLING.batch.4.f:
    description: Tool-name XML tag case - n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.f is specific to Qwen3-Coder XML syntax, where the model may emit a tool-name tag such as <terminal> inside <tool_call> instead of the required <function=Terminal> opener. This family does not use Qwen3-Coder's <function=...> opener.
