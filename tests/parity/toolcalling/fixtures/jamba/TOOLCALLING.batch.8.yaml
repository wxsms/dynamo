family: jamba
mode: batch
cases:
  TOOLCALLING.batch.8.a:
    description: Narration before tool call only
    ref: dynamo
    model_text: 'I will check the weather. <tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}]</tool_calls>'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: I will check the weather.
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.8.b:
    description: Narration after tool call only
    ref: dynamo
    model_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}]</tool_calls> Let me know if you need
      more.'
    tools:
    - *id001
    expected:
      dynamo: &id002
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id002
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.8.c:
    description: Narration both before and after (sandwich)
    ref: dynamo
    model_text: 'I will check the weather. <tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}]</tool_calls>
      Let me know if you need more.'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: I will check the weather.
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.8.d:
    description: Narration between multiple tool calls
    ref: dynamo
    model_text: 'I will check the weather. <tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}]</tool_calls>
      Then check LA weather. <tool_calls>[{"name": "get_weather", "arguments": {"location": "LA"}}]</tool_calls>'
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: I will check the weather.
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      sglang:
        unavailable: SGLang has no detector for family='jamba'
