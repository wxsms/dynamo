family: jamba
mode: batch
cases:
  TOOLCALLING.batch.6.a:
    description: 'Canonical "arguments": {}'
    ref: dynamo
    model_text: '<tool_calls>[{"name": "get_time", "arguments": {}}]</tool_calls>'
    tools:
    - &id002
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo: &id001
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id001
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.6.b:
    description: Whitespace inside arguments {}
    ref: dynamo
    model_text: '<tool_calls>[{"name": "get_time", "arguments": { }}]</tool_calls>'
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id003
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.6.c:
    description: No arguments key
    ref: dynamo
    model_text: '<tool_calls>[{"name": "get_time"}]</tool_calls>'
    tools:
    - *id002
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<tool_calls>[{"name": "get_time"}]</tool_calls>'
      sglang:
        unavailable: SGLang has no detector for family='jamba'
