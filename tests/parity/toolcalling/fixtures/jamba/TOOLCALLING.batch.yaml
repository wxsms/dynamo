  TOOLCALLING.batch.13.c:
    description: Mixed known and unknown calls in one response
    ref: dynamo
    model_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}, {"name": "unknown_tool", "arguments":
      {"location": "LA"}}]</tool_calls>'
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: unknown_tool
          arguments:
            location: LA
        normal_text: ''
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: unknown_tool
          arguments:
            location: LA
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='jamba'
