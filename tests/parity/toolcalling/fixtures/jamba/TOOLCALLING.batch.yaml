family: jamba
model_label: AI21 Jamba
mode: batch
cases:
  TOOLCALLING.batch.1:
    description: Single tool call (happy path)
    model_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}]</tool_calls>'
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id001
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls: []
        normal_text: Hello, how can I help you today?
      vllm: *id003
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.9.a:
    description: Empty model text
    model_text: ''
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.9.b:
    description: Blank / whitespace-only model text
    ref: dynamo
    model_text: '   '
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: '   '
      vllm:
        calls: []
        normal_text: '   '
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.10:
    description: Duplicate calls (same name twice)
    model_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}, {"name": "get_weather", "arguments":
      {"location": "LA"}}]</tool_calls>'
    tools:
    - *id002
    expected:
      dynamo: &id005
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *id005
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.30.a:
    description: JSON-array call separator `,` inside one argument string value
    model_text: '<tool_calls>[{"name": "run_query", "arguments": {"sql": "SELECT a, SELECT b"}}]</tool_calls>'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a, SELECT b
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a, SELECT b
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.30.b:
    description: JSON structural delimiters `}` and `]` inside one argument string value
    ref: dynamo
    model_text: '<tool_calls>[{"name": "run_query", "arguments": {"sql": "SELECT value WHERE note has brace } and bracket ]"}}]</tool_calls>'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.30.c:
    description: XML wrapper marker `<tool_calls>...</tool_calls>` text inside one argument string value
    ref: dynamo
    model_text: '<tool_calls>[{"name": "run_query", "arguments": {"sql": "literal <tool_calls marker>[]</tool_calls marker> stays text"}}]</tool_calls>'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: literal <tool_calls marker>[]</tool_calls marker> stays text
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: literal <tool_calls marker>[]</tool_calls marker> stays text
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.31.a:
    description: Multi-call JSON array with call separator `,` inside the first argument string
    model_text: '<tool_calls>[{"name": "run_query", "arguments": {"sql": "SELECT a, SELECT b"}}, {"name": "get_time", "arguments":
      {"timezone": "EST"}}]</tool_calls>'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a, SELECT b
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a, SELECT b
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.31.b:
    description: Multi-call response with structural delimiters inside one argument string value
    ref: dynamo
    model_text: '<tool_calls>[{"name": "run_query", "arguments": {"sql": "SELECT value WHERE note has brace } and bracket ]"}},
      {"name": "get_time", "arguments": {"timezone": "EST"}}]</tool_calls>'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  TOOLCALLING.batch.13.a:
    description: Unknown-only call under default behavior
    model_text: '<tool_calls>[{"name": "unknown_tool", "arguments": {"location": "NYC"}}]</tool_calls>'
    tools:
    - name: get_weather
      parameters:
