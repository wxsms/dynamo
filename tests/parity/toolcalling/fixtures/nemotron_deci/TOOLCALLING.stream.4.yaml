family: nemotron_deci
model_label: Nemotron (DeciLM)
mode: stream
cases:
  TOOLCALLING.stream.4.a:
    description: Truncated stream terminates after a complete in-flight tool-call body
    ref: derived from TOOLCALLING.batch.5.a
    chunks:
    - delta_text: '<TOOLCALL>[{"name": "get_weather", "arguments": {"location": "NYC"}}]'
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='nemotron_deci'
      vllm:
        unavailable: vLLM has no parser for family='nemotron_deci'
  TOOLCALLING.stream.4.b:
    description: Stream terminates mid-call body before the in-flight argument payload is complete
    ref: derived from TOOLCALLING.batch.5.c
    chunks:
    - delta_text: '<TOOLCALL>[{"name": "get_w'
    - delta_text: 'eather", "arguments": {"loc'
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: '<TOOLCALL>[{"name": "get_weather", "arguments": {"loc'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_deci'
      vllm:
        unavailable: vLLM has no parser for family='nemotron_deci'
  TOOLCALLING.stream.4.c:
    description: Stream reaches length after a valid inner tool-call body without the required outer wrapper, followed by
      repeated close markers
    ref: derived from nemotron-ultra-preview-tool-call-leak-repro/repro_tool_call_leak.py
    chunks:
    - delta_text: '[{"name": "get_weather", "arguments": {"location": "NYC"}}]</TOOLCALL></TOOLCALL></TOOLCALL>'
    - delta_text: ''
      finish_reason: length
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: '[{"name": "get_weather", "arguments": {"location": "NYC"}}]</TOOLCALL></TOOLCALL></TOOLCALL>'
      vllm:
        unavailable: vLLM has no parser for family='nemotron_deci'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_deci'
