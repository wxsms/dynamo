family: nemotron_deci
mode: batch
cases:
  TOOLCALLING.batch.4.a:
    description: TOOLCALL wrapper with garbage
    ref: dynamo
    model_text: <TOOLCALL>not a json array</TOOLCALL>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        reason: "Dynamo's nemotron_deci parser leaves <TOOLCALL> envelope in normal_text on malformed input (impl-defined recovery)"
        calls: []
        normal_text: <TOOLCALL>not a json array</TOOLCALL>
      vllm:
        unavailable: vLLM has no parser for family='nemotron_deci'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_deci'
  TOOLCALLING.batch.4.b:
    description: Unterminated JSON string in args
    ref: dynamo
    model_text: '<TOOLCALL>[{"name": "get_weather", "arguments": {"location": "NYC</TOOLCALL>'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_deci'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_deci'
  TOOLCALLING.batch.4.c:
    description: Missing name key in JSON
    ref: dynamo
    model_text: '<TOOLCALL>[{"arguments": {"location": "NYC"}}]</TOOLCALL>'
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_deci'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_deci'
  TOOLCALLING.batch.4.d:
    description: Mismatched JSON brackets
    ref: dynamo
    model_text: '<TOOLCALL>[{"name": "get_weather", "arguments": {"location": "NYC"}}</TOOLCALL>'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_deci'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_deci'
  TOOLCALLING.batch.4.e:
    description: Malformed-prefix recovery — n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.e is specific to llama3_json's raw JSON-object scanner: a malformed JSON-looking prefix is followed by a complete JSON object, and the detector may resynchronize on the later object. This family uses a framed parser grammar instead of that raw JSON-prefix scanner; malformed-input coverage for this family lives in TOOLCALLING.batch.4.a through 4.d.
