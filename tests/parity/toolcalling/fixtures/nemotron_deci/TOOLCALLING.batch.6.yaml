family: nemotron_deci
mode: batch
cases:
  TOOLCALLING.batch.6.a:
    description: 'Canonical "arguments": {}'
    ref: dynamo
    model_text: '<TOOLCALL>[{"name": "get_time", "arguments": {}}]</TOOLCALL>'
    tools:
    - &id001
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo:
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_deci'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_deci'
  TOOLCALLING.batch.6.b:
    description: Whitespace inside arguments {}
    ref: dynamo
    model_text: '<TOOLCALL>[{"name": "get_time", "arguments": { }}]</TOOLCALL>'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_deci'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_deci'
  TOOLCALLING.batch.6.c:
    description: No arguments key
    ref: dynamo
    model_text: '<TOOLCALL>[{"name": "get_time"}]</TOOLCALL>'
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_deci'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_deci'
