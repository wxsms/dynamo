family: qwen3_coder
mode: batch
cases:
  TOOLCALLING.batch.7.a:
    description: Multiple parameters (existing multi-arg shape)
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L220
    model_text: |-
      <tool_call>
      <function=book_flight>
      <parameter=destination>
      Paris
      </parameter>
      <parameter=passengers>
      2
      </parameter>
      <parameter=first_class>
      true
      </parameter>
      </function>
      </tool_call>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo: &id001
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            first_class: true
            passengers: 2
        normal_text: ''
      vllm: *id001
      sglang: *id001
  TOOLCALLING.batch.7.b:
    description: Unicode in parameter value
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L302
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      Tōkyō central
      </parameter>
      </function>
      </tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id002
        calls:
        - name: get_weather
          arguments:
            location: Tōkyō central
        normal_text: ''
      vllm: *id002
      sglang: *id002
  TOOLCALLING.batch.7.c:
    description: Schema-type-mismatch test 7.c — not yet authored for this family
    reason: |-
      Schema-type-mismatch test 7.c not yet authored for qwen3_coder; argument-shape coverage is provided by 7.a / 7.b for this family.
  TOOLCALLING.batch.7.d:
    description: Nested-arguments test 7.d — not yet authored for this family
    reason: |-
      Nested-arguments test 7.d not yet authored for qwen3_coder; see 7.a / 7.b for simpler argument shapes.
  TOOLCALLING.batch.7.e:
    description: Large / deep JSON-edge payload test 7.e — not yet authored for this family
    reason: Large/deep JSON-edge payload test 7.e not yet authored for qwen3_coder; existing batch.7 coverage remains in 7.a-d.
  TOOLCALLING.batch.7.f:
    description: Numeric precision edge preserves integer-like number literal
    ref: dynamo
    model_text: |-
      <tool_call>
      <function=set_limit>
      <parameter=count>9007199254740993</parameter>
      </function>
      </tool_call>
    tools:
    - name: set_limit
      parameters:
        type: object
        properties:
          count:
            type: number
    expected:
      dynamo: &id003
        calls:
        - name: set_limit
          arguments:
            count: 9007199254740993
        normal_text: ''
      vllm: &id004
        reason: Dynamo preserves integer-like number literals before the f64 path; vLLM/SGLang round through f64 and lose precision above 2^53.
        calls:
        - name: set_limit
          arguments:
            count: 9007199254740992
        normal_text:
      sglang: *id004
