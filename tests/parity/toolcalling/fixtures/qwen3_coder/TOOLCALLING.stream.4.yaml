family: qwen3_coder
model_label: Qwen 3 Coder
mode: stream
cases:
  TOOLCALLING.stream.4.a:
    description: Truncated stream terminates after a complete in-flight tool-call body
    ref: derived from TOOLCALLING.batch.5.a
    chunks:
    - delta_text: |-
        <tool_call>
        <function=get_weather>
        <parameter=location>
        NYC
        </parameter>
        </function>
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang: *id001
      vllm:
        calls: []
        normal_text: ''
        reason: 'Same root cause as TOOLCALLING.stream.1.a: the full body arrives in a single delta, vLLM detects `<tool_call>`
          and returns at qwen3coder_tool_parser.py:412 without reprocessing the rest of the chunk. The final `finish_reason=stop`
          chunk has no `delta_token_ids`, so the EOS-flush branch at qwen3coder_tool_parser.py:348-370 is skipped. No header
          or arguments are ever emitted.'
  TOOLCALLING.stream.4.b:
    description: Stream terminates mid-call body before the in-flight argument payload is complete
    ref: derived from TOOLCALLING.batch.5.c
    chunks:
    - delta_text: |-
        <tool_call>
        <function=get_wea
    - delta_text: |-
        ther>
        <parameter=location>
        NY
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NY
        normal_text: ''
      sglang:
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
        reason: 'Impl-defined recovery for TOOLCALLING.batch.5-class missing end-token (per `tests/parity/README.md` "permanent
          divergences"). The stream ends mid-argument with `NY` but no `</parameter>`; SGLang requires the parameter close-token
          before emitting the value, so it ships the header with empty `arguments` and drops the partial payload. Dynamo emits
          the partial value (`location: "NY"`).'
      vllm:
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
        reason: Impl-defined recovery for TOOLCALLING.batch.5-class missing end-token (per `tests/parity/README.md` "permanent
          divergences"). vLLM's per-parameter extraction loop (qwen3coder_tool_parser.py:540-579) requires either `</parameter>`,
          the next `<parameter=`, or `</function>` to delimit the value; when the stream ends mid-payload none of those are
          present, the loop breaks before emitting a json fragment, and the header ships with empty `arguments`. Matches SGLang.
  TOOLCALLING.stream.4.c:
    description: Stream reaches length after a valid inner tool-call body without the required outer wrapper, followed by
      repeated close markers
    ref: derived from nemotron-ultra-preview-tool-call-leak-repro/repro_tool_call_leak.py
    chunks:
    - delta_text: |-
        <function=get_weather>
        <parameter=location>
        NYC
        </parameter>
        </function>
        </function>
        </function>
    - delta_text: ''
      finish_reason: length
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls: []
        normal_text: |-
          <function=get_weather>
          <parameter=location>
          NYC
          </parameter>
          </function>
          </function>
          </function>
        reason: vLLM's streaming qwen3_coder parser does not enter tool-call mode for this bare <function=...> body because the outer <tool_call> marker is missing, so it preserves the raw function markup in normal_text. Dynamo intentionally uses Qwen3-Coder's no-wrapper backoff and emits the structured call without leaking parser tags.
      sglang:
        calls:
        - arguments: '{"location": "NYC"}}}'
          name: get_weather
        reason: SGLang recovers the bare <function=...> body, but the repeated </function> close markers are folded into the emitted argument string as extra closing braces. Dynamo consumes the repeated close markers as parser syntax and emits arguments {"location":"NYC"} with empty normal_text.
        normal_text: |2+




...
