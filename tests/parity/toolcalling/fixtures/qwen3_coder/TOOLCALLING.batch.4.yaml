family: qwen3_coder
mode: batch
cases:
  TOOLCALLING.batch.4.a:
    description: Tool_call wrapper with no <function> body
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L322
    model_text: |-
      <tool_call>
      random text without function tag
      </tool_call>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_4_a
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: |-
          <tool_call>
          random text without function tag
          </tool_call>
        reason: vLLM preserves a <tool_call> wrapper with no <function=...> body as content; Dynamo/SGLang strip the invalid wrapper.
      sglang: *d_4_a
  TOOLCALLING.batch.4.d:
    description: Missing </parameter> closing tag
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_qwen3coder_tool_parser.py#L729
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </function>
      </tool_call>
    tools:
    - *id001
    expected:
      dynamo: &id002
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id002
      sglang: *id002
  TOOLCALLING.batch.4.b:
    description: Malformed variant 4.b — not yet authored for this family
    reason: |-
      Malformed-input variant 4.b not yet authored for qwen3_coder; see 4.a / 4.c / 4.d for this family's malformed-input scenarios.
  TOOLCALLING.batch.4.c:
    description: Malformed variant 4.c — not yet authored for this family
    reason: |-
      Malformed-input variant 4.c not yet authored for qwen3_coder; see 4.a / 4.b / 4.d for this family's malformed-input scenarios.
  TOOLCALLING.batch.4.e:
    description: Malformed-prefix recovery — n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.e is specific to llama3_json's raw JSON-object scanner: a malformed JSON-looking prefix is followed by a complete JSON object, and the detector may resynchronize on the later object. This family uses a framed parser grammar instead of that raw JSON-prefix scanner; malformed-input coverage for this family lives in TOOLCALLING.batch.4.a through 4.d.
  TOOLCALLING.batch.4.f:
    description: Tool name emitted as an XML tag instead of <function=...>
    ref: Ultra test case - tool name emitted as XML tag instead of <function=...>
    model_text: |-
      <tool_call>
      <terminal>
      echo hello
      </function>
      </tool_call>
    tools:
    - name: Terminal
      parameters:
        type: object
        properties:
          command:
            type: string
    expected:
      dynamo: &d_4_f
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: |-
          <tool_call>
          <terminal>
          echo hello
          </function>
          </tool_call>
        reason: <terminal> is not valid Qwen3-Coder grammar; vLLM preserves the invalid wrapper as content, while Dynamo/SGLang strip it.
      sglang: *d_4_f
