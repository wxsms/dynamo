family: qwen3_coder
mode: batch
cases:
  TOOLCALLING.batch.6.a:
    description: Function block with no <parameter>
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L260
    model_text: |-
      <tool_call>
      <function=get_time>
      </function>
      </tool_call>
    tools:
    - &id002
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo: &id001
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id001
      sglang: *id001
  TOOLCALLING.batch.6.b:
    description: Function block with extra whitespace inside
    ref: dynamo
    model_text: |-
      <tool_call>
      <function=get_time>

      </function>
      </tool_call>
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id003
      sglang: *id003
  TOOLCALLING.batch.6.c:
    description: Empty-body variant 6.c — not yet authored for this family
    reason: |-
      Empty-body variant 6.c not yet authored for qwen3_coder; see 6.a / 6.b for this family's empty / whitespace scenarios.
