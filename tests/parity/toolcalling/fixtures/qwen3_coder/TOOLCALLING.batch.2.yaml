family: qwen3_coder
mode: batch
cases:
  TOOLCALLING.batch.2.a:
    description: Parallel calls (different names)
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L185
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call>
      <tool_call>
      <function=get_time>
      <parameter=timezone>
      EST
      </parameter>
      </function>
      </tool_call>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id003
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *id001
      sglang: *id001
  TOOLCALLING.batch.2.c:
    description: Parallel calls with surrounding narration
    ref: dynamo
    model_text: |-
      Both queries: <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call>
      <tool_call>
      <function=get_time>
      <parameter=timezone>
      EST
      </parameter>
      </function>
      </tool_call> Results above.
    tools:
    - *id002
    - *id003
    expected:
      dynamo: &id004
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: 'Both queries: '
      vllm: *id004
      sglang: *id004
  TOOLCALLING.batch.2.d:
    description: Same-name twice (id distinctness)
    ref: dynamo
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call>
      <tool_call>
      <function=get_weather>
      <parameter=location>
      LA
      </parameter>
      </function>
      </tool_call>
    tools:
    - *id002
    - *id002
    expected:
      dynamo: &id005
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *id005
      sglang: *id005
  TOOLCALLING.batch.2.b:
    description: Two back-to-back fence pairs — not applicable to this family
    reason: |-
      qwen3_coder's multi-call form is exercised by TOOLCALLING.batch.2.a / 2.c / 2.d; no back-to-back fence/wrapper pattern applies to this family's parser syntax.
