family: qwen25
mode: batch
cases:
  TOOLCALLING.batch.2.a:
    description: Parallel calls (back-to-back tool_call wrappers)
    ref: dynamo
    model_text: |-
      <tool_call>
      {"name": "get_weather", "arguments": {"location": "NYC"}}
      </tool_call><tool_call>
      {"name": "get_time", "arguments": {"timezone": "EST"}}
      </tool_call>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id003
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang: *id001
  TOOLCALLING.batch.2.b:
    description: Two back-to-back fence pairs - not applicable to this family
    reason: Multi-call is covered by 2.a/2.c/2.d; no back-to-back fence pattern for this family.
  TOOLCALLING.batch.2.c:
    description: With surrounding narration
    ref: dynamo
    model_text: |-
      Both: <tool_call>
      {"name": "get_weather", "arguments": {"location": "NYC"}}
      </tool_call><tool_call>
      {"name": "get_time", "arguments": {"timezone": "EST"}}
      </tool_call> Done.
    tools:
    - *id002
    - *id003
    expected:
      dynamo: &id004
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: 'Both:'
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang: *id004
  TOOLCALLING.batch.2.d:
    description: Same-name twice
    ref: dynamo
    model_text: |-
      <tool_call>
      {"name": "get_weather", "arguments": {"location": "NYC"}}
      </tool_call><tool_call>
      {"name": "get_weather", "arguments": {"location": "LA"}}
      </tool_call>
    tools:
    - *id002
    - *id002
    expected:
      dynamo: &id005
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang: *id005
