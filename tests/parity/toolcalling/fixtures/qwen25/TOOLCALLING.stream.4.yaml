family: qwen25
model_label: Qwen 2.5
mode: stream
cases:
  TOOLCALLING.stream.4.a:
    description: Truncated stream terminates after a complete in-flight tool-call body
    ref: derived from TOOLCALLING.batch.5.a
    chunks:
    - delta_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}'
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      dynamo:
        calls: []
        normal_text: ''
      sglang:
        reason: 'Incomplete call (open <tool_call>, no close): Dynamo suppresses to empty, SGLang keeps raw. Non-parity by
          design.'
        calls: []
        normal_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}'
  TOOLCALLING.stream.4.b:
    description: Stream terminates mid-call body before the in-flight argument payload is complete
    ref: derived from TOOLCALLING.batch.5.c
    chunks:
    - delta_text: '<tool_call>{"name": "get_w'
    - delta_text: 'eather", "arguments": {"loc'
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      dynamo:
        calls: []
        normal_text: ''
      sglang:
        reason: 'Incomplete call (open <tool_call>, no close): Dynamo suppresses to empty, SGLang keeps raw. Non-parity by
          design.'
        calls: []
        normal_text: '<tool_call>{"name": "get_weather", "arguments": {"loc'
  TOOLCALLING.stream.4.c:
    description: Stream reaches length after a valid inner tool-call body without the required outer wrapper, followed by
      repeated close markers
    ref: derived from nemotron-ultra-preview-tool-call-leak-repro/repro_tool_call_leak.py
    chunks:
    - delta_text: '{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call></tool_call></tool_call>'
    - delta_text: ''
      finish_reason: length
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: '{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call></tool_call></tool_call>'
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang:
        reason: 'Orphan </tool_call> markers with no opener: SGLang strips them, Dynamo keeps them (impl-defined recovery).'
        calls: []
        normal_text: '{"name": "get_weather", "arguments": {"location": "NYC"}}'
