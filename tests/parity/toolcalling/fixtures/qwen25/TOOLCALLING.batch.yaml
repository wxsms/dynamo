family: qwen25
model_label: Qwen 2.5
mode: batch
cases:
  TOOLCALLING.batch.1:
    description: Single tool call (happy path)
    model_text: |-
      <tool_call>
      {"name": "get_weather", "arguments": {"location": "NYC"}}
      </tool_call>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang: *id001
  TOOLCALLING.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls: []
        normal_text: Hello, how can I help you today?
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang: *id003
  TOOLCALLING.batch.9.a:
    description: Empty model text
    model_text: ''
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang:
        calls: []
        normal_text: ''
  TOOLCALLING.batch.9.b:
    description: Blank / whitespace-only model text
    ref: dynamo
    model_text: '   '
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: '   '
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang:
        calls: []
        normal_text: '   '
  TOOLCALLING.batch.10:
    description: Duplicate calls (same name twice)
    model_text: |-
      <tool_call>
      {"name": "get_weather", "arguments": {"location": "NYC"}}
      </tool_call><tool_call>
      {"name": "get_weather", "arguments": {"location": "LA"}}
      </tool_call>
    tools:
    - *id002
    expected:
      dynamo: &id004
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang: *id004
  TOOLCALLING.batch.13:
    description: Unknown tool name absent from supplied tools
    ref: dynamo
    model_text: |-
      <tool_call>
      {"name": "unknown_tool", "arguments": {"location": "NYC"}}
      </tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      dynamo:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        reason: SGLang drops tool calls whose name is absent from the supplied tools; Dynamo forwards the call regardless.
        calls: []
        normal_text: ''
  TOOLCALLING.batch.13.c:
    description: Mixed known and unknown calls not applicable
    reason: 'n/a: no vLLM peer; SGLang treats unknown calls as content.'
  TOOLCALLING.batch.30:
    description: Separator-character case not applicable
    reason: 'n/a: this family wraps each call in <tool_call>, not a delimiter-separated body.'
  TOOLCALLING.batch.31:
    description: Multi-call separator-character case not applicable
    reason: 'n/a: this family wraps each call in <tool_call>, not a delimiter-separated body.'
