family: qwen25
mode: batch
cases:
  TOOLCALLING.batch.7.a:
    description: Standard scalar types
    ref: dynamo
    model_text: |-
      <tool_call>
      {"name": "book_flight", "arguments": {"destination": "Paris", "passengers": 2, "first_class": true}}
      </tool_call>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo: &id001
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            passengers: 2
            first_class: true
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang: *id001
  TOOLCALLING.batch.7.b:
    description: Unicode + escaped chars
    ref: dynamo
    model_text: |-
      <tool_call>
      {"name": "get_weather", "arguments": {"location": "Tōkyō \"central\""}}
      </tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id002
        calls:
        - name: get_weather
          arguments:
            location: Tōkyō "central"
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang: *id002
  TOOLCALLING.batch.7.c:
    description: Schema mismatch - string value where schema declares integer
    ref: dynamo
    model_text: |-
      <tool_call>
      {"name": "set_temperature", "arguments": {"celsius": "20"}}
      </tool_call>
    tools:
    - name: set_temperature
      parameters:
        type: object
        properties:
          celsius:
            type: integer
    expected:
      dynamo: &id003
        calls:
        - name: set_temperature
          arguments:
            celsius: '20'
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang: *id003
  TOOLCALLING.batch.7.d:
    description: Nested object + array
    ref: dynamo
    model_text: |-
      <tool_call>
      {"name": "process_data", "arguments": {"items": [1,2,3], "config": {"nested": true}}}
      </tool_call>
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          items:
            type: array
          config:
            type: object
    expected:
      dynamo: &id004
        calls:
        - name: process_data
          arguments:
            items:
            - 1
            - 2
            - 3
            config:
              nested: true
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang: *id004
  TOOLCALLING.batch.7.e:
    description: Large / deep JSON-edge argument payload
    ref: dynamo
    model_text: |-
      <tool_call>
      {"name": "process_data", "arguments": {"payload": {"regions": [{"name": "west", "scores": [1, 2, 3]}, {"name": "east", "scores": [4, 5, 6]}], "flags": {"enabled": true, "retry": null}, "empty": {}}}}
      </tool_call>
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          payload:
            type: object
    expected:
      dynamo: &id005
        calls:
        - name: process_data
          arguments:
            payload:
              regions:
              - name: west
                scores:
                - 1
                - 2
                - 3
              - name: east
                scores:
                - 4
                - 5
                - 6
              flags:
                enabled: true
                retry: null
              empty: {}
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang: *id005
  TOOLCALLING.batch.7.f:
    description: Numeric precision edge preserves integer-like number literal
    ref: https://qwen.readthedocs.io/en/v2.5/framework/function_call.html
    model_text: |-
      <tool_call>
      {"name": "set_limit", "arguments": {"count": 9007199254740993}}
      </tool_call>
    tools:
    - name: set_limit
      parameters:
        type: object
        properties:
          count:
            type: number
    expected:
      dynamo: &id006
        calls:
        - name: set_limit
          arguments:
            count: 9007199254740993
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='qwen25'
      sglang: *id006
