family: hermes
model_label: Hermes-3 / Llama variants
mode: stream
cases:
  TOOLCALLING.stream.3:
    description: Complete single tool call with a grammar token split across chunk boundaries
    ref: derived from TOOLCALLING.batch.1
    chunks:
    - delta_text: <t
    - delta_text: ool
    - delta_text: _call
    - delta_text: '>{"name": "'
    - delta_text: get_weather", "argu
    - delta_text: me
    - delta_text: nts
    - delta_text: '": {"'
    - delta_text: 'location": '
    - delta_text: '"NYC"}}</tool_call>'
    - delta_text: ''
      finish_reason: tool_calls
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang: *id001
      vllm: *id001
