family: kimi_k2
mode: batch
cases:
  TOOLCALLING.batch.4.a:
    description: Garbage between section fences (no call_begin)
    ref: dynamo
    model_text: <|tool_calls_section_begin|>nonsense<|tool_calls_section_end|>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls: []
        normal_text: ''
      vllm: *id001
      sglang: *id001
  TOOLCALLING.batch.4.b:
    description: Invalid JSON args (missing close brace)
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_kimi_k2_tool_parser.py#L151
    model_text: <|tool_calls_section_begin|><|tool_call_begin|>functions.get_weather:0<|tool_call_argument_begin|>{"location":"NYC"<|tool_call_end|><|tool_calls_section_end|>
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls:
        - name: get_weather
          arguments: '{"location":"NYC"'
        normal_text: ''
      vllm: *id003
      sglang:
        calls: []
        normal_text: ''
        reason: "drops malformed JSON args instead of surfacing raw-string recovery; invalid-JSON recovery is implementation-defined"
  TOOLCALLING.batch.4.c:
    description: Missing function name (call_begin without functions.X:N)
    ref: dynamo
    model_text: <|tool_calls_section_begin|><|tool_call_begin|><|tool_call_argument_begin|>{"location":"NYC"}<|tool_call_end|><|tool_calls_section_end|>
    tools:
    - *id002
    expected:
      dynamo: &id004
        calls: []
        normal_text: ''
      vllm: *id004
      sglang: *id004
  TOOLCALLING.batch.4.d:
    description: Mismatched fences (call_end before call_begin closes)
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_kimi_k2_tool_parser.py#L165
    model_text: <|tool_calls_section_begin|><|tool_call_begin|>functions.get_weather:0<|tool_call_argument_begin|>{"location":"NYC"}<|tool_calls_section_end|>
    tools:
    - *id002
    expected:
      dynamo: &id005
        calls: []
        normal_text: ''
      vllm: *id005
      sglang: *id005
  TOOLCALLING.batch.4.e:
    description: Malformed-prefix recovery — n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.e is specific to llama3_json's raw JSON-object scanner: a malformed JSON-looking prefix is followed by a complete JSON object, and the detector may resynchronize on the later object. This family uses a framed parser grammar instead of that raw JSON-prefix scanner; malformed-input coverage for this family lives in TOOLCALLING.batch.4.a through 4.d.
