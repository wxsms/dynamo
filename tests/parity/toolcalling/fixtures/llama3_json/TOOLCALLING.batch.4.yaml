family: llama3_json
mode: batch
cases:
  TOOLCALLING.batch.4.a:
    description: Python_tag prefix with non-JSON garbage
    ref: dynamo
    model_text: <|python_tag|>not even json
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: <|python_tag|>not even json
        reason: impl-defined recovery contract (see TOOLCALLING_CASES.md)
      sglang:
        calls: []
        normal_text: not even json
        reason: impl-defined recovery contract; strips python_tag before returning malformed action text
  TOOLCALLING.batch.4.b:
    description: Missing close brace
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_llama3_json_tool_parser.py#L66
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"'
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"'
        reason: impl-defined recovery contract (see TOOLCALLING_CASES.md)
      sglang:
        calls: []
        normal_text: '{"name": "get_weather", "arguments": {"location": "NYC"'
        reason: impl-defined recovery contract; strips python_tag before returning malformed action text
  TOOLCALLING.batch.4.c:
    description: Missing name key
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_llama3_json_tool_parser.py#L234
    model_text: '<|python_tag|>{"arguments": {"location": "NYC"}}'
    tools:
    - *id001
    expected:
      dynamo: &id002
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<|python_tag|>{"arguments": {"location": "NYC"}}'
        reason: impl-defined recovery contract (see TOOLCALLING_CASES.md)
      sglang: *id002
  TOOLCALLING.batch.4.e:
    description: Malformed JSON prefix followed by a valid complete call
    ref: SGLang TestLlama32Detector.test_invalid_then_valid_json
    model_text: '{"name": "get_weather", "arguments": {{"name": "get_weather", "arguments": {}}'
    tools:
    - name: get_weather
      parameters:
        type: object
        properties: {}
    expected:
      dynamo: &id003
        calls: []
        normal_text: '{"name": "get_weather", "arguments": {{"name": "get_weather", "arguments": {}}'
      vllm: *id003
      sglang:
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
        reason: SGLang Llama32Detector scans past the malformed prefix and recovers the later valid JSON object.
  TOOLCALLING.batch.4.d:
    description: Malformed variant 4.d — not applicable to this family
    reason: |-
      Malformed-input variant 4.d does not apply to llama3_json's parser syntax (no equivalent end-marker recovery scenario).
  TOOLCALLING.batch.4.f:
    description: Tool-name XML tag case - n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.f is specific to Qwen3-Coder XML syntax, where the model may emit a tool-name tag such as <terminal> inside <tool_call> instead of the required <function=Terminal> opener. This family does not use Qwen3-Coder's <function=...> opener.
