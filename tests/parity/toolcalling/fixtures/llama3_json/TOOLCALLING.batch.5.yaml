family: llama3_json
mode: batch
cases:
  TOOLCALLING.batch.5.a:
    description: No explicit end (truncation)
    ref: dynamo
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}'
      sglang:
        calls: []
        normal_text: '{"name": "get_weather", "arguments": {"location": "NYC"}'
        reason: impl-defined recovery contract; strips python_tag before returning incomplete action text
  TOOLCALLING.batch.5.c:
    description: Truncation deeper inside arguments JSON (vs .a which truncates at the closing brace)
    ref: dynamo
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"loc'
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<|python_tag|>{"name": "get_weather", "arguments": {"loc'
      sglang:
        calls: []
        normal_text: '{"name": "get_weather", "arguments": {"loc'
        reason: impl-defined recovery contract; strips python_tag before returning incomplete action text
  TOOLCALLING.batch.5.d:
    description: Multi-call, last call missing only end marker (body complete)
    ref: dynamo
    model_text: 'I''ll start by fetching the weather for both Boston and New York at the same time!<|python_tag|>{"name":
      "get_weather", "arguments": {"location": "Boston"}};{"name": "get_weather", "arguments": {"location": "New York"}'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: 'I''ll start by fetching the weather for both Boston and New York at the same time!{"name": "get_weather",
          "arguments": {"location": "New York"}'
        reason: impl-defined recovery contract; strips python_tag and preserves malformed trailing JSON after first recovered call
      vllm:
        calls: []
        normal_text: 'I''ll start by fetching the weather for both Boston and New York at the same time!<|python_tag|>{"name":
          "get_weather", "arguments": {"location": "Boston"}};{"name": "get_weather", "arguments": {"location": "New York"}'
  TOOLCALLING.batch.5.e:
    description: Multi-call, last call truncated mid-arg-value
    ref: dynamo
    model_text: 'I''ll start by fetching the weather for both Boston and New York at the same time!<|python_tag|>{"name":
      "get_weather", "arguments": {"location": "Boston"}};{"name": "get_weather", "arguments": {"location": "New York'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: 'I''ll start by fetching the weather for both Boston and New York at the same time!{"name": "get_weather",
          "arguments": {"location": "New York'
        reason: impl-defined recovery contract; strips python_tag and preserves malformed trailing JSON after first recovered call
      vllm:
        calls: []
        normal_text: 'I''ll start by fetching the weather for both Boston and New York at the same time!<|python_tag|>{"name":
          "get_weather", "arguments": {"location": "Boston"}};{"name": "get_weather", "arguments": {"location": "New York'
  TOOLCALLING.batch.5.b:
    description: Orphan closing-marker — n/a for this family's syntax
    reason: |-
      Orphan closing-marker test is n/a — llama3_json's output has no matching delimiter pair to leave unclosed.
