family: llama3_json
model_label: Llama 3 (JSON fmt)
mode: stream
cases:
  TOOLCALLING.stream.4.a:
    description: Truncated stream terminates after a complete in-flight tool-call body
    ref: derived from TOOLCALLING.batch.5.a
    chunks:
    - delta_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}'
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      sglang:
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
      vllm:
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
  TOOLCALLING.stream.4.b:
    description: Stream terminates mid-call body before the in-flight argument payload is complete
    ref: derived from TOOLCALLING.batch.5.c
    chunks:
    - delta_text: '<|python_tag|>{"name": "get_'
    - delta_text: 'weather", "arguments": {"loc'
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      sglang:
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
      vllm:
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
