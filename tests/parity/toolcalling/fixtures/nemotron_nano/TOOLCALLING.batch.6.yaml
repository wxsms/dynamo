family: nemotron_nano
mode: batch
cases:
  TOOLCALLING.batch.6.a:
    description: Function block with no <parameter>
    ref: dynamo
    model_text: |-
      <tool_call>
      <function=get_time>
      </function>
      </tool_call>
    tools:
    - &id001
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo:
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.6.b:
    description: Function block with extra whitespace inside
    ref: dynamo
    model_text: |-
      <tool_call>
      <function=get_time>

      </function>
      </tool_call>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.6.c:
    description: Empty-body variant 6.c — not yet authored for this family
    reason: |-
      Empty-body variant 6.c not yet authored for nemotron_nano; see 6.a / 6.b for this family's empty / whitespace scenarios.
