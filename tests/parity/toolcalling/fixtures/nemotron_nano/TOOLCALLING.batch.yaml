family: nemotron_nano
model_label: Nemotron Nano v3
mode: batch
cases:
  TOOLCALLING.batch.1:
    description: Single tool call (happy path)
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.13.c:
    description: Mixed known and unknown calls not applicable
    reason: |-
      This case is not applicable to nemotron_nano because neither vLLM nor SGLang has a peer parser for this family.
  TOOLCALLING.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: Hello, how can I help you today?
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.9.a:
    description: Empty model text
    model_text: ''
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.9.b:
    description: Blank / whitespace-only model text
    ref: dynamo
    model_text: '   '
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: '   '
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.10:
    description: Duplicate calls (same name twice)
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call>
      <tool_call>
      <function=get_weather>
      <parameter=location>
      LA
      </parameter>
      </function>
      </tool_call>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.30:
    description: Separator-character case not applicable
    reason: |-
      This case is not applicable to nemotron_nano because it is a qwen3_coder-style XML parser with no vLLM/SGLang peer parser.
  TOOLCALLING.batch.31:
    description: Multi-call separator-character case not applicable
    reason: |-
      This case is not applicable to nemotron_nano because it is a qwen3_coder-style XML parser with no vLLM/SGLang peer parser.
  TOOLCALLING.batch.13:
    description: Unknown tool name absent from supplied tools
    ref: dynamo
    model_text: |-
      <tool_call>
      <function=unknown_tool>
      <parameter=location>NYC</parameter>
      </function>
      </tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
