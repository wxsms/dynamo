family: nemotron_nano
mode: batch
cases:
  TOOLCALLING.batch.2.a:
    description: Parallel calls (back-to-back tool_call wrappers)
    ref: dynamo
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call>
      <tool_call>
      <function=get_time>
      <parameter=timezone>
      EST
      </parameter>
      </function>
      </tool_call>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.2.c:
    description: With surrounding narration
    ref: dynamo
    model_text: |-
      Both: <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call>
      <tool_call>
      <function=get_time>
      <parameter=timezone>
      EST
      </parameter>
      </function>
      </tool_call> Done.
    tools:
    - *id001
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: 'Both: '
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.2.d:
    description: Same-name twice
    ref: dynamo
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call>
      <tool_call>
      <function=get_weather>
      <parameter=location>
      LA
      </parameter>
      </function>
      </tool_call>
    tools:
    - *id001
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.2.b:
    description: Two back-to-back fence pairs — not applicable to this family
    reason: |-
      nemotron_nano's multi-call form is exercised by TOOLCALLING.batch.2.a / 2.c / 2.d; no back-to-back fence/wrapper pattern applies to this family's parser syntax.
