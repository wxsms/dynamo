family: nemotron_nano
model_label: Nemotron Nano
mode: stream
cases:
  TOOLCALLING.stream.4.a:
    description: Truncated stream terminates after a complete in-flight tool-call body
    ref: derived from TOOLCALLING.batch.5.a
    chunks:
    - delta_text: |-
        <tool_call>
        <function=get_weather>
        <parameter=location>
        NYC
        </parameter>
        </function>
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
  TOOLCALLING.stream.4.b:
    description: Stream terminates mid-call body before the in-flight argument payload is complete
    ref: derived from TOOLCALLING.batch.5.c
    chunks:
    - delta_text: |-
        <tool_call>
        <function=get_wea
    - delta_text: |-
        ther>
        <parameter=location>
        NY
    - delta_text: ''
