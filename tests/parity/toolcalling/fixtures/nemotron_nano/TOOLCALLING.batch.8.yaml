family: nemotron_nano
mode: batch
cases:
  TOOLCALLING.batch.8.a:
    description: Narration before tool call only
    ref: dynamo
    model_text: |-
      I will check the weather. <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.8.b:
    description: Narration after tool call only
    ref: dynamo
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call> Let me know if you need more.
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.8.c:
    description: Narration both before and after (sandwich)
    ref: dynamo
    model_text: |-
      I will check the weather. <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call> Let me know if you need more.
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.8.d:
    description: Narration between multiple tool calls
    ref: dynamo
    model_text: |-
      I will check the weather. <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call> Then check LA weather. <tool_call>
      <function=get_weather>
      <parameter=location>
      LA
      </parameter>
      </function>
      </tool_call>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: 'I will check the weather. '
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
