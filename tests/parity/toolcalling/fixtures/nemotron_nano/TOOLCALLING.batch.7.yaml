family: nemotron_nano
mode: batch
cases:
  TOOLCALLING.batch.7.a:
    description: Multiple parameters
    ref: dynamo
    model_text: |-
      <tool_call>
      <function=book_flight>
      <parameter=destination>
      Paris
      </parameter>
      <parameter=passengers>
      2
      </parameter>
      <parameter=first_class>
      true
      </parameter>
      </function>
      </tool_call>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo:
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            passengers: 2
            first_class: true
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.7.b:
    description: Unicode in parameter
    ref: dynamo
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      Tōkyō central
      </parameter>
      </function>
      </tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Tōkyō central
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
  TOOLCALLING.batch.7.c:
    description: Schema-type-mismatch test 7.c — not yet authored for this family
    reason: |-
      Schema-type-mismatch test 7.c not yet authored for nemotron_nano; argument-shape coverage is provided by 7.a / 7.b for this family.
  TOOLCALLING.batch.7.d:
    description: Nested-arguments test 7.d — not yet authored for this family
    reason: |-
      Nested-arguments test 7.d not yet authored for nemotron_nano; see 7.a / 7.b for simpler argument shapes.
  TOOLCALLING.batch.7.e:
    description: Large / deep JSON-edge payload test 7.e — not yet authored for this family
    reason: Large/deep JSON-edge payload test 7.e not yet authored for nemotron_nano; existing batch.7 coverage remains in 7.a-d.
  TOOLCALLING.batch.7.f:
    description: Numeric precision edge preserves integer-like number literal
    ref: inferhub live capture on nvidia/nvidia/Nemotron-3-Nano-30B-A3B; format follows https://huggingface.co/Qwen/Qwen3-Coder-480B-A35B-Instruct/blob/main/qwen3coder_tool_parser.py
    model_text: |-
      <tool_call>
      <function=set_limit>
      <parameter=count>
      9007199254740993
      </parameter>
      </function>
      </tool_call>
    tools:
    - name: set_limit
      parameters:
        type: object
        properties:
          count:
            type: number
    expected:
      dynamo: &d_7_f
        calls:
        - name: set_limit
          arguments:
            count: 9007199254740993
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_nano'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_nano'
