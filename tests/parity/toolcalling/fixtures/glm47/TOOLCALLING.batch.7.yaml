family: glm47
mode: batch
cases:
  TOOLCALLING.batch.7.a:
    description: Multiple parameters (existing multi-arg shape)
    ref: dynamo
    model_text: <tool_call>book_flight<arg_key>destination</arg_key><arg_value>Paris</arg_value><arg_key>passengers</arg_key><arg_value>2</arg_value><arg_key>first_class</arg_key><arg_value>true</arg_value></tool_call>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo: &id001
        calls:
        - name: book_flight
          arguments:
            first_class: true
            passengers: 2
            destination: Paris
        normal_text: ''
      vllm: *id001
      sglang: *id001
  TOOLCALLING.batch.7.b:
    description: Unicode in arg value
    ref: dynamo
    model_text: <tool_call>get_weather<arg_key>location</arg_key><arg_value>Tōkyō central</arg_value></tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id002
        calls:
        - name: get_weather
          arguments:
            location: Tōkyō central
        normal_text: ''
      vllm: *id002
      sglang: *id002
  TOOLCALLING.batch.7.c:
    description: Schema-type-mismatch test 7.c — not yet authored for this family
    reason: |-
      Schema-type-mismatch test 7.c not yet authored for glm47; argument-shape coverage is provided by 7.a / 7.b for this family.
  TOOLCALLING.batch.7.d:
    description: Nested-arguments test 7.d — not yet authored for this family
    reason: |-
      Nested-arguments test 7.d not yet authored for glm47; see 7.a / 7.b for simpler argument shapes.
  TOOLCALLING.batch.7.e:
    description: Large / deep JSON-edge payload test 7.e — not yet authored for this family
    reason: Large/deep JSON-edge payload test 7.e not yet authored for glm47; existing batch.7 coverage remains in 7.a-d.
  TOOLCALLING.batch.7.f:
    description: Numeric precision edge preserves integer-like number literal
    ref: inferhub live capture on nvidia/zai-org/glm-5.1; format follows https://huggingface.co/zai-org/GLM-4.7/blob/main/chat_template.jinja
    model_text: <tool_call>set_limit<arg_key>count</arg_key><arg_value>9007199254740993</arg_value></tool_call>
    tools:
    - name: set_limit
      parameters:
        type: object
        properties:
          count:
            type: number
    expected:
      dynamo: &d_7_f
        calls:
        - name: set_limit
          arguments:
            count: 9007199254740993
        normal_text: ''
      vllm: *d_7_f
      sglang: *d_7_f
