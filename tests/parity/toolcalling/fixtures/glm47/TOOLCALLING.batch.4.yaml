family: glm47
mode: batch
cases:
  TOOLCALLING.batch.4.a:
    description: Tool_call wrapper with no function name
    ref: dynamo
    model_text: <tool_call><arg_key>location</arg_key><arg_value>NYC</arg_value></tool_call>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls:
        - name: <arg_key>location</arg_key><arg_value>NYC</arg_value>
          arguments: {}
        normal_text: ''
        reason: vLLM treats the leading <arg_key>...</arg_value> bytes as a function name when no name precedes the first arg_key; Dynamo and SGLang both drop the malformed call
      sglang:
        calls: []
        normal_text: ''
  TOOLCALLING.batch.4.d:
    description: Missing </arg_value> end tag
    ref: dynamo
    model_text: <tool_call>get_weather<arg_key>location</arg_key><arg_value>NYC</tool_call>
    tools:
    - *id001
    expected:
      dynamo: &id002
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
      vllm: *id002
      sglang: *id002
  TOOLCALLING.batch.4.b:
    description: Malformed variant 4.b — not yet authored for this family
    reason: |-
      Malformed-input variant 4.b not yet authored for glm47; see 4.a / 4.c / 4.d for this family's malformed-input scenarios.
  TOOLCALLING.batch.4.c:
    description: Malformed variant 4.c — not yet authored for this family
    reason: |-
      Malformed-input variant 4.c not yet authored for glm47; see 4.a / 4.b / 4.d for this family's malformed-input scenarios.
  TOOLCALLING.batch.4.e:
    description: Malformed-prefix recovery — n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.e is specific to llama3_json's raw JSON-object scanner: a malformed JSON-looking prefix is followed by a complete JSON object, and the detector may resynchronize on the later object. This family uses a framed parser grammar instead of that raw JSON-prefix scanner; malformed-input coverage for this family lives in TOOLCALLING.batch.4.a through 4.d.
  TOOLCALLING.batch.4.f:
    description: Tool-name XML tag case - n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.f is specific to Qwen3-Coder XML syntax, where the model may emit a tool-name tag such as <terminal> inside <tool_call> instead of the required <function=Terminal> opener. This family does not use Qwen3-Coder's <function=...> opener.
