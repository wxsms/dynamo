family: glm47
mode: batch
cases:
  TOOLCALLING.batch.5.a:
    description: Missing </tool_call> end marker
    ref: dynamo
    model_text: <tool_call>get_weather<arg_key>location</arg_key><arg_value>NYC</arg_value>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm: &id001
        calls: []
        normal_text: <tool_call>get_weather<arg_key>location</arg_key><arg_value>NYC</arg_value>
        reason: vLLM and SGLang preserve the truncated <tool_call>... markup as content on missing-end-token recovery; Dynamo drops to keep wire tags out of message.content
      sglang: *id001
  TOOLCALLING.batch.5.b:
    description: Closing </tool_call> without matching <tool_call> open
    ref: dynamo
    model_text: get_weather<arg_key>location</arg_key><arg_value>NYC</arg_value></tool_call>
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: &id003
        reason: "vLLM and SGLang preserve orphan GLM <arg_key>/<arg_value>/</tool_call> markup as content when opening <tool_call> is missing; Dynamo recovers the complete bare call body and strips the orphan close marker."
        calls: []
        normal_text: get_weather<arg_key>location</arg_key><arg_value>NYC</arg_value></tool_call>
      sglang: *id003
  TOOLCALLING.batch.5.c:
    description: Truncation mid-arg_value
    ref: dynamo
    model_text: <tool_call>get_weather<arg_key>location</arg_key><arg_value>N
    tools:
    - *id002
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm: &id004
        calls: []
        normal_text: <tool_call>get_weather<arg_key>location</arg_key><arg_value>N
        reason: vLLM and SGLang preserve the truncated <tool_call>... prefix as content on mid-arg-value truncation; Dynamo drops to keep wire tags out of message.content
      sglang: *id004
  TOOLCALLING.batch.5.d:
    description: Multi-call, last call missing only </tool_call> end marker (body complete)
    ref: dynamo
    model_text: I'll start by fetching the weather for both Boston and New York at the same time!<tool_call>get_weather<arg_key>location</arg_key><arg_value>Boston</arg_value></tool_call><tool_call>get_weather<arg_key>location</arg_key><arg_value>New
      York</arg_value>
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!<tool_call>get_weather<arg_key>location</arg_key><arg_value>New
          York</arg_value>
        reason: SGLang preserves the trailing truncated <tool_call>... block as content; Dynamo and vLLM both drop it
  TOOLCALLING.batch.5.e:
    description: Multi-call, last call truncated mid-arg-value
    ref: dynamo
    model_text: I'll start by fetching the weather for both Boston and New York at the same time!<tool_call>get_weather<arg_key>location</arg_key><arg_value>Boston</arg_value></tool_call><tool_call>get_weather<arg_key>location</arg_key><arg_value>New
      York
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!<tool_call>get_weather<arg_key>location</arg_key><arg_value>New
          York
        reason: SGLang preserves the trailing truncated <tool_call>... block as content; Dynamo and vLLM both drop it
  TOOLCALLING.batch.5.f:
    description: Closing </tool_call> without matching <tool_call> open after prefix prose
    ref: dynamo
    model_text: I will check that. get_weather<arg_key>location</arg_key><arg_value>NYC</arg_value></tool_call>
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check that. '
      vllm: &id005
        reason: "vLLM and SGLang preserve orphan GLM <arg_key>/<arg_value>/</tool_call> markup as content when opening <tool_call> is missing; Dynamo preserves the prefix prose, recovers the complete bare call body, and strips the orphan close marker."
        calls: []
        normal_text: I will check that. get_weather<arg_key>location</arg_key><arg_value>NYC</arg_value></tool_call>
      sglang: *id005
  TOOLCALLING.batch.5.g:
    description: Bare valid call before a complete wrapped call
    ref: dynamo
    model_text: get_weather<arg_key>location</arg_key><arg_value>NYC</arg_value></tool_call><tool_call>get_weather<arg_key>location</arg_key><arg_value>Boston</arg_value></tool_call>
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: Boston
        normal_text: ''
      vllm: &id006
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: get_weather<arg_key>location</arg_key><arg_value>NYC</arg_value></tool_call>
        reason: vLLM and SGLang preserve the bare GLM call before the first <tool_call> as content; Dynamo recovers it as the first structured call before parsing the wrapped call.
      sglang: *id006
