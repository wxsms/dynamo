family: phi4
mode: batch
cases:
  TOOLCALLING.batch.8.a:
    description: Narration before tool call only
    ref: dynamo
    model_text: 'I will check the weather. functools[{"name": "get_weather", "arguments": {"location": "NYC"}}]'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: I will check the weather.
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  TOOLCALLING.batch.8.b:
    description: Narration after tool call only
    ref: dynamo
    model_text: 'functools[{"name": "get_weather", "arguments": {"location": "NYC"}}] Let me know if you need more.'
    tools:
    - *id001
    expected:
      dynamo: &id002
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id002
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  TOOLCALLING.batch.8.c:
    description: Narration both before and after (sandwich)
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L282
    model_text: 'I will check the weather. functools[{"name": "get_weather", "arguments": {"location": "NYC"}}] Let me know
      if you need more.'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: I will check the weather.
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  TOOLCALLING.batch.8.d:
    description: Narration between multiple tool calls
    ref: dynamo
    model_text: 'I will check the weather. functools[{"name": "get_weather", "arguments": {"location": "NYC"}}] Then check
      LA weather. functools[{"name": "get_weather", "arguments": {"location": "LA"}}]'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: I will check the weather.
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='phi4'
