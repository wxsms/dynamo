family: phi4
mode: batch
cases:
  TOOLCALLING.batch.4.a:
    description: functools[ wrapper with garbage
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L322
    model_text: functools[not a json array]
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls: []
        normal_text: ''
      vllm: *id001
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  TOOLCALLING.batch.4.b:
    description: Missing close brace
    ref: dynamo
    model_text: 'functools[{"name": "get_weather", "arguments": {"location": "NYC"]'
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls: []
        normal_text: ''
      vllm: *id003
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  TOOLCALLING.batch.4.c:
    description: Missing name key
    ref: dynamo
    model_text: 'functools[{"arguments": {"location": "NYC"}}]'
    tools:
    - *id002
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: 'functools[{"arguments": {"location": "NYC"}}]'
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  TOOLCALLING.batch.4.d:
    description: Missing closing ]
    ref: dynamo
    model_text: 'functools[{"name": "get_weather", "arguments": {"location": "NYC"}}'
    tools:
    - *id002
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: 'functools[{"name": "get_weather", "arguments": {"location": "NYC"}}'
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  TOOLCALLING.batch.4.e:
    description: Malformed-prefix recovery — n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.e is specific to llama3_json's raw JSON-object scanner: a malformed JSON-looking prefix is followed by a complete JSON object, and the detector may resynchronize on the later object. This family uses a framed parser grammar instead of that raw JSON-prefix scanner; malformed-input coverage for this family lives in TOOLCALLING.batch.4.a through 4.d.
