family: phi4
model_label: Phi-4
mode: stream
cases:
  TOOLCALLING.stream.2:
    description: Multiple tool calls split across multiple content chunks
    ref: derived from TOOLCALLING.batch.2.a
    chunks:
    - delta_text: functools
    - delta_text: '[{"name'
    - delta_text: '": "get_weath'
    - delta_text: 'er", '
    - delta_text: '"arguments": {"lo'
    - delta_text: cat
    - delta_text: 'ion": "NY'
    - delta_text: C"}}, {
    - delta_text: '"name": "get_'
    - delta_text: time"
    - delta_text: ', "arguments": {"'
    - delta_text: tim
    - delta_text: 'ezone": "'
    - delta_text: EST"}}]
    - delta_text: ''
      finish_reason: tool_calls
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='phi4'
      vllm:
        calls: []
        normal_text: ''
