family: phi4
mode: batch
cases:
  TOOLCALLING.batch.6.a:
    description: 'Canonical "arguments": {}'
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L260
    model_text: 'functools[{"name": "get_time", "arguments": {}}]'
    tools:
    - &id002
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo: &id001
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id001
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  TOOLCALLING.batch.6.b:
    description: Whitespace inside arguments {}
    ref: dynamo
    model_text: 'functools[{"name": "get_time", "arguments": { }}]'
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id003
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  TOOLCALLING.batch.6.c:
    description: No arguments key
    ref: dynamo
    model_text: 'functools[{"name": "get_time"}]'
    tools:
    - *id002
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: 'functools[{"name": "get_time"}]'
      sglang:
        unavailable: SGLang has no detector for family='phi4'
