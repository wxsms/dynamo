family: gemma4
mode: batch
cases:
  TOOLCALLING.batch.4.a:
    description: Sentinel pair with garbage
    ref: dynamo
    model_text: <|tool_call>nonsense<tool_call|>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: <|tool_call>nonsense<tool_call|>
        reason: vLLM leaks the tool call tag into normal_text on the recovery path
      sglang:
        calls: []
        normal_text: <|tool_call>nonsense<tool_call|>
        reason: SGLang leaks the tool call tag into normal_text on the recovery path
  TOOLCALLING.batch.4.b:
    description: Missing close brace in body
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_gemma4_tool_parser.py#L572
    model_text: <|tool_call>call:get_weather{location:<|"|>NYC<|"|><tool_call|>
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: <|tool_call>call:get_weather{location:<|"|>NYC<|"|><tool_call|>
        reason: vLLM leaks the tool call tag into normal_text on the recovery path
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
        reason: accepts missing close brace before closing sentinel
  TOOLCALLING.batch.4.c:
    description: No call:name prefix
    ref: dynamo
    model_text: <|tool_call>{location:<|"|>NYC<|"|>}<tool_call|>
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: <|tool_call>{location:<|"|>NYC<|"|>}<tool_call|>
        reason: vLLM leaks the tool call tag into normal_text on the recovery path
      sglang:
        calls: []
        normal_text: <|tool_call>{location:<|"|>NYC<|"|>}<tool_call|>
        reason: SGLang leaks the tool call tag into normal_text on the recovery path
  TOOLCALLING.batch.4.d:
    description: Mismatched sentinels
    ref: dynamo
    model_text: <|tool_call>call:get_weather{location:<|"|>NYC<|"|>}</tool_call>
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: <|tool_call>call:get_weather{location:<|"|>NYC<|"|>}</tool_call>
        reason: vLLM leaks the tool call tag into normal_text on the recovery path
      sglang:
        calls: []
        normal_text: <|tool_call>call:get_weather{location:<|"|>NYC<|"|>}</tool_call>
        reason: SGLang leaks the tool call tag into normal_text on the recovery path
  TOOLCALLING.batch.4.e:
    description: Malformed-prefix recovery — n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.e is specific to llama3_json's raw JSON-object scanner: a malformed JSON-looking prefix is followed by a complete JSON object, and the detector may resynchronize on the later object. This family uses a framed parser grammar instead of that raw JSON-prefix scanner; malformed-input coverage for this family lives in TOOLCALLING.batch.4.a through 4.d.
  TOOLCALLING.batch.4.f:
    description: Tool-name XML tag case - n/a for this family's syntax
    reason: |-
      TOOLCALLING.batch.4.f is specific to Qwen3-Coder XML syntax, where the model may emit a tool-name tag such as <terminal> inside <tool_call> instead of the required <function=Terminal> opener. This family does not use Qwen3-Coder's <function=...> opener.
