family: gemma4
mode: batch
cases:
  TOOLCALLING.batch.6.a:
    description: Canonical empty {} body
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_gemma4_tool_parser.py#L560
    model_text: <|tool_call>call:get_time{}<tool_call|>
    tools:
    - &id002
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo: &id001
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id001
      sglang: *id001
  TOOLCALLING.batch.6.b:
    description: Whitespace inside empty {}
    ref: dynamo
    model_text: <|tool_call>call:get_time{ }<tool_call|>
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id003
      sglang: *id003
  TOOLCALLING.batch.6.c:
    description: No body (just call:name)
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_gemma4_tool_parser.py#L280
    model_text: <|tool_call>call:get_time<tool_call|>
    tools:
    - *id002
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: <|tool_call>call:get_time<tool_call|>
        reason: vLLM leaks the tool call tag into normal_text on the recovery path
      sglang:
        calls: []
        normal_text: <|tool_call>call:get_time<tool_call|>
        reason: SGLang leaks the tool call tag into normal_text on the recovery path
