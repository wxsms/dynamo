family: gemma4
mode: batch
cases:
  TOOLCALLING.batch.5.a:
    description: Missing <tool_call|> end marker
    ref: dynamo
    model_text: <|tool_call>call:get_weather{location:<|"|>NYC<|"|>}
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls: []
        normal_text: <|tool_call>call:get_weather{location:<|"|>NYC<|"|>}
        reason: vLLM leaks the tool call tag into normal_text on the recovery path; Dynamo recovers the complete call body with only the end marker missing.
      sglang:
        calls: []
        normal_text: <|tool_call>call:get_weather{location:<|"|>NYC<|"|>}
        reason: SGLang leaks the tool call tag into normal_text on the recovery path; Dynamo recovers the complete call body with only the end marker missing.
  TOOLCALLING.batch.5.b:
    description: Closing <tool_call|> without matching <|tool_call> open
    ref: dynamo
    model_text: call:get_weather{location:<|"|>NYC<|"|>}<tool_call|>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls: []
        normal_text: call:get_weather{location:<|"|>NYC<|"|>}<tool_call|>
        reason: vLLM leaks the tool call tag into normal_text on the recovery path; Dynamo recovers the complete call body with only the start marker missing.
      sglang:
        calls: []
        normal_text: call:get_weather{location:<|"|>NYC<|"|>}<tool_call|>
        reason: SGLang leaks the tool call tag into normal_text on the recovery path; Dynamo recovers the complete call body with only the start marker missing.
  TOOLCALLING.batch.5.c:
    description: Truncation mid-argument value
    ref: dynamo
    model_text: <|tool_call>call:get_weather{location:<|"|>N
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: <|tool_call>call:get_weather{location:<|"|>N
        reason: vLLM leaks the tool call tag into normal_text on the recovery path
      sglang:
        calls: []
        normal_text: <|tool_call>call:get_weather{location:<|"|>N
        reason: SGLang leaks the tool call tag into normal_text on the recovery path
  TOOLCALLING.batch.5.d:
    description: Multi-call, last call missing only end marker (body complete)
    ref: dynamo
    model_text: I'll start by fetching the weather for both Boston and New York at the same time!<|tool_call>call:get_weather{location:<|"|>Boston<|"|>}<tool_call|><|tool_call>call:get_weather{location:<|"|>New
      York<|"|>}
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        - name: get_weather
          arguments:
            location: New York
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      vllm: &id002
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
        reason: vLLM drops the trailing Gemma call when only the final <tool_call|> marker is missing; Dynamo recovers the complete trailing call body.
      sglang: *id002
  TOOLCALLING.batch.5.e:
    description: Multi-call, last call truncated mid-arg-value
    ref: dynamo
    model_text: I'll start by fetching the weather for both Boston and New York at the same time!<|tool_call>call:get_weather{location:<|"|>Boston<|"|>}<tool_call|><|tool_call>call:get_weather{location:<|"|>New
      York
    tools:
    - *id001
    expected:
      dynamo: &id003
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: I'll start by fetching the weather for both Boston and New York at the same time!
      vllm: *id003
      sglang: *id003
  TOOLCALLING.batch.5.f:
    description: Bare valid call before a complete wrapped call
    ref: dynamo
    model_text: call:get_weather{location:<|"|>NYC<|"|>}<tool_call|><|tool_call>call:get_weather{location:<|"|>Boston<|"|>}<tool_call|>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: Boston
        normal_text: ''
      vllm: &id004
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: call:get_weather{location:<|"|>NYC<|"|>}<tool_call|>
        reason: vLLM and SGLang treat the bare Gemma call before the first <|tool_call> marker as content; Dynamo recovers it as the first structured call before parsing the wrapped call.
      sglang: *id004
  TOOLCALLING.batch.5.g:
    description: Closing <tool_call|> without matching <|tool_call> open after prefix prose
    ref: dynamo
    model_text: 'I will check that. call:get_weather{location:<|"|>NYC<|"|>}<tool_call|>'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: I will check that.
      vllm:
        calls: []
        normal_text: 'I will check that. call:get_weather{location:<|"|>NYC<|"|>}<tool_call|>'
        reason: vLLM leaks the tool call tag into normal_text on the recovery path; Dynamo preserves the prefix prose, recovers the complete call body, and strips the orphan start marker.
      sglang:
        calls: []
        normal_text: 'I will check that. call:get_weather{location:<|"|>NYC<|"|>}<tool_call|>'
        reason: SGLang leaks the tool call tag into normal_text on the recovery path; Dynamo preserves the prefix prose, recovers the complete call body, and strips the orphan start marker.
