family: deepseek_v4
mode: batch
cases:
  TOOLCALLING.batch.8.a:
    description: Narration before tool call only
    ref: dynamo
    model_text: |-
      I will check the weather. <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      vllm: *id001
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.8.b:
    description: Narration after tool call only
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls> Let me know if you need more.
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.8.c:
    description: Narration both before and after (sandwich)
    ref: dynamo
    model_text: |-
      I will check the weather. <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls> Let me know if you need more.
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.8.d:
    description: Narration between multiple tool calls
    ref: dynamo
    model_text: |-
      I will check the weather. <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls> Then check LA weather. <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">LA</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: 'I will check the weather. '
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: 'I will check the weather. '
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
