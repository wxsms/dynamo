# `|2+` simply means a single newline ("\n"); see tests/parity/README.md for the full decode.

family: deepseek_v4
mode: batch
cases:
  TOOLCALLING.batch.2.a:
    description: Two invokes inside one tool_calls wrapper
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      <｜DSML｜invoke name="get_time">
      <｜DSML｜parameter name="timezone" string="true">EST</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id003
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *id001
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.2.b:
    description: Two back-to-back tool_calls wrappers
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_time">
      <｜DSML｜parameter name="timezone" string="true">EST</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - *id002
    - *id003
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
        reason: "vLLM drops the inter-fence newline between back-to-back tool_calls wrappers"
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.2.c:
    description: Parallel with surrounding narration
    ref: dynamo
    model_text: |-
      Both: <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      <｜DSML｜invoke name="get_time">
      <｜DSML｜parameter name="timezone" string="true">EST</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls> Done.
    tools:
    - *id002
    - *id003
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: 'Both: '
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: 'Both: '
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.2.d:
    description: Same-name twice
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">LA</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - *id002
    - *id002
    expected:
      dynamo: &id004
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *id004
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
