family: deepseek_v4
mode: batch
cases:
  TOOLCALLING.batch.6.a:
    description: Invoke with no <parameter>
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_time">
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - &id002
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo: &id001
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id001
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.6.b:
    description: Invoke with extra newline
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_time">

      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *id003
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.6.c:
    description: Empty-body variant 6.c — not yet authored for this family
    reason: |-
      Empty-body variant 6.c not yet authored for deepseek_v4; see 6.a / 6.b for this family's empty / whitespace scenarios.
