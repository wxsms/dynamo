family: deepseek_v4
mode: batch
cases:
  TOOLCALLING.batch.7.a:
    description: Multiple parameters
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="book_flight">
      <｜DSML｜parameter name="destination" string="true">Paris</｜DSML｜parameter>
      <｜DSML｜parameter name="passengers" string="false">2</｜DSML｜parameter>
      <｜DSML｜parameter name="first_class" string="false">true</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo: &id001
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            passengers: 2
            first_class: true
        normal_text: ''
      vllm: *id001
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.7.b:
    description: Unicode in parameter
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">Tōkyō central</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id002
        calls:
        - name: get_weather
          arguments:
            location: Tōkyō central
        normal_text: ''
      vllm: *id002
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.7.c:
    description: Schema-type-mismatch test 7.c — not yet authored for this family
    reason: |-
      Schema-type-mismatch test 7.c not yet authored for deepseek_v4; argument-shape coverage is provided by 7.a / 7.b for this family.
  TOOLCALLING.batch.7.d:
    description: Nested-arguments test 7.d — not yet authored for this family
    reason: |-
      Nested-arguments test 7.d not yet authored for deepseek_v4; see 7.a / 7.b for simpler argument shapes.
  TOOLCALLING.batch.7.e:
    description: Large / deep JSON-edge payload test 7.e — not yet authored for this family
    reason: Large/deep JSON-edge payload test 7.e not yet authored for deepseek_v4; existing batch.7 coverage remains in 7.a-d.
  TOOLCALLING.batch.7.f:
    description: Numeric precision edge preserves integer-like number literal
    ref: inferhub live capture on nvidia/deepseek-ai/deepseek-v4-pro; format follows https://huggingface.co/deepseek-ai/DeepSeek-V3.2/blob/main/encoding/encoding_dsv32.py
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="set_limit">
      <｜DSML｜parameter name="count" string="false">9007199254740993</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - name: set_limit
      parameters:
        type: object
        properties:
          count:
            type: number
    expected:
      dynamo: &d_7_f
        calls:
        - name: set_limit
          arguments:
            count: 9007199254740993
        normal_text: ''
      vllm:
        reason: Dynamo preserves integer-like number literals; vLLM rounds this DSML number parameter through f64 and loses precision above 2^53.
        calls:
        - name: set_limit
          arguments:
            count: 9007199254740992
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
