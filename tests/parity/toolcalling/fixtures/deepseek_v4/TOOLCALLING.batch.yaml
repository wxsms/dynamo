family: deepseek_v4
model_label: DeepSeek V4
mode: batch
cases:
  TOOLCALLING.batch.1:
    description: Single tool call (happy path)
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id001
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.13.c:
    description: Mixed known and unknown calls not applicable
    reason: |-
      This case is not applicable to deepseek_v4 because SGLang has no peer detector for this parser family.
  TOOLCALLING.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls: []
        normal_text: Hello, how can I help you today?
      vllm: *id003
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.9.a:
    description: Empty model text
    model_text: ''
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.9.b:
    description: Blank / whitespace-only model text
    ref: dynamo
    model_text: '   '
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: '   '
      vllm:
        calls: []
        normal_text: '   '
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.10:
    description: Duplicate calls (same name twice)
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">LA</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - *id002
    expected:
      dynamo: &id005
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *id005
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.30:
    description: Separator-character case not applicable
    reason: |-
      This case is not applicable to deepseek_v4 because it uses DSML invoke/parameter tags, not delimiter-separated call bodies.
  TOOLCALLING.batch.31:
    description: Multi-call separator-character case not applicable
    reason: |-
      This case is not applicable to deepseek_v4 because it uses DSML invoke/parameter tags, not delimiter-separated call bodies.
  TOOLCALLING.batch.13:
    description: Unknown tool name absent from supplied tools
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="unknown_tool">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
