family: deepseek_v4
model_label: DeepSeek V4
mode: stream
cases:
  TOOLCALLING.stream.4.a:
    description: Truncated stream terminates after a complete in-flight tool-call body
    ref: derived from TOOLCALLING.batch.5.a
    chunks:
    - delta_text: |-
        <｜DSML｜tool_calls>
        <｜DSML｜invoke name="get_weather">
        <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
        </｜DSML｜invoke>
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_4_a
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
      vllm: *d_4_a
  TOOLCALLING.stream.4.b:
    description: Stream terminates mid-call body before the in-flight argument payload is complete
    ref: derived from TOOLCALLING.batch.5.c
    chunks:
    - delta_text: |-
        <｜DSML｜tool_calls>
        <｜DSML｜invoke name="get_weather"
    - delta_text: |-
        >
        <｜DSML｜parameter name="location" string="true">NY
    - delta_text: ''
      finish_reason: stop
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls: []
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
      vllm: *id001
