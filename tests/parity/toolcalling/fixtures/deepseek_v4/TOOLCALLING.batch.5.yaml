family: deepseek_v4
mode: batch
cases:
  TOOLCALLING.batch.5.a:
    description: Missing </｜DSML｜tool_calls> end marker
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls: []
        normal_text: |-
          <｜DSML｜tool_calls>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
          </｜DSML｜invoke>
        reason: "vLLM leaks the DSML envelope into normal_text on missing end-marker recovery; Dynamo recovers the complete <｜DSML｜invoke> call and strips the unterminated outer tag."
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.5.b:
    description: Closing </｜DSML｜tool_calls> without matching open
    ref: dynamo
    model_text: |-
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        reason: "vLLM leaks the DSML envelope into normal_text on missing/orphan end marker recovery; Dynamo recovers the complete bare <｜DSML｜invoke> call and strips the orphan DSML marker tail."
        calls: []
        normal_text: |-
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
          </｜DSML｜invoke>
          </｜DSML｜tool_calls>
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.5.c:
    description: Truncation mid-parameter value
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NY
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: |-
          <｜DSML｜tool_calls>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">NY
        reason: "vLLM leaks the tool call tag into normal_text on the recovery path"
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.5.d:
    description: Multi-call, last call missing only end marker (body complete)
    ref: dynamo
    model_text: |-
      I'll start by fetching the weather for both Boston and New York at the same time!
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">Boston</｜DSML｜parameter>
      </｜DSML｜invoke>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">New York</｜DSML｜parameter>
      </｜DSML｜invoke>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        - name: get_weather
          arguments:
            location: New York
        normal_text: |
          I'll start by fetching the weather for both Boston and New York at the same time!
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
      vllm:
        calls: []
        normal_text: |-
          I'll start by fetching the weather for both Boston and New York at the same time!
          <｜DSML｜tool_calls>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">Boston</｜DSML｜parameter>
          </｜DSML｜invoke>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">New York</｜DSML｜parameter>
          </｜DSML｜invoke>
        reason: "vLLM leaks the unterminated DSML block into normal_text on the recovery path; Dynamo recovers both complete <｜DSML｜invoke> calls (bodies fully closed) and keeps the prefix prose as normal_text."
  TOOLCALLING.batch.5.e:
    description: Multi-call, last call truncated mid-arg-value
    ref: dynamo
    model_text: |-
      I'll start by fetching the weather for both Boston and New York at the same time!
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">Boston</｜DSML｜parameter>
      </｜DSML｜invoke>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">New York
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: |
          I'll start by fetching the weather for both Boston and New York at the same time!
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
      vllm:
        calls: []
        normal_text: |-
          I'll start by fetching the weather for both Boston and New York at the same time!
          <｜DSML｜tool_calls>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">Boston</｜DSML｜parameter>
          </｜DSML｜invoke>
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">New York
        reason: "vLLM leaks the unterminated DSML block into normal_text on the recovery path; Dynamo recovers only the complete Boston call and drops the New York call whose <｜DSML｜invoke> was never closed, keeping the prefix prose as normal_text."
  TOOLCALLING.batch.5.f:
    description: Bare valid invoke before a complete wrapped call
    ref: dynamo
    model_text: |-
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">Boston</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: Boston
        normal_text: ''
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: Boston
        normal_text: |
          <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
          </｜DSML｜invoke>
          </｜DSML｜tool_calls>
        reason: "vLLM preserves the bare DSML invoke before the first <｜DSML｜tool_calls> as content, including the trailing newline; Dynamo recovers it as the first structured call before parsing the wrapped call."
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  TOOLCALLING.batch.5.g:
    description: Closing </｜DSML｜tool_calls> without matching open after prefix prose
    ref: dynamo
    model_text: |-
      I will check that. <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: I will check that.
      vllm:
        calls: []
        normal_text: |-
          I will check that. <｜DSML｜invoke name="get_weather">
          <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
          </｜DSML｜invoke>
          </｜DSML｜tool_calls>
        reason: "vLLM leaks the DSML envelope into normal_text on orphan close-marker recovery; Dynamo preserves the prefix prose, recovers the complete bare <｜DSML｜invoke> call, and strips the orphan DSML marker tail."
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
