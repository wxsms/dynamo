family: qwen3_coder
model_label: Qwen 3 Coder
mode: stream
cases:
  PARSER.stream.1.a:
    description: Complete tool-call payload delivered in one content chunk
    ref: derived from PARSER.batch.1
    chunks:
    - delta_text: |-
        <tool_call>
        <function=get_weather>
        <parameter=location>
        NYC
        </parameter>
        </function>
        </tool_call>
    - delta_text: ''
      finish_reason: tool_calls
    tools: &id002
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang: *id001
      vllm:
        calls: []
        normal_text: ''
        reason: >-
          vLLM streaming parser exits at qwen3coder_tool_parser.py:412 after
          detecting `<tool_call>` in delta_text and never re-processes the
          remainder of the same chunk; the trailing `finish_reason=tool_calls`
          chunk has no `delta_token_ids`, so the EOS-flush branch
          (qwen3coder_tool_parser.py:348-370) is skipped and no tool call is
          emitted. Dynamo handles the single-chunk burst correctly.
  PARSER.stream.1.b:
    description: Complete tool call split across parser-significant boundaries
    ref: derived from PARSER.batch.1
    chunks:
    - delta_text: |
        <tool_call>
    - delta_text: |
        <function=get_weather>
    - delta_text: |
        <parameter=location>
    - delta_text: |
        NYC
    - delta_text: |
        </parameter>
    - delta_text: |
        </function>
    - delta_text: </tool_call>
    - delta_text: ''
      finish_reason: tool_calls
    tools: *id002
    expected:
      dynamo: &id003
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang: *id003
      vllm: *id003
