family: gemma4
model_label: Gemma 4
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: <|tool_call>call:get_weather{location:<|"|>NYC<|"|>}<tool_call|>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id001
      sglang: *id001
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls: []
        normal_text: Hello, how can I help you today?
      vllm: *id003
      sglang: *id003
  PARSER.batch.9.a:
    description: Empty model text
    model_text: ''
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: ''
      sglang:
        calls: []
        normal_text: ''
  PARSER.batch.9.b:
    description: Blank / whitespace-only model text
    ref: dynamo
    model_text: '   '
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: '   '
      vllm:
        calls: []
        normal_text: '   '
      sglang:
        calls: []
        normal_text: '   '
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: <|tool_call>call:get_weather{location:<|"|>NYC<|"|>}<tool_call|><|tool_call>call:get_weather{location:<|"|>LA<|"|>}<tool_call|>
    tools:
    - *id002
    expected:
      dynamo: &id005
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *id005
      sglang: *id005
  PARSER.batch.30.a:
    description: Call/body delimiters `,`, `:`, and `{}` inside one argument string value
    ref: dynamo
    model_text: <|tool_call>call:run_query{sql:<|"|>SELECT a,b:and{brace}<|"|>}<tool_call|>
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a,b:and{brace}
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a,b:and{brace}
        normal_text: ''
      sglang:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a,b:and{brace}
        normal_text: ''
  PARSER.batch.30.b:
    description: Structural delimiters `}` and `]` inside one argument string value
    ref: dynamo
    model_text: <|tool_call>call:run_query{sql:<|"|>SELECT value WHERE note has brace } and bracket ]<|"|>}<tool_call|>
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        normal_text: ''
      sglang:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        normal_text: ''
  PARSER.batch.30.c:
    description: Tool-call marker `<|tool_call>` text inside one argument string value
    ref: dynamo
    model_text: <|tool_call>call:run_query{sql:<|"|>literal <|tool_call marker> call:get_time{} stays text<|"|>}<tool_call|>
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: literal <|tool_call marker> call:get_time{} stays text
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: literal <|tool_call marker> call:get_time{} stays text
        normal_text: ''
      sglang:
        calls:
        - name: run_query
          arguments:
            sql: literal <|tool_call marker> call:get_time{} stays text
        normal_text: ''
  PARSER.batch.31.a:
    description: Multi-call response with Gemma delimiters `,`, `:`, and `{}` inside the first argument string
    ref: dynamo
    model_text: <|tool_call>call:run_query{sql:<|"|>SELECT a,b:and{brace}<|"|>}<tool_call|><|tool_call>call:get_time{timezone:<|"|>EST<|"|>}<tool_call|>
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a,b:and{brace}
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a,b:and{brace}
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      sglang:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a,b:and{brace}
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
  PARSER.batch.31.b:
    description: Multi-call response with structural delimiters inside one argument string value
    ref: dynamo
    model_text: <|tool_call>call:run_query{sql:<|"|>SELECT value WHERE note has brace } and bracket ]<|"|>}<tool_call|><|tool_call>call:get_time{timezone:<|"|>EST<|"|>}<tool_call|>
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      sglang:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
  PARSER.batch.13.a:
    description: Unknown-only call under default behavior
    ref: originated from https://github.com/sgl-project/sglang/blob/612785ffdcaf35552f1ed433a981d596ca9fe900/test/registered/unit/function_call/test_function_call_parser.py#L4312
    model_text: <|tool_call>call:unknown_tool{location:<|"|>NYC<|"|>}<tool_call|>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
  PARSER.batch.13.c:
    description: Mixed known and unknown calls in one response
    ref: dynamo
    model_text: <|tool_call>call:get_weather{location:<|"|>NYC<|"|>}<tool_call|><|tool_call>call:unknown_tool{location:<|"|>LA<|"|>}<tool_call|>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: unknown_tool
          arguments:
            location: LA
        normal_text: ''
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: unknown_tool
          arguments:
            location: LA
        normal_text: ''
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: unknown_tool
          arguments:
            location: LA
        normal_text: ''
