family: gemma4
mode: batch
cases:
  PARSER.batch.7.a:
    description: Standard scalar types
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_gemma4_tool_parser.py#L236
    model_text: <|tool_call>call:book_flight{destination:<|"|>Paris<|"|>,passengers:2,first_class:true}<tool_call|>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo: &id001
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            passengers: 2
            first_class: true
        normal_text: ''
      vllm: *id001
      sglang: *id001
  PARSER.batch.7.b:
    description: Unicode in value
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_gemma4_tool_parser.py#L630
    model_text: <|tool_call>call:get_weather{location:<|"|>Tōkyō central<|"|>}<tool_call|>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id002
        calls:
        - name: get_weather
          arguments:
            location: Tōkyō central
        normal_text: ''
      vllm: *id002
      sglang: *id002
  PARSER.batch.7.c:
    description: Schema mismatch — string value where schema declares integer
    ref: dynamo
    model_text: <|tool_call>call:set_temperature{celsius:<|"|>20<|"|>}<tool_call|>
    tools:
    - name: set_temperature
      parameters:
        type: object
        properties:
          celsius:
            type: integer
    expected:
      dynamo: &id003
        calls:
        - name: set_temperature
          arguments:
            celsius: '20'
        normal_text: ''
      vllm: *id003
      sglang: *id003
  PARSER.batch.7.d:
    description: Nested object + array (existing)
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_gemma4_tool_parser.py#L179
    model_text: <|tool_call>call:process_data{items:[1,2,3],config:{nested:true}}<tool_call|>
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          items:
            type: array
          config:
            type: object
    expected:
      dynamo: &id004
        calls:
        - name: process_data
          arguments:
            items:
            - 1
            - 2
            - 3
            config:
              nested: true
        normal_text: ''
      vllm: *id004
      sglang: *id004
  PARSER.batch.7.e:
    description: Large / deep JSON-edge argument payload
    ref: dynamo
    model_text: <|tool_call>call:process_data{payload:{regions:[{name:<|"|>west<|"|>,scores:[1,2,3]},{name:<|"|>east<|"|>,scores:[4,5,6]}],flags:{enabled:true,retry:null},empty:{}}}<tool_call|>
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          payload:
            type: object
    expected:
      dynamo:
        calls:
        - name: process_data
          arguments:
            payload:
              regions:
              - name: west
                scores:
                - 1
                - 2
                - 3
              - name: east
                scores:
                - 4
                - 5
                - 6
              flags:
                enabled: true
                retry: null
              empty: {}
        normal_text: ''
      vllm:
        calls:
        - name: process_data
          arguments:
            payload:
              regions:
              - name: west
                scores:
                - 1
                - 2
                - 3
              - name: east
                scores:
                - 4
                - 5
                - 6
              flags:
                enabled: true
                retry: null
              empty: {}
        normal_text: ''
      sglang:
        reason: SGLang keeps the Gemma-style bare null token as the string 'null'; Dynamo and vLLM parse it as JSON null.
        calls:
        - name: process_data
          arguments:
            payload:
              regions:
              - name: west
                scores:
                - 1
                - 2
                - 3
              - name: east
                scores:
                - 4
                - 5
                - 6
              flags:
                enabled: true
                retry: 'null'
              empty: {}
        normal_text: ''
