family: deepseek_v3
mode: batch
cases:
  PARSER.batch.7.a:
    description: Standard scalar types
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L220
    model_text: |-
      <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>function<ÔĹútool‚ĖĀsepÔĹú>book_flight
      ```json
      {"destination": "Paris", "passengers": 2, "first_class": true}
      ```<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú><ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo: &id001
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            passengers: 2
            first_class: true
        normal_text: ''
      vllm: *id001
      sglang: *id001
  PARSER.batch.7.b:
    description: Unicode + escaped chars
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L302
    model_text: |-
      <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>function<ÔĹútool‚ĖĀsepÔĹú>get_weather
      ```json
      {"location": "TŇćkyŇć \"central\""}
      ```<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú><ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id002
        calls:
        - name: get_weather
          arguments:
            location: TŇćkyŇć "central"
        normal_text: ''
      vllm: *id002
      sglang: *id002
  PARSER.batch.7.c:
    description: Schema mismatch ‚ÄĒ string value where schema declares integer
    ref: dynamo
    model_text: |-
      <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>function<ÔĹútool‚ĖĀsepÔĹú>set_temperature
      ```json
      {"celsius": "20"}
      ```<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú><ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
    tools:
    - name: set_temperature
      parameters:
        type: object
        properties:
          celsius:
            type: integer
    expected:
      dynamo: &id003
        calls:
        - name: set_temperature
          arguments:
            celsius: '20'
        normal_text: ''
      vllm: *id003
      sglang: *id003
  PARSER.batch.7.d:
    description: Nested object + array (existing)
    ref: dynamo
    model_text: |-
      <ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>function<ÔĹútool‚ĖĀsepÔĹú>process_data
      ```json
      {"items": [1, 2, 3], "config": {"nested": true}}
      ```<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú><ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          items:
            type: array
          config:
            type: object
    expected:
      dynamo: &id004
        calls:
        - name: process_data
          arguments:
            items:
            - 1
            - 2
            - 3
            config:
              nested: true
        normal_text: ''
      vllm: *id004
      sglang: *id004
  PARSER.batch.7.e:
    description: Large / deep JSON-edge argument payload
    ref: dynamo
    model_text: '<ÔĹútool‚ĖĀcalls‚ĖĀbeginÔĹú><ÔĹútool‚ĖĀcall‚ĖĀbeginÔĹú>function<ÔĹútool‚ĖĀsepÔĹú>process_data

      ```json

      {"payload": {"regions": [{"name": "west", "scores": [1, 2, 3]}, {"name": "east", "scores": [4, 5, 6]}], "flags": {"enabled":
      true, "retry": null}, "empty": {}}}

      ```<ÔĹútool‚ĖĀcall‚ĖĀendÔĹú><ÔĹútool‚ĖĀcalls‚ĖĀendÔĹú>'
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          payload:
            type: object
    expected:
      dynamo:
        calls:
        - name: process_data
          arguments:
            payload:
              regions:
              - name: west
                scores:
                - 1
                - 2
                - 3
              - name: east
                scores:
                - 4
                - 5
                - 6
              flags:
                enabled: true
                retry: null
              empty: {}
        normal_text: ''
      vllm:
        calls:
        - name: process_data
          arguments:
            payload:
              regions:
              - name: west
                scores:
                - 1
                - 2
                - 3
              - name: east
                scores:
                - 4
                - 5
                - 6
              flags:
                enabled: true
                retry: null
              empty: {}
        normal_text: ''
      sglang:
        calls:
        - name: process_data
          arguments:
            payload:
              regions:
              - name: west
                scores:
                - 1
                - 2
                - 3
              - name: east
                scores:
                - 4
                - 5
                - 6
              flags:
                enabled: true
                retry: null
              empty: {}
        normal_text: ''
  PARSER.batch.7.f:
    description: Numeric precision edge test 7.f ‚ÄĒ not yet authored for this family
    reason: Numeric precision edge test 7.f not yet authored for deepseek_v3; Qwen3-Coder coverage is provided by qwen3_coder 7.f.
