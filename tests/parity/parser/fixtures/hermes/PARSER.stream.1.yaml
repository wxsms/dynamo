family: hermes
model_label: Hermes-3 / Llama variants
mode: stream
cases:
  PARSER.stream.1.a:
    description: Complete tool-call payload delivered in one content chunk
    ref: derived from PARSER.batch.1
    chunks:
    - delta_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call>'
    - delta_text: ''
      finish_reason: tool_calls
    tools: &id002
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang: *id001
      vllm: *id001
  PARSER.stream.1.b:
    description: Complete tool call split across parser-significant boundaries
    ref: derived from PARSER.batch.1
    chunks:
    - delta_text: <tool_call>
    - delta_text: '{"name": "get_weather", '
    - delta_text: '"arguments": {"location": "NYC"}}'
    - delta_text: </tool_call>
    - delta_text: ''
      finish_reason: tool_calls
    tools: *id002
    expected:
      dynamo: &id003
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang: *id003
      vllm: *id003
