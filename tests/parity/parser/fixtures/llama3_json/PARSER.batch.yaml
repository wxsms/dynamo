family: llama3_json
model_label: Llama 3 (JSON fmt)
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}}'
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id001
      sglang: *id001
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id002
    expected:
      dynamo: &id004
        calls: []
        normal_text: Hello, how can I help you today?
      vllm: *id004
      sglang: *id004
  PARSER.batch.9.a:
    description: Empty model text
    model_text: ''
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: ''
      sglang:
        calls: []
        normal_text: ''
  PARSER.batch.9.b:
    description: Blank / whitespace-only model text
    ref: dynamo
    model_text: '   '
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: '   '
      vllm:
        calls: []
        normal_text: '   '
      sglang:
        calls: []
        normal_text: '   '
  PARSER.batch.10:
    description: Duplicate calls (same name twice, semicolon-separated)
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}};{"name": "get_weather", "arguments":
      {"location": "LA"}}'
    tools:
    - *id002
    expected:
      dynamo: &id006
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *id006
      sglang: *id006
  PARSER.batch.30.a:
    description: Llama JSON call separator `;` inside one argument string value
    ref: dynamo
    model_text: '<|python_tag|>{"name": "run_query", "arguments": {"sql": "SELECT a; SELECT b"}}'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a; SELECT b
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a; SELECT b
        normal_text: ''
      sglang:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a; SELECT b
        normal_text: ''
  PARSER.batch.30.b:
    description: JSON structural delimiters `}` and `]` inside one argument string value
    ref: dynamo
    model_text: '<|python_tag|>{"name": "run_query", "arguments": {"sql": "SELECT value WHERE note has brace } and bracket ]"}}'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        normal_text: ''
      sglang:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        normal_text: ''
  PARSER.batch.30.c:
    description: Start marker `<|python_tag|>` text inside one argument string value
    ref: dynamo
    model_text: '<|python_tag|>{"name": "run_query", "arguments": {"sql": "literal <|python_tag marker|>{name:x} stays text"}}'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: literal <|python_tag marker|>{name:x} stays text
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: literal <|python_tag marker|>{name:x} stays text
        normal_text: ''
      sglang:
        calls:
        - name: run_query
          arguments:
            sql: literal <|python_tag marker|>{name:x} stays text
        normal_text: ''
  PARSER.batch.31.a:
    description: Multi-call Llama JSON response with call separator `;` inside the first argument string
    ref: dynamo
    model_text: '<|python_tag|>{"name": "run_query", "arguments": {"sql": "SELECT a; SELECT b"}};{"name": "get_time", "arguments":
      {"timezone": "EST"}}'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a; SELECT b
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a; SELECT b
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      sglang:
        calls:
        - name: run_query
          arguments:
            sql: SELECT a; SELECT b
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
  PARSER.batch.31.b:
    description: Multi-call response with structural delimiters inside one argument string value
    ref: dynamo
    model_text: '<|python_tag|>{"name": "run_query", "arguments": {"sql": "SELECT value WHERE note has brace } and bracket ]"}};{"name":
      "get_time", "arguments": {"timezone": "EST"}}'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      sglang:
        calls:
        - name: run_query
          arguments:
            sql: SELECT value WHERE note has brace } and bracket ]
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
  PARSER.batch.13.a:
    description: Unknown-only call under default behavior
    ref: originated from https://github.com/sgl-project/sglang/blob/612785ffdcaf35552f1ed433a981d596ca9fe900/test/registered/unit/function_call/test_unknown_tool_name.py#L29
    model_text: '<|python_tag|>{"name": "unknown_tool", "arguments": {"location": "NYC"}}'
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        calls: []
        normal_text: ''
        reason: SGLang drops unknown tool names by default unless SGLANG_FORWARD_UNKNOWN_TOOLS is enabled.
  PARSER.batch.13.c:
    description: Mixed known and unknown calls in one response
    ref: dynamo
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}};{"name": "unknown_tool", "arguments":
      {"location": "LA"}}'
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: unknown_tool
          arguments:
            location: LA
        normal_text: ''
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: unknown_tool
          arguments:
            location: LA
        normal_text: ''
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
        reason: SGLang drops unknown tool names by default unless SGLANG_FORWARD_UNKNOWN_TOOLS is enabled.
