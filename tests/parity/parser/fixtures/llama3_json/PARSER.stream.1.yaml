family: llama3_json
model_label: Llama 3 (JSON fmt)
mode: stream
cases:
  PARSER.stream.1.a:
    description: Complete tool-call payload delivered in one content chunk
    ref: derived from PARSER.batch.1
    chunks:
    - delta_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}}'
    - delta_text: ''
      finish_reason: tool_calls
    tools: &id002
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang: *id001
      vllm:
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
  PARSER.stream.1.b:
    description: Complete tool call split across parser-significant boundaries
    ref: derived from PARSER.batch.1
    chunks:
    - delta_text: <|python_tag|>
    - delta_text: '{"name": "get_weather", '
    - delta_text: '"arguments": {"location": "NYC"}}'
    - delta_text: ''
      finish_reason: tool_calls
    tools: *id002
    expected:
      dynamo: &id003
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      sglang: *id003
      vllm: *id003
