family: minimax_m2
mode: batch
cases:
  PARSER.batch.7.a:
    description: Multiple parameters
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="book_flight">
      <parameter name="destination">Paris</parameter>
      <parameter name="passengers">2</parameter>
      <parameter name="first_class">true</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo: &id001
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            first_class: true
            passengers: 2
        normal_text: ''
      vllm: *id001
      sglang: *id001
  PARSER.batch.7.b:
    description: Unicode in parameter
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">Tōkyō central</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id002
        calls:
        - name: get_weather
          arguments:
            location: Tōkyō central
        normal_text: ''
      vllm: *id002
      sglang: *id002
  PARSER.batch.7.c:
    description: Schema-type-mismatch test 7.c — not yet authored for this family
    reason: |-
      Schema-type-mismatch test 7.c not yet authored for minimax_m2; argument-shape coverage is provided by 7.a / 7.b for this family.
  PARSER.batch.7.d:
    description: Nested-arguments test 7.d — not yet authored for this family
    reason: |-
      Nested-arguments test 7.d not yet authored for minimax_m2; see 7.a / 7.b for simpler argument shapes.
  PARSER.batch.7.e:
    description: Large / deep JSON-edge payload test 7.e — not yet authored for this family
    reason: Large/deep JSON-edge payload test 7.e not yet authored for minimax_m2; existing batch.7 coverage remains in 7.a-d.
  PARSER.batch.7.f:
    description: Numeric precision edge test 7.f — not yet authored for this family
    reason: Numeric precision edge test 7.f not yet authored for minimax_m2; Qwen3-Coder coverage is provided by qwen3_coder 7.f.
