family: minimax_m2
model_label: MiniMax 2.7
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id001
      sglang: *id001
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls: []
        normal_text: Hello, how can I help you today?
      vllm: *id003
      sglang: *id003
  PARSER.batch.9.a:
    description: Empty model text
    model_text: ''
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: ''
      sglang:
        calls: []
        normal_text: ''
  PARSER.batch.13.c:
    description: Mixed known and unknown calls not applicable
    reason: |-
      This case is not applicable to minimax_m2 because there is no peer mixed known/unknown MiniMax parser case to align against.
  PARSER.batch.9.b:
    description: Blank / whitespace-only model text
    ref: dynamo
    model_text: '   '
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: '   '
      vllm:
        calls: []
        normal_text: '   '
      sglang:
        calls: []
        normal_text: '   '
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      <invoke name="get_weather">
      <parameter name="location">LA</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - *id002
    expected:
      dynamo: &id005
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *id005
      sglang: *id005
  PARSER.batch.30:
    description: Separator-character case not applicable
    reason: |-
      This case is not applicable to minimax_m2 because it uses XML-style tool_name/tool_args tags, not delimiter-separated call bodies.
  PARSER.batch.31:
    description: Multi-call separator-character case not applicable
    reason: |-
      This case is not applicable to minimax_m2 because it uses XML-style tool_name/tool_args tags, not delimiter-separated call bodies.
  PARSER.batch.13:
    description: Unknown tool name absent from supplied tools
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <minimax:tool_name>unknown_tool</minimax:tool_name>
      <minimax:tool_args>{"location":"NYC"}</minimax:tool_args>
      </minimax:tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: |-
          <minimax:tool_call>
          <minimax:tool_name>unknown_tool</minimax:tool_name>
          <minimax:tool_args>{"location":"NYC"}</minimax:tool_args>
          </minimax:tool_call>
        reason: vLLM leaves the unknown MiniMax tool-call block in normal_text, while Dynamo drops it after tool-name validation.
      sglang:
        calls: []
        normal_text: ''
