family: harmony
mode: batch
cases:
  PARSER.batch.7.a:
    description: Standard scalar types
    ref: "OpenAI Harmony receiving tool calls example starts completion at '<|channel|>': https://developers.openai.com/cookbook/articles/openai-harmony#receiving-tool-calls"
    model_text: <|channel|>commentary to=functions.book_flight <|constrain|>json<|message|>{"destination":"Paris","passengers":2,"first_class":true}<|call|>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo:
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            passengers: 2
            first_class: true
        normal_text: ''
      vllm:
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            passengers: 2
            first_class: true
        normal_text: ''
      sglang:
        calls: []
        normal_text: <|channel|>commentary to=functions.book_flight <|constrain|>json<|message|>{"destination":"Paris","passengers":2,"first_class":true}<|call|>
        reason: "Dynamo/vLLM are more spec-correct for completion-body parsing: the first assistant message may start at '<|channel|>'; SGLang requires a redundant '<|start|>assistant' prefix and leaks raw markup"
  PARSER.batch.7.b:
    description: Unicode + escaped chars
    ref: "OpenAI Harmony receiving tool calls example starts completion at '<|channel|>': https://developers.openai.com/cookbook/articles/openai-harmony#receiving-tool-calls"
    model_text: <|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"Tōkyō \"central\""}<|call|>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Tōkyō "central"
        normal_text: ''
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: Tōkyō "central"
        normal_text: ''
      sglang:
        calls: []
        normal_text: <|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"Tōkyō \"central\""}<|call|>
        reason: "Dynamo/vLLM are more spec-correct for completion-body parsing: the first assistant message may start at '<|channel|>'; SGLang requires a redundant '<|start|>assistant' prefix and leaks raw markup"
  PARSER.batch.7.c:
    description: Schema mismatch — string value where schema declares integer
    ref: "OpenAI Harmony receiving tool calls example starts completion at '<|channel|>': https://developers.openai.com/cookbook/articles/openai-harmony#receiving-tool-calls"
    model_text: <|channel|>commentary to=functions.set_temperature <|constrain|>json<|message|>{"celsius":"20"}<|call|>
    tools:
    - name: set_temperature
      parameters:
        type: object
        properties:
          celsius:
            type: integer
    expected:
      dynamo:
        calls:
        - name: set_temperature
          arguments:
            celsius: '20'
        normal_text: ''
      vllm:
        calls:
        - name: set_temperature
          arguments:
            celsius: '20'
        normal_text: ''
      sglang:
        calls: []
        normal_text: <|channel|>commentary to=functions.set_temperature <|constrain|>json<|message|>{"celsius":"20"}<|call|>
        reason: "Dynamo/vLLM are more spec-correct for completion-body parsing: the first assistant message may start at '<|channel|>'; SGLang requires a redundant '<|start|>assistant' prefix and leaks raw markup"
  PARSER.batch.7.d:
    description: Nested object + array
    ref: "OpenAI Harmony receiving tool calls example starts completion at '<|channel|>': https://developers.openai.com/cookbook/articles/openai-harmony#receiving-tool-calls"
    model_text: <|channel|>commentary to=functions.process_data <|constrain|>json<|message|>{"items":[1,2,3],"config":{"nested":true}}<|call|>
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          items:
            type: array
          config:
            type: object
    expected:
      dynamo:
        calls:
        - name: process_data
          arguments:
            items:
            - 1
            - 2
            - 3
            config:
              nested: true
        normal_text: ''
      vllm:
        calls:
        - name: process_data
          arguments:
            items:
            - 1
            - 2
            - 3
            config:
              nested: true
        normal_text: ''
      sglang:
        calls: []
        normal_text: <|channel|>commentary to=functions.process_data <|constrain|>json<|message|>{"items":[1,2,3],"config":{"nested":true}}<|call|>
        reason: "Dynamo/vLLM are more spec-correct for completion-body parsing: the first assistant message may start at '<|channel|>'; SGLang requires a redundant '<|start|>assistant' prefix and leaks raw markup"
  PARSER.batch.7.e:
    description: Large / deep JSON-edge argument payload
    ref: dynamo
    model_text: <|channel|>commentary to=functions.process_data <|constrain|>json<|message|>{"payload":{"regions":[{"name":"west","scores":[1,2,3]},{"name":"east","scores":[4,5,6]}],"flags":{"enabled":true,"retry":null},"empty":{}}}<|call|>
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          payload:
            type: object
    expected:
      dynamo:
        calls:
        - name: process_data
          arguments:
            payload:
              regions:
              - name: west
                scores:
                - 1
                - 2
                - 3
              - name: east
                scores:
                - 4
                - 5
                - 6
              flags:
                enabled: true
                retry: null
              empty: {}
        normal_text: ''
      vllm:
        calls:
        - name: process_data
          arguments:
            payload:
              regions:
              - name: west
                scores:
                - 1
                - 2
                - 3
              - name: east
                scores:
                - 4
                - 5
                - 6
              flags:
                enabled: true
                retry: null
              empty: {}
        normal_text: ''
      sglang:
        calls: []
        normal_text: <|channel|>commentary to=functions.process_data <|constrain|>json<|message|>{"payload":{"regions":[{"name":"west","scores":[1,2,3]},{"name":"east","scores":[4,5,6]}],"flags":{"enabled":true,"retry":null},"empty":{}}}<|call|>
        reason: "Dynamo/vLLM are more spec-correct for completion-body parsing: the first assistant message may start at '<|channel|>'; SGLang requires a redundant '<|start|>assistant' prefix and leaks raw markup"
  PARSER.batch.7.f:
    description: Numeric precision edge test 7.f — not yet authored for this family
    reason: Numeric precision edge test 7.f not yet authored for harmony; Qwen3-Coder coverage is provided by qwen3_coder 7.f.
