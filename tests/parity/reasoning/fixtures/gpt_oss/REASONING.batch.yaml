family: gpt_oss
model_label: gpt-oss
mode: batch
refs:
  upstream: &upstream_ref 'inspired by vLLM GPT-OSS reasoning tests: https://github.com/vllm-project/vllm/blob/39910f2b25aacc09f5e7f166cdf0030b19f8b9e8/tests/reasoning/test_gptoss_reasoning_parser.py; local taxonomy: lib/parsers/REASONING_CASES.md'
cases:
  REASONING.batch.1.b:
    description: Plain text without Harmony channel markers
    ref: *upstream_ref
    model_text: plain answer
    expected:
      dynamo: &id001
        reasoning_text: ''
        normal_text: ''
      vllm:
        reasoning_text: ''
        normal_text: ''
      sglang: *id001
  REASONING.batch.2.a:
    description: Harmony analysis channel followed by final channel
    ref: *upstream_ref
    model_text: <|channel|>analysis<|message|>thinking<|end|><|start|>assistant<|channel|>final<|message|>answer
    expected:
      dynamo: &d_1
        reasoning_text: thinking
        normal_text: answer
      vllm: *d_1
      sglang: *d_1
  REASONING.batch.3.a:
    description: Harmony analysis followed by commentary tool-call channel
    ref: *upstream_ref
    model_text: <|channel|>analysis<|message|>choose tool<|end|><|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"city":"SF"}<|call|>
    expected:
      dynamo: &d_2
        reasoning_text: choose tool
        normal_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"city":"SF"}<|call|>
        reason: Unlike vLLM batch reasoning, Dynamo parses reasoning before tool calling. For GPT-OSS/Harmony, directed commentary is tool-call text, so Dynamo passes it in normal_text for the Harmony tool parser to emit structured tool_calls and remove the markup from final content.
      vllm:
        reasoning_text: choose tool
        normal_text: ''
        reason: vLLM batch reasoning suppresses directed Harmony commentary at the reasoning layer; Dynamo keeps it because normal_text is the handoff to the Harmony tool parser.
      sglang:
        reasoning_text: choose tool
        normal_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"city":"SF"}<|call|>
  REASONING.batch.3.c:
    description: Recipientless Harmony commentary is visible normal text
    ref: *upstream_ref
    model_text: <|channel|>commentary<|message|>I will check that.<|end|><|start|>assistant<|channel|>final<|message|>Done.
    expected:
      dynamo: &d_10
        reasoning_text: ''
        normal_text: |-
          I will check that.
          Done.
      vllm: *d_10
      sglang:
        reasoning_text: ''
        normal_text: I will check that.Done.
        reason: SGLang drops the Harmony block boundary between recipientless commentary and final content, so two visible text blocks concatenate without the separator Dynamo/vLLM insert.
  REASONING.batch.3.d:
    description: Directed Harmony commentary tool call is not visible normal text
    ref: *upstream_ref
    model_text: <|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"city":"SF"}<|call|>
    expected:
      dynamo: &d_11
        reasoning_text: ''
        normal_text: <|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"city":"SF"}<|call|>
        reason: Unlike vLLM batch reasoning, Dynamo parses reasoning before tool calling. For GPT-OSS/Harmony, directed commentary is tool-call text, so Dynamo passes it in normal_text for the Harmony tool parser to emit structured tool_calls and remove the markup from final content.
      vllm:
        reasoning_text: ''
        normal_text: ''
        reason: vLLM batch reasoning suppresses directed Harmony commentary at the reasoning layer; Dynamo keeps it because normal_text is the handoff to the Harmony tool parser.
      sglang:
        reasoning_text: ''
        normal_text: <|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"city":"SF"}<|call|>
  REASONING.batch.3.e:
    description: Directed Harmony analysis tool call stays in reasoning text
    ref: *upstream_ref
    model_text: <|channel|>analysis to=functions.search <|constrain|>json<|message|>{"q":"x"}<|call|>
    expected:
      dynamo: &d_12
        reasoning_text: '{"q":"x"}'
        normal_text: ''
        reason: Unlike SGLang, Dynamo only passes GPT-OSS/Harmony function calls from commentary to=functions.* to the tool-call parser. This analysis to=functions.search block is reasoning-channel text, so Dynamo keeps its payload in reasoning_text.
      vllm: *d_12
      sglang:
        reasoning_text: ''
        normal_text: <|channel|>analysis to=functions.search <|constrain|>json<|message|>{"q":"x"}<|call|>
        reason: SGLang classifies a directed Harmony analysis channel ending in <|call|> as a tool_call handoff and emits the raw envelope in normal_text; Dynamo/vLLM keep analysis-channel payload hidden in reasoning_text for this parser-level contract.
  REASONING.batch.3.f:
    description: Harmony analysis, directed commentary tool call, then final answer
    ref: *upstream_ref
    model_text: <|channel|>analysis<|message|>think<|end|><|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"city":"SF"}<|call|><|start|>assistant<|channel|>final<|message|>It is sunny.
    expected:
      dynamo: &d_13
        reasoning_text: think
        normal_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"city":"SF"}<|call|><|start|>assistant<|channel|>final<|message|>It is sunny.
        reason: Unlike vLLM batch reasoning, Dynamo parses reasoning before tool calling. For GPT-OSS/Harmony, directed commentary is tool-call text, so Dynamo passes it in normal_text for the Harmony tool parser to emit structured tool_calls, recover final text, and remove tool-call markup from final content.
      vllm:
        reasoning_text: think
        normal_text: It is sunny.
        reason: vLLM batch reasoning suppresses directed Harmony commentary at the reasoning layer; Dynamo keeps it because normal_text is the handoff to the Harmony tool parser.
      sglang:
        reasoning_text: think
        normal_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"city":"SF"}<|call|>It is sunny.
        reason: SGLang preserves directed Harmony commentary for downstream parsing but strips the final-channel envelope before returning normal_text; Dynamo keeps the final Harmony envelope too so the downstream Harmony tool parser can recover final text after extracting the call.
  REASONING.batch.2.c:
    description: Harmony analysis followed by normal final answer text
    ref: *upstream_ref
    model_text: <|channel|>analysis<|message|>compute<|end|><|start|>assistant<|channel|>final<|message|>answer
    expected:
      dynamo: &d_3
        reasoning_text: compute
        normal_text: answer
      vllm: *d_3
      sglang: *d_3
  REASONING.batch.4:
    description: Final channel without prior analysis channel
    ref: *upstream_ref
    model_text: <|channel|>final<|message|>answer
    expected:
      dynamo: &d_4
        reasoning_text: ''
        normal_text: answer
      vllm: *d_4
      sglang: *d_4
  REASONING.batch.5:
    description: Analysis channel without a final or commentary channel
    ref: *upstream_ref
    model_text: <|channel|>analysis<|message|>partial reasoning<|end|>
    expected:
      dynamo: &d_5
        reasoning_text: partial reasoning
        normal_text: ''
      vllm: *d_5
      sglang: *d_5
  REASONING.batch.2.e:
    description: Empty analysis channel followed by final text
    ref: *upstream_ref
    model_text: <|channel|>analysis<|message|><|end|><|start|>assistant<|channel|>final<|message|>answer
    expected:
      dynamo: &d_6
        reasoning_text: ''
        normal_text: answer
      vllm: *d_6
      sglang: *d_6
  REASONING.batch.2.f:
    description: Complex Harmony analysis content with Unicode and newlines
    ref: *upstream_ref
    model_text: |-
      <|channel|>analysis<|message|>Line 1
      Unicode: café
      JSON-ish: {"x": [1, true]}<|end|><|start|>assistant<|channel|>final<|message|>Done.
    expected:
      dynamo: &d_7
        reasoning_text: |-
          Line 1
          Unicode: café
          JSON-ish: {"x": [1, true]}
        normal_text: Done.
      vllm: *d_7
      sglang: *d_7
  REASONING.batch.1.a:
    description: Empty input
    ref: *upstream_ref
    model_text: ''
    expected:
      dynamo: &d_8
        reasoning_text: ''
        normal_text: ''
      vllm: *d_8
      sglang: *d_8
  REASONING.batch.6.a:
    description: Multiple Harmony analysis spans
    ref: *upstream_ref
    model_text: <|channel|>analysis<|message|>first<|end|><|start|>assistant<|channel|>analysis<|message|>second<|end|><|start|>assistant<|channel|>final<|message|>done
    expected:
      dynamo: &d_9
        reasoning_text: |-
          first
          second
        normal_text: done
      vllm: *d_9
      sglang:
        reasoning_text: firstsecond
        normal_text: done
        reason: SGLang concatenates multiple Harmony analysis spans without an inserted separator, while Dynamo/vLLM preserve the span boundary with a newline.
  REASONING.batch.2.d:
    description: Normal text before a Harmony analysis channel is not a portable parser-level fixture
    reason: Harmony reasoning content is channel-framed; prefix text before the first channel is outside this parser-level fixture contract.
  REASONING.batch.3.b:
    description: Open analysis channel interrupted by downstream tool-call text is not configured for Harmony
    ref: *upstream_ref
    reason: Harmony tool calls require a commentary channel envelope; the closed analysis to commentary handoff is covered by REASONING.batch.3.a.
  REASONING.batch.6.b:
    description: Stray end marker after a complete reasoning span(unbalanced-tag)
    ref: dynamo
    spec_ref: tests/parity/README.md
    model_text: ''
    expected:
      dynamo:
        unavailable: 'Pattern not applicable: gpt_oss does not use paired open/close markers, so the 1-open + 2-close unbalanced-tag shape has no direct analog.'
      vllm:
        unavailable: 'Pattern not applicable: gpt_oss does not use paired open/close markers, so the 1-open + 2-close unbalanced-tag shape has no direct analog.'
      sglang:
        unavailable: 'Pattern not applicable: gpt_oss does not use paired open/close markers, so the 1-open + 2-close unbalanced-tag shape has no direct analog.'
