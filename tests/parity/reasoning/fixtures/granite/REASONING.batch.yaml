family: granite
model_label: Granite
mode: batch
refs:
  upstream: &upstream_ref 'inspired by vLLM Granite reasoning tests: https://github.com/vllm-project/vllm/blob/39910f2b25aacc09f5e7f166cdf0030b19f8b9e8/tests/reasoning/test_granite_reasoning_parser.py; local taxonomy: lib/parsers/REASONING_CASES.md'
cases:
  REASONING.batch.1.b:
    description: Plain text without Granite reasoning markers
    ref: *upstream_ref
    model_text: plain answer
    expected:
      dynamo: &d_0
        reasoning_text: ''
        normal_text: plain answer
      vllm: *d_0
      sglang:
        unavailable: SGLang has no reasoning parser for family='granite'
  REASONING.batch.2.a:
    description: Granite thought-process marker
    ref: *upstream_ref
    model_text: 'Here is my thought process: thinking Here is my response: answer'
    expected:
      dynamo:
        reasoning_text: 'thinking '
        normal_text: answer
      vllm:
        reasoning_text: ' thinking '
        normal_text: ' answer'
      sglang:
        unavailable: SGLang has no reasoning parser for family='granite'
  REASONING.batch.3.a:
    description: Granite reasoning followed by downstream tool-call text is not covered by a paired Dynamo tool call parser
    ref: *upstream_ref
    reason: Granite reasoning parsing has no paired Dynamo tool call parser fixture, so downstream handoff is outside this seed fixture set.
  REASONING.batch.2.c:
    description: Granite reasoning followed by normal answer text
    ref: *upstream_ref
    model_text: 'Here is my thought process: compute Here is my response: answer'
    expected:
      dynamo:
        reasoning_text: 'compute '
        normal_text: answer
      vllm:
        reasoning_text: ' compute '
        normal_text: ' answer'
      sglang:
        unavailable: SGLang has no reasoning parser for family='granite'
  REASONING.batch.4:
    description: Dangling Granite response marker without a thought marker
    ref: *upstream_ref
    model_text: 'normal Here is my response: answer'
    expected:
      dynamo: &d_4
        reasoning_text: ''
        normal_text: 'normal Here is my response: answer'
      vllm: *d_4
      sglang:
        unavailable: SGLang has no reasoning parser for family='granite'
  REASONING.batch.5:
    description: Start marker without response marker keeps suffix as reasoning
    ref: *upstream_ref
    model_text: 'Here is my thought process: partial reasoning'
    expected:
      dynamo:
        reasoning_text: partial reasoning
        normal_text: ''
      vllm:
        reasoning_text: ''
        normal_text: 'Here is my thought process: partial reasoning'
      sglang:
        unavailable: SGLang has no reasoning parser for family='granite'
  REASONING.batch.2.e:
    description: Empty Granite thought-process span
    ref: *upstream_ref
    model_text: 'Here is my thought process: Here is my response: answer'
    expected:
      dynamo:
        reasoning_text: ''
        normal_text: answer
      vllm:
        reasoning_text: ''
        normal_text: ' answer'
      sglang:
        unavailable: SGLang has no reasoning parser for family='granite'
  REASONING.batch.2.f:
    description: Complex Granite reasoning content with Unicode and newlines
    ref: *upstream_ref
    model_text: |-
      Here is my thought process: Line 1
      Unicode: café
      JSON-ish: {"x": [1, true]} Here is my response: Done.
    expected:
      dynamo:
        reasoning_text: "Line 1\nUnicode: café\nJSON-ish: {\"x\": [1, true]} "
        normal_text: Done.
      vllm:
        reasoning_text: " Line 1\nUnicode: café\nJSON-ish: {\"x\": [1, true]} "
        normal_text: ' Done.'
      sglang:
        unavailable: SGLang has no reasoning parser for family='granite'
  REASONING.batch.1.a:
    description: Empty input
    ref: *upstream_ref
    model_text: ''
    expected:
      dynamo: &d_8
        reasoning_text: ''
        normal_text: ''
      vllm: *d_8
      sglang:
        unavailable: SGLang has no reasoning parser for family='granite'
  REASONING.batch.6.a:
    description: Granite batch parser stops after the first thought-process span
    ref: *upstream_ref
    model_text: 'Here is my thought process: first Here is my response: middle Here is my thought process: second Here is my response: done'
    expected:
      dynamo:
        reasoning_text: 'first '
        normal_text: 'middle Here is my thought process: second Here is my response: done'
      vllm:
        reasoning_text: ' first '
        normal_text: ' middle Here is my thought process: second Here is my response: done'
      sglang:
        unavailable: SGLang has no reasoning parser for family='granite'
  REASONING.batch.2.d:
    description: Normal text before and after Granite thought-process markers
    ref: *upstream_ref
    model_text: 'before Here is my thought process: thinking Here is my response: after'
    expected:
      dynamo:
        reasoning_text: 'before  thinking '
        normal_text: after
      vllm:
        reasoning_text: ' thinking '
        normal_text: ' after'
      sglang:
        unavailable: SGLang has no reasoning parser for family='granite'
  REASONING.batch.3.b:
    description: Open Granite reasoning interrupted by downstream tool-call text is not covered by a paired Dynamo tool call parser
    ref: *upstream_ref
    reason: Granite reasoning parsing has no paired Dynamo tool call parser fixture or open-reasoning tool boundary in this seed fixture set.
  REASONING.batch.6.b:
    description: Stray end marker after a complete reasoning span(unbalanced-tag)
    ref: dynamo
    spec_ref: tests/parity/README.md
    model_text: ''
    expected:
      dynamo:
        unavailable: 'Pattern not applicable: granite does not use paired open/close markers, so the 1-open + 2-close unbalanced-tag shape has no direct analog.'
      vllm:
        unavailable: 'Pattern not applicable: granite does not use paired open/close markers, so the 1-open + 2-close unbalanced-tag shape has no direct analog.'
      sglang:
        unavailable: "UNAVAILABLE: SGLang has no reasoning parser for family='granite'"
  REASONING.batch.3.c:
    description: Recipientless Harmony commentary is not applicable to Granite
    reason: Granite does not use Harmony commentary channels; visible text and reasoning are separated by Granite thought-process and response markers.
  REASONING.batch.3.d:
    description: Directed Harmony commentary tool calls are not applicable to Granite
    reason: Granite does not use Harmony `commentary to=functions.*` envelopes and has no paired Dynamo Harmony tool-call parser fixture.
  REASONING.batch.3.e:
    description: Directed Harmony analysis tool calls are not applicable to Granite
    reason: Granite does not use Harmony `analysis to=functions.*` envelopes; reasoning is represented by Granite thought-process markers.
  REASONING.batch.3.f:
    description: Harmony analysis/commentary/final channel sequencing is not applicable to Granite
    reason: Granite has no Harmony channel protocol, so mixed analysis, commentary tool call, and final-channel sequencing is outside its grammar.
