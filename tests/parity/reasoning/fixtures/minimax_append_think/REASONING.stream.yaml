family: minimax_append_think
model_label: MiniMax append-think
mode: stream
refs:
  upstream: &upstream_ref 'inspired by vLLM MiniMax M2 append-think reasoning tests: https://github.com/vllm-project/vllm/blob/39910f2b25aacc09f5e7f166cdf0030b19f8b9e8/tests/reasoning/test_minimax_m2_append_reasoning_parser.py; local taxonomy: lib/parsers/REASONING_CASES.md'
cases:
  REASONING.stream.1.a:
    description: Empty stream chunk still receives the synthetic think opener
    ref: *upstream_ref
    chunks:
    - ''
    expected:
      dynamo: &d_s0
        reasoning_text: ''
        normal_text: <think>
      vllm: *d_s0
      sglang: *d_s0
  REASONING.stream.2.a:
    description: First streamed chunk gets the synthetic think opener
    ref: *upstream_ref
    chunks:
    - 'reasoning '
    - content
    - </think>answer
    expected:
      dynamo: &d_s1
        reasoning_text: ''
        normal_text: <think>reasoning content</think>answer
      vllm: *d_s1
      sglang: *d_s1
  REASONING.stream.2.b:
    description: Multiple append-think-looking spans remain normal text
    ref: *upstream_ref
    chunks:
    - first</think>
    - ' middle '
    - second</think> done
    expected:
      dynamo: &d_s5
        reasoning_text: ''
        normal_text: <think>first</think> middle second</think> done
      vllm: *d_s5
      sglang: *d_s5
  REASONING.stream.3.a:
    description: Single chunk without a model-emitted think opener
    ref: *upstream_ref
    chunks:
    - reasoning content
    expected:
      dynamo: &d_s2
        reasoning_text: ''
        normal_text: <think>reasoning content
      vllm: *d_s2
      sglang: *d_s2
  REASONING.stream.3.b:
    description: End marker split across chunks is still normal text
    ref: *upstream_ref
    chunks:
    - reasoning</th
    - ink>answer
    expected:
      dynamo: &d_s3
        reasoning_text: ''
        normal_text: <think>reasoning</think>answer
      vllm: *d_s3
      sglang: *d_s3
  REASONING.stream.3.c:
    description: Partial marker-looking prefix remains normal text
    ref: *upstream_ref
    chunks:
    - plain <th
    - esis answer
    expected:
      dynamo: &d_s6
        reasoning_text: ''
        normal_text: <think>plain <thesis answer
      vllm: *d_s6
      sglang: *d_s6
  REASONING.stream.1.b:
    description: Plain text is passed through after the synthetic opener
    ref: *upstream_ref
    chunks:
    - plain
    - ' answer'
    expected:
      dynamo: &d_s4
        reasoning_text: ''
        normal_text: <think>plain answer
      vllm: *d_s4
      sglang: *d_s4
  REASONING.stream.2.c:
    description: Stray end marker after a complete reasoning span, across chunks(unbalanced-tag; passthrough — chunks reassemble without leading <think>)
    ref: dynamo
    spec_ref: tests/parity/README.md
    chunks:
    - 'preamble</think>'
    - 'body</think>'
    - 'answer'
    expected:
      dynamo:
        reasoning_text: ''
        normal_text: '<think>preamble</think>body</think>answer'
        reason: 'MiniMaxAppendThinkParser prepends <think> before parsing (matching the append-think chat template); in default mode (no force_reasoning) the parser does not split on </think>, so the entire output stays in normal_text. This mirrors REASONING.batch.6.a passthrough behavior.'
      vllm:
        reasoning_text: ''
        normal_text: '<think>preamble</think>body</think>answer'
      sglang:
        reasoning_text: ''
        normal_text: '<think>preamble</think>body</think>answer'
  REASONING.stream.4.a:
    description: Downstream streaming boundary is not applicable to MiniMax append-think
    reason: MiniMax append-think has no configured Harmony commentary boundary; it emits a synthetic normal-text wrapper around model output.
  REASONING.stream.4.b:
    description: Split downstream streaming boundary is not applicable to MiniMax append-think
    reason: MiniMax append-think has no Harmony `commentary to=functions.*` stream boundary to split across chunks.
  REASONING.stream.4.c:
    description: Partial downstream boundary recovery is not applicable to MiniMax append-think
    reason: MiniMax append-think has no Harmony commentary protocol, so partial commentary-boundary recovery is outside its grammar.
  REASONING.stream.4.d:
    description: Directed Harmony analysis tool calls are not applicable to MiniMax append-think
    reason: This parser family does not use Harmony `analysis to=functions.*` envelopes, so split analysis-channel tool-call handoff is outside its grammar.
