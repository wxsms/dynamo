family: minimax_append_think
model_label: MiniMax append-think
mode: batch
refs:
  upstream: &upstream_ref 'inspired by vLLM MiniMax M2 append-think reasoning tests: https://github.com/vllm-project/vllm/blob/39910f2b25aacc09f5e7f166cdf0030b19f8b9e8/tests/reasoning/test_minimax_m2_append_reasoning_parser.py; local taxonomy: lib/parsers/REASONING_CASES.md'
cases:
  REASONING.batch.1.b:
    description: Plain text receives the synthetic think opener
    ref: *upstream_ref
    model_text: plain answer
    expected:
      dynamo: &d_0
        reasoning_text: ''
        normal_text: <think>plain answer
      vllm: *d_0
      sglang: *d_0
  REASONING.batch.2.a:
    description: MiniMax appends a synthetic think opener and leaves content inline
    ref: *upstream_ref
    model_text: reasoning content
    expected:
      dynamo: &d_1
        reasoning_text: ''
        normal_text: <think>reasoning content
      vllm: *d_1
      sglang: *d_1
  REASONING.batch.3.a:
    description: Reasoning-shaped text followed by downstream MiniMax tool-call text
    ref: *upstream_ref
    model_text: |-
      reasoning</think><minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      </minimax:tool_call>
    expected:
      dynamo: &d_2
        reasoning_text: ''
        normal_text: |-
          <think>reasoning</think><minimax:tool_call>
          <invoke name="get_weather">
          <parameter name="location">NYC</parameter>
          </invoke>
          </minimax:tool_call>
      vllm: *d_2
      sglang: *d_2
  REASONING.batch.2.c:
    description: Reasoning-shaped text followed by normal answer text
    ref: *upstream_ref
    model_text: reasoning</think>answer
    expected:
      dynamo: &d_3
        reasoning_text: ''
        normal_text: <think>reasoning</think>answer
      vllm: *d_3
      sglang: *d_3
  REASONING.batch.4:
    description: Dangling end marker is left inline
    ref: *upstream_ref
    model_text: normal</think>answer
    expected:
      dynamo: &d_4
        reasoning_text: ''
        normal_text: <think>normal</think>answer
      vllm: *d_4
      sglang: *d_4
  REASONING.batch.5:
    description: Missing end marker is left inline
    ref: *upstream_ref
    model_text: partial reasoning
    expected:
      dynamo: &d_5
        reasoning_text: ''
        normal_text: <think>partial reasoning
      vllm: *d_5
      sglang: *d_5
  REASONING.batch.2.e:
    description: Empty input still emits the synthetic think opener
    ref: *upstream_ref
    model_text: ''
    expected:
      dynamo: &d_6
        reasoning_text: ''
        normal_text: <think>
      vllm: *d_6
      sglang: *d_6
  REASONING.batch.2.f:
    description: Complex content remains inline after the synthetic opener
    ref: *upstream_ref
    model_text: |-
      Line 1
      Unicode: café
      JSON-ish: {"x": [1, true]}
    expected:
      dynamo: &d_7
        reasoning_text: ''
        normal_text: |-
          <think>Line 1
          Unicode: café
          JSON-ish: {"x": [1, true]}
      vllm: *d_7
      sglang: *d_7
  REASONING.batch.1.a:
    description: Empty input variant
    ref: *upstream_ref
    model_text: ''
    expected:
      dynamo: &d_8
        reasoning_text: ''
        normal_text: <think>
      vllm: *d_8
      sglang: *d_8
  REASONING.batch.6.a:
    description: Multiple think-looking spans remain inline
    ref: *upstream_ref
    model_text: first</think> middle <think>second</think> done
    expected:
      dynamo: &d_9
        reasoning_text: ''
        normal_text: <think>first</think> middle <think>second</think> done
      vllm: *d_9
      sglang: *d_9
  REASONING.batch.2.d:
    description: Normal text around think-looking markup remains inline after the synthetic opener
    ref: *upstream_ref
    model_text: before <think>thinking</think> after
    expected:
      dynamo: &d_10
        reasoning_text: ''
        normal_text: <think>before <think>thinking</think> after
      vllm: *d_10
      sglang: *d_10
  REASONING.batch.3.b:
    description: Open reasoning interrupted by downstream tool-call text is not configured for MiniMax append-think
    ref: *upstream_ref
    reason: MiniMax append-think emits a synthetic normal-text wrapper instead of running an open reasoning-span boundary; closed-span handoff is covered by REASONING.batch.3.a.
  REASONING.batch.6.b:
    description: Stray end marker after a complete reasoning span(unbalanced-tag; passthrough — model output has no leading <think>, parser prepends it)
    ref: dynamo
    spec_ref: tests/parity/README.md
    model_text: 'preamble</think>body</think>answer'
    expected:
      dynamo:
        reasoning_text: ''
        normal_text: '<think>preamble</think>body</think>answer'
        reason: 'MiniMaxAppendThinkParser prepends <think> before parsing (matching the append-think chat template); in default mode (no force_reasoning) the parser does not split on </think>, so the entire output stays in normal_text. This mirrors REASONING.batch.6.a passthrough behavior.'
      vllm:
        reasoning_text: ''
        normal_text: '<think>preamble</think>body</think>answer'
      sglang:
        reasoning_text: ''
        normal_text: '<think>preamble</think>body</think>answer'
  REASONING.batch.3.c:
    description: Recipientless Harmony commentary is not applicable to MiniMax append-think
    reason: MiniMax append-think does not use Harmony commentary channels; it emits a synthetic normal-text wrapper around model output.
  REASONING.batch.3.d:
    description: Directed Harmony commentary tool calls are not applicable to MiniMax append-think
    reason: MiniMax append-think does not use Harmony `commentary to=functions.*` envelopes; downstream tool handoff uses MiniMax-specific output shape when applicable.
  REASONING.batch.3.e:
    description: Directed Harmony analysis tool calls are not applicable to MiniMax append-think
    reason: MiniMax append-think does not use Harmony `analysis to=functions.*` envelopes; reasoning-shaped text remains inside the synthetic normal-text wrapper.
  REASONING.batch.3.f:
    description: Harmony analysis/commentary/final channel sequencing is not applicable to MiniMax append-think
    reason: MiniMax append-think has no Harmony channel protocol, so mixed analysis, commentary tool call, and final-channel sequencing is outside its grammar.
