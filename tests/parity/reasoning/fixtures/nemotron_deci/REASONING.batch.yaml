family: nemotron_deci
model_label: Nemotron Deci v1 / GLM 4.5
mode: batch
refs:
  upstream: &upstream_ref 'inspired by vLLM GLM/Nemotron think-tag reasoning tests: https://github.com/vllm-project/vllm/blob/39910f2b25aacc09f5e7f166cdf0030b19f8b9e8/tests/reasoning/test_glm4_moe_reasoning_parser.py and https://github.com/vllm-project/vllm/blob/39910f2b25aacc09f5e7f166cdf0030b19f8b9e8/tests/reasoning/test_nemotron_v3_reasoning_parser.py; local taxonomy: lib/parsers/REASONING_CASES.md'
cases:
  REASONING.batch.1.b:
    description: Plain text without reasoning markers
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    model_text: plain answer
    expected:
      dynamo: &d_0
        reasoning_text: ''
        normal_text: plain answer
      vllm:
        reasoning_text: plain answer
        normal_text: ''
        reason: vLLM GLM/Nemotron parser (`glm45`) defaults thinking on and treats marker-free text as reasoning.
      sglang: *d_0
  REASONING.batch.2.a:
    description: Single think-tag reasoning block
    ref: *upstream_ref
    model_text: <think>thinking</think>answer
    expected:
      dynamo: &d_1
        reasoning_text: thinking
        normal_text: answer
      vllm: *d_1
      sglang: *d_1
  REASONING.batch.3.a:
    description: Reasoning followed by downstream tool-call text
    ref: *upstream_ref
    model_text: '<think>choose tool</think><TOOLCALL>[{"name": "get_weather", "arguments": {"location": "NYC"}}]</TOOLCALL>'
    expected:
      dynamo: &d_2
        reasoning_text: choose tool
        normal_text: '<TOOLCALL>[{"name": "get_weather", "arguments": {"location": "NYC"}}]</TOOLCALL>'
      vllm: *d_2
      sglang: *d_2
  REASONING.batch.3.b:
    description: Open reasoning interrupted by downstream tool-call text is not configured for GLM/Nemotron
    ref: *upstream_ref
    reason: Dynamo's GLM/Nemotron reasoning parser has no downstream tool-call boundary while reasoning is open; closed-span handoff is covered by REASONING.batch.3.a.
  REASONING.batch.2.c:
    description: Reasoning followed by normal answer text
    ref: *upstream_ref
    model_text: <think>compute</think>answer
    expected:
      dynamo: &d_3
        reasoning_text: compute
        normal_text: answer
      vllm: *d_3
      sglang: *d_3
  REASONING.batch.2.d:
    description: Normal text around reasoning
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    model_text: before <think>thinking</think> after
    expected:
      dynamo:
        reasoning_text: thinking
        normal_text: before  after
      vllm:
        reasoning_text: thinking
        normal_text: ' after'
        reason: Dynamo keeps visible text outside a complete reasoning span as normal_text; vLLM drops the prefix.
      sglang:
        reasoning_text: before thinking
        normal_text: ' after'
        reason: Dynamo keeps text emitted before the reasoning open marker as normal_text; SGLang strips the start marker in place and folds that prefix into reasoning_text.
  REASONING.batch.4:
    description: Dangling end marker without an opening think tag
    ref: *upstream_ref
    model_text: normal</think>answer
    expected:
      dynamo:
        reasoning_text: normal
        normal_text: answer
      vllm:
        reasoning_text: normal
        normal_text: answer
      sglang:
        reasoning_text: ''
        normal_text: normal</think>answer
        reason: Dynamo treats the text before an unpaired end marker as reasoning (implicit-opener recovery, matching vLLM); SGLang enters reasoning only on an explicit start marker, so the dangling end marker and surrounding text stay in normal_text.
  REASONING.batch.5:
    description: Missing end marker keeps the remaining text as reasoning
    ref: *upstream_ref
    model_text: <think>partial
    expected:
      dynamo: &d_5
        reasoning_text: partial
        normal_text: ''
      vllm: *d_5
      sglang: *d_5
  REASONING.batch.2.e:
    description: Empty reasoning block
    ref: *upstream_ref
    model_text: <think></think>answer
    expected:
      dynamo: &d_6
        reasoning_text: ''
        normal_text: answer
      vllm: *d_6
      sglang: *d_6
  REASONING.batch.2.f:
    description: Complex reasoning content with Unicode and newlines
    ref: *upstream_ref
    model_text: |-
      <think>Line 1
      Unicode: café
      JSON-ish: {"x": [1, true]}</think>Done.
    expected:
      dynamo: &d_7
        reasoning_text: |-
          Line 1
          Unicode: café
          JSON-ish: {"x": [1, true]}
        normal_text: Done.
      vllm: *d_7
      sglang: *d_7
  REASONING.batch.1.a:
    description: Empty input
    ref: *upstream_ref
    model_text: ''
    expected:
      dynamo: &d_8
        reasoning_text: ''
        normal_text: ''
      vllm: *d_8
      sglang: *d_8
  REASONING.batch.6.a:
    description: Multiple reasoning spans are concatenated by Dynamo
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    model_text: <think>first</think> middle <think>second</think> done
    expected:
      dynamo:
        reasoning_text: firstsecond
        normal_text: middle  done
      vllm:
        reasoning_text: first
        normal_text: ' middle <think>second</think> done'
        reason: Dynamo extracts each complete reasoning span; vLLM leaves the later complete span in normal_text.
      sglang:
        reasoning_text: first
        normal_text: ' middle <think>second</think> done'
        reason: Dynamo extracts every complete reasoning span and concatenates them; SGLang exits reasoning at the first end marker and leaves the later span, with its literal markers, in normal_text.
  REASONING.batch.6.b:
    description: Stray end marker after a complete reasoning span(unbalanced-tag)
    ref: dynamo
    spec_ref: tests/parity/README.md
    model_text: '<think>preamble</think>body</think>answer'
    expected:
      dynamo:
        reasoning_text: preamble
        normal_text: 'bodyanswer'
        reason: 'Lossless split: when a stray close marker appears outside any reasoning block, it is stripped (parser-owned syntax must not appear in normal_text). Reasoning is captured from the first <open>...<close> pair only; subsequent stray closes are discarded.'
      vllm:
        reasoning_text: 'preamble'
        normal_text: 'body</think>answer'
      sglang:
        reasoning_text: 'preamble'
        normal_text: 'body</think>answer'
  REASONING.batch.3.c:
    description: Recipientless Harmony commentary is not applicable to GLM/Nemotron
    reason: GLM/Nemotron reasoning parsers do not use Harmony commentary channels; visible text and downstream tool handoff use model-specific think and tool-call markers.
  REASONING.batch.3.d:
    description: Directed Harmony commentary tool calls are not applicable to GLM/Nemotron
    reason: GLM/Nemotron reasoning parsers do not use Harmony `commentary to=functions.*` envelopes; downstream tool calls use model-specific tool-call markers.
  REASONING.batch.3.e:
    description: Directed Harmony analysis tool calls are not applicable to GLM/Nemotron
    reason: GLM/Nemotron reasoning parsers do not use Harmony `analysis to=functions.*` envelopes; reasoning is represented by think tags.
  REASONING.batch.3.f:
    description: Harmony analysis/commentary/final channel sequencing is not applicable to GLM/Nemotron
    reason: GLM/Nemotron reasoning parsers have no Harmony channel protocol, so mixed analysis, commentary tool call, and final-channel sequencing is outside their grammar.
