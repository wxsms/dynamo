family: kimi_k25
model_label: Kimi K2.5 / K2.6
mode: stream
refs:
  upstream: &upstream_ref 'inspired by vLLM Kimi K2/K2.5 reasoning tests: https://github.com/vllm-project/vllm/blob/39910f2b25aacc09f5e7f166cdf0030b19f8b9e8/tests/reasoning/test_kimi_k2_reasoning_parser.py; local taxonomy: lib/parsers/REASONING_CASES.md'
cases:
  REASONING.stream.1.a:
    description: Empty stream chunk
    ref: *upstream_ref
    force_reasoning: true
    chunks:
    - ''
    expected:
      dynamo: &d_s0
        reasoning_text: ''
        normal_text: ''
      vllm: *d_s0
      sglang: *d_s0
  REASONING.stream.2.a:
    description: Force-reasoning stream exits on closing think tag
    ref: *upstream_ref
    force_reasoning: true
    chunks:
    - thinking
    - </think>answer
    expected:
      dynamo: &sg_stream_2_a
        reasoning_text: thinking
        normal_text: answer
      vllm:
        reasoning_text: thinking
        normal_text: answer
      sglang: *sg_stream_2_a
  REASONING.stream.2.b:
    description: Multiple reasoning spans across chunks
    ref: *upstream_ref
    force_reasoning: true
    chunks:
    - <think>first</think>
    - ' middle '
    - <think>second</think> done
    expected:
      dynamo:
        reasoning_text: firstsecond
        normal_text: ' middle  done'
      vllm:
        reasoning_text: <think>first
        normal_text: ' middle <think>second</think> done'
        reason: vLLM Kimi K2 streaming parser leaks the first start marker and leaves the later complete span in normal_text.
      sglang:
        reasoning_text: first
        normal_text: ' middle <think>second</think> done'
        reason: Dynamo re-enters reasoning on each open marker across chunks and concatenates all spans; SGLang exits at the first end marker and does not re-enter, leaving the later span in normal_text.
  REASONING.stream.3.a:
    description: Opening think marker split across chunks
    ref: *upstream_ref
    force_reasoning: true
    chunks:
    - <thi
    - nk>thinking</think>answer
    expected:
      dynamo: &id001
        reasoning_text: thinking
        normal_text: answer
      vllm:
        reasoning_text: <think>thinking
        normal_text: answer
        reason: Dynamo buffers a split start delimiter and strips it; vLLM Kimi K2 streaming parser leaks the reconstructed delimiter.
      sglang: *id001
  REASONING.stream.3.b:
    description: End marker split across chunks
    ref: *upstream_ref
    force_reasoning: true
    chunks:
    - <think>thinking</th
    - ink>answer
    expected:
      dynamo:
        reasoning_text: thinking
        normal_text: answer
      vllm:
        reasoning_text: <think>thinking</think>answer
        normal_text: ''
        reason: Dynamo buffers a split end delimiter and resumes normal_text after it; vLLM Kimi K2 streaming parser keeps the delimiter and answer in reasoning_text.
      sglang:
        reasoning_text: thinking</think>answer
        normal_text: ''
        reason: Dynamo buffers an end marker split across chunk boundaries and resumes normal_text after it; SGLang streams the partial delimiter as reasoning (it only holds back a partial marker when the whole pending buffer is a marker prefix), so the split marker is never reassembled and the answer stays in reasoning_text.
  REASONING.stream.3.c:
    description: Partial start-marker prefix later resolves as force-reasoning text
    ref: *upstream_ref
    force_reasoning: true
    chunks:
    - plain <th
    - esis answer
    expected:
      dynamo: &sg_stream_3_c
        reasoning_text: plain <thesis answer
        normal_text: ''
      vllm:
        reasoning_text: plain <thesis answer
        normal_text: ''
      sglang: *sg_stream_3_c
  REASONING.stream.1.b:
    description: Plain text stays in force-reasoning mode until an end marker
    ref: *upstream_ref
    force_reasoning: true
    chunks:
    - plain
    - ' answer'
    expected:
      dynamo: &sg_stream_1_b
        reasoning_text: plain answer
        normal_text: ''
      vllm:
        reasoning_text: plain answer
        normal_text: ''
      sglang: *sg_stream_1_b
  REASONING.stream.2.c:
    description: Stray end marker after a complete reasoning span, across chunks(unbalanced-tag)
    ref: dynamo
    spec_ref: tests/parity/README.md
    chunks:
    - '<think>preamble</think>'
    - 'body</think>'
    - 'answer'
    expected:
      dynamo:
        reasoning_text: preamble
        normal_text: 'bodyanswer'
        reason: 'Lossless split: when a stray close marker appears outside any reasoning block, it is stripped (parser-owned syntax must not appear in normal_text). Reasoning is captured from the first <open>...<close> pair only; subsequent stray closes are discarded.'
      vllm:
        reasoning_text: '<think>preamble'
        normal_text: 'body</think>answer'
      sglang:
        reasoning_text: 'preamble'
        normal_text: 'body</think>answer'
  REASONING.stream.4.a:
    description: Downstream streaming boundary is not applicable to Kimi K2.5
    reason: Kimi K2.5 uses Kimi tool-section markers, not Harmony commentary channels; Harmony stream boundary cases are GPT-OSS specific.
  REASONING.stream.4.b:
    description: Split downstream streaming boundary is not applicable to Kimi K2.5
    reason: Kimi K2.5 does not use Harmony `commentary to=functions.*` envelopes, so there is no Harmony stream boundary to split across chunks.
  REASONING.stream.4.c:
    description: Partial downstream boundary recovery is not applicable to Kimi K2.5
    reason: Kimi K2.5 has no Harmony commentary protocol, so partial commentary-boundary recovery is outside its grammar.
  REASONING.stream.4.d:
    description: Directed Harmony analysis tool calls are not applicable to Kimi K2.5
    reason: This parser family does not use Harmony `analysis to=functions.*` envelopes, so split analysis-channel tool-call handoff is outside its grammar.
