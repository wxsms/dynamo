family: qwen3
model_label: Qwen 3.x
mode: stream
refs:
  upstream: &upstream_ref 'inspired by vLLM Qwen3 reasoning tests: https://github.com/vllm-project/vllm/blob/39910f2b25aacc09f5e7f166cdf0030b19f8b9e8/tests/reasoning/test_qwen3_reasoning_parser.py; local taxonomy: lib/parsers/REASONING_CASES.md'
cases:
  REASONING.stream.1.a:
    description: Empty stream chunk
    ref: *upstream_ref
    chunks:
    - ''
    expected:
      dynamo: &d_s0
        reasoning_text: ''
        normal_text: ''
      vllm: *d_s0
      sglang: *d_s0
  REASONING.stream.2.a:
    description: Single reasoning block across chunks
    ref: *upstream_ref
    chunks:
    - <think>thin
    - king</think>
    - answer
    expected:
      dynamo: &d_s1
        reasoning_text: thinking
        normal_text: answer
      vllm: *d_s1
      sglang: *d_s1
  REASONING.stream.2.b:
    description: Multiple reasoning spans across chunks
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://qwen.readthedocs.io/en/stable/inference/transformers.html#parsing-thinking-content; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    chunks:
    - <think>first</think>
    - ' middle '
    - <think>second</think> done
    expected:
      dynamo:
        reasoning_text: firstsecond
        normal_text: ' middle  done'
      vllm:
        reasoning_text: first
        normal_text: ' middle <think>second</think> done'
        reason: Dynamo extracts each complete reasoning span across chunks; vLLM leaves the later complete span in normal_text.
      sglang:
        reasoning_text: first
        normal_text: ' middle <think>second</think> done'
        reason: Dynamo re-enters reasoning on each open marker across chunks and concatenates all spans; SGLang exits at the first end marker and does not re-enter, leaving the later span in normal_text.
  REASONING.stream.3.a:
    description: Start marker split across chunks
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://qwen.readthedocs.io/en/stable/inference/transformers.html#parsing-thinking-content; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    chunks:
    - <th
    - ink>thinking</think>answer
    expected:
      dynamo: &d_s2
        reasoning_text: thinking
        normal_text: answer
      vllm:
        reasoning_text: <think>thinking
        normal_text: answer
        reason: Dynamo buffers a split start delimiter and strips it; vLLM leaks the reconstructed delimiter.
      sglang: *d_s2
  REASONING.stream.3.b:
    description: End marker split across chunks
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://qwen.readthedocs.io/en/stable/inference/transformers.html#parsing-thinking-content; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    chunks:
    - <think>thinking</th
    - ink>answer
    expected:
      dynamo:
        reasoning_text: thinking
        normal_text: answer
      vllm:
        reasoning_text: thinking</think>answer
        normal_text: ''
        reason: Dynamo buffers a split end delimiter and resumes normal_text after it; vLLM keeps the delimiter and answer in reasoning_text.
      sglang:
        reasoning_text: thinking</think>answer
        normal_text: ''
        reason: Dynamo buffers an end marker split across chunk boundaries and resumes normal_text after it; SGLang streams the partial delimiter as reasoning (it only holds back a partial marker when the whole pending buffer is a marker prefix), so the split marker is never reassembled and the answer stays in reasoning_text.
  REASONING.stream.3.c:
    description: Partial start-marker prefix later becomes normal text
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://qwen.readthedocs.io/en/stable/inference/transformers.html#parsing-thinking-content; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    chunks:
    - plain <th
    - esis answer
    expected:
      dynamo: &d_s6
        reasoning_text: ''
        normal_text: plain <thesis answer
      vllm:
        reasoning_text: plain <thesis answer
        normal_text: ''
        reason: vLLM Qwen streaming parser treats marker-free stream text as reasoning in this shape.
      sglang: *d_s6
  REASONING.stream.1.b:
    description: Plain text never enters reasoning mode
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://qwen.readthedocs.io/en/stable/inference/transformers.html#parsing-thinking-content; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    chunks:
    - plain
    - ' answer'
    expected:
      dynamo: &d_s4
        reasoning_text: ''
        normal_text: plain answer
      vllm:
        reasoning_text: plain answer
        normal_text: ''
        reason: vLLM Qwen streaming parser treats text before a reasoning end marker as reasoning; serving may bypass it when thinking is disabled.
      sglang: *d_s4
  REASONING.stream.2.c:
    description: Stray end marker after a complete reasoning span, across chunks(unbalanced-tag)
    ref: dynamo
    spec_ref: tests/parity/README.md
    chunks:
    - '<think>preamble</think>'
    - 'body</think>'
    - 'answer'
    expected:
      dynamo:
        reasoning_text: preamble
        normal_text: 'bodyanswer'
        reason: 'Lossless split: when a stray close marker appears outside any reasoning block, it is stripped (parser-owned syntax must not appear in normal_text). Reasoning is captured from the first <open>...<close> pair only; subsequent stray closes are discarded.'
      vllm:
        reasoning_text: 'preamble'
        normal_text: 'body</think>answer'
      sglang:
        reasoning_text: 'preamble'
        normal_text: 'body</think>answer'
  REASONING.stream.4.a:
    description: Downstream streaming boundary is not applicable to Qwen3
    reason: Qwen3 has no configured tool-call start marker that force-exits open streaming reasoning; closed-span handoff is covered by REASONING.batch.3.a.
  REASONING.stream.4.b:
    description: Split downstream streaming boundary is not applicable to Qwen3
    reason: Qwen3 has no configured tool-call start marker that force-exits open streaming reasoning, so there is no split downstream boundary to buffer.
  REASONING.stream.4.c:
    description: Partial downstream boundary recovery is not applicable to Qwen3
    reason: Qwen3 has no configured tool-call start marker that force-exits open streaming reasoning, so partial tool-marker recovery is outside its grammar.
  REASONING.stream.4.d:
    description: Directed Harmony analysis tool calls are not applicable to Qwen3
    reason: This parser family does not use Harmony `analysis to=functions.*` envelopes, so split analysis-channel tool-call handoff is outside its grammar.
