family: gemma4
model_label: Gemma 4
mode: batch
refs:
  upstream: &upstream_ref 'inspired by vLLM Gemma4 reasoning tests: https://github.com/vllm-project/vllm/blob/39910f2b25aacc09f5e7f166cdf0030b19f8b9e8/tests/reasoning/test_gemma4_reasoning_parser.py; local taxonomy: lib/parsers/REASONING_CASES.md'
cases:
  REASONING.batch.2.a:
    description: Gemma thought channel with role label stripped
    ref: *upstream_ref
    model_text: |-
      <|channel>thought
      step one
      step two<channel|>The answer is 42.
    expected:
      dynamo: &d_1
        reasoning_text: |-
          step one
          step two
        normal_text: The answer is 42.
      vllm: *d_1
      sglang: *d_1
  REASONING.batch.3.a:
    description: Gemma reasoning followed by downstream tool-call text
    ref: *upstream_ref
    model_text: |-
      <|channel>thought
      choose tool<channel|><|tool_call>call:get_weather{location:<|"|>NYC<|"|>}<tool_call|>
    expected:
      dynamo: &d_2
        reasoning_text: choose tool
        normal_text: <|tool_call>call:get_weather{location:<|"|>NYC<|"|>}<tool_call|>
      vllm: *d_2
      sglang: *d_2
  REASONING.batch.3.b:
    description: Open Gemma thought channel interrupted by downstream tool-call text is not configured
    ref: *upstream_ref
    reason: Dynamo's Gemma reasoning parser has no downstream tool-call boundary while the thought channel is open; closed-channel handoff is covered by REASONING.batch.3.a.
  REASONING.batch.2.c:
    description: Gemma reasoning followed by normal answer text
    ref: *upstream_ref
    model_text: |-
      <|channel>thought
      compute<channel|>answer
    expected:
      dynamo: &d_10
        reasoning_text: compute
        normal_text: answer
      vllm: *d_10
      sglang: *d_10
  REASONING.batch.2.d:
    description: Gemma normal text around reasoning
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://docs.vllm.ai/en/v0.21.0/api/vllm/reasoning/gemma4_reasoning_parser/; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    model_text: |-
      Hello. <|channel>thought
      rumination<channel|> Goodbye.
    expected:
      dynamo:
        reasoning_text: rumination
        normal_text: Hello.  Goodbye.
      vllm:
        reasoning_text: rumination
        normal_text: ' Goodbye.'
        reason: vLLM drops text before the Gemma reasoning channel.
      sglang:
        reasoning_text: Hello. rumination
        normal_text: ' Goodbye.'
        reason: Dynamo keeps text emitted before the reasoning open marker as normal_text; SGLang strips the start marker in place and folds that prefix into reasoning_text.
  REASONING.batch.1.b:
    description: No reasoning markers pass through as normal text
    ref: *upstream_ref
    model_text: just a plain answer
    expected:
      dynamo: &d_3
        reasoning_text: ''
        normal_text: just a plain answer
      vllm: *d_3
      sglang: *d_3
  REASONING.batch.4:
    description: Dangling Gemma channel end marker extracts text before the marker as reasoning
    ref: *upstream_ref
    model_text: normal<channel|>answer
    expected:
      dynamo: &d_4
        reasoning_text: normal
        normal_text: answer
      vllm: *d_4
      sglang:
        reasoning_text: ''
        normal_text: normal<channel|>answer
        reason: Dynamo treats the text before an unpaired end marker as reasoning (implicit-opener recovery, matching vLLM); SGLang enters reasoning only on an explicit start marker, so the dangling end marker and surrounding text stay in normal_text.
  REASONING.batch.5:
    description: Open thought channel without close treats suffix as reasoning
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://docs.vllm.ai/en/v0.21.0/api/vllm/reasoning/gemma4_reasoning_parser/; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    model_text: |-
      intro <|channel>thought
      partial
    expected:
      dynamo:
        reasoning_text: partial
        normal_text: 'intro '
      vllm:
        reasoning_text: partial
        normal_text: ''
        reason: vLLM drops text before an open Gemma reasoning channel.
      sglang:
        reasoning_text: intro partial
        normal_text: ''
        reason: Dynamo keeps text before an unclosed reasoning channel as normal_text and the channel body as reasoning; SGLang strips the open marker in place and folds the entire prefix into reasoning_text.
  REASONING.batch.2.e:
    description: Empty Gemma reasoning channel
    ref: *upstream_ref
    model_text: |-
      <|channel>thought
      <channel|>answer
    expected:
      dynamo: &d_6
        reasoning_text: ''
        normal_text: answer
      vllm: *d_6
      sglang: *d_6
  REASONING.batch.2.f:
    description: Complex Gemma reasoning content with Unicode and newlines
    ref: *upstream_ref
    model_text: |-
      <|channel>thought
      Line 1
      Unicode: café
      JSON-ish: {"x": [1, true]}<channel|>Done.
    expected:
      dynamo: &d_7
        reasoning_text: |-
          Line 1
          Unicode: café
          JSON-ish: {"x": [1, true]}
        normal_text: Done.
      vllm: *d_7
      sglang: *d_7
  REASONING.batch.1.a:
    description: Empty input
    ref: *upstream_ref
    model_text: ''
    expected:
      dynamo: &d_8
        reasoning_text: ''
        normal_text: ''
      vllm: *d_8
      sglang: *d_8
  REASONING.batch.6.a:
    description: Multiple reasoning spans are concatenated by Dynamo
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://docs.vllm.ai/en/v0.21.0/api/vllm/reasoning/gemma4_reasoning_parser/; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    model_text: |-
      <|channel>thought
      first<channel|> middle <|channel>thought
      second<channel|> done
    expected:
      dynamo:
        reasoning_text: firstsecond
        normal_text: ' middle  done'
      vllm:
        reasoning_text: first
        normal_text: |2-
           middle <|channel>thought
          second<channel|> done
        reason: Multi-span reasoning is out-of-spec model output; Dynamo preserves all reasoning and non-reasoning text without leaking protocol markers, while vLLM leaves the later complete channel in normal_text.
      sglang:
        reasoning_text: first
        normal_text: |2-
           middle <|channel>thought
          second<channel|> done
        reason: Dynamo extracts every complete reasoning span and concatenates them; SGLang exits reasoning at the first end marker and leaves the later span, with its literal markers, in normal_text.
  REASONING.batch.6.b:
    description: Stray end marker after a complete reasoning span(unbalanced-tag)
    ref: dynamo
    spec_ref: tests/parity/README.md
    model_text: |-
      <|channel>thought
      preamble<channel|>body<channel|>answer
    expected:
      dynamo:
        reasoning_text: preamble
        normal_text: 'bodyanswer'
        reason: 'Lossless split: stray <channel|> close marker after a complete reasoning span is stripped (parser-owned syntax must not appear in normal_text).'
      vllm:
        reasoning_text: 'preamble'
        normal_text: 'body<channel|>answer'
      sglang:
        reasoning_text: 'preamble'
        normal_text: 'body<channel|>answer'
  REASONING.batch.3.c:
    description: Recipientless Harmony commentary is not applicable to Gemma 4
    reason: Gemma 4 uses Gemma thought channels, not Harmony commentary channels; visible text and downstream tool handoff use Gemma-specific markers.
  REASONING.batch.3.d:
    description: Directed Harmony commentary tool calls are not applicable to Gemma 4
    reason: Gemma 4 does not use Harmony `commentary to=functions.*` envelopes; downstream tool calls use Gemma-specific tool markers.
  REASONING.batch.3.e:
    description: Directed Harmony analysis tool calls are not applicable to Gemma 4
    reason: Gemma 4 does not use Harmony `analysis to=functions.*` envelopes; reasoning is represented by Gemma thought channels.
  REASONING.batch.3.f:
    description: Harmony analysis/commentary/final channel sequencing is not applicable to Gemma 4
    reason: Gemma 4 has no Harmony channel protocol, so mixed analysis, commentary tool call, and final-channel sequencing is outside its grammar.
