family: gemma4
model_label: Gemma 4
mode: stream
refs:
  upstream: &upstream_ref 'inspired by vLLM Gemma4 reasoning tests: https://github.com/vllm-project/vllm/blob/39910f2b25aacc09f5e7f166cdf0030b19f8b9e8/tests/reasoning/test_gemma4_reasoning_parser.py; local taxonomy: lib/parsers/REASONING_CASES.md'
cases:
  REASONING.stream.1.a:
    description: Empty stream chunk
    ref: *upstream_ref
    chunks:
    - ''
    expected:
      dynamo: &d_s0
        reasoning_text: ''
        normal_text: ''
      vllm: *d_s0
      sglang: *d_s0
  REASONING.stream.2.a:
    description: Gemma thought channel across chunks
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://docs.vllm.ai/en/v0.21.0/api/vllm/reasoning/gemma4_reasoning_parser/; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    chunks:
    - |
      <|channel>thought
      step one
    - step two<channel|>
    - The answer is 42.
    expected:
      dynamo: &d_s1
        reasoning_text: |-
          step one
          step two
        normal_text: The answer is 42.
      vllm:
        reasoning_text: |-
          <|channel>thought
          step one
          step two
        normal_text: The answer is 42.
        reason: Dynamo strips Gemma channel syntax and the thought role label; vLLM leaks the channel prefix in streaming.
      sglang: *d_s1
  REASONING.stream.2.b:
    description: Multiple Gemma thought channels across chunks
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://docs.vllm.ai/en/v0.21.0/api/vllm/reasoning/gemma4_reasoning_parser/; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    chunks:
    - |-
      <|channel>thought
      first<channel|>
    - ' middle '
    - |-
      <|channel>thought
      second<channel|> done
    expected:
      dynamo:
        reasoning_text: firstsecond
        normal_text: ' middle  done'
      vllm:
        reasoning_text: first
        normal_text: |2-
           middle <|channel>thought
          second<channel|> done
        reason: Dynamo extracts each complete Gemma thought channel across chunks; vLLM leaves the later complete channel in normal_text.
      sglang:
        reasoning_text: first
        normal_text: |2-
           middle <|channel>thought
          second<channel|> done
        reason: Dynamo re-enters reasoning on each open marker across chunks and concatenates all spans; SGLang exits at the first end marker and does not re-enter, leaving the later span in normal_text.
  REASONING.stream.3.a:
    description: Start marker split across chunks
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://docs.vllm.ai/en/v0.21.0/api/vllm/reasoning/gemma4_reasoning_parser/; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    chunks:
    - <|chan
    - |-
      nel>thought
      thinking<channel|>answer
    expected:
      dynamo: &d_s2
        reasoning_text: thinking
        normal_text: answer
      vllm:
        reasoning_text: ''
        normal_text: |-
          <|channel>thought
          thinking<channel|>answer
        reason: Dynamo buffers a split Gemma start delimiter and extracts the channel; vLLM leaves the full channel in normal_text.
      sglang: *d_s2
  REASONING.stream.3.b:
    description: End marker split across chunks
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://docs.vllm.ai/en/v0.21.0/api/vllm/reasoning/gemma4_reasoning_parser/; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    chunks:
    - |-
      <|channel>thought
      thinking<chan
    - nel|>answer
    expected:
      dynamo:
        reasoning_text: thinking
        normal_text: answer
      vllm:
        reasoning_text: |-
          <|channel>thought
          thinking<channel|>answer
        normal_text: ''
        reason: Dynamo buffers a split Gemma end delimiter and resumes normal_text after it; vLLM keeps the delimiter and answer in reasoning_text.
      sglang:
        reasoning_text: thinking<channel|>answer
        normal_text: ''
        reason: Dynamo buffers an end marker split across chunk boundaries and resumes normal_text after it; SGLang streams the partial delimiter as reasoning (it only holds back a partial marker when the whole pending buffer is a marker prefix), so the split marker is never reassembled and the answer stays in reasoning_text.
  REASONING.stream.3.c:
    description: Partial channel marker prefix later becomes normal text
    ref: *upstream_ref
    chunks:
    - plain <|chan
    - ce answer
    expected:
      dynamo: &d_s6
        reasoning_text: ''
        normal_text: plain <|chance answer
      vllm: *d_s6
      sglang: *d_s6
  REASONING.stream.1.b:
    description: Plain text never enters reasoning mode
    ref: *upstream_ref
    chunks:
    - plain
    - ' answer'
    expected:
      dynamo: &d_s4
        reasoning_text: ''
        normal_text: plain answer
      vllm: *d_s4
      sglang: *d_s4
  REASONING.stream.2.c:
    description: Stray end marker after a complete reasoning span, across chunks(unbalanced-tag)
    ref: dynamo
    spec_ref: tests/parity/README.md
    chunks:
    - "<|channel>thought\npreamble<channel|>"
    - 'body<channel|>'
    - 'answer'
    expected:
      dynamo:
        reasoning_text: preamble
        normal_text: 'bodyanswer'
        reason: 'Lossless split: stray <channel|> close marker after a complete reasoning span is stripped (parser-owned syntax must not appear in normal_text).'
      vllm:
        reasoning_text: 'preamble'
        normal_text: 'body<channel|>answer'
      sglang:
        reasoning_text: 'preamble'
        normal_text: 'body<channel|>answer'
