family: deepseek_v3
model_label: DeepSeek V3.x
mode: stream
refs:
  upstream: &upstream_ref 'inspired by vLLM DeepSeek V3 reasoning tests: https://github.com/vllm-project/vllm/blob/39910f2b25aacc09f5e7f166cdf0030b19f8b9e8/tests/reasoning/test_deepseekv3_reasoning_parser.py; local taxonomy: lib/parsers/REASONING_CASES.md'
chat_template_kwargs:
  thinking: true
cases:
  REASONING.stream.1.a:
    description: Empty stream chunk
    ref: *upstream_ref
    chunks:
    - ''
    expected:
      dynamo: &d_s0
        reasoning_text: ''
        normal_text: ''
      vllm: *d_s0
      sglang: *d_s0
  REASONING.stream.2.a:
    description: Single reasoning block across chunks
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://api-docs.deepseek.com/guides/thinking_mode; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    chunks:
    - <think>thin
    - king</think>
    - answer
    expected:
      dynamo: &d_s1
        reasoning_text: thinking
        normal_text: answer
      vllm:
        reasoning_text: <think>thinking
        normal_text: answer
        reason: Dynamo strips reasoning delimiters even when the block is streamed across chunks; vLLM leaks the start delimiter.
      sglang: *d_s1
  REASONING.stream.2.b:
    description: Multiple reasoning spans across chunks
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://api-docs.deepseek.com/guides/thinking_mode; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    chunks:
    - <think>first</think>
    - ' middle '
    - <think>second</think> done
    expected:
      dynamo:
        reasoning_text: firstsecond
        normal_text: ' middle  done'
      vllm:
        reasoning_text: first
        normal_text: ' middle <think>second</think> done'
        reason: Dynamo extracts each complete reasoning span across chunks; vLLM leaves the later complete span in normal_text.
      sglang:
        reasoning_text: first
        normal_text: ' middle <think>second</think> done'
        reason: Dynamo re-enters reasoning on each open marker across chunks and concatenates all spans; SGLang exits at the first end marker and does not re-enter, leaving the later span in normal_text.
  REASONING.stream.3.a:
    description: Start marker split across chunks
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://api-docs.deepseek.com/guides/thinking_mode; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    chunks:
    - <th
    - ink>thinking</think>answer
    expected:
      dynamo: &d_s2
        reasoning_text: thinking
        normal_text: answer
      vllm:
        reasoning_text: <think>thinking
        normal_text: answer
        reason: Dynamo buffers a split start delimiter and strips it; vLLM leaks the reconstructed delimiter.
      sglang: *d_s2
  REASONING.stream.3.b:
    description: End marker split across chunks
    ref: *upstream_ref
    spec_ref: lib/parsers/REASONING_CASES.md; https://api-docs.deepseek.com/guides/thinking_mode; https://docs.nvidia.com/dynamo/dev/user-guides/reasoning/reasoning-parsing-dynamo
    chunks:
    - <think>thinking</th
    - ink>answer
    expected:
      dynamo:
        reasoning_text: thinking
        normal_text: answer
      vllm:
        reasoning_text: <think>thinking</think>answer
        normal_text: ''
        reason: Dynamo buffers a split end delimiter and resumes normal_text after it; vLLM keeps the delimiter and answer in reasoning_text.
      sglang:
        reasoning_text: thinking</think>answer
        normal_text: ''
        reason: Dynamo buffers an end marker split across chunk boundaries and resumes normal_text after it; SGLang streams the partial delimiter as reasoning, so the split marker is never reassembled and the answer stays in reasoning_text.
  REASONING.stream.3.c:
    description: Partial start-marker prefix later resolves as force-reasoning text
    ref: *upstream_ref
    chunks:
    - plain <th
    - esis answer
    expected:
      dynamo: &d_s6
        reasoning_text: plain <thesis answer
        normal_text: ''
      vllm: *d_s6
      sglang:
        reasoning_text: ''
        normal_text: plain <thesis answer
        reason: Dynamo/vLLM keep marker-free chunks in force-reasoning mode; SGLang treats the unresolved partial marker as normal_text.
  REASONING.stream.1.b:
    description: Plain text stays in force-reasoning mode until an end marker
    ref: *upstream_ref
    chunks:
    - plain
    - ' answer'
    expected:
      dynamo: &d_s4
        reasoning_text: plain answer
        normal_text: ''
      vllm: *d_s4
      sglang:
        reasoning_text: ''
        normal_text: plain answer
        reason: Dynamo/vLLM keep marker-free stream text in force-reasoning mode; SGLang only enters reasoning after an explicit start marker.
  REASONING.stream.2.c:
    description: Stray end marker after a complete reasoning span, across chunks(unbalanced-tag)
    ref: dynamo
    spec_ref: tests/parity/README.md
    chunks:
    - '<think>preamble</think>'
    - 'body</think>'
    - 'answer'
    expected:
      dynamo:
        reasoning_text: preamble
        normal_text: 'bodyanswer'
        reason: 'Lossless split: when a stray close marker appears outside any reasoning block, it is stripped (parser-owned syntax must not appear in normal_text). Reasoning is captured from the first <open>...<close> pair only; subsequent stray closes are discarded.'
      vllm:
        reasoning_text: 'preamble'
        normal_text: 'body</think>answer'
      sglang:
        reasoning_text: 'preamble'
        normal_text: 'body</think>answer'
  REASONING.stream.4.a:
    description: Downstream streaming boundary is not applicable to DeepSeek V3
    reason: DeepSeek V3 has no configured Harmony commentary boundary; closed-span handoff is covered by REASONING.batch.3.a.
  REASONING.stream.4.b:
    description: Split downstream streaming boundary is not applicable to DeepSeek V3
    reason: DeepSeek V3 has no Harmony `commentary to=functions.*` stream boundary to split across chunks.
  REASONING.stream.4.c:
    description: Partial downstream boundary recovery is not applicable to DeepSeek V3
    reason: DeepSeek V3 has no Harmony commentary protocol, so partial commentary-boundary recovery is outside its grammar.
  REASONING.stream.4.d:
    description: Directed Harmony analysis tool calls are not applicable to DeepSeek V3
    reason: This parser family does not use Harmony `analysis to=functions.*` envelopes, so split analysis-channel tool-call handoff is outside its grammar.
