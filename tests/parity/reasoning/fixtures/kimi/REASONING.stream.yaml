family: kimi
model_label: Kimi Unicode reasoning
mode: stream
cases:
  REASONING.stream.1.a:
    description: Empty stream chunk
    ref: dynamo
    chunks:
    - ''
    expected:
      dynamo: &d_s0
        reasoning_text: ''
        normal_text: ''
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang: *d_s0
  REASONING.stream.2.b:
    description: Multiple reasoning spans across chunks
    ref: dynamo
    chunks:
    - в—Ѓthinkв–·firstв—Ѓ/thinkв–·
    - ' middle '
    - в—Ѓthinkв–·secondв—Ѓ/thinkв–· done
    expected:
      dynamo:
        reasoning_text: firstsecond
        normal_text: ' middle  done'
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        reasoning_text: first
        normal_text: ' middle в—Ѓthinkв–·secondв—Ѓ/thinkв–· done'
  REASONING.stream.2.a:
    description: Single reasoning block across chunks
    ref: dynamo
    chunks:
    - в—Ѓthinkв–·thin
    - kingв—Ѓ/thinkв–·
    - answer
    expected:
      dynamo: &d_s1
        reasoning_text: thinking
        normal_text: answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang: *d_s1
  REASONING.stream.3.a:
    description: Start marker split across chunks
    ref: dynamo
    chunks:
    - в—Ѓthi
    - nkв–·thinkingв—Ѓ/thinkв–·answer
    expected:
      dynamo: &d_s2
        reasoning_text: thinking
        normal_text: answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang: *d_s2
  REASONING.stream.3.b:
    description: End marker split across chunks
    ref: dynamo
    chunks:
    - в—Ѓthinkв–·thinkingв—Ѓ/thi
    - nkв–·answer
    expected:
      dynamo:
        reasoning_text: thinking
        normal_text: answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        reasoning_text: thinkingв—Ѓ/thinkв–·answer
        normal_text: ''
  REASONING.stream.3.c:
    description: Partial start-marker prefix later becomes normal text
    ref: dynamo
    chunks:
    - plain в—Ѓth
    - esis answer
    expected:
      dynamo: &d_s6
        reasoning_text: ''
        normal_text: plain в—Ѓthesis answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang: *d_s6
  REASONING.stream.1.b:
    description: Plain text without reasoning markers
    ref: dynamo
    chunks:
    - plain
    - ' answer'
    expected:
      dynamo: &d_s4
        reasoning_text: ''
        normal_text: plain answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang: *d_s4
  REASONING.stream.2.c:
    description: Stray end marker after a complete reasoning span, across chunks(unbalanced-tag)
    ref: dynamo
    spec_ref: tests/parity/README.md
    chunks:
    - 'в—Ѓthinkв–·preambleв—Ѓ/thinkв–·'
    - 'bodyв—Ѓ/thinkв–·'
    - 'answer'
    expected:
      dynamo:
        reasoning_text: preamble
        normal_text: 'bodyanswer'
        reason: 'Lossless split: when a stray close marker appears outside any reasoning block, it is stripped (parser-owned syntax must not appear in normal_text). Reasoning is captured from the first <open>...<close> pair only; subsequent stray closes are discarded.'
      vllm:
        unavailable: "UNAVAILABLE: vLLM has no reasoning parser for family='kimi'"
      sglang:
        reasoning_text: 'preamble'
        normal_text: 'bodyв—Ѓ/thinkв–·answer'
  REASONING.stream.4.a:
    description: Downstream streaming boundary is not applicable to this Kimi delimiter family
    reason: This parser family has no configured Harmony commentary boundary; closed-span handoff is covered by REASONING.batch.3.a.
  REASONING.stream.4.b:
    description: Split downstream streaming boundary is not applicable to this Kimi delimiter family
    reason: This parser family has no Harmony `commentary to=functions.*` stream boundary to split across chunks.
  REASONING.stream.4.c:
    description: Partial downstream boundary recovery is not applicable to this Kimi delimiter family
    reason: This parser family has no Harmony commentary protocol, so partial commentary-boundary recovery is outside its grammar.
  REASONING.stream.4.d:
    description: Directed Harmony analysis tool calls are not applicable to this Kimi delimiter family
    reason: This parser family does not use Harmony `analysis to=functions.*` envelopes, so split analysis-channel tool-call handoff is outside its grammar.
