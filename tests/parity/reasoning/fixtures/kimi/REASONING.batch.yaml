family: kimi
model_label: Kimi Unicode reasoning
mode: batch
cases:
  REASONING.batch.1.b:
    description: Plain text without Kimi reasoning delimiters
    ref: dynamo
    model_text: plain answer
    expected:
      dynamo: &d_0
        reasoning_text: ''
        normal_text: plain answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang: *d_0
  REASONING.batch.2.a:
    description: Single reasoning block with Kimi delimiters
    ref: dynamo
    model_text: â—پthinkâ–·thinkingâ—پ/thinkâ–·answer
    expected:
      dynamo: &d_1
        reasoning_text: thinking
        normal_text: answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang: *d_1
  REASONING.batch.3.a:
    description: Reasoning followed by downstream tool-call text
    ref: dynamo
    model_text: â—پthinkâ–·choose toolâ—پ/thinkâ–·<|tool_calls_section_begin|><|tool_call_begin|>functions.get_weather:0<|tool_call_argument_begin|>{"location":"NYC"}<|tool_call_end|><|tool_calls_section_end|>
    expected:
      dynamo: &d_2
        reasoning_text: choose tool
        normal_text: <|tool_calls_section_begin|><|tool_call_begin|>functions.get_weather:0<|tool_call_argument_begin|>{"location":"NYC"}<|tool_call_end|><|tool_calls_section_end|>
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang: *d_2
  REASONING.batch.2.c:
    description: Reasoning followed by normal answer text
    ref: dynamo
    model_text: â—پthinkâ–·computeâ—پ/thinkâ–·answer
    expected:
      dynamo: &d_3
        reasoning_text: compute
        normal_text: answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang: *d_3
  REASONING.batch.4:
    description: Dangling end marker without an opening think tag
    dynamo_leak: true
    ref: dynamo
    model_text: normalâ—پ/thinkâ–·answer
    expected:
      dynamo: &d_4
        reasoning_text: ''
        normal_text: normalâ—پ/thinkâ–·answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang: *d_4
  REASONING.batch.5:
    description: Missing end marker keeps the remaining text as reasoning
    ref: dynamo
    model_text: â—پthinkâ–·partial reasoning
    expected:
      dynamo: &d_5
        reasoning_text: partial reasoning
        normal_text: ''
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang: *d_5
  REASONING.batch.2.e:
    description: Empty reasoning block
    ref: dynamo
    model_text: â—پthinkâ–·â—پ/thinkâ–·answer
    expected:
      dynamo: &d_6
        reasoning_text: ''
        normal_text: answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang: *d_6
  REASONING.batch.2.f:
    description: Complex reasoning content with Unicode and newlines
    ref: dynamo
    model_text: |-
      â—پthinkâ–·Line 1
      Unicode: cafأ©
      JSON-ish: {"x": [1, true]}â—پ/thinkâ–·Done.
    expected:
      dynamo: &d_7
        reasoning_text: |-
          Line 1
          Unicode: cafأ©
          JSON-ish: {"x": [1, true]}
        normal_text: Done.
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang: *d_7
  REASONING.batch.1.a:
    description: Empty input
    ref: dynamo
    model_text: ''
    expected:
      dynamo: &d_8
        reasoning_text: ''
        normal_text: ''
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang: *d_8
  REASONING.batch.6.a:
    description: Multiple reasoning spans are concatenated
    ref: dynamo
    model_text: â—پthinkâ–·firstâ—پ/thinkâ–· middle â—پthinkâ–·secondâ—پ/thinkâ–· done
    expected:
      dynamo:
        reasoning_text: firstsecond
        normal_text: middle  done
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        reasoning_text: first
        normal_text: ' middle â—پthinkâ–·secondâ—پ/thinkâ–· done'
  REASONING.batch.2.d:
    description: Normal text before and after a Kimi reasoning span
    ref: dynamo
    model_text: before â—پthinkâ–·thinkingâ—پ/thinkâ–· after
    expected:
      dynamo:
        reasoning_text: thinking
        normal_text: before  after
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        reasoning_text: before thinking
        normal_text: ' after'
  REASONING.batch.3.b:
    description: Open reasoning interrupted by downstream tool-call text is not configured for this Kimi delimiter family
    ref: dynamo
    reason: Dynamo's Kimi Unicode-delimiter reasoning parser has no downstream tool-call boundary while reasoning is open; closed-span handoff is covered by REASONING.batch.3.a.
  REASONING.batch.6.b:
    description: Stray end marker after a complete reasoning span(unbalanced-tag)
    ref: dynamo
    spec_ref: tests/parity/README.md
    model_text: 'â—پthinkâ–·preambleâ—پ/thinkâ–·bodyâ—پ/thinkâ–·answer'
    expected:
      dynamo:
        reasoning_text: preamble
        normal_text: 'bodyanswer'
        reason: 'Lossless split: when a stray close marker appears outside any reasoning block, it is stripped (parser-owned syntax must not appear in normal_text). Reasoning is captured from the first <open>...<close> pair only; subsequent stray closes are discarded.'
      vllm:
        unavailable: "UNAVAILABLE: vLLM has no reasoning parser for family='kimi'"
      sglang:
        reasoning_text: 'preamble'
        normal_text: 'bodyâ—پ/thinkâ–·answer'
  REASONING.batch.3.c:
    description: Recipientless Harmony commentary is not applicable to this Kimi delimiter family
    reason: This parser family does not use Harmony commentary channels; visible text and downstream tool handoff use Kimi-specific reasoning and tool-call markers.
  REASONING.batch.3.d:
    description: Directed Harmony commentary tool calls are not applicable to this Kimi delimiter family
    reason: This parser family does not use Harmony `commentary to=functions.*` envelopes; downstream tool calls use Kimi-specific tool-call markers.
  REASONING.batch.3.e:
    description: Directed Harmony analysis tool calls are not applicable to this Kimi delimiter family
    reason: This parser family does not use Harmony `analysis to=functions.*` envelopes; reasoning is represented by Kimi-specific reasoning delimiters.
  REASONING.batch.3.f:
    description: Harmony analysis/commentary/final channel sequencing is not applicable to this Kimi delimiter family
    reason: This parser family has no Harmony channel protocol, so mixed analysis, commentary tool call, and final-channel sequencing is outside its grammar.
