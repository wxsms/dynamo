family: kimi
model_label: Kimi reasoning
mode: batch
cases:
  REASONING.batch.1.b:
    description: Plain text without Kimi reasoning delimiters
    ref: dynamo
    model_text: plain answer
    expected:
      dynamo: &d_0
        reasoning_text: ''
        normal_text: plain answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        unavailable: SGLang has no Kimi reasoning parser for this delimiter family.
  REASONING.batch.2.a:
    description: Single reasoning block with Kimi delimiters
    ref: dynamo
    model_text: в—Ѓthinkв–·thinkingв—Ѓ/thinkв–·answer
    expected:
      dynamo: &d_1
        reasoning_text: thinking
        normal_text: answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        unavailable: SGLang has no Kimi reasoning parser for this delimiter family.
  REASONING.batch.3.a:
    description: Reasoning followed by downstream tool-call text
    ref: dynamo
    model_text: в—Ѓthinkв–·choose toolв—Ѓ/thinkв–·<tool_call>{}
    expected:
      dynamo: &d_2
        reasoning_text: choose tool
        normal_text: <tool_call>{}
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        unavailable: SGLang has no Kimi reasoning parser for this delimiter family.
  REASONING.batch.2.c:
    description: Reasoning followed by normal answer text
    ref: dynamo
    model_text: в—Ѓthinkв–·computeв—Ѓ/thinkв–·answer
    expected:
      dynamo: &d_3
        reasoning_text: compute
        normal_text: answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        unavailable: SGLang has no Kimi reasoning parser for this delimiter family.
  REASONING.batch.4:
    description: Dangling end marker without an opening think tag
    dynamo_leak: true
    ref: dynamo
    model_text: normalв—Ѓ/thinkв–·answer
    expected:
      dynamo: &d_4
        reasoning_text: ''
        normal_text: normalв—Ѓ/thinkв–·answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        unavailable: SGLang has no Kimi reasoning parser for this delimiter family.
  REASONING.batch.5:
    description: Missing end marker keeps the remaining text as reasoning
    ref: dynamo
    model_text: в—Ѓthinkв–·partial reasoning
    expected:
      dynamo: &d_5
        reasoning_text: partial reasoning
        normal_text: ''
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        unavailable: SGLang has no Kimi reasoning parser for this delimiter family.
  REASONING.batch.2.e:
    description: Empty reasoning block
    ref: dynamo
    model_text: в—Ѓthinkв–·в—Ѓ/thinkв–·answer
    expected:
      dynamo: &d_6
        reasoning_text: ''
        normal_text: answer
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        unavailable: SGLang has no Kimi reasoning parser for this delimiter family.
  REASONING.batch.2.f:
    description: Complex reasoning content with Unicode and newlines
    ref: dynamo
    model_text: |-
      в—Ѓthinkв–·Line 1
      Unicode: cafГ©
      JSON-ish: {"x": [1, true]}в—Ѓ/thinkв–·Done.
    expected:
      dynamo: &d_7
        reasoning_text: |-
          Line 1
          Unicode: cafГ©
          JSON-ish: {"x": [1, true]}
        normal_text: Done.
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        unavailable: SGLang has no Kimi reasoning parser for this delimiter family.
  REASONING.batch.1.a:
    description: Empty input
    ref: dynamo
    model_text: ''
    expected:
      dynamo: &d_8
        reasoning_text: ''
        normal_text: ''
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        unavailable: SGLang has no Kimi reasoning parser for this delimiter family.
  REASONING.batch.6.a:
    description: Multiple reasoning spans are concatenated
    ref: dynamo
    model_text: в—Ѓthinkв–·firstв—Ѓ/thinkв–· middle в—Ѓthinkв–·secondв—Ѓ/thinkв–· done
    expected:
      dynamo: &d_9
        reasoning_text: firstsecond
        normal_text: middle  done
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        unavailable: SGLang has no Kimi reasoning parser for this delimiter family.
  REASONING.batch.2.d:
    description: Normal text before and after a Kimi reasoning span
    ref: dynamo
    model_text: before в—Ѓthinkв–·thinkingв—Ѓ/thinkв–· after
    expected:
      dynamo: &d_10
        reasoning_text: thinking
        normal_text: before  after
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        unavailable: SGLang has no Kimi reasoning parser for this delimiter family.
  REASONING.batch.3.b:
    description: Tool-call boundary inside an open Kimi reasoning span
    dynamo_leak: true
    ref: dynamo
    model_text: в—Ѓthinkв–·choose tool<tool_call>{}
    expected:
      dynamo: &d_11
        reasoning_text: choose tool<tool_call>{}
        normal_text: ''
      vllm:
        unavailable: vLLM has no Kimi reasoning parser for this delimiter family.
      sglang:
        unavailable: SGLang has no Kimi reasoning parser for this delimiter family.
