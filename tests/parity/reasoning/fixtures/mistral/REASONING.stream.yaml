family: mistral
model_label: Mistral / Magistral
mode: stream
refs:
  upstream: &upstream_ref 'inspired by vLLM Mistral reasoning tests: https://github.com/vllm-project/vllm/blob/39910f2b25aacc09f5e7f166cdf0030b19f8b9e8/tests/reasoning/test_mistral_reasoning_parser.py; local taxonomy: lib/parsers/REASONING_CASES.md'
cases:
  REASONING.stream.1.a:
    description: Empty stream chunk
    ref: *upstream_ref
    chunks:
    - ''
    expected:
      dynamo: &d_s0
        reasoning_text: ''
        normal_text: ''
      vllm: *d_s0
      sglang: *d_s0
  REASONING.stream.2.a:
    description: Mistral THINK block across chunks
    ref: *upstream_ref
    chunks:
    - '[THINK]thin'
    - king[/THINK]answer
    expected:
      dynamo: &d_s1
        reasoning_text: thinking
        normal_text: answer
      vllm:
        reasoning_text: '[THINK]thinking'
        normal_text: answer
      sglang: *d_s1
  REASONING.stream.2.b:
    description: Multiple Mistral THINK spans across chunks
    ref: *upstream_ref
    chunks:
    - '[THINK]first[/THINK]'
    - ' middle '
    - '[THINK]second[/THINK] done'
    expected:
      dynamo:
        reasoning_text: firstsecond
        normal_text: ' middle  done'
      vllm:
        reasoning_text: first
        normal_text: ' middle [THINK]second[/THINK] done'
      sglang:
        reasoning_text: first
        normal_text: ' middle [THINK]second[/THINK] done'
  REASONING.stream.3.a:
    description: Start marker split across chunks
    ref: *upstream_ref
    chunks:
    - '[TH'
    - INK]thinking[/THINK]answer
    expected:
      dynamo: &d_s2
        reasoning_text: thinking
        normal_text: answer
      vllm:
        reasoning_text: ''
        normal_text: '[THINK]thinking[/THINK]answer'
      sglang: *d_s2
  REASONING.stream.3.b:
    description: End marker split across chunks
    ref: *upstream_ref
    chunks:
    - '[THINK]thinking[/TH'
    - INK]answer
    expected:
      dynamo:
        reasoning_text: thinking
        normal_text: answer
      vllm:
        reasoning_text: '[THINK]thinking[/THINK]answer'
        normal_text: ''
      sglang:
        reasoning_text: thinking[/THINK]answer
        normal_text: ''
  REASONING.stream.3.c:
    description: Partial start-marker prefix later resolves as force-reasoning text
    ref: *upstream_ref
    chunks:
    - plain [TH
    - ESIS answer
    expected:
      dynamo:
        reasoning_text: plain [THESIS answer
        normal_text: ''
      vllm:
        reasoning_text: ''
        normal_text: plain [THESIS answer
        reason: vLLM Mistral streaming parser only enters reasoning after an explicit start marker.
      sglang:
        reasoning_text: ''
        normal_text: plain [THESIS answer
  REASONING.stream.1.b:
    description: Plain text stays in force-reasoning mode until an end marker
    ref: *upstream_ref
    chunks:
    - plain
    - ' answer'
    expected:
      dynamo:
        reasoning_text: plain answer
        normal_text: ''
      vllm:
        reasoning_text: ''
        normal_text: plain answer
        reason: vLLM Mistral streaming parser only enters reasoning after an explicit start marker.
      sglang:
        reasoning_text: ''
        normal_text: plain answer
  REASONING.stream.2.c:
    description: Stray end marker after a complete reasoning span, across chunks(unbalanced-tag)
    ref: dynamo
    spec_ref: tests/parity/README.md
    chunks:
    - '[THINK]preamble[/THINK]'
    - 'body[/THINK]'
    - 'answer'
    expected:
      dynamo:
        reasoning_text: preamble
        normal_text: 'bodyanswer'
        reason: 'Lossless split: when a stray close marker appears outside any reasoning block, it is stripped (parser-owned syntax must not appear in normal_text). Reasoning is captured from the first <open>...<close> pair only; subsequent stray closes are discarded.'
      vllm:
        reasoning_text: 'preamble'
        normal_text: 'body[/THINK]answer'
      sglang:
        reasoning_text: 'preamble'
        normal_text: 'body[/THINK]answer'
