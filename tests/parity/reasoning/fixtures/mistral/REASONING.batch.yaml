family: mistral
model_label: Mistral / Magistral
mode: batch
refs:
  upstream: &upstream_ref 'inspired by vLLM Mistral reasoning tests: https://github.com/vllm-project/vllm/blob/39910f2b25aacc09f5e7f166cdf0030b19f8b9e8/tests/reasoning/test_mistral_reasoning_parser.py; local taxonomy: lib/parsers/REASONING_CASES.md'
cases:
  REASONING.batch.1.b:
    description: Plain text stays in force-reasoning mode in Dynamo
    ref: *upstream_ref
    model_text: plain answer
    expected:
      dynamo:
        reasoning_text: plain answer
        normal_text: ''
      vllm:
        reasoning_text: ''
        normal_text: plain answer
        reason: vLLM Mistral parser only enters reasoning after the explicit start token.
      sglang:
        reasoning_text: ''
        normal_text: plain answer
  REASONING.batch.2.a:
    description: Mistral THINK block
    ref: *upstream_ref
    model_text: '[THINK]thinking[/THINK]answer'
    expected:
      dynamo: &d_1
        reasoning_text: thinking
        normal_text: answer
      vllm: *d_1
      sglang: *d_1
  REASONING.batch.3.a:
    description: Mistral reasoning followed by downstream tool-call text
    ref: *upstream_ref
    model_text: '[THINK]choose tool[/THINK][TOOL_CALLS][{"name": "get_weather", "arguments": {"location": "NYC"}}][/TOOL_CALLS]'
    expected:
      dynamo: &d_2
        reasoning_text: choose tool
        normal_text: '[TOOL_CALLS][{"name": "get_weather", "arguments": {"location": "NYC"}}][/TOOL_CALLS]'
      vllm: *d_2
      sglang: *d_2
  REASONING.batch.3.b:
    description: Open reasoning interrupted by downstream tool-call text is not configured for Mistral
    ref: *upstream_ref
    reason: Dynamo's Mistral reasoning parser has no downstream tool-call boundary while reasoning is open; closed-span handoff is covered by REASONING.batch.3.a.
  REASONING.batch.2.c:
    description: Mistral reasoning followed by normal answer text
    ref: *upstream_ref
    model_text: '[THINK]compute[/THINK]answer'
    expected:
      dynamo: &d_3
        reasoning_text: compute
        normal_text: answer
      vllm: *d_3
      sglang: *d_3
  REASONING.batch.2.d:
    description: Normal text around reasoning is not applicable in force-reasoning mode
    reason: Force-reasoning parser families start inside reasoning; marker-free prefix text is not a normal-text prefix.
  REASONING.batch.4:
    description: Dangling Mistral end marker without an opening marker
    ref: *upstream_ref
    model_text: normal[/THINK]answer
    expected:
      dynamo:
        reasoning_text: normal
        normal_text: answer
      vllm:
        reasoning_text: ''
        normal_text: normalanswer
        reason: vLLM Mistral parser treats a dangling end marker as normal text and strips the marker.
      sglang:
        reasoning_text: ''
        normal_text: normal[/THINK]answer
  REASONING.batch.5:
    description: Force-reasoning parser treats unterminated text as reasoning
    ref: *upstream_ref
    model_text: thinking without an end marker
    expected:
      dynamo:
        reasoning_text: thinking without an end marker
        normal_text: ''
      vllm:
        reasoning_text: ''
        normal_text: thinking without an end marker
        reason: vLLM Mistral parser only enters reasoning after the explicit start token.
      sglang:
        reasoning_text: ''
        normal_text: thinking without an end marker
  REASONING.batch.2.e:
    description: Empty Mistral reasoning block
    ref: *upstream_ref
    model_text: '[THINK][/THINK]answer'
    expected:
      dynamo: &d_6
        reasoning_text: ''
        normal_text: answer
      vllm: *d_6
      sglang: *d_6
  REASONING.batch.2.f:
    description: Complex Mistral reasoning content with Unicode and newlines
    ref: *upstream_ref
    model_text: |-
      [THINK]Line 1
      Unicode: café
      JSON-ish: {"x": [1, true]}[/THINK]Done.
    expected:
      dynamo: &d_7
        reasoning_text: |-
          Line 1
          Unicode: café
          JSON-ish: {"x": [1, true]}
        normal_text: Done.
      vllm: *d_7
      sglang: *d_7
  REASONING.batch.1.a:
    description: Empty input
    ref: *upstream_ref
    model_text: ''
    expected:
      dynamo: &d_8
        reasoning_text: ''
        normal_text: ''
      vllm: *d_8
      sglang: *d_8
  REASONING.batch.6.a:
    description: Multiple Mistral reasoning spans are concatenated by Dynamo
    ref: *upstream_ref
    model_text: '[THINK]first[/THINK] middle [THINK]second[/THINK] done'
    expected:
      dynamo:
        reasoning_text: firstsecond
        normal_text: middle  done
      vllm:
        reasoning_text: first
        normal_text: ' middle [THINK]second[/THINK] done'
      sglang:
        reasoning_text: first
        normal_text: ' middle [THINK]second[/THINK] done'
  REASONING.batch.6.b:
    description: Stray end marker after a complete reasoning span(unbalanced-tag)
    ref: dynamo
    spec_ref: tests/parity/README.md
    model_text: '[THINK]preamble[/THINK]body[/THINK]answer'
    expected:
      dynamo:
        reasoning_text: preamble
        normal_text: 'bodyanswer'
        reason: 'Lossless split: when a stray close marker appears outside any reasoning block, it is stripped (parser-owned syntax must not appear in normal_text). Reasoning is captured from the first <open>...<close> pair only; subsequent stray closes are discarded.'
      vllm:
        reasoning_text: 'preamble'
        normal_text: 'body[/THINK]answer'
      sglang:
        reasoning_text: 'preamble'
        normal_text: 'body[/THINK]answer'
